    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#EEF7F1;overflow-x:hidden;font-family:'Noto Sans KR',-apple-system,sans-serif}
    #root{min-height:100vh}
    [contenteditable]:empty:before{content:attr(data-placeholder);color:#9FB8A8;pointer-events:none;position:absolute}
    .rich-editor{outline:none;position:relative}
    .rich-editor img{max-width:100%;border-radius:10px;margin:4px 0;display:block}
    .rich-editor mark{padding:1px 3px;border-radius:3px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(16px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fi{animation:fadeUp .28s cubic-bezier(.22,1,.36,1) both}
    button:active{transform:scale(0.96);transition:transform .1s}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(0,112,74,0.15);border-radius:4px}

      set:async(k,v,s)=>{localStorage.setItem((s?"sh_":"pr_")+k,v);return{key:k,value:v,shared:s}},
      delete:async(k,s)=>{localStorage.removeItem((s?"sh_":"pr_")+k);return{key:k,deleted:true,shared:s}},
      list:async(p,s)=>{const px=(s?"sh_":"pr_")+(p||"");return{keys:Object.keys(localStorage).filter(k=>k.startsWith(px)),shared:s}}

/* ─── Gist Sync Engine ──────────────────────────── */
const GIST_FILENAME = "starbucks_store_data.json";
const SYNC_KEYS = [
  "sbx6_notices","sbx6_events","sbx6_categories",
  "sbx_teamtasks","sbx6_profile",
  "sbx_order_records","sbx_order_items","sbx_order_buffers"
];

const GistSync = {
  getToken: () => { try { return localStorage.getItem("sbx_gist_token")||""; } catch(e){return "";} },
  getGistId: () => { try { return localStorage.getItem("sbx_gist_id")||""; } catch(e){return "";} },
  setGistId: (id) => { try { localStorage.setItem("sbx_gist_id", id); } catch(e){} },

  /** 현재 localStorage → Gist 에 업로드 (push) */
  push: async () => {
    const token = GistSync.getToken();
    if (!token) throw new Error("NO_TOKEN");
    const payload = {};
    SYNC_KEYS.forEach(k=>{
      const v = localStorage.getItem("sh_"+k) || localStorage.getItem("pr_"+k) || localStorage.getItem(k);
      if(v) payload[k] = v;
    });
    // profile도 포함
    const pv = localStorage.getItem("sbx_profile");
    if(pv) payload["sbx_profile"] = pv;

    const body = {
      description:"Starbucks Store App Data - "+new Date().toISOString(),
      public:false,
      files:{ [GIST_FILENAME]: { content: JSON.stringify(payload) } }
    };
    const gistId = GistSync.getGistId();
    const url = gistId
      ? "https://api.github.com/gists/"+gistId
      : "https://api.github.com/gists";
    const method = gistId ? "PATCH" : "POST";
    const resp = await fetch(url, {
      method, headers:{ Authorization:"token "+token, "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    if (!resp.ok) {
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.message||("HTTP "+resp.status));
    }
    const data = await resp.json();
    GistSync.setGistId(data.id);
    return data.id;
  },

  /** Gist → localStorage 에 덮어쓰기 (pull) */
  pull: async () => {
    const token = GistSync.getToken();
    if (!token) throw new Error("NO_TOKEN");
    const gistId = GistSync.getGistId();
    if (!gistId) throw new Error("NO_GIST");
    const resp = await fetch("https://api.github.com/gists/"+gistId, {
      headers:{ Authorization:"token "+token }
    });
    if (!resp.ok) throw new Error("HTTP "+resp.status);
    const data = await resp.json();
    const content = data.files?.[GIST_FILENAME]?.content;
    if (!content) throw new Error("EMPTY");
    const payload = JSON.parse(content);
    Object.entries(payload).forEach(([k,v])=>{
      // 공유 데이터는 sh_, 개인은 pr_
      if(SYNC_KEYS.includes(k)) localStorage.setItem("sh_"+k, v);
      else localStorage.setItem(k, v);
    });
    if(payload["sbx_profile"]) localStorage.setItem("sbx_profile", payload["sbx_profile"]);
    return Object.keys(payload).length;
  },

  /** 내 Gist 목록에서 StarbucksStore Gist 찾기 */
  findExisting: async () => {
    const token = GistSync.getToken();
    if (!token) return null;
    let page = 1;
    while (page <= 5) {
      const resp = await fetch("https://api.github.com/gists?per_page=30&page="+page, {
        headers:{ Authorization:"token "+token }
      });
      if (!resp.ok) break;
      const list = await resp.json();
      if (!list.length) break;
      const found = list.find(g => g.files && g.files[GIST_FILENAME]);
      if (found) { GistSync.setGistId(found.id); return found.id; }
      page++;
    }
    return null;
  },

  /** 자동 push - debounce 2초 */
  _timer: null,
  _lastPush: 0,
  autoPush: () => {
    clearTimeout(GistSync._timer);
    // 변경 즉시 pull 차단 시작 (push 예정 상태)
    GistSync._lastPush = Date.now();
    GistSync._timer = setTimeout(async ()=>{
      if(!GistSync.getToken()) return;
      if(!GistSync.getGistId()) {
        await GistSync.findExisting().catch(()=>{});
      }
      await GistSync.push().catch(()=>{});
      // push 완료 시각 갱신 (이후 20초간 pull 스킵)
      GistSync._lastPush = Date.now();
    }, 5000);
  }
};


/* ─── Hooks ─────────────────────────────────────── */
function useShared(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  // loadRef로 안정화 - 리렌더마다 새 참조 생성 방지
  const loadRef = useRef(null);
  loadRef.current = async () => {
    try {
      const r = await window.storage.get(key, true);
      if (r) {
        setData(JSON.parse(r.value));
      } else {
        // localStorage에 없으면 seed 저장 후 사용 (데이터 손실 방지)
        setData(seed);
        if (seed !== null && seed !== undefined) {
          window.storage.set(key, JSON.stringify(seed), true).catch(()=>{});
        }
      }
    }
    catch { setData(seed); }
    finally { setLoading(false); }
  };
  // 최초 1회만 로드
  useEffect(() => { loadRef.current(); }, [key]);
  // sbx-sync 이벤트 수신 - loadRef 사용으로 무한루프 없음
  useEffect(() => {
    const handler = () => loadRef.current();
    window.addEventListener("sbx-sync", handler);
    return () => window.removeEventListener("sbx-sync", handler);
  }, [key]);
  const save = useCallback(async (next) => {
    const val = typeof next === "function" ? next(data||seed) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
    GistSync.autoPush();
  }, [key, data]);
  return [data, save, loading];
}

/* 개인 데이터 (본인만) */
function usePersonal(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!key) { setData(seed); setLoading(false); return; }
    (async () => {
      try { const r = await window.storage.get(key, false); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    if (!key) return;
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), false); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

function EmptyState({ emoji, text, sub, action, actionLabel }) {
  return (
    <div style={{ padding:"36px 20px", textAlign:"center" }}>
      <div style={{ fontSize:36, marginBottom:10 }}>{emoji||"📭"}</div>

      {sub && <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:14 }}>{sub}</div>}
      {action && <button onClick={action} style={{
        padding:"8px 18px", borderRadius:12, border:"none",

        cursor:"pointer", fontFamily:F }}>{actionLabel||"추가하기"}</button>}

  );
}
function EmptyRow({ text }) {
  return <div style={{ padding:"22px 16px", textAlign:"center", color:T.t3, fontSize:14, fontFamily:F }}>{text}</div>;
}

/* ─── Spinner ────────────────────────────────────── */
function Spin({ size=20, color }) {
  return (
    <div style={{ width:size, height:size, borderRadius:"50%",
      border:`2px solid ${color||T.brandDim}`,
      borderTopColor:color||T.brand,
      animation:"spin .7s linear infinite", flexShrink:0 }}/>
  );
}

/* ═══════════════════ APP ══════════════════════════ */
function App() {
  /* 프로필 */
  const [profile, setProfileRaw] = useState(null);
  const [profileLoading, setProfileLoading] = useState(true);
  const [showProfileSetup, setShowProfileSetup] = useState(false);
  // -- 반응형: 항상 최상단에 선언 (조건부 return 전에) --
  const [isPC, setIsPC] = useState(typeof window !== "undefined" ? window.innerWidth >= 768 : false);
  useEffect(()=>{
    const fn = () => setIsPC(window.innerWidth >= 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);

  // -- Gist 자동 pull (앱 시작시 + 2분마다) --
  const doPull = useCallback(async (silent=true) => {
    if (!GistSync.getToken()) return;
    // push 후 20초 이내면 pull 스킵 (충돌 방지)
    if (Date.now() - GistSync._lastPush < 20000) return;
    // Gist ID 없으면 먼저 탐색
    if (!GistSync.getGistId()) {
      const found = await GistSync.findExisting().catch(()=>null);
      if (!found) return; // 연결된 Gist 없음
    }
    if (!silent) setSyncStatus("syncing");
    try {
      // 변경 감지용: pull 전 스냅샷
      const before = ["sbx6_notices","sbx6_events","sbx6_categories","sbx_teamtasks"]
        .map(k=>localStorage.getItem("sh_"+k)).join("|");
      await GistSync.pull();
      const t = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
      localStorage.setItem("sbx_last_sync", t);
      setLastSync(t);
      setSyncStatus("ok");
      const after = ["sbx6_notices","sbx6_events","sbx6_categories","sbx_teamtasks"]
        .map(k=>localStorage.getItem("sh_"+k)).join("|");
      // 데이터가 달라졌으면 커스텀 이벤트로 state 갱신 (reload 없이)
      if (before !== after) {
        window.dispatchEvent(new Event("sbx-sync"));
      }
    } catch(e) {
      setSyncStatus("error");
    }
  }, []);

  useEffect(()=>{
    doPull(true);
    const iv = setInterval(()=>doPull(true), 15*1000);
    return ()=>clearInterval(iv);
  }, [doPull]);

  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get("sbx_profile", false); setProfileRaw(r?JSON.parse(r.value):null); }
      catch { setProfileRaw(null); }
      finally { setProfileLoading(false); }
    })();
  }, []);

  const saveProfile = async (p) => {
    setProfileRaw(p);
    try { await window.storage.set("sbx_profile", JSON.stringify(p), false); } catch {}
    setShowProfileSetup(false);
  };

  /* 개인 할일 키 — 프로필 기반 */
  const taskKey     = profile ? `sbx_tasks_${profile.name}_${profile.role}` : null;

  const [memoNotes, saveMemoNotes] = useShared("sbx6_memos", []);

      const ci = CAT_COLORS[i % CAT_COLORS.length];

  const [calDate, setCalDate] = useState(new Date());

  const [ef, setEf] = useState({ title:"", date:todayStr(), endDate:"", category:(categories||DEFAULT_CATS)[0]||"이벤트", memo:"" });

function CalendarTab({ events, notices, calDate, setCalDate, selDay, setSelDay, todayStr, CAT, onAddEvent, onDeleteEvent, onEditEvent, onViewNotice }) {
  var cY = calDate.getFullYear();
  var cM = calDate.getMonth();
  var firstDow = new Date(cY, cM, 1).getDay();
  var daysInMo = new Date(cY, cM + 1, 0).getDate();
  var WDAYS_CAL = ["일","월","화","수","목","금","토"];
  var mStr = cY + "-" + String(cM + 1).padStart(2, "0");

  var monthEvents = events.filter(function(e) {
    var s = e.date, en = e.endDate || e.date;
    return s.slice(0,7) === mStr || en.slice(0,7) === mStr ||
           (s < mStr + "-01" && en > mStr + "-31");
  });

  // 주 배열 생성
  var weeks = [];
  var d = 1, blanks = firstDow;
  while (d <= daysInMo) {
    var row = [];
    for (var col = 0; col < 7; col++) {
      if (blanks > 0) { row.push(null); blanks--; }
      else if (d <= daysInMo) { row.push(d); d++; }
      else row.push(null);
    }
    weeks.push(row);
  }

  var selDayEvents = events.filter(function(e) {
    return selDay >= e.date && selDay <= (e.endDate || e.date);
  });
  var selDateLabel = new Date(selDay + "T00:00:00")
    .toLocaleDateString("ko-KR", { month:"long", day:"numeric" });

  return (
    <div style={{ padding:"16px" }} className="fi">
      {/* 월 네비 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <button onClick={function(){ setCalDate(new Date(cY, cM-1, 1)); }} style={{
          width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:10, background:T.card, cursor:"pointer", color:T.l1,
          fontSize:18, border:"1px solid "+T.border0,
          boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>‹</button>
        <span style={{ fontSize:17, fontWeight:700, color:T.l1, fontFamily:F }}>
          {calDate.toLocaleDateString("ko-KR", { year:"numeric", month:"long" })}
        </span>
        <button onClick={function(){ setCalDate(new Date(cY, cM+1, 1)); }} style={{
          width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:10, background:T.card, cursor:"pointer", color:T.l1,
          fontSize:18, border:"1px solid "+T.border0,
          boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>›</button>
      </div>

      {/* 캘린더 카드 */}
      <div style={{ background:T.card, borderRadius:20, padding:"16px",
        boxShadow:"0 2px 20px rgba(30,57,50,0.08)", marginBottom:16 }}>

        {/* 요일 헤더 */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:8 }}>
          {WDAYS_CAL.map(function(wd, i) {
            return (
              <div key={wd} style={{ textAlign:"center", fontSize:11, fontWeight:600,
                fontFamily:F, padding:"2px 0 8px",
                color: i===0 ? T.red : i===6 ? T.blue : T.l3 }}>{wd}</div>
            );
          })}
        </div>

        {/* 날짜 그리드 - 그리드선 없음 */}
        {weeks.map(function(weekRow, wi) {
          // 이 주의 이벤트 찾기
          var validDays = weekRow.filter(function(x){ return x!==null; });
          if (!validDays.length) return null;
          var wStart = validDays[0], wEnd = validDays[validDays.length-1];

          var weekBars = [];
          var mPfx = cY+"-"+String(cM+1).padStart(2,"0")+"-";
          monthEvents.forEach(function(ev) {
            var sDate = ev.date||"";
            var eDate = (ev.endDate&&ev.endDate.length>=10?ev.endDate:ev.date)||"";
            // 시작일이 이번 달보다 이전이면 1일로 간주
            var evS = sDate.slice(0,7) < mPfx.slice(0,7) ? 1
                    : parseInt(sDate.slice(8,10)||"0");
            // 종료일이 이번 달보다 이후이면 31일로 간주 (월말까지 표시)
            var evE = eDate.slice(0,7) > mPfx.slice(0,7) ? 31
                    : parseInt(eDate.slice(8,10)||"0");
            if (evS > wEnd || evE < wStart) return;
            var clampS = Math.max(evS, wStart);
            var clampE = Math.min(evE, wEnd);
            var colS = weekRow.indexOf(clampS);
            var colE = weekRow.indexOf(clampE);
            if (colS < 0) colS = 0;
            if (colE < 0) colE = weekRow.filter(function(x){return x!==null;}).length - 1;
            // 시작/끝이 이 주에 없으면 첫날~마지막날로 clamp
            weekBars.push({ ev:ev, colS:colS, colE:colE,
              startsHere: evS>=wStart && sDate.slice(0,7)===mPfx.slice(0,7),
              endsHere: evE<=wEnd && eDate.slice(0,7)===mPfx.slice(0,7), slot:null });
          });
          weekBars.forEach(function(bar) {
            var slot=0, busy=[];
            weekBars.forEach(function(b){
              if(b===bar||b.slot===null)return;
              if(b.colS<=bar.colE&&b.colE>=bar.colS)busy.push(b.slot);
            });
            while(busy.indexOf(slot)!==-1)slot++;
            bar.slot=slot;
          });
          var maxSlot = weekBars.reduce(function(m,b){return Math.max(m,b.slot+1);},0);
          var cellH = 34 + maxSlot*18;

          return (
            <div key={wi} style={{ position:"relative", marginBottom:2 }}>
              {/* 날짜 행 */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
                {weekRow.map(function(day, ci) {
                  if (day===null) return <div key={"n"+ci} style={{ height:cellH }}/>;
                  var dStr = cY+"-"+String(cM+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
                  var isTod = dStr===todayStr();
                  var isSel = dStr===selDay && !isTod;
                  var dayCol = ci===0?T.red:ci===6?T.blue:T.l1;
                  return (
                    <div key={day} onClick={function(){setSelDay(dStr);}}
                      style={{ height:cellH, cursor:"pointer", position:"relative",
                        background: isSel ? T.greenLight : "transparent",
                        borderRadius:10 }}>
                      <div style={{ position:"relative", zIndex:2,
                        display:"flex", justifyContent:"center", paddingTop:4 }}>
                      {isTod ? (
                        <div style={{ width:26, height:26, borderRadius:"50%",
                          background:"linear-gradient(135deg,#00704A,#1E3932)",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          boxShadow:"0 2px 8px rgba(0,112,74,0.35)" }}>
                          <span style={{ fontSize:12, fontWeight:800, color:"#fff",
                            lineHeight:1, fontFamily:F }}>{day}</span>
                        </div>
                      ) : (
                        <span style={{ fontSize:13, fontWeight:isSel?700:400,
                          color:isSel?T.green:dayCol, lineHeight:"26px", fontFamily:F }}>{day}</span>
                      )}
                    </div>
                    </div>
                  );
                })}
              </div>

              {/* 이벤트 바 */}
              {weekBars.map(function(bar,bi){
                var meta = CAT[bar.ev.category] || { color:T.green };
                var topOff = 34 + bar.slot*18;
                var span = bar.colE - bar.colS + 1;
                return (
                  <div key={bar.ev.id+"_"+wi+"_"+bi} style={{
                    position:"absolute", top:topOff, zIndex:3,
                    left:(bar.colS*100/7)+"%", width:(span*100/7)+"%",
                    height:14,
                    background: meta.color+"30",
                    borderLeft: bar.startsHere ? "3px solid "+meta.color : "none",
                    borderRight: bar.endsHere ? "1px solid "+meta.color+"50" : "none",
                    borderTop: "1px solid "+meta.color+"40",
                    borderBottom: "1px solid "+meta.color+"40",
                    borderRadius: bar.startsHere?(bar.endsHere?"5px":"5px 0 0 5px"):(bar.endsHere?"0 5px 5px 0":"0"),
                    display:"flex", alignItems:"center", paddingLeft:bar.startsHere?4:2,
                    overflow:"hidden", pointerEvents:"none"
                  }}>
                    {bar.startsHere&&(
                      <span style={{ fontSize:9, fontWeight:700, color:meta.color,
                        fontFamily:F, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                        {bar.ev.title}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* 선택 날짜 일정 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <span style={{ fontSize:15, fontWeight:700, color:T.l1, fontFamily:F }}>{selDateLabel}</span>
          <span style={{ fontSize:13, color:T.l3, fontFamily:F, marginLeft:6 }}>
            {selDayEvents.length>0 ? selDayEvents.length+"개" : "없음"}
          </span>
        </div>
        <ActionBtn onClick={onAddEvent}>+ 추가</ActionBtn>
      </div>

      <div style={{ background:T.card, borderRadius:16, overflow:"hidden",
        boxShadow:"0 2px 16px rgba(30,57,50,0.07)" }}>
        {selDayEvents.length===0
          ? <EmptyRow text="이 날에 일정이 없어요"/>
          : selDayEvents.map(function(e,i){
              var linkedNotice = notices ? (
                e.noticeId
                  ? notices.find(function(n){ return n.id===e.noticeId; })
                  : notices.find(function(n){ return n.title===e.title; })
              ) : null;
              return (
                <div key={e.id} style={{ position:"relative" }}>
                  <ERow e={e}/>
                  <div style={{ display:"flex", gap:6, padding:"0 16px 10px", justifyContent:"flex-end" }}>
                    {linkedNotice&&(
                      <button onClick={()=>onViewNotice&&onViewNotice(linkedNotice)} style={{
                        padding:"4px 12px", borderRadius:8, fontSize:12, fontFamily:F,
                        border:"1px solid "+T.greenBorder, background:T.greenDim, color:T.green,
                        cursor:"pointer", fontWeight:600 }}>📢 공지 보기</button>
                    )}
                    <button onClick={()=>onEditEvent&&onEditEvent(e)} style={{
                      padding:"4px 12px", borderRadius:8, fontSize:12, fontFamily:F,
                      border:"1px solid "+T.border1, background:T.glass1, color:T.l2, cursor:"pointer" }}>수정</button>
                    <button onClick={()=>{ if(window.confirm("일정을 삭제할까요?")) onDeleteEvent&&onDeleteEvent(e.id); }} style={{
                      padding:"4px 12px", borderRadius:8, fontSize:12, fontFamily:F,
                      border:"1px solid #ff6b6b44", background:"#ff6b6b11", color:"#e05252", cursor:"pointer" }}>삭제</button>
                  </div>
                  {i<selDayEvents.length-1&&<Sep/>}
                </div>
              );
            })
        }
      </div>
    </div>
  );
}


function OrderTab({ records, items, buffers, onSaveRecords, onSaveItems, onSaveBuffers }) {
  const [mode, setMode] = useState("input"); // "input"|"recommend"|"stats"|"settings"
  const [inputDate, setInputDate] = useState(() => {
    const d = new Date(); return d.toISOString().slice(0,10);
  });
  const [form, setForm] = useState({});
  const [newItem, setNewItem] = useState("");
  const [bufEdit, setBufEdit] = useState({});
  const [bufMode, setBufMode] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const [statsItem, setStatsItem] = useState(() => items && items[0] ? items[0] : "우유");

  const DOW_KR = ["일","월","화","수","목","금","토"];

  // 날짜 바뀌면 form 초기화: 전일 마감재고 자동 로드
  useEffect(() => {
    const prevDate = getPrevDate(inputDate);
    const prevRec = records.find(r => r.date === prevDate);
    const init = {};
    items.forEach(item => {
      const prevClosing = prevRec ? (prevRec.items[item]?.closing ?? "") : "";
      init[item] = { prev: String(prevClosing), received: "", closing: "" };
    });
    setForm(init);
  }, [inputDate, records.length, items.join(",")]);

  function getPrevDate(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0,10);
  }

  function calcUsed(prev, received, closing) {
    const p = parseFloat(prev)||0, r = parseFloat(received)||0, c = parseFloat(closing)||0;
    if (prev===""&&received===""&&closing==="") return null;
    return Math.max(0, p + r - c);
  }

  function handleFieldChange(item, field, val) {
    setForm(f => ({ ...f, [item]: { ...(f[item]||{}), [field]: val } }));
  }

  function handleSaveRecord() {
    const dow = new Date(inputDate + "T00:00:00").getDay();
    const itemData = {};
    items.forEach(item => {
      const f = form[item] || {};
      const used = calcUsed(f.prev, f.received, f.closing);
      itemData[item] = {
        prev:     parseFloat(f.prev)    || 0,
        received: parseFloat(f.received)|| 0,
        closing:  parseFloat(f.closing) || 0,
        used:     used !== null ? used : 0,
      };
    });
    const newRec = { date: inputDate, dow, items: itemData };
    const exists = records.findIndex(r => r.date === inputDate);
    let updated;
    if (exists >= 0) {
      updated = records.map((r,i) => i===exists ? newRec : r);
    } else {
      updated = [...records, newRec].sort((a,b) => a.date.localeCompare(b.date));
    }
    onSaveRecords(updated);
    alert("저장되었습니다 ✓");
  }

  // 요일별 평균 사용량 계산
  function getAvgByDow(item, dow) {
    const vals = records.filter(r => r.dow === dow && r.items[item]?.used > 0)
      .map(r => r.items[item].used);
    if (!vals.length) return null;
    return (vals.reduce((a,b)=>a+b,0) / vals.length).toFixed(1);
  }

  // 전주 같은 요일 사용량
  function getLastWeekSame(item, dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() - 7);
    const lastWeekDate = d.toISOString().slice(0,10);
    const rec = records.find(r => r.date === lastWeekDate);
    return rec ? rec.items[item]?.used ?? null : null;
  }

  // 발주 추천량
  function getRecommend(item) {
    // 발주 → 이틀 후 입고 (ex. 월→수)
    // 입고 당일(+2일) 사용량을 커버하도록 계산
    const today = inputDate;
    const todayRec = records.find(r => r.date === today);
    const currentStock = todayRec ? todayRec.items[item]?.closing ?? 0 : 0;
    const dow = new Date(today + "T00:00:00").getDay();
    const deliveryDow = (dow + 2) % 7; // 입고 요일 (+2일)
    const avg = parseFloat(getAvgByDow(item, deliveryDow)) || 0;
    const buf = parseFloat(buffers[item]) || 2;
    const rec = Math.max(0, Math.ceil(avg + buf - currentStock));
    return { rec, avg, buf, currentStock, deliveryDow };
  }

  // 주차별 요일 통계 (최근 8주)
  function getWeeklyStats(item) {
    const sorted = [...records].sort((a,b)=>b.date.localeCompare(a.date));
    // 주 그룹화
    const weeks = [];
    sorted.forEach(r => {
      const d = new Date(r.date + "T00:00:00");
      const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay()+6)%7));
      const wk = mon.toISOString().slice(0,10);
      let w = weeks.find(x=>x.week===wk);
      if (!w) { w = { week:wk, days:{} }; weeks.push(w); }
      w.days[r.dow] = r.items[item]?.used ?? null;
    });
    return weeks.slice(0,8).reverse();
  }

  const btnStyle = (active) => ({
    padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer",
    fontFamily:F, fontSize:13, fontWeight:active?700:500,
    background: active ? T.green : T.glass1,
    color: active ? "#fff" : T.l2,
    transition:"all .15s"
  });

  const inputStyle = {
    width:"100%", padding:"8px 10px", borderRadius:8,
    border:"1px solid "+T.border1, background:T.card,
    fontSize:14, fontFamily:F, color:T.l1,
    textAlign:"center", outline:"none"
  };

  return (
    <div>
      {/* 모드 탭 */}
      <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
        {[["input","📝 재고 입력"],["recommend","📦 발주 추천"],["stats","📊 통계"],["settings","⚙️ 설정"]].map(([id,label])=>(
          <button key={id} onClick={()=>setMode(id)} style={btnStyle(mode===id)}>{label}</button>
        ))}
      </div>

      {/* ── 재고 입력 ── */}
      {mode==="input"&&(
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
            <input type="date" value={inputDate} onChange={e=>setInputDate(e.target.value)}
              style={{ ...inputStyle, width:"auto", textAlign:"left", padding:"8px 12px" }}/>
            <span style={{ fontSize:13, color:T.l3, fontFamily:F }}>
              ({DOW_KR[new Date(inputDate+"T00:00:00").getDay()]}요일)
            </span>
          </div>

          <div style={{ background:T.card, borderRadius:16, overflow:"hidden",
            boxShadow:"0 2px 16px rgba(30,57,50,0.07)", marginBottom:16 }}>
            {/* 헤더 */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr 0.8fr",
              padding:"10px 14px", background:T.greenDim, gap:6 }}>
              {["품목","전일재고","당일입고","마감재고","사용량"].map(h=>(
                <div key={h} style={{ fontSize:11, fontWeight:700, color:T.green, fontFamily:F, textAlign:"center" }}>{h}</div>
              ))}
            </div>
            {/* 행 */}
            {items.map((item, idx) => {
              const f = form[item] || { prev:"", received:"", closing:"" };
              const used = calcUsed(f.prev, f.received, f.closing);
              return (
                <div key={item} style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr 0.8fr",
                  padding:"10px 14px", gap:6, alignItems:"center",
                  background: idx%2===0 ? T.glass2 : T.card,
                  borderBottom: idx<items.length-1 ? "1px solid "+T.border0 : "none" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:T.l1, fontFamily:F }}>{item}</div>
                  {["prev","received","closing"].map(field=>(
                    <input key={field} type="number" min="0" step="0.5"
                      value={f[field]||""}
                      onChange={e=>handleFieldChange(item, field, e.target.value)}
                      placeholder="0"
                      style={{ ...inputStyle, fontSize:14,
                        background: field==="prev" ? T.glass3 : T.card }}/>
                  ))}
                  <div style={{ textAlign:"center", fontSize:14, fontWeight:700,
                    color: used!==null ? T.green : T.l4, fontFamily:F }}>
                    {used!==null ? used : "-"}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:12 }}>
            💡 전일재고는 어제 저장된 마감재고가 자동으로 입력돼요
          </div>
          <button onMouseDown={e=>{e.preventDefault();handleSaveRecord();}}
            style={{ width:"100%", padding:"14px", borderRadius:14, border:"none",
              background:"linear-gradient(135deg,#00704A,#1E3932)",
              color:"#fff", fontSize:15, fontWeight:700, fontFamily:F,
              cursor:"pointer", boxShadow:"0 4px 20px rgba(0,112,74,0.30)" }}>
            저장하기
          </button>
        </div>
      )}

      {/* ── 발주 추천 ── */}
      {mode==="recommend"&&(
        <div>
          <div style={{ background:T.greenDim, border:"1px solid "+T.greenBorder,
            borderRadius:12, padding:"10px 14px", marginBottom:16, fontSize:13, color:T.green, fontFamily:F }}>
            📅 발주일: {inputDate} ({DOW_KR[new Date(inputDate+"T00:00:00").getDay()]}요일)<br/>
            📦 입고 예정: {DOW_KR[(new Date(inputDate+"T00:00:00").getDay()+2)%7]}요일 기준 사용량으로 계산
          </div>
          <div style={{ background:T.card, borderRadius:16, overflow:"hidden",
            boxShadow:"0 2px 16px rgba(30,57,50,0.07)" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1.2fr 1fr 1fr 1fr 1fr",
              padding:"10px 14px", background:T.greenDim, gap:4 }}>
              {["품목","현재고","입고일사용","버퍼","권장발주"].map(h=>(
                <div key={h} style={{ fontSize:11, fontWeight:700, color:T.green, fontFamily:F, textAlign:"center" }}>{h}</div>
              ))}
            </div>
            {items.map((item, idx) => {
              const { rec, avg, buf, currentStock } = getRecommend(item);
              return (
                <div key={item} style={{ display:"grid", gridTemplateColumns:"1.2fr 1fr 1fr 1fr 1fr",
                  padding:"10px 14px", gap:4, alignItems:"center",
                  background: idx%2===0 ? T.glass2 : T.card,
                  borderBottom: idx<items.length-1 ? "1px solid "+T.border0 : "none" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:T.l1, fontFamily:F }}>{item}</div>
                  <div style={{ textAlign:"center", fontSize:13, color:T.l2, fontFamily:F }}>{currentStock}</div>
                  <div style={{ textAlign:"center", fontSize:13, color:T.l2, fontFamily:F }}>{avg||"-"}</div>
                  <div style={{ textAlign:"center", fontSize:13, color:T.l3, fontFamily:F }}>{buf}</div>
                  <div style={{ textAlign:"center", fontSize:15, fontWeight:800,
                    color: rec>0 ? T.green : T.l4, fontFamily:F }}>
                    {rec>0 ? "▶ "+rec : "충분"}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginTop:10 }}>
            * 버퍼 재고는 설정 탭에서 품목별로 조정할 수 있어요
          </div>
        </div>
      )}

      {/* ── 통계 ── */}
      {mode==="stats"&&(
        <div>
          <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
            {items.map(item=>(
              <button key={item} onClick={()=>setStatsItem(item)}
                style={{ padding:"6px 12px", borderRadius:20, border:"1px solid "+(statsItem===item?T.green:T.border1),
                  background: statsItem===item ? T.greenDim : T.glass1,
                  color: statsItem===item ? T.green : T.l2,
                  fontSize:12, fontWeight:statsItem===item?700:400, cursor:"pointer", fontFamily:F }}>
                {item}
              </button>
            ))}
          </div>

          {/* 요일별 평균 */}
          <div style={{ background:T.card, borderRadius:16, padding:"14px",
            boxShadow:"0 2px 16px rgba(30,57,50,0.07)", marginBottom:16 }}>
            <div style={{ fontSize:13, fontWeight:700, color:T.l1, fontFamily:F, marginBottom:10 }}>
              📊 요일별 평균 사용량 — {statsItem}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:6 }}>
              {[0,1,2,3,4,5,6].map(dow=>{
                const avg = getAvgByDow(statsItem, dow);
                const maxAvg = Math.max(...[0,1,2,3,4,5,6].map(d=>parseFloat(getAvgByDow(statsItem,d))||0));
                const ratio = maxAvg>0 ? (parseFloat(avg)||0)/maxAvg : 0;
                return (
                  <div key={dow} style={{ textAlign:"center" }}>
                    <div style={{ fontSize:11, fontWeight:600, color:dow===0?T.red:dow===6?T.blue:T.l3,
                      fontFamily:F, marginBottom:4 }}>{DOW_KR[dow]}</div>
                    <div style={{ height:60, background:T.glass3, borderRadius:6, position:"relative",
                      overflow:"hidden", marginBottom:4 }}>
                      <div style={{ position:"absolute", bottom:0, left:0, right:0,
                        height:(ratio*100)+"%",
                        background: "linear-gradient(to top,"+T.green+","+T.green+"88)",
                        borderRadius:6, transition:"height .3s" }}/>
                    </div>
                    <div style={{ fontSize:12, fontWeight:700, color:T.l1, fontFamily:F }}>
                      {avg||"-"}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 주차별 테이블 */}
          <div style={{ background:T.card, borderRadius:16, overflow:"hidden",
            boxShadow:"0 2px 16px rgba(30,57,50,0.07)" }}>

function CatManagerSheet({ onClose, categories, onSave, catColors, onSaveColors }) {
  const cats = categories && categories.length ? [...categories] : [...DEFAULT_CATS];
  const [list, setList] = useState(cats);
  const [input, setInput] = useState("");
  const [colors, setColors] = useState(catColors||{});
  const PALETTE = ["#00704A","#C07020","#2563EB","#7C3AED","#DC2626","#EA580C","#0891B2","#059669","#DB2777","#65A30D"];

  const add = () => {
    const v = input.trim();
    if (!v || list.includes(v)) return;
    setList(prev => [...prev, v]);
    setInput("");
  };
  const remove = (name) => {
    if (list.length <= 1) return;
    setList(prev => prev.filter(c => c !== name));
  };
  const setColor = (name, color) => {
    setColors(prev => ({...prev, [name]: color}));
  };
  const handleSave = () => {
    onSave(list);
    onSaveColors(colors);
    onClose();
  };

  return (
    <Sheet title="카테고리 관리" onClose={onClose}>
      <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:14, lineHeight:1.6 }}>
        카테고리를 추가하고 캘린더 표시 색상을 지정해요.
      </p>

      {/* 카테고리 목록 */}
      <div style={{ marginBottom:14 }}>
        {list.map(function(name){
          const curColor = colors[name] || BASE_CAT[name]?.color || CAT_COLORS[0].color;
          return (
            <div key={name} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <div style={{ width:14, height:14, borderRadius:4, background:curColor, flexShrink:0 }}/>
                <span style={{ fontSize:14, fontWeight:600, color:T.l1, fontFamily:F, flex:1 }}>{name}</span>
                {!DEFAULT_CATS.includes(name) && (
                  <button onClick={()=>remove(name)} style={{
                    background:"none", border:"none", color:T.red, fontSize:18,
                    cursor:"pointer", lineHeight:1, padding:"0 4px" }}>×</button>
                )}
              </div>
              {/* 색상 팔레트 */}
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", paddingLeft:22 }}>
                {PALETTE.map(function(hex){
                  const isSelected = curColor === hex;
                  return (
                    <button key={hex} onClick={()=>setColor(name, hex)} style={{
                      width:24, height:24, borderRadius:6, background:hex, border:"none",
                      cursor:"pointer", flexShrink:0,
                      outline:isSelected?"3px solid "+hex:"none",
                      outlineOffset:isSelected?"2px":"0",
                      opacity:isSelected?1:0.65,
                      transform:isSelected?"scale(1.15)":"scale(1)",
                      transition:"all .15s" }}/>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* 새 카테고리 추가 */}
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&add()}
          placeholder="새 카테고리 이름"
          style={{ flex:1, padding:"10px 14px", borderRadius:12, border:"1px solid "+T.border1,
            background:T.card, color:T.l1, fontSize:14, fontFamily:F, outline:"none" }}/>
        <button onClick={add} style={{
          padding:"10px 16px", borderRadius:12, border:"none",
          background:T.green, color:"#fff", fontSize:14, fontWeight:700,
          cursor:"pointer", fontFamily:F }}>추가</button>
      </div>

      <GreenBtn full onClick={handleSave}>저장하기</GreenBtn>
    </Sheet>
  );
}


function GistSetupModal({ onClose, currentToken, currentGistId, onSave }) {
  const [token, setToken] = useState(currentToken||"");
  const [gistId, setGistId] = useState(currentGistId||"");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState("");

  const handleSave = async () => {
    if (!token.trim()) { setMsg("GitHub 토큰을 입력해주세요."); return; }
    setSaving(true);
    setMsg("");
    try {
      localStorage.setItem("sbx_gist_token", token.trim());
      let gid = gistId.trim();
      if (!gid) {
        // 기존 Gist 탐색
        const found = await GistSync.findExisting().catch(()=>null);
        gid = found || "";
      }
      if (gid) {
        localStorage.setItem("sbx_gist_id", gid);
        setGistId(gid);
        setMsg("✓ 저장됐어요! Gist ID: "+gid.slice(0,8)+"...");
      } else {
        // 없으면 새로 생성
        await GistSync.push();
        gid = GistSync.getGistId();
        setGistId(gid);
        setMsg("✓ 새 Gist 생성됨! ID: "+(gid||"").slice(0,8)+"...");
      }
      setTimeout(()=>onSave(token.trim(), gid), 800);
    } catch(e) {
      setMsg("❌ 오류: 토큰을 확인해주세요.");
    }
    setSaving(false);
  };

  const handleDisconnect = () => {
    localStorage.removeItem("sbx_gist_token");
    localStorage.removeItem("sbx_gist_id");
    onSave("", "");
  };

  return (
    <Sheet title="🔗 Gist 동기화 설정" onClose={onClose}>
      <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:16, lineHeight:1.6 }}>
        GitHub Gist를 통해 팀원들과 공지·캘린더를 공유해요. 각자 본인의 GitHub 토큰을 입력하고, 같은 Gist ID를 사용하면 돼요.
      </p>

      <Field label="GitHub Personal Access Token"
        value={token} onChange={setToken}
        placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"/>

      <div style={{ marginBottom:12 }}>
        <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>
          Gist ID <span style={{color:T.l4}}>(팀장이 공유한 ID — 없으면 자동 생성)</span>
        </div>
        <input value={gistId} onChange={e=>setGistId(e.target.value)}
          placeholder="비워두면 새로 생성됩니다"
          style={{ width:"100%", padding:"13px 15px", borderRadius:12,
            border:"1px solid "+T.border1, background:"#F7FAF8",
            fontSize:15, fontFamily:F, color:T.l1, outline:"none" }}/>
      </div>

      {gistId && (
        <div style={{ padding:"10px 14px", borderRadius:10, marginBottom:12,
          background:"rgba(0,112,74,0.06)", border:"1px solid rgba(0,112,74,0.15)" }}>
          <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:4 }}>팀원에게 공유할 Gist ID</div>
          <div style={{ fontSize:14, fontWeight:700, color:T.green, fontFamily:F,
            wordBreak:"break-all" }}>{gistId}</div>
        </div>
      )}

      {msg && (
        <div style={{ padding:"10px 14px", borderRadius:10, marginBottom:12,
          background: msg.startsWith("❌")?"rgba(220,38,38,0.06)":"rgba(0,112,74,0.06)",
          border:"1px solid "+(msg.startsWith("❌")?"rgba(220,38,38,0.2)":"rgba(0,112,74,0.2)") }}>
          <div style={{ fontSize:13, color: msg.startsWith("❌")?T.red:T.green, fontFamily:F }}>
            {msg}
          </div>
        </div>
      )}

      <GreenBtn full onClick={handleSave} disabled={saving}>
        {saving ? "⏳ 저장 중..." : "저장하기"}
      </GreenBtn>

      {(currentToken||token) && (
        <button onClick={handleDisconnect} style={{
          width:"100%", marginTop:10, padding:"11px", borderRadius:12,
          border:"1px solid rgba(220,38,38,0.2)", background:"rgba(220,38,38,0.05)",
          color:"#DC2626", fontSize:14, fontFamily:F, cursor:"pointer" }}>
          연결 해제
        </button>
      )}

      <div style={{ marginTop:16, padding:"12px 14px", borderRadius:12,
        background:T.glass1, border:"1px solid "+T.border0 }}>
        <div style={{ fontSize:12, color:T.l3, fontFamily:F, lineHeight:1.8 }}>
          📌 <b>토큰 발급 방법</b><br/>
          github.com → Settings → Developer settings<br/>
          → Personal access tokens → Tokens (classic)<br/>
          → Generate new token → <b>gist</b> 권한만 체크
        </div>
      </div>
    </Sheet>
  );
}

function RichNoticeSheet({ onClose, onSave, initial, categories }) {
  const cats = categories && categories.length ? categories : DEFAULT_CATS;

  const [title, setTitle]       = useState(initial ? initial.title : "");
  const [category, setCategory] = useState(initial ? initial.category : cats[0]);
  const [pinned, setPinned]     = useState(initial ? !!initial.pinned : false);
  const [noticeDate, setNoticeDate] = useState(initial ? (initial.noticeDate||"") : "");
  const [noticeEndDate, setNoticeEndDate] = useState(initial ? (initial.noticeEndDate||"") : "");
  const editorRef = useRef();
  const imgRef = useRef();

  useEffect(() => {
    if (initial && editorRef.current) {
      editorRef.current.innerHTML = initial.content || "";
    }
  }, []);

  const execCmd = (cmd, val) => {
    document.execCommand(cmd, false, val || null);
    editorRef.current.focus();
  };

  const insertImage = async (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.margin = "6px 0";
      editorRef.current.focus();
      const sel = window.getSelection();
      if (sel && sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.insertNode(img);
        range.collapse(false);
      } else {
        editorRef.current.appendChild(img);
      }
    };
    reader.readAsDataURL(file);
  };

  // body 스크롤 잠금 (iOS 키보드 밀림 방지)
  useEffect(() => {
    const y = window.scrollY;
    document.body.style.cssText = "position:fixed;top:-"+y+"px;left:0;right:0;overflow:hidden;width:100%;";
    return () => { document.body.style.cssText = ""; window.scrollTo(0, y); };
  }, []);

  const handleSave = () => {
    if (!title.trim()) return;
    const content = editorRef.current ? editorRef.current.innerHTML : "";
    onSave({ title: title.trim(), category, content, pinned, noticeDate, noticeEndDate });
  };

  const tools = [
    { icon:"B",  cmd:"bold",        style:{ fontWeight:800 },              tip:"굵게"    },
    { icon:"I",  cmd:"italic",      style:{ fontStyle:"italic" },          tip:"기울임"  },
    { icon:"U",  cmd:"underline",   style:{ textDecoration:"underline" },  tip:"밑줄"    },
  ];

  // 형광펜: 어두운 배경에서 잘 보이는 진한 색 사용
  const highlights = [
    { bg:"#FFE066", text:"#1a1a00", label:"노랑" },
    { bg:"#5DDE74", text:"#003010", label:"초록" },
    { bg:"#FF7B7B", text:"#2a0000", label:"빨강" },
    { bg:"#5BA8FF", text:"#001835", label:"파랑" },
  ];

  const btnS = { padding:"5px 9px", borderRadius:7, border:"1px solid "+T.border1,
    background:T.glass1, color:T.l1, cursor:"pointer", fontFamily:F, fontSize:13 };

  const insertHR = () => {
    const sel=window.getSelection(); if(!sel||!sel.rangeCount) return;
    const r=sel.getRangeAt(0);
    const hr=document.createElement("hr");
    hr.style.cssText="border:none;border-top:1.5px solid #C8DDD4;margin:10px 0";
    const br=document.createElement("br");
    r.collapse(false); r.insertNode(br); r.insertNode(hr);
    r.setStartAfter(br); r.collapse(true);
    sel.removeAllRanges(); sel.addRange(r);
  };

  const applyFontSize = (size, weight) => {
    const ed = editorRef.current;
    if (!ed) return;
    ed.focus();
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    let r = sel.getRangeAt(0);

    // 커서만 있을 때 → 현재 줄(블록) 전체 선택
    if (r.collapsed) {
      let node = r.startContainer;
      // 텍스트 노드면 부모로
      if (node.nodeType === 3) node = node.parentNode;
      // editor 바로 아래 블록 자식 찾기 (div/p/li 등)
      // editor 자체이면 → 그냥 커서 위치 텍스트노드만 감쌈
      if (node === ed) {
        // editor 직접 하위에 커서: 빈 줄일 가능성, 새 span 삽입만
        const sp = document.createElement("span");
        sp.style.fontSize = size; sp.style.fontWeight = weight;
        sp.innerHTML = "​"; // zero-width space
        r.insertNode(sp);
        r.setStartAfter(sp); r.collapse(true);
        sel.removeAllRanges(); sel.addRange(r);
        return;
      }
      // editor 하위 블록 찾기
      let block = node;
      while (block.parentNode && block.parentNode !== ed) block = block.parentNode;
      // block이 ed의 직접 자식이면 그것만 선택
      const newR = document.createRange();
      newR.selectNodeContents(block);
      sel.removeAllRanges(); sel.addRange(newR);
      r = newR;
    }

    // 기존 font-size 중첩 방지
    const frag = r.extractContents();
    const stripSize = (n) => {
      if (n.style) { n.style.fontSize = ""; n.style.fontWeight = ""; }
      n.childNodes && n.childNodes.forEach(stripSize);
    };
    stripSize(frag);
    const sp = document.createElement("span");
    sp.style.fontSize = size; sp.style.fontWeight = weight;
    sp.appendChild(frag);
    r.insertNode(sp);
    r.setStartAfter(sp); r.collapse(true);

function AIAssistantSheet({ onClose, notices, events, tasks, roleTasks, profile, initTab="chat" }) {
  const [tab, setTab] = useState(initTab); // "chat"|"briefing"|"quiz"
  const [messages, setMessages] = useState([]); // { role:"user"|"assistant", text:string }
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [briefing, setBriefing] = useState("");
  const [briefLoading, setBriefLoading] = useState(false);
  const [quiz, setQuiz] = useState(null);
  const [quizLoading, setQuizLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [quizCount, setQuizCount] = useState(0);
  const [quizScore, setQuizScore] = useState(0);
  const msgEnd = useRef();
  const inputRef = useRef();

  /* ── 시스템 컨텍스트 빌더 ── */
  const buildContext = useCallback(() => {
    const today = new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
    const noticeCtx = (notices||[]).slice(0,20).map(n=>{
      const body = n.content ? n.content.replace(/<[^>]*>/g,"").slice(0,200) : (n.body ? n.body.replace(/<[^>]*>/g,"").slice(0,200) : "");
      return `[${n.category||"기타"}] ${n.title}${body?" - "+body:""}${n.date?" (${n.date})":""}`;
    }).join("\n");
    const upcomingEvs = (events||[]).filter(e=>e.date>=new Date().toISOString().slice(0,10))
      .slice(0,10).map(e=>`${e.date} ${e.title} [${e.category||""}]`).join("\n");
    const myTasks = (tasks||[]).filter(t=>!t.done).slice(0,10).map(t=>`• ${t.text} (${t.priority||"보통"})`).join("\n");
    const roleTk  = (roleTasks||[]).filter(t=>!t.done).slice(0,10).map(t=>`• ${t.text}`).join("\n");
    return `당신은 스타벅스 매장 파트너를 위한 전문 업무 어시스턴트입니다.
사용자: ${profile?.name||"파트너"} (${profile?.role||"바리스타"})
오늘 날짜: ${today}

[최근 공지 ${(notices||[]).length}건]
${noticeCtx||"(없음)"}

[예정 일정]
${upcomingEvs||"(없음)"}

[내 미완료 할일]
${myTasks||"(없음)"}

[팀 미완료 할일]
${roleTk||"(없음)"}

응답 규칙:
- 한국어로 친근하고 전문적으로
- 구체적이고 실행 가능한 답변
- 필요시 번호/불릿 리스트 사용
- 300자 이내로 간결하게 (복잡한 내용은 400자까지)`;
  }, [notices, events, tasks, roleTasks, profile]);

  /* ── Chat: 질문 전송 ── */
  const sendChat = useCallback(async () => {
    if (!input.trim() || loading) return;

    setInput("");
    const newMsgs = [...messages, { role:"user", text:userMsg }];
    setMessages(newMsgs);

    setTimeout(()=>msgEnd.current?.scrollIntoView({behavior:"smooth"}),50);

    try {
      const apiMsgs = newMsgs.map(m=>({ role:m.role==="user"?"user":"assistant", content:m.text }));
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:800,
          system:buildContext(),
          messages:apiMsgs
        })
      });
      const d = await res.json();
      const reply = (d.content||[]).map(b=>b.text||"").join("") || "답변을 가져오지 못했어요.";
      setMessages(p=>[...p, { role:"assistant", text:reply }]);
    } catch(e) {
      setMessages(p=>[...p, { role:"assistant", text:"⚠ API 키를 확인해주세요. (홈 → 설정 → Gist 설정 하단에서 AI API 키 입력)" }]);
    }
    setLoading(false);
    setTimeout(()=>msgEnd.current?.scrollIntoView({behavior:"smooth"}),100);
  }, [input, messages, loading, buildContext]);

  /* ── 빠른 질문 버튼 ── */
  const quickAsk = (q) => { setInput(q); setTimeout(()=>{ inputRef.current?.focus(); },50); };

  /* ── Briefing 생성 ── */
  const generateBriefing = useCallback(async () => {
    setBriefLoading(true); setBriefing("");
    try {
      const today = new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"});
      const noticeCtx = (notices||[]).slice(0,12).map(n=>`• ${n.title} [${n.category||""}]`).join("\n");
      const evCtx = (events||[]).filter(e=>e.date>=new Date().toISOString().slice(0,10)).slice(0,6)
        .map(e=>`• ${e.date} ${e.title}`).join("\n");
      const taskCtx = [...(tasks||[]).filter(t=>!t.done).slice(0,5), ...(roleTasks||[]).filter(t=>!t.done).slice(0,3)]
        .map(t=>`• ${t.text}`).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:500,
          messages:[{role:"user", content:
            `오늘(${today}) 스타벅스 매장 파트너 ${profile?.name||""}(${profile?.role||""})를 위한 AI 브리핑을 작성해주세요.\n\n최근 공지:\n${noticeCtx||"(없음)"}\n\n예정 일정:\n${evCtx||"(없음)"}\n\n미완료 할일:\n${taskCtx||"(없음)"}\n\n형식: 오늘의 핵심 3~5가지를 이모지+번호 리스트로. 친근하고 동기부여가 되도록. 마지막에 응원 한마디.`
          }]
        })
      });
      const d = await res.json();
      setBriefing((d.content||[]).map(b=>b.text||"").join("") || "브리핑을 생성할 수 없어요.");
    } catch(e) { setBriefing("⚠ API 키를 확인해주세요."); }
    setBriefLoading(false);
  }, [notices, events, tasks, roleTasks, profile]);

  /* ── Quiz 생성 ── */
  const generateQuiz = useCallback(async () => {
    setQuizLoading(true); setQuiz(null); setSelected(null);
    try {
      const ctx = (notices||[]).slice(0,15).map(n=>{
        const body = n.content ? n.content.replace(/<[^>]*>/g,"").slice(0,80) : (n.body ? n.body.replace(/<[^>]*>/g,"").slice(0,80) : "");
        return n.title+(body?": "+body:"");
      }).join("\n");
      const fmt = '{"question":"질문","options":["A","B","C","D"],"answer":0,"explanation":"설명"}';
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:400,
          messages:[{role:"user",content:"공지 내용으로 퀴즈 1문제를 만들어줘:\n"+ctx+"\n\n반드시 JSON만 반환해: "+fmt}]
        })
      });
      const d = await res.json();
      const txt = (d.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
      setQuiz(JSON.parse(txt));
    } catch(e) { setQuiz({question:"API 오류",options:["확인"],answer:0,explanation:"API 키를 확인해주세요."}); }
    setQuizLoading(false);
  }, [notices]);

  useEffect(()=>{
    if (tab==="briefing" && !briefing) generateBriefing();
    if (tab==="quiz" && !quiz) generateQuiz();
  }, [tab]);

  const apiKey = window.ANTHROPIC_API_KEY;

  return (
    <Sheet title="✨ AI 어시스턴트" onClose={onClose}>
      {/* API 키 없음 경고 */}
      {!apiKey && (
        <div style={{ padding:"10px 14px", borderRadius:12, background:T.aDim,
          border:"1px solid "+T.aBdr, marginBottom:12, fontSize:12, color:T.amber, fontFamily:F }}>
          ⚠ AI API 키가 설정되지 않았어요. <br/>
          <span style={{ color:T.t2 }}>사이드바 하단 &gt; Gist 설정 &gt; AI(Anthropic) API 키 입력</span>
        </div>
      )}

      {/* 탭 */}
      <div style={{ display:"flex", gap:6, marginBottom:16,
        background:T.card2, borderRadius:12, padding:4 }}>
        {[{id:"chat",l:"💬 AI 채팅"},{id:"briefing",l:"🔍 브리핑"},{id:"quiz",l:"📝 퀴즈"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1, padding:"8px 6px", borderRadius:9, border:"none", cursor:"pointer",
            background:tab===t.id?T.card:"transparent",
            color:tab===t.id?T.brand:T.t3, fontSize:12, fontWeight:tab===t.id?700:500,
            fontFamily:F, boxShadow:tab===t.id?T.sh1:"none", transition:"all .18s" }}>
            {t.l}
          </button>
        ))}
      </div>

      {/* ── 채팅 탭 ── */}
      {tab==="chat" && (
        <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
          {/* 빠른 질문 */}
          {messages.length===0 && (
            <div>
              <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:8 }}>빠른 질문</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }}>
                {[
                  "오늘 공지 요약해줘",
                  "이번 주 일정 알려줘",
                  "미완료 할일 정리해줘",
                  "이번 달 프로모션은?",
                  "주요 체크포인트 알려줘",
                ].map(q=>(
                  <button key={q} onClick={()=>quickAsk(q)} style={{
                    padding:"7px 12px", borderRadius:20, border:"1px solid "+T.brandBorder,
                    background:T.brandDim, color:T.brand, fontSize:12, fontWeight:500,
                    cursor:"pointer", fontFamily:F }}>
                    {q}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* 메시지 */}
          {messages.length>0 && (
            <div style={{ maxHeight:340, overflowY:"auto", marginBottom:12,
              display:"flex", flexDirection:"column", gap:10 }}>
              {messages.map((m,i)=>(
                <div key={i} style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start" }}>
                  {m.role==="assistant" && (
                    <div style={{ width:28, height:28, borderRadius:"50%", background:T.brandDim,
                      border:"1px solid "+T.brandBorder, flexShrink:0, marginRight:8, marginTop:2,
                      display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>✨</div>
                  )}
                  <div style={{
                    maxWidth:"82%", padding:"10px 14px", borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",
                    background:m.role==="user"?"linear-gradient(135deg,"+T.brand+","+T.brandDark+")":T.card2,
                    color:m.role==="user"?"#fff":T.t1, fontSize:13, fontFamily:F, lineHeight:1.6,
                    whiteSpace:"pre-wrap", boxShadow:T.sh1,
                    border:m.role==="user"?"none":"1px solid "+T.b0 }}>
                    {m.text}
                  </div>
                </div>
              ))}
              {loading && (
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ width:28, height:28, borderRadius:"50%", background:T.brandDim,
                    border:"1px solid "+T.brandBorder, flexShrink:0,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>✨</div>
                  <div style={{ padding:"10px 14px", borderRadius:"4px 16px 16px 16px",
                    background:T.card2, border:"1px solid "+T.b0, display:"flex", gap:5, alignItems:"center" }}>
                    {[0,1,2].map(i=>(
                      <div key={i} style={{ width:6, height:6, borderRadius:"50%", background:T.t3,
                        animation:`bounce .9s ${i*0.15}s infinite` }}/>
                    ))}
                  </div>
                </div>
              )}
              <div ref={msgEnd}/>
            </div>
          )}

          {/* 입력창 */}
          <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
            <textarea ref={inputRef}
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();} }}
              placeholder="공지, 일정, 할일에 대해 질문해보세요..."
              style={{ flex:1, border:"1px solid "+T.brandBorder, borderRadius:14,
                padding:"11px 14px", fontSize:13, fontFamily:F, color:T.t1, background:T.card,
                resize:"none", outline:"none", minHeight:44, maxHeight:100, lineHeight:1.5 }}
              rows={1}/>
            <button onClick={sendChat} disabled={loading||!input.trim()} style={{
              width:44, height:44, borderRadius:12, border:"none", flexShrink:0,
              background:input.trim()&&!loading?"linear-gradient(135deg,"+T.brand+","+T.brandDark+")":T.card2,
              color:input.trim()&&!loading?"#fff":T.t3, cursor:input.trim()&&!loading?"pointer":"default",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
              transition:"all .15s" }}>↑</button>
          </div>

          {/* 대화 초기화 */}
          {messages.length>0 && (
            <button onClick={()=>setMessages([])} style={{
              marginTop:8, width:"100%", padding:"8px", border:"none",
              background:"none", color:T.t3, fontSize:12, cursor:"pointer", fontFamily:F }}>
              대화 초기화
            </button>
          )}
        </div>
      )}

      {/* ── 브리핑 탭 ── */}
      {tab==="briefing" && (
        <div>
          {briefLoading ? (
            <div style={{ padding:"50px 0", display:"flex", flexDirection:"column",
              alignItems:"center", gap:14 }}>
              <Spin size={28}/>
              <div style={{ fontSize:13, color:T.t3, fontFamily:F }}>AI가 오늘의 브리핑을 분석 중...</div>
            </div>
          ) : (
            <div>
              <div style={{ padding:"16px", borderRadius:14, background:T.brandDim,
                border:"1px solid "+T.brandBorder, marginBottom:12 }}>
                <div style={{ fontSize:14, color:T.t1, fontFamily:F, lineHeight:1.8,
                  whiteSpace:"pre-wrap" }}>{briefing||"내용을 불러오는 중이에요."}</div>
              </div>
              <button onClick={generateBriefing} style={{
                width:"100%", padding:"11px", borderRadius:12, border:"1px solid "+T.b1,
                background:T.card2, color:T.t2, cursor:"pointer", fontFamily:F, fontSize:13, fontWeight:600 }}>
                🔄 새로 생성
              </button>
            </div>
          )}
        </div>
      )}

      {/* ── 퀴즈 탭 ── */}
      {tab==="quiz" && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
              공지 내용 이해 체크 🎯
            </div>
            {quizCount > 0 && (
              <div style={{ fontSize:13, fontWeight:700, color:T.brand, fontFamily:F }}>
                {quizScore}/{quizCount}점
              </div>
            )}
          </div>
          {quizLoading ? (
            <div style={{ padding:"50px 0", display:"flex", flexDirection:"column",
              alignItems:"center", gap:14 }}>
              <Spin size={28}/>
              <div style={{ fontSize:13, color:T.t3, fontFamily:F }}>문제 생성 중...</div>
            </div>
          ) : quiz ? (
            <div>
              <div style={{ padding:"16px", borderRadius:14, background:T.card,
                border:"1px solid "+T.b1, marginBottom:14, boxShadow:T.sh1 }}>
                <div style={{ fontSize:15, fontWeight:700, color:T.t1, fontFamily:F,
                  marginBottom:14, lineHeight:1.6 }}>{quiz.question}</div>
                {(quiz.options||[]).map((opt,i)=>{
                  const isRight=i===quiz.answer, isWrong=selected!==null&&selected===i&&!isRight;
                  const bg=selected===null?T.card2:isRight?"rgba(0,112,74,0.10)":isWrong?"rgba(212,53,28,0.08)":T.card2;
                  const bdr=selected===null?T.b1:isRight?T.brand:isWrong?T.red:T.b1;
                  const col=selected===null?T.t1:isRight?T.brand:isWrong?T.red:T.t1;
                  return (
                    <button key={i} onClick={()=>{
                      if(selected!==null) return;
                      setSelected(i);
                      setQuizCount(p=>p+1);
                      if(i===quiz.answer) setQuizScore(p=>p+1);
                    }} style={{
                      width:"100%", padding:"11px 14px", borderRadius:12, marginBottom:8,
                      border:"1px solid "+bdr, background:bg, color:col,
                      fontSize:14, fontFamily:F, cursor:selected===null?"pointer":"default",
                      textAlign:"left", transition:"all .2s",
                      display:"flex", alignItems:"center", gap:10 }}>
                      <span style={{ width:22, height:22, borderRadius:"50%",
                        background:selected!==null&&isRight?T.brand:selected!==null&&isWrong?T.red:T.b0,
                        color:selected!==null&&(isRight||isWrong)?"#fff":T.t2,
                        display:"inline-flex", alignItems:"center", justifyContent:"center",
                        fontSize:11, fontWeight:700, flexShrink:0 }}>
                        {["A","B","C","D"][i]}
                      </span>
                      {opt}
                    </button>
                  );
                })}
                {selected!==null && (
                  <div style={{ padding:"11px 14px", borderRadius:12,
                    background:selected===quiz.answer?T.brandDim:T.rDim,
                    border:"1px solid "+(selected===quiz.answer?T.brandBorder:T.rBdr), marginTop:4 }}>
                    <div style={{ fontSize:13, fontWeight:700,
                      color:selected===quiz.answer?T.brand:T.red, fontFamily:F, marginBottom:4 }}>
                      {selected===quiz.answer?"✅ 정답!":"❌ 오답"} — 정답: {["A","B","C","D"][quiz.answer]}
                    </div>
                    <div style={{ fontSize:13, color:T.t2, fontFamily:F, lineHeight:1.6 }}>
                      {quiz.explanation}
                    </div>
                  </div>
                )}
              </div>
              <button onClick={generateQuiz} style={{
                width:"100%", padding:"11px", borderRadius:12, border:"1px solid "+T.b1,
                background:T.card2, color:T.t2, cursor:"pointer", fontFamily:F, fontSize:13, fontWeight:600 }}>
                🔄 다음 문제
              </button>
            </div>
          ) : null}
        </div>
      )}
    </Sheet>
  );
}

/* ════════════════ GLOBAL SEARCH ════════════════════ */
function GlobalSearchSheet({ onClose, notices, events, tasks, roleTasks, onViewNotice, setTab }) {
  const [q, setQ] = useState("");
  const inputRef = useRef();

  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),100); },[]);

  const results = q.trim().length < 1 ? [] : (() => {
    const kw = q.toLowerCase();
    const res = [];

    (notices||[]).forEach(n=>{
      const body = n.content ? n.content.replace(/<[^>]*>/g,"") : (n.body||"");
      if ((n.title||"").toLowerCase().includes(kw) || body.toLowerCase().includes(kw)) {
        res.push({ type:"notice", icon:"📢", title:n.title, sub:n.category+" · "+n.date, item:n });
      }
    });
    (events||[]).forEach(e=>{
      if ((e.title||"").toLowerCase().includes(kw)||(e.memo||"").toLowerCase().includes(kw)) {
        res.push({ type:"event", icon:"📅", title:e.title, sub:e.date+" · "+e.category, item:e });
      }
    });
    (tasks||[]).filter(t=>!t.done).forEach(t=>{
      if ((t.text||"").toLowerCase().includes(kw)) {
        res.push({ type:"task", icon:"✅", title:t.text, sub:"개인 할일 · "+t.priority, item:t });
      }
    });
    (roleTasks||[]).filter(t=>!t.done).forEach(t=>{
      if ((t.text||"").toLowerCase().includes(kw)) {
        res.push({ type:"roletask", icon:"👥", title:t.text, sub:"팀 할일", item:t });
      }
    });
    return res;
  })();

  return (
    <Sheet title="🔍 전체 검색" onClose={onClose}>
      <div style={{ position:"sticky", top:0, background:T.card, paddingBottom:12, zIndex:1 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8,
          border:"1.5px solid "+T.brandBorder, borderRadius:14, padding:"0 14px",
          background:T.brandDim }}>
          <span style={{ fontSize:16 }}>🔍</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="공지, 일정, 할일 검색..."
            style={{ flex:1, border:"none", outline:"none", background:"transparent",
              padding:"12px 0", fontSize:14, fontFamily:F, color:T.t1 }}/>
          {q && <button onClick={()=>setQ("")} style={{
            background:"none", border:"none", color:T.t3, cursor:"pointer", fontSize:16 }}>✕</button>}
        </div>
      </div>

      {q.trim().length > 0 && results.length === 0 && (
        <EmptyState emoji="🔎" text={`"${q}" 검색 결과가 없어요`} sub="다른 키워드로 시도해보세요"/>
      )}

      {results.length > 0 && (
        <div style={{ ...glassBox({ overflow:"hidden" }) }}>
          {results.map((r,i)=>(
            <div key={r.type+i}>
              <button onClick={()=>{
                if (r.type==="notice") { onViewNotice(r.item); onClose(); }
                else if (r.type==="event") { setTab("calendar"); onClose(); }
                else { setTab("tasks"); onClose(); }
              }} style={{
                width:"100%", display:"flex", alignItems:"center", gap:12,
                padding:"12px 16px", border:"none", background:"none", cursor:"pointer",
                textAlign:"left" }}>
                <div style={{ width:36, height:36, borderRadius:10, background:T.card2,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:16, flexShrink:0 }}>{r.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:500, color:T.t1, fontFamily:F,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.title}</div>
                  <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginTop:2 }}>{r.sub}</div>
                </div>
                <span style={{ fontSize:11, fontWeight:600, color:T.t3,
                  background:T.card2, borderRadius:8, padding:"2px 8px", flexShrink:0, fontFamily:F }}>
                  {r.type==="notice"?"공지":r.type==="event"?"일정":"할일"}
                </span>
              </button>
              {i<results.length-1 && <div style={{ height:1, background:T.b0, margin:"0 16px" }}/>}
            </div>
          ))}
        </div>
      )}

      {q.trim().length === 0 && (
        <div>
          <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:8 }}>최근 공지</div>
          <div style={{ ...glassBox({ overflow:"hidden" }) }}>
            {(notices||[]).slice(0,5).map((n,i,arr)=>(
              <div key={n.id}>
                <button onClick={()=>{ onViewNotice(n); onClose(); }} style={{
                  width:"100%", display:"flex", alignItems:"center", gap:12,
                  padding:"12px 16px", border:"none", background:"none", cursor:"pointer",
                  textAlign:"left" }}>
                  <span style={{ fontSize:16 }}>📢</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:500, color:T.t1, fontFamily:F,
                      overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{n.title}</div>
                    <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>{n.date}</div>
                  </div>
                </button>
                {i<arr.length-1 && <div style={{ height:1, background:T.b0, margin:"0 16px" }}/>}
              </div>
            ))}
          </div>
        </div>
      )}
    </Sheet>
  );
}


    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
