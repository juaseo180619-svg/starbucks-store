/* ─── Storage hooks ─── */
/* 공유 데이터 (팀 전체) */
/* ══════════════════ GIST SYNC ENGINE ══════════════════ */
const GIST_FILENAME = "starbucks_store_data.json";
const SYNC_KEYS = [
  "sbx6_notices","sbx6_events","sbx6_categories",
  "sbx_teamtasks","sbx6_profile"
];

const GistSync = {
  getToken: () => { try { return localStorage.getItem("sbx_gist_token")||""; } catch(e){return "";} },
  getGistId: () => { try { return localStorage.getItem("sbx_gist_id")||""; } catch(e){return "";} },
  setGistId: (id) => { try { localStorage.setItem("sbx_gist_id", id); } catch(e){} },

  /** 현재 localStorage → Gist 에 업로드 (push) */
  push: async () => {
    const token = GistSync.getToken();
    if (!token) throw new Error("NO_TOKEN");
    const payload = {};
    SYNC_KEYS.forEach(k=>{
      const v = localStorage.getItem("sh_"+k) || localStorage.getItem("pr_"+k) || localStorage.getItem(k);
      if(v) payload[k] = v;
    });
    // profile도 포함
    const pv = localStorage.getItem("sbx_profile");
    if(pv) payload["sbx_profile"] = pv;

    const body = {
      description:"Starbucks Store App Data - "+new Date().toISOString(),
      public:false,
      files:{ [GIST_FILENAME]: { content: JSON.stringify(payload) } }
    };
    const gistId = GistSync.getGistId();
    const url = gistId
      ? "https://api.github.com/gists/"+gistId
      : "https://api.github.com/gists";
    const method = gistId ? "PATCH" : "POST";
    const resp = await fetch(url, {
      method, headers:{ Authorization:"token "+token, "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    if (!resp.ok) {
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.message||("HTTP "+resp.status));
    }
    const data = await resp.json();
    GistSync.setGistId(data.id);
    return data.id;
  },

  /** Gist → localStorage 에 덮어쓰기 (pull) */
  pull: async () => {
    const token = GistSync.getToken();
    if (!token) throw new Error("NO_TOKEN");
    const gistId = GistSync.getGistId();
    if (!gistId) throw new Error("NO_GIST");
    const resp = await fetch("https://api.github.com/gists/"+gistId, {
      headers:{ Authorization:"token "+token }
    });
    if (!resp.ok) throw new Error("HTTP "+resp.status);
    const data = await resp.json();
    const content = data.files?.[GIST_FILENAME]?.content;
    if (!content) throw new Error("EMPTY");
    const payload = JSON.parse(content);
    Object.entries(payload).forEach(([k,v])=>{
      // 공유 데이터는 sh_, 개인은 pr_
      if(SYNC_KEYS.includes(k)) localStorage.setItem("sh_"+k, v);
      else localStorage.setItem(k, v);
    });
    if(payload["sbx_profile"]) localStorage.setItem("sbx_profile", payload["sbx_profile"]);
    return Object.keys(payload).length;
  },

  /** 내 Gist 목록에서 StarbucksStore Gist 찾기 */
  findExisting: async () => {
    const token = GistSync.getToken();
    if (!token) return null;
    let page = 1;
    while (page <= 5) {
      const resp = await fetch("https://api.github.com/gists?per_page=30&page="+page, {
        headers:{ Authorization:"token "+token }
      });
      if (!resp.ok) break;
      const list = await resp.json();
      if (!list.length) break;
      const found = list.find(g => g.files && g.files[GIST_FILENAME]);
      if (found) { GistSync.setGistId(found.id); return found.id; }
      page++;
    }
    return null;
  },

  /** 자동 push - debounce 2초 */
  _timer: null,
  autoPush: () => {
    clearTimeout(GistSync._timer);
    GistSync._timer = setTimeout(async ()=>{
      if(!GistSync.getToken()) return;
      if(!GistSync.getGistId()) {
        await GistSync.findExisting().catch(()=>{});
      }
      GistSync.push().catch(()=>{});
    }, 2000);
  }
};

function useShared(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get(key, true); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    const val = typeof next === "function" ? next(data||seed) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
    GistSync.autoPush();
  }, [key, data]);
  return [data, save, loading];
}

/* 개인 데이터 (본인만) */
function usePersonal(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!key) { setData(seed); setLoading(false); return; }
    (async () => {
      try { const r = await window.storage.get(key, false); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    if (!key) return;
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), false); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

function Sheet({ onClose, title, children, tall, full }) {
  const [expanded, setExpanded] = useState(!!full);
  const [dragging, setDragging] = useState(false);
  const [startY, setStartY] = useState(0);
  const [dragDY, setDragDY] = useState(0);
  const sheetRef = useRef();

  const handleTouchStart = (e) => {
    setDragging(true);
    setStartY(e.touches[0].clientY);
    setDragDY(0);
  };
  const handleTouchMove = (e) => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    setDragDY(dy);
  };
  const handleTouchEnd = () => {
    setDragging(false);
    if (dragDY < -60) setExpanded(true);
    else if (dragDY > 80) { if (expanded) setExpanded(false); else onClose(); }
    setDragDY(0);
  };

  const maxH = expanded ? "100vh" : (tall ? "93vh" : "82vh");
  return (
    <div style={{ position:"fixed", inset:0, zIndex:700, background:"rgba(0,0,0,0.55)",
      backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
      display:"flex", alignItems:"flex-end", justifyContent:"center",
      touchAction:"none" }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div ref={sheetRef}
        style={{ background:"rgba(245,250,247,0.98)",
          backdropFilter:"blur(40px)", WebkitBackdropFilter:"blur(40px)",
          borderTop:"2px solid "+T.green,
          borderLeft:"1px solid "+T.border0, borderRight:"1px solid "+T.border0,
          borderRadius: expanded ? "0" : "26px 26px 0 0",
          width:"100%", maxWidth:430,
          height: maxH,
          overflowY:"auto", overflowX:"hidden", paddingBottom:44,
          touchAction:"pan-y",
          transform: dragDY > 0 ? "translateY("+Math.min(dragDY,120)+"px)" : "none",
          transition: dragging ? "none" : "height .35s cubic-bezier(.32,0,.67,0), border-radius .35s, transform .2s",
          boxShadow:"0 -20px 60px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.09)" }}>
        {/* 드래그 핸들 */}
        <div style={{ display:"flex", justifyContent:"center", padding:"14px 0 0", cursor:"grab" }}
          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
          onMouseDown={e=>{setDragging(true);setStartY(e.clientY);}}
          onMouseMove={e=>{if(dragging)setDragDY(e.clientY-startY);}}
          onMouseUp={()=>{if(dragDY<-60)setExpanded(true);else if(dragDY>80){if(expanded)setExpanded(false);else onClose();}setDragging(false);setDragDY(0);}}>
          <div style={{ width:44, height:5, borderRadius:3, background:T.glass3 }}/>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 22px 18px" }}>
          <span style={{ fontSize:20, fontWeight:700, color:T.l1, fontFamily:F }}>{title}</span>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <button onClick={onClose} style={{ background:T.glass2, border:"1px solid "+T.border1,
              borderRadius:"50%", width:30, height:30, cursor:"pointer", color:T.l2,
              fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
          </div>
        </div>
        <div style={{ padding:"0 22px" }}>{children}</div>
      </div>
    </div>
  );
}

/* ════════════════════════ MAIN APP ════════════════════════ */
function App() {
  /* 프로필 */
  const [profile, setProfileRaw] = useState(null);
  const [profileLoading, setProfileLoading] = useState(true);
  const [showProfileSetup, setShowProfileSetup] = useState(false);
  // ── 반응형: 항상 최상단에 선언 (조건부 return 전에) ──
  const [isPC, setIsPC] = useState(typeof window !== "undefined" ? window.innerWidth >= 768 : false);
  useEffect(()=>{
    const fn = () => setIsPC(window.innerWidth >= 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);

  // ── Gist 자동 pull (앱 시작시 + 2분마다) ──
  const doPull = useCallback(async (silent=true) => {
    if (!GistSync.getToken()) return;
    // Gist ID 없으면 먼저 탐색
    if (!GistSync.getGistId()) {
      const found = await GistSync.findExisting().catch(()=>null);
      if (!found) return; // 연결된 Gist 없음
    }
    if (!silent) setSyncStatus("syncing");
    try {
      // 변경 감지용: pull 전 스냅샷
      const before = ["sbx6_notices","sbx6_events","sbx6_categories","sbx_teamtasks"]
        .map(k=>localStorage.getItem("sh_"+k)).join("|");
      await GistSync.pull();
      const t = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
      localStorage.setItem("sbx_last_sync", t);
      setLastSync(t);
      setSyncStatus("ok");
      const after = ["sbx6_notices","sbx6_events","sbx6_categories","sbx_teamtasks"]
        .map(k=>localStorage.getItem("sh_"+k)).join("|");
      // silent여도 데이터가 달라졌으면 reload
      if (before !== after) window.location.reload();
      else if (!silent) window.location.reload();
    } catch(e) {
      setSyncStatus("error");
    }
  }, []);

  useEffect(()=>{
    doPull(true);
    const iv = setInterval(()=>doPull(true), 2*60*1000);
    return ()=>clearInterval(iv);
  }, [doPull]);

  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get("sbx_profile", false); setProfileRaw(r?JSON.parse(r.value):null); }
      catch { setProfileRaw(null); }
      finally { setProfileLoading(false); }
    })();
  }, []);

  const saveProfile = async (p) => {
    setProfileRaw(p);
    try { await window.storage.set("sbx_profile", JSON.stringify(p), false); } catch {}
    setShowProfileSetup(false);
  };

              {[

            setGistId(gid);

      {/* 동기화 상태 토스트 */}
      {syncStatus==="syncing" && (
        <div style={{ position:"fixed", bottom:80, left:"50%", transform:"translateX(-50%)",
          background:"rgba(30,57,50,0.92)", color:"#fff", borderRadius:20, padding:"8px 18px",

          display:"flex", alignItems:"center", gap:8,
          animation:"toastIn .3s ease" }}>

          동기화 중...
        </div>
      )}
      {toastVisible && (
        <div style={{ position:"fixed", bottom:80, left:"50%",
          background:syncStatus==="error"?"#e53e3e":T.green, color:"#fff",
          borderRadius:20, padding:"8px 18px",
          fontSize:13, fontFamily:F, zIndex:999, pointerEvents:"none",
          animation:toastAnim==="in"?"toastIn .35s ease forwards":"toastOut .5s ease forwards" }}>
          {syncStatus==="error"?"⚠ 동기화 실패":"✓ 동기화 완료"}
        </div>
      )}
      {/* showQuiz - already closed above */}
      {false}
      {showCatMgr&&<CatManagerSheet onClose={()=>setShowCatMgr(false)} categories={categories} onSave={saveCategories} catColors={catColors||{}} onSaveColors={saveCatColors}/>}

          }}

      )}
      </div>
{/* 메인 콘텐츠 영역 끝 */}
    </div>
  );
}


/* ══════════════════ 리치텍스트 공지 작성 ══════════════════ */
function RichNoticeSheet({ onClose, onSave, initial, categories }) {
  const cats = categories && categories.length ? categories : DEFAULT_CATS;
  const [title, setTitle]       = useState(initial ? initial.title : "");
  const [category, setCategory] = useState(initial ? initial.category : cats[0]);
  const [pinned, setPinned]     = useState(initial ? !!initial.pinned : false);
  const [noticeDate, setNoticeDate] = useState(initial ? (initial.noticeDate||"") : "");
  const [noticeEndDate, setNoticeEndDate] = useState(initial ? (initial.noticeEndDate||"") : "");
  const editorRef = useRef();
  const imgRef = useRef();

  useEffect(() => {
    if (initial && editorRef.current) {
      editorRef.current.innerHTML = initial.content || "";
    }
  }, []);

  const execCmd = (cmd, val) => {
    document.execCommand(cmd, false, val || null);
    editorRef.current.focus();
  };

  const insertImage = async (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.margin = "6px 0";
      editorRef.current.focus();
      const sel = window.getSelection();
      if (sel && sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.insertNode(img);
        range.collapse(false);
      } else {
        editorRef.current.appendChild(img);
      }
    };
    reader.readAsDataURL(file);
  };

  const handleSave = () => {
    if (!title.trim()) return;
    const content = editorRef.current.innerHTML;
    onSave({ title: title.trim(), category, content, pinned, noticeDate, noticeEndDate });
  };

  const tools = [
    { icon:"B",  cmd:"bold",        style:{ fontWeight:800 },              tip:"굵게"    },
    { icon:"I",  cmd:"italic",      style:{ fontStyle:"italic" },          tip:"기울임"  },
    { icon:"U",  cmd:"underline",   style:{ textDecoration:"underline" },  tip:"밑줄"    },
  ];

  // 형광펜: 어두운 배경에서 잘 보이는 진한 색 사용
  const highlights = [
    { bg:"#FFE066", text:"#1a1a00", label:"노랑" },
    { bg:"#5DDE74", text:"#003010", label:"초록" },
    { bg:"#FF7B7B", text:"#2a0000", label:"빨강" },
    { bg:"#5BA8FF", text:"#001835", label:"파랑" },
  ];

  return (
    <Sheet title={initial ? "공지 수정" : "공지 작성"} onClose={onClose} tall>
      <style>{`.rich-editor b,.rich-editor strong{font-weight:800}.rich-editor mark{padding:1px 2px;border-radius:3px}`}</style>

      <input
        value={title}
        onChange={e => setTitle(e.target.value)}
        onKeyDown={e => { if(e.key==="Enter") e.preventDefault(); }}
        placeholder="공지 제목"
        style={{ ...fBase, marginBottom:10, fontSize:17, fontWeight:600 }}
      />

      {/* 카테고리 - 동적 */}
      <div style={{ marginBottom:10 }}>
        <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>카테고리</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {cats.map(cat => (
            <button key={cat} onMouseDown={e => { e.preventDefault(); setCategory(cat); }}
              style={{ padding:"7px 14px", borderRadius:20, fontSize:13, fontWeight:600,
                border:"1px solid "+(category===cat?T.green:T.border1),
                background:category===cat?T.greenDim:T.glass1,
                color:category===cat?T.green:T.l2,
                cursor:"pointer", fontFamily:F }}>
              {cat}
            </button>
          ))}
        </div>
      </div>

      {/* 날짜 */}
      <div style={{ marginBottom:10 }}>
        <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>
          날짜 <span style={{ color:T.l4 }}>(선택 · 캘린더에 자동 추가)</span>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, color:T.l4, fontFamily:F, marginBottom:4 }}>시작일</div>
            <input type="date" value={noticeDate} onChange={e=>setNoticeDate(e.target.value)}
              style={{ ...fBase, marginBottom:0 }}/>
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, color:T.l4, fontFamily:F, marginBottom:4 }}>종료일</div>
            <input type="date" value={noticeEndDate} onChange={e=>setNoticeEndDate(e.target.value)}
              min={noticeDate} style={{ ...fBase, marginBottom:0 }}/>
          </div>
        </div>
      </div>

      {/* 서식 툴바 */}
      <div style={{ display:"flex", gap:5, marginBottom:8, flexWrap:"wrap", alignItems:"center",
        padding:"8px 10px", background:T.glass1, borderRadius:12, border:"1px solid "+T.border0 }}>
        {/* B / I / U */}
        {tools.map(t => (
          <button key={t.cmd} onMouseDown={e => { e.preventDefault(); execCmd(t.cmd); }}
            title={t.tip}
            style={{ ...t.style, width:30, height:30, borderRadius:7,
              border:"1px solid "+T.border1, background:T.glass2,
              color:T.l1, fontSize:13, cursor:"pointer", fontFamily:F,
              display:"flex", alignItems:"center", justifyContent:"center" }}>
            {t.icon}
          </button>
        ))}

        <div style={{ width:1, height:22, background:T.border1 }}/>

        {/* 들여쓰기 - 선택 텍스트 줄에 margin-left 16px */}
        <button onMouseDown={e => {
            e.preventDefault();
            const sel = window.getSelection();
            if (!sel || !sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            let node = range.startContainer;
            if (node.nodeType === 3) node = node.parentElement;
            // 가장 가까운 블록 요소 찾기
            while (node && node !== editorRef.current && !["P","DIV","LI","BLOCKQUOTE"].includes(node.tagName)) {
              node = node.parentElement;
            }
            if (node && node !== editorRef.current) {
              const cur = parseInt(node.style.marginLeft || "0");
              node.style.marginLeft = Math.min(cur + 16, 80) + "px";
            }
          }}
          title="들여쓰기"
          style={{ width:30, height:30, borderRadius:7, border:"1px solid "+T.border1,
            background:T.glass2, color:T.l1, fontSize:13, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center" }}>→</button>
        <button onMouseDown={e => {
            e.preventDefault();
            const sel = window.getSelection();
            if (!sel || !sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            let node = range.startContainer;
            if (node.nodeType === 3) node = node.parentElement;
            while (node && node !== editorRef.current && !["P","DIV","LI","BLOCKQUOTE"].includes(node.tagName)) {
              node = node.parentElement;
            }
            if (node && node !== editorRef.current) {
              const cur = parseInt(node.style.marginLeft || "0");
              node.style.marginLeft = Math.max(cur - 16, 0) + "px";
            }
          }}
          title="내어쓰기"
          style={{ width:30, height:30, borderRadius:7, border:"1px solid "+T.border1,
            background:T.glass2, color:T.l1, fontSize:13, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center" }}>←</button>

        <div style={{ width:1, height:22, background:T.border1 }}/>

        {/* 형광펜 */}
        {highlights.map(h => (
          <button key={h.bg} onMouseDown={e => {
              e.preventDefault();
              // mark 태그로 감싸기
              const sel = window.getSelection();
              if (sel && sel.rangeCount && !sel.isCollapsed) {
                const range = sel.getRangeAt(0);
                const mark = document.createElement("mark");
                mark.style.background = h.bg;
                mark.style.color = h.text;
                mark.style.borderRadius = "3px";
                mark.style.padding = "1px 2px";
                range.surroundContents(mark);
              }
            }}
            title={"형광펜 "+h.label}
            style={{ width:22, height:22, borderRadius:5,
              border:"1px solid rgba(255,255,255,0.15)",
              background:h.bg, cursor:"pointer" }}/>
        ))}
        <button onMouseDown={e => { e.preventDefault(); execCmd("removeFormat"); }}
          title="서식 제거"
          style={{ width:22, height:22, borderRadius:5, border:"1px solid "+T.border1,
            background:T.glass2, color:T.l2, fontSize:11, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>

        <div style={{ width:1, height:22, background:T.border1 }}/>

        {/* 이미지 */}
        <button onMouseDown={e => { e.preventDefault(); imgRef.current.click(); }}
          title="이미지 삽입"
          style={{ width:30, height:30, borderRadius:7, border:"1px solid "+T.border1,
            background:T.glass2, color:T.l2, fontSize:14, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center" }}>🖼</button>
        <input ref={imgRef} type="file" accept="image/*" style={{ display:"none" }}
          onChange={e => e.target.files[0] && insertImage(e.target.files[0])} />
      </div>

      {/* 에디터 */}
      <div
        ref={editorRef}
        contentEditable
        suppressContentEditableWarning
        className="rich-editor"
        data-placeholder="공지 내용을 입력하세요..."
        style={{ ...fBase, minHeight:160, fontSize:15, lineHeight:1.8, padding:"12px 14px",
          whiteSpace:"pre-wrap", overflowY:"auto", marginBottom:10 }}
      />

      {/* 고정 */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14,
        padding:"12px 14px", background:T.glass1, border:"1px solid "+T.border0, borderRadius:12 }}>
        <input type="checkbox" id="richpin" checked={pinned}
          onChange={e => setPinned(e.target.checked)}
          style={{ width:18, height:18, accentColor:T.green, cursor:"pointer" }}/>
        <label htmlFor="richpin" style={{ fontSize:14, color:T.l1, cursor:"pointer", userSelect:"none", fontFamily:F }}>
          상단 고정
        </label>
      </div>

      <GreenBtn full onClick={handleSave} disabled={!title.trim()}>
        {initial ? "수정 완료" : "등록하기"}
      </GreenBtn>
    </Sheet>
  );
}


/* ══════════════════ 카테고리 관리 ══════════════════ */

// ─── MemoTab ───
function MemoTab({ memos, onSave }) {
  const [input, setInput] = useState("");
  const [editId, setEditId] = useState(null);
  const [editText, setEditText] = useState("");

  const add = () => {
    const v = input.trim();
    if (!v) return;
    onSave([...memos, { id:"m"+Date.now(), text:v, date:new Date().toLocaleDateString("ko-KR",{month:"short",day:"numeric"}) }]);
    setInput("");
  };

  const del = (id) => onSave(memos.filter(m=>m.id!==id));

  const saveEdit = (id) => {
    onSave(memos.map(m=>m.id===id?{...m,text:editText.trim()}:m));
    setEditId(null);
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <span style={{ fontSize:18, fontWeight:700, color:T.l1, fontFamily:F }}>📓 메모장</span>
        <span style={{ fontSize:12, color:T.l4, fontFamily:F }}>{memos.length}개</span>
      </div>

      {/* 입력 */}
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <textarea value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();add();} }}
          placeholder="메모를 입력하세요... (Enter로 저장)"
          rows={2}
          style={{ flex:1, padding:"12px 14px", borderRadius:14, border:"1px solid "+T.border1,
            background:T.card, color:T.l1, fontSize:14, fontFamily:F, outline:"none",
            resize:"none", lineHeight:1.6 }}/>
        <button onClick={add} style={{
          padding:"0 16px", borderRadius:14, border:"none",
          background:T.green, color:"#fff", fontSize:14, fontWeight:700,
          cursor:"pointer", fontFamily:F, flexShrink:0 }}>저장</button>
      </div>

      {/* 메모 목록 */}
      {memos.length===0 ? (
        <div style={{ padding:"40px 0", textAlign:"center" }}>
          <div style={{ fontSize:32, marginBottom:10 }}>📝</div>
          <div style={{ fontSize:14, color:T.l4, fontFamily:F }}>아직 메모가 없어요</div>
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {[...memos].reverse().map(function(m){
            const isEdit = editId===m.id;
            return (
              <div key={m.id} style={{
                padding:"14px 16px", borderRadius:16,
                background:T.card, border:"1px solid "+T.border0,
                boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
                {isEdit ? (
                  <div>
                    <textarea value={editText} onChange={e=>setEditText(e.target.value)}
                      rows={3}
                      style={{ width:"100%", padding:"8px 10px", borderRadius:10,
                        border:"1px solid "+T.border1, background:T.bg,
                        color:T.l1, fontSize:14, fontFamily:F, outline:"none",
                        resize:"none", marginBottom:8, lineHeight:1.6 }}/>
                    <div style={{ display:"flex", gap:6 }}>
                      <button onClick={()=>saveEdit(m.id)} style={{
                        padding:"6px 14px", borderRadius:8, border:"none",
                        background:T.green, color:"#fff", fontSize:13,
                        fontWeight:700, cursor:"pointer", fontFamily:F }}>저장</button>

function CatManagerSheet({ onClose, categories, onSave, catColors, onSaveColors }) {
  const cats = categories && categories.length ? [...categories] : [...DEFAULT_CATS];
  const [list, setList] = useState(cats);
  const [input, setInput] = useState("");
  const [colors, setColors] = useState(catColors||{});
  const PALETTE = ["#00704A","#C07020","#2563EB","#7C3AED","#DC2626","#EA580C","#0891B2","#059669","#DB2777","#65A30D"];

  const add = () => {
    const v = input.trim();
    if (!v || list.includes(v)) return;
    setList(prev => [...prev, v]);
    setInput("");
  };
  const remove = (name) => {
    if (list.length <= 1) return;
    setList(prev => prev.filter(c => c !== name));
  };
  const setColor = (name, color) => {
    setColors(prev => ({...prev, [name]: color}));
  };
  const handleSave = () => {
    onSave(list);
    onSaveColors(colors);
    onClose();
  };

  return (
    <Sheet title="카테고리 관리" onClose={onClose}>
      <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:14, lineHeight:1.6 }}>
        카테고리를 추가하고 캘린더 표시 색상을 지정해요.
      </p>

      {/* 카테고리 목록 */}
      <div style={{ marginBottom:14 }}>
        {list.map(function(name){
          const curColor = colors[name] || BASE_CAT[name]?.color || CAT_COLORS[0].color;
          return (
            <div key={name} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <div style={{ width:14, height:14, borderRadius:4, background:curColor, flexShrink:0 }}/>
                <span style={{ fontSize:14, fontWeight:600, color:T.l1, fontFamily:F, flex:1 }}>{name}</span>
                {!DEFAULT_CATS.includes(name) && (
                  <button onClick={()=>remove(name)} style={{
                    background:"none", border:"none", color:T.red, fontSize:18,
                    cursor:"pointer", lineHeight:1, padding:"0 4px" }}>×</button>
                )}
              </div>
              {/* 색상 팔레트 */}
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", paddingLeft:22 }}>
                {PALETTE.map(function(hex){
                  const isSelected = curColor === hex;
                  return (
                    <button key={hex} onClick={()=>setColor(name, hex)} style={{
                      width:24, height:24, borderRadius:6, background:hex, border:"none",
                      cursor:"pointer", flexShrink:0,
                      outline:isSelected?"3px solid "+hex:"none",
                      outlineOffset:isSelected?"2px":"0",
                      opacity:isSelected?1:0.65,
                      transform:isSelected?"scale(1.15)":"scale(1)",
                      transition:"all .15s" }}/>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* 새 카테고리 추가 */}
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&add()}
          placeholder="새 카테고리 이름"
          style={{ flex:1, padding:"10px 14px", borderRadius:12, border:"1px solid "+T.border1,
            background:T.card, color:T.l1, fontSize:14, fontFamily:F, outline:"none" }}/>
        <button onClick={add} style={{
          padding:"10px 16px", borderRadius:12, border:"none",
          background:T.green, color:"#fff", fontSize:14, fontWeight:700,
          cursor:"pointer", fontFamily:F }}>추가</button>
      </div>

      <GreenBtn full onClick={handleSave}>저장하기</GreenBtn>
    </Sheet>
  );
}


/* ══════════════════ CALENDAR TAB ══════════════════ */
function CalendarTab({ events, calDate, setCalDate, selDay, setSelDay, todayStr, CAT, onAddEvent, onDeleteEvent, onEditEvent }) {
  var cY = calDate.getFullYear();
  var cM = calDate.getMonth();
  var firstDow = new Date(cY, cM, 1).getDay();
  var daysInMo = new Date(cY, cM + 1, 0).getDate();
  var WDAYS_CAL = ["일","월","화","수","목","금","토"];
  var mStr = cY + "-" + String(cM + 1).padStart(2, "0");

  var monthEvents = events.filter(function(e) {
    var s = e.date, en = e.endDate || e.date;
    return s.slice(0,7) === mStr || en.slice(0,7) === mStr ||
           (s < mStr + "-01" && en > mStr + "-31");
  });

  // 주 배열 생성
  var weeks = [];
  var d = 1, blanks = firstDow;
  while (d <= daysInMo) {
    var row = [];
    for (var col = 0; col < 7; col++) {
      if (blanks > 0) { row.push(null); blanks--; }
      else if (d <= daysInMo) { row.push(d); d++; }
      else row.push(null);
    }
    weeks.push(row);
  }

  var selDayEvents = events.filter(function(e) {
    return selDay >= e.date && selDay <= (e.endDate || e.date);
  });
  var selDateLabel = new Date(selDay + "T00:00:00")
    .toLocaleDateString("ko-KR", { month:"long", day:"numeric" });

  return (
    <div style={{ padding:"16px" }} className="fi">
      {/* 월 네비 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <button onClick={function(){ setCalDate(new Date(cY, cM-1, 1)); }} style={{
          width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:10, background:T.card, cursor:"pointer", color:T.l1,
          fontSize:18, border:"1px solid "+T.border0,
          boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>‹</button>
        <span style={{ fontSize:17, fontWeight:700, color:T.l1, fontFamily:F }}>
          {calDate.toLocaleDateString("ko-KR", { year:"numeric", month:"long" })}
        </span>
        <button onClick={function(){ setCalDate(new Date(cY, cM+1, 1)); }} style={{
          width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:10, background:T.card, cursor:"pointer", color:T.l1,
          fontSize:18, border:"1px solid "+T.border0,
          boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>›</button>
      </div>

      {/* 캘린더 카드 */}
      <div style={{ background:T.card, borderRadius:20, padding:"16px",
        boxShadow:"0 2px 20px rgba(30,57,50,0.08)", marginBottom:16 }}>

        {/* 요일 헤더 */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:8 }}>
          {WDAYS_CAL.map(function(wd, i) {
            return (
              <div key={wd} style={{ textAlign:"center", fontSize:11, fontWeight:600,
                fontFamily:F, padding:"2px 0 8px",
                color: i===0 ? T.red : i===6 ? T.blue : T.l3 }}>{wd}</div>
            );
          })}
        </div>

        {/* 날짜 그리드 - 그리드선 없음 */}
        {weeks.map(function(weekRow, wi) {
          // 이 주의 이벤트 찾기
          var validDays = weekRow.filter(function(x){ return x!==null; });
          if (!validDays.length) return null;
          var wStart = validDays[0], wEnd = validDays[validDays.length-1];

          var weekBars = [];
          monthEvents.forEach(function(ev) {
            var evS = parseInt((ev.date||"").slice(8,10)||"0");
            var evE = parseInt(((ev.endDate&&ev.endDate.length>=10?ev.endDate:ev.date)||"").slice(8,10)||"0");
            if (evS > wEnd || evE < wStart) return;
            var clampS = Math.max(evS, wStart);
            var clampE = Math.min(evE, wEnd);
            var colS = weekRow.indexOf(clampS);
            var colE = weekRow.indexOf(clampE);
            if (colS < 0 || colE < 0) return;
            weekBars.push({ ev:ev, colS:colS, colE:colE,
              startsHere: evS>=wStart, endsHere: evE<=wEnd, slot:null });
          });
          weekBars.forEach(function(bar) {
            var slot=0, busy=[];
            weekBars.forEach(function(b){
              if(b===bar||b.slot===null)return;
              if(b.colS<=bar.colE&&b.colE>=bar.colS)busy.push(b.slot);
            });
            while(busy.indexOf(slot)!==-1)slot++;
            bar.slot=slot;
          });
          var maxSlot = weekBars.reduce(function(m,b){return Math.max(m,b.slot+1);},0);
          var cellH = 34 + maxSlot*18;

          return (
            <div key={wi} style={{ position:"relative", marginBottom:2 }}>
              {/* 날짜 행 */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
                {weekRow.map(function(day, ci) {
                  if (day===null) return <div key={"n"+ci} style={{ height:cellH }}/>;
                  var dStr = cY+"-"+String(cM+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
                  var isTod = dStr===todayStr();
                  var isSel = dStr===selDay && !isTod;
                  var dayCol = ci===0?T.red:ci===6?T.blue:T.l1;
                  return (
                    <div key={day} onClick={function(){setSelDay(dStr);}}
                      style={{ height:cellH, cursor:"pointer", position:"relative",
                        background: isSel ? T.greenLight : "transparent",
                        borderRadius:10 }}>
                      <div style={{ position:"relative", zIndex:2,
                        display:"flex", justifyContent:"center", paddingTop:4 }}>
                      {isTod ? (
                        <div style={{ width:26, height:26, borderRadius:"50%",
                          background:"linear-gradient(135deg,#00704A,#1E3932)",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          boxShadow:"0 2px 8px rgba(0,112,74,0.35)" }}>
                          <span style={{ fontSize:12, fontWeight:800, color:"#fff",
                            lineHeight:1, fontFamily:F }}>{day}</span>
                        </div>
                      ) : (
                        <span style={{ fontSize:13, fontWeight:isSel?700:400,
                          color:isSel?T.green:dayCol, lineHeight:"26px", fontFamily:F }}>{day}</span>
                      )}
                    </div>
                    </div>
                  );
                })}
              </div>

              {/* 이벤트 바 */}
              {weekBars.map(function(bar,bi){
                var meta = CAT[bar.ev.category] || { color:T.green };
                var topOff = 34 + bar.slot*18;
                var span = bar.colE - bar.colS + 1;
                return (
                  <div key={bar.ev.id+"_"+wi+"_"+bi} style={{
                    position:"absolute", top:topOff, zIndex:3,
                    left:(bar.colS*100/7)+"%", width:(span*100/7)+"%",
                    height:14,
                    background: meta.color+"30",
                    borderLeft: bar.startsHere ? "3px solid "+meta.color : "none",
                    borderRight: bar.endsHere ? "1px solid "+meta.color+"50" : "none",
                    borderTop: "1px solid "+meta.color+"40",
                    borderBottom: "1px solid "+meta.color+"40",
                    borderRadius: bar.startsHere?(bar.endsHere?"5px":"5px 0 0 5px"):(bar.endsHere?"0 5px 5px 0":"0"),
                    display:"flex", alignItems:"center", paddingLeft:bar.startsHere?4:2,
                    overflow:"hidden", pointerEvents:"none"
                  }}>
                    {bar.startsHere&&(
                      <span style={{ fontSize:9, fontWeight:700, color:meta.color,
                        fontFamily:F, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                        {bar.ev.title}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* 선택 날짜 일정 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <span style={{ fontSize:15, fontWeight:700, color:T.l1, fontFamily:F }}>{selDateLabel}</span>
          <span style={{ fontSize:13, color:T.l3, fontFamily:F, marginLeft:6 }}>
            {selDayEvents.length>0 ? selDayEvents.length+"개" : "없음"}
          </span>
        </div>
        <ActionBtn onClick={onAddEvent}>+ 추가</ActionBtn>
      </div>

      <div style={{ background:T.card, borderRadius:16, overflow:"hidden",
        boxShadow:"0 2px 16px rgba(30,57,50,0.07)" }}>
        {selDayEvents.length===0
          ? <EmptyRow text="이 날에 일정이 없어요"/>
          : selDayEvents.map(function(e,i){
              return (
                <div key={e.id} style={{ position:"relative" }}>
                  <ERow e={e}/>
                  <div style={{ display:"flex", gap:6, padding:"0 16px 10px", justifyContent:"flex-end" }}>
                    <button onClick={()=>onEditEvent&&onEditEvent(e)} style={{
                      padding:"4px 12px", borderRadius:8, fontSize:12, fontFamily:F,
                      border:"1px solid "+T.border1, background:T.glass1, color:T.l2, cursor:"pointer" }}>수정</button>
                    <button onClick={()=>{ if(window.confirm("일정을 삭제할까요?")) onDeleteEvent&&onDeleteEvent(e.id); }} style={{
                      padding:"4px 12px", borderRadius:8, fontSize:12, fontFamily:F,
                      border:"1px solid #ff6b6b44", background:"#ff6b6b11", color:"#e05252", cursor:"pointer" }}>삭제</button>
                  </div>
                  {i<selDayEvents.length-1&&<Sep/>}
                </div>
              );
            })
        }
      </div>
    </div>
  );
}

// ─── AI Chat Sheet ───
function AIChatSheet({ onClose, notices }) {
  const [query, setQuery] = useState("");
  const [answer, setAnswer] = useState("");
  const [loading, setLoading] = useState(false);

  const ask = async () => {
    if (!query.trim()) return;
    setLoading(true);
    setAnswer("");
    try {
      const ctx = (notices||[]).slice(0,20).map(n=>
        n.title+(n.body?": "+n.body.replace(/<[^>]*>/g,"").slice(0,100):"")
      ).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:800,
          messages:[{ role:"user", content:"스타벅스 매장 공지 목록:\n"+ctx+"\n\n질문: "+query }]
        })
      });
      const d = await res.json();
      setAnswer((d.content||[]).map(b=>b.text||"").join(""));
    } catch(e) { setAnswer("API 키가 설정되지 않았거나 오류가 발생했어요."); }
    setLoading(false);
  };

  return (
    <Sheet title="AI 공지 검색" onClose={onClose}>
      <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:14 }}>
        공지 내용에 대해 질문하거나 요약을 요청해보세요.
      </p>
      <Field label="질문" value={query} onChange={setQuery} placeholder="예: 이번 달 프로모션 정리해줘"/>
      <GreenBtn full onClick={ask} disabled={loading}>
        {loading ? "⏳ 답변 중..." : "✨ 물어보기"}
      </GreenBtn>
      {answer && (
        <div style={{ marginTop:16, padding:"14px 16px", borderRadius:14,
          background:T.glass1, border:"1px solid "+T.border0 }}>
          <div style={{ fontSize:13, color:T.l1, fontFamily:F, lineHeight:1.7,
            whiteSpace:"pre-wrap" }}>{answer}</div>
        </div>
      )}
    </Sheet>
  );
}

// ─── AI Briefing Sheet ───
function AIBriefingSheet({ onClose, notices, events }) {
  const [briefing, setBriefing] = useState("");
  const [loading, setLoading] = useState(false);

  const generate = async () => {
    setLoading(true);
    setBriefing("");
    try {
      const today = new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"});
      const noticeCtx = (notices||[]).slice(0,10).map(n=>
        "• "+n.title+(n.category?" ["+n.category+"]":"")
      ).join("\n");
      const evCtx = (events||[]).filter(e=>e.date>=new Date().toISOString().slice(0,10)).slice(0,5)
        .map(e=>"• "+e.date+" "+e.title).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:600,
          messages:[{ role:"user", content:
            "오늘("+today+") 스타벅스 매장 파트너를 위한 간결한 AI 브리핑을 작성해줘.\n\n최근 공지:\n"+noticeCtx+
            "\n\n예정 일정:\n"+evCtx+
            "\n\n형식: 3~5문장으로 오늘 주요 체크포인트 요약. 친근하고 간결하게." }]
        })
      });
      const d = await res.json();
      setBriefing((d.content||[]).map(b=>b.text||"").join(""));
    } catch(e) { setBriefing("API 연결 오류가 발생했어요. AI API 키를 확인해주세요."); }
    setLoading(false);
  };

  useEffect(()=>{ generate(); }, []);

  return (
    <Sheet title="🔍 AI 브리핑" onClose={onClose}>
      <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:14 }}>
        공지와 일정을 분석한 오늘의 브리핑이에요.
      </p>
      {loading ? (
        <div style={{ padding:"40px 0", textAlign:"center" }}>
          <div style={{ fontSize:13, color:T.l3, fontFamily:F }}>⏳ AI가 분석 중...</div>
        </div>
      ) : (
        <div>
          <div style={{ padding:"16px", borderRadius:14, background:T.glass1,
            border:"1px solid "+T.border0, marginBottom:14 }}>
            <div style={{ fontSize:14, color:T.l1, fontFamily:F, lineHeight:1.8,
              whiteSpace:"pre-wrap" }}>{briefing||"내용을 불러오는 중이에요."}</div>
          </div>
          <ActionBtn onClick={generate}>🔄 새로 생성</ActionBtn>
        </div>
      )}
    </Sheet>
  );
}

// ─── AI Quiz Sheet ───
function AIQuizSheet({ onClose, notices }) {
  const [quiz, setQuiz] = useState(null);
  const [selected, setSelected] = useState(null);
  const [loading, setLoading] = useState(false);

  const generate = async () => {
    setLoading(true);
    setQuiz(null);
    setSelected(null);
    try {
      const ctx = (notices||[]).slice(0,15).map(n=>
        n.title+(n.body?": "+n.body.replace(/<[^>]*>/g,"").slice(0,80):"")
      ).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:400,
          messages:[{ role:"user", content:
            "공지 내용으로 퀴즈 1문제를 만들어줘:\n"+ctx+
            "\n\n반드시 JSON만 반환해: {question:"질문",options:["A","B","C","D"],answer:0,explanation:"설명"}" }]
        })
      });
      const d = await res.json();
      const txt = (d.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
      setQuiz(JSON.parse(txt));
    } catch(e) { setQuiz({question:"API 오류",options:["확인"],answer:0,explanation:"API 키를 확인해주세요."}); }
    setLoading(false);
  };

  useEffect(()=>{ generate(); }, []);

  return (
    <Sheet title="📝 공지 퀴즈" onClose={onClose}>
      <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:14 }}>
        공지 내용을 잘 이해하고 있는지 확인해봐요!
      </p>
      {loading ? (
        <div style={{ padding:"40px 0", textAlign:"center" }}>
          <div style={{ fontSize:13, color:T.l3, fontFamily:F }}>⏳ 문제 생성 중...</div>
        </div>
      ) : quiz ? (
        <div>
          <div style={{ padding:"16px", borderRadius:14, background:T.glass1,
            border:"1px solid "+T.border0, marginBottom:14 }}>
            <div style={{ fontSize:15, fontWeight:700, color:T.l1, fontFamily:F,
              marginBottom:14, lineHeight:1.6 }}>{quiz.question}</div>
            {(quiz.options||[]).map(function(opt,i){
              const isRight = i===quiz.answer;
              const isWrong = selected!==null && selected===i && !isRight;
              return (
                <button key={i} onClick={()=>setSelected(i)} style={{
                  width:"100%", padding:"11px 14px", borderRadius:12, marginBottom:8,
                  border:"1px solid "+(selected===null?T.border1:isRight?"#00704A":isWrong?"#DC2626":T.border0),
                  background:selected===null?T.card:isRight?"rgba(0,112,74,0.12)":isWrong?"rgba(220,38,38,0.08)":T.card,
                  color:T.l1, fontSize:14, fontFamily:F, cursor:"pointer", textAlign:"left" }}>
                  {["A","B","C","D"][i]}. {opt}
                </button>
              );
            })}
            {selected!==null && (
              <div style={{ padding:"10px 14px", borderRadius:10,
                background:"rgba(0,112,74,0.08)", border:"1px solid rgba(0,112,74,0.2)" }}>
                <div style={{ fontSize:13, color:T.green, fontFamily:F, fontWeight:600, marginBottom:4 }}>
                  {selected===quiz.answer?"✅ 정답!" :"❌ 오답"} — 정답: {["A","B","C","D"][quiz.answer]}
                </div>
                <div style={{ fontSize:13, color:T.l2, fontFamily:F, lineHeight:1.6 }}>
                  {quiz.explanation}
                </div>
              </div>
            )}
          </div>
          <ActionBtn onClick={generate}>🔄 새 문제</ActionBtn>
        </div>
      ) : null}
    </Sheet>
  );
}



    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
