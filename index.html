/* ─── Storage hooks ─── */
/* 공유 데이터 (팀 전체) */
function useShared(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get(key, true); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

/* 개인 데이터 (본인만) */
function usePersonal(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!key) { setData(seed); setLoading(false); return; }
    (async () => {
      try { const r = await window.storage.get(key, false); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    if (!key) return;
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), false); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

/* ══════════════════ AI ANALYZE SHEET ══════════════════ */
function AIAnalyzeSheet({ onClose, onSave }) {
  const CHUNK = 5; // 묶음 크기

  const [step, setStep]         = useState("upload");
  const [files, setFiles]       = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [chunks, setChunks]     = useState([]); // [{ status:"pending"|"analyzing"|"done"|"error", summary:"" }]
  const [merging, setMerging]   = useState(false);
  const [result, setResult]     = useState(null);
  const [error, setError]       = useState(null);
  const [savePinned, setSavePinned] = useState(false);
  const fileRef = useRef();

  const toBase64 = f => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(",")[1]);
    r.onerror = () => rej();
    r.readAsDataURL(f);
  });

  const handleFiles = (incoming) => {
    setError(null);
    const valid = Array.from(incoming).filter(f =>
      f.type.startsWith("image/") || f.type === "application/pdf"
    );
    if (!valid.length) { setError("이미지(PNG, JPG) 또는 PDF만 가능해요."); return; }
    setFiles(prev => [...prev, ...valid.map(f => ({
      file: f,
      preview: f.type.startsWith("image/") ? URL.createObjectURL(f) : null,
    }))]);
  };

  const removeFile = idx => setFiles(prev => prev.filter((_, i) => i !== idx));
  const clearAll   = () => { setFiles([]); setResult(null); setError(null); setChunks([]); setSavePinned(false); };

  /* 묶음 1개(5~6장) → 텍스트 요약 */
  const analyzeChunk = async (chunkFiles, chunkIdx) => {
    setChunks(prev => prev.map((c, i) => i === chunkIdx ? { ...c, status:"analyzing" } : c));

    const blocks = await Promise.all(chunkFiles.map(async ({ file }) => {
      const base64 = await toBase64(file);
      const isPDF  = file.type === "application/pdf";
      return isPDF
        ? { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } }
        : { type:"image",    source:{ type:"base64", media_type:file.type, data:base64 } };
    }));

    const prompt = `이 ${chunkFiles.length}개의 이미지/문서는 스타벅스 파트너넷 공지사항의 일부 페이지입니다.
이미지에 있는 모든 텍스트와 내용을 빠짐없이 추출해주세요.
내용을 삭제하거나 줄이지 말고, 보이는 그대로 전부 옮겨주세요.
JSON만 반환하고 다른 텍스트는 절대 포함하지 마세요.
{"text": "이미지에서 추출한 모든 내용 (생략 없이 전부)"}
내용이 없으면: {"text": ""}`;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({
          model:"claude-haiku-4-5-20251001", max_tokens:1000,
          messages:[{ role:"user", content:[...blocks, { type:"text", text:prompt }] }],
        }),
      });
      const data   = await resp.json();
      const raw    = data.content?.map(c => c.text || "").join("").trim();
      const parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());
      const summary = parsed.text || "";
      setChunks(prev => prev.map((c, i) => i === chunkIdx ? { ...c, status:"done", summary } : c));
      return summary;
    } catch {
      setChunks(prev => prev.map((c, i) => i === chunkIdx ? { ...c, status:"error", summary:"" } : c));
      return "";
    }
  };

  /* 수집된 텍스트 → 공지 1개로 합치기 */
  const mergeTexts = async (texts) => {
    const combined = texts.filter(Boolean).join("\n\n---\n\n");
    const prompt = `당신은 스타벅스 매장 운영 전문 AI입니다.
아래는 파트너넷 공지사항에서 추출한 내용입니다.
내용을 삭제하거나 줄이지 말고, 중복된 내용만 하나로 합쳐서 읽기 좋게 정리해주세요.
날짜, 수치, 세부 조건 등 모든 정보를 유지해야 합니다.
JSON만 반환하고 다른 텍스트는 절대 포함하지 마세요.

{
  "title": "공지 제목 (30자 이내)",
  "category": "이벤트 or 운영 or 인사 or 기타",
  "summary": "공지 전체 내용을 보기 좋게 정리 (내용 삭제 금지, 항목별 개행은 \\n, 중요 항목은 • 로 시작)"
}

추출 내용:
${combined}

오늘 날짜: ${todayStr()}`;

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:2000,
        messages:[{ role:"user", content:[{ type:"text", text:prompt }] }],
      }),
    });
    const data   = await resp.json();
    const raw    = data.content?.map(c => c.text || "").join("").trim();
    return JSON.parse(raw.replace(/```json|```/g, "").trim());
  };

  const analyze = async () => {
    if (!files.length) return;
    setStep("analyzing");
    setMerging(false);

    // 파일을 CHUNK 크기로 분할
    const grouped = [];
    for (let i = 0; i < files.length; i += CHUNK) grouped.push(files.slice(i, i + CHUNK));
    setChunks(grouped.map(() => ({ status:"pending", summary:"" })));

    try {
      // 묶음들을 동시에 병렬 처리
      const texts = await Promise.all(
        grouped.map((group, idx) => analyzeChunk(group, idx))
      );

      // 마지막 합치기
      setMerging(true);
      const merged = await mergeTexts(texts);
      setResult(merged);
      setStep("result");
    } catch {
      setError("분석 중 오류가 발생했어요. 다시 시도해주세요.");
      setStep("upload");
    }
  };

  const handleSave = () => {
    if (!result) return;
    onSave({
      notice:{ id:"n"+Date.now(), title:result.title, category:result.category,
        content:result.summary, date:todayStr(), pinned:savePinned, author:"AI 분석", _read:false },
      tasks:[],
    });
    onClose();
  };

  const chunkCount = Math.ceil(files.length / CHUNK);
  const doneCount  = chunks.filter(c => c.status === "done" || c.status === "error").length;

  return (
    <Sheet title="AI 공지 분석" onClose={onClose} tall>

      {/* ── UPLOAD ── */}
      {step==="upload"&&(
        <>
          <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:14, lineHeight:1.6 }}>
            파트너넷 공지 캡처 이미지 또는 PDF를 올려주세요.<br/>
            <span style={{ color:T.green }}>여러 파일을 한꺼번에</span> 올리면 하나의 공지로 통합 정리해드려요.
          </p>

          {/* 드롭존 */}
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files);}}
            onClick={()=>fileRef.current.click()}
            style={{ ...glassBox({ borderRadius:18, padding:"22px 20px",
              border:`2px dashed ${dragOver?T.green:T.border2}`,
              background:dragOver?T.greenDim:T.glass0, transition:"all .2s" }),
              textAlign:"center", cursor:"pointer", marginBottom:14 }}>
            <div style={{ fontSize:30, marginBottom:8 }}>📎</div>
            <div style={{ fontSize:14, fontWeight:600, color:T.l2, fontFamily:F, marginBottom:4 }}>파일 추가하기</div>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F }}>탭하거나 드래그 · 여러 파일 동시 선택 가능</div>
            <div style={{ fontSize:11, color:T.l4, fontFamily:F, marginTop:6 }}>PNG · JPG · PDF 지원</div>
          </div>
          <input ref={fileRef} type="file" accept="image/*,.pdf" multiple style={{ display:"none" }}
            onChange={e=>handleFiles(e.target.files)}/>

          {files.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <span style={{ fontSize:13, fontWeight:600, color:T.l2, fontFamily:F }}>{files.length}개 파일</span>
                <button onClick={clearAll} style={{ background:"none", border:"none",
                  color:T.red, fontSize:12, cursor:"pointer", fontFamily:F }}>전체 삭제</button>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, maxHeight:220, overflowY:"auto" }}>
                {files.map((f,i)=>(
                  <div key={i} style={{ position:"relative", borderRadius:10, overflow:"hidden",
                    border:`1px solid ${T.border1}`, background:T.glass1, aspectRatio:"1" }}>
                    {f.preview
                      ? <img src={f.preview} alt="" style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }}/>
                      : <div style={{ width:"100%", height:"100%", display:"flex", flexDirection:"column",
                          alignItems:"center", justifyContent:"center", gap:3 }}>
                          <span style={{ fontSize:18 }}>📄</span>
                          <span style={{ fontSize:9, color:T.l3, fontFamily:F, padding:"0 4px",
                            textAlign:"center", overflow:"hidden", textOverflow:"ellipsis",
                            whiteSpace:"nowrap", width:"100%" }}>{f.file.name}</span>
                        </div>
                    }
                    <button onClick={e=>{e.stopPropagation();removeFile(i);}} style={{
                      position:"absolute", top:3, right:3, width:18, height:18, borderRadius:"50%",
                      background:"rgba(0,0,0,0.75)", border:"none", color:"#fff",
                      fontSize:10, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                    }}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {error&&<div style={{ background:T.redDim, border:`1px solid rgba(255,107,107,0.3)`, borderRadius:12,
            padding:"10px 14px", marginBottom:14, fontSize:13, color:T.red, fontFamily:F }}>⚠️ {error}</div>}

          <GreenBtn full onClick={analyze} disabled={!files.length}>
            {files.length > 0
              ? `${files.length}개 파일 · ${chunkCount}묶음 병렬 분석`
              : "파일을 추가해주세요"}
          </GreenBtn>
        </>
      )}

      {/* ── ANALYZING ── */}
      {step==="analyzing"&&(
        <div style={{ padding:"20px 0" }}>
          {/* 스피너 + 상태 */}
          <div style={{ textAlign:"center", marginBottom:24 }}>
            <div style={{ position:"relative", width:60, height:60, margin:"0 auto 16px" }}>
              <div style={{ width:60, height:60, borderRadius:"50%", border:`3px solid ${T.glass2}`,
                borderTopColor:T.green, animation:"spin .8s linear infinite", position:"absolute" }}/>
              <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center",
                justifyContent:"center", fontSize:20 }}>✨</div>
            </div>
            {merging
              ? <div style={{ fontSize:15, fontWeight:700, color:T.l1, fontFamily:F, marginBottom:4 }}>
                  최종 공지 정리 중...
                </div>
              : <div style={{ fontSize:15, fontWeight:700, color:T.l1, fontFamily:F, marginBottom:4 }}>
                  {doneCount}/{chunks.length} 묶음 완료
                </div>
            }
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:14 }}>
              {merging ? "추출된 내용을 하나의 공지로 합치고 있어요" : `${files.length}개 파일을 ${chunks.length}묶음으로 동시 분석 중`}
            </div>
            {/* 프로그레스 바 */}
            <div style={{ background:T.glass2, borderRadius:6, height:7,
              margin:"0 auto", width:"85%", overflow:"hidden" }}>
              <div style={{ height:"100%", borderRadius:6,
                background:`linear-gradient(90deg,${T.green},#28a864)`,
                width: merging ? "95%" : chunks.length > 0 ? `${Math.max((doneCount/chunks.length)*88, 4)}%` : "4%",
                transition:"width .4s ease" }}/>
            </div>
          </div>

          {/* 묶음별 상태 카드 */}
          <div style={{ ...glassBox({ overflow:"hidden" }) }}>
            {chunks.map((chunk, ci) => {
              const start = ci * CHUNK;
              const end   = Math.min(start + CHUNK, files.length);
              const thumbs = files.slice(start, end);
              const statusColor = chunk.status==="done" ? T.green : chunk.status==="error" ? T.red : chunk.status==="analyzing" ? T.orange : T.l4;
              const statusLabel = chunk.status==="done" ? "✓ 완료" : chunk.status==="error" ? "✕ 실패" : chunk.status==="analyzing" ? "분석 중..." : "대기 중";
              return (
                <div key={ci}>
                  <div style={{ padding:"12px 16px", display:"flex", alignItems:"center", gap:12 }}>
                    {/* 썸네일 묶음 */}
                    <div style={{ display:"flex", gap:3, flexShrink:0 }}>
                      {thumbs.map((f, ti) => (
                        <div key={ti} style={{ width:32, height:32, borderRadius:7, overflow:"hidden",
                          border:`1.5px solid ${chunk.status==="done"?T.green:T.border1}`,
                          background:T.glass2, transition:"border .3s", flexShrink:0 }}>
                          {f.preview
                            ? <img src={f.preview} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                            : <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center",
                                justifyContent:"center", fontSize:13 }}>📄</div>
                          }
                        </div>
                      ))}
                    </div>
                    {/* 상태 */}
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, color:T.l2, fontFamily:F, marginBottom:2 }}>
                        {start+1}~{end}번 파일
                      </div>
                      <div style={{ fontSize:12, color:statusColor, fontFamily:F, fontWeight:600 }}>
                        {statusLabel}
                      </div>
                    </div>
                    {/* 애니메이션 도트 */}
                    {chunk.status==="analyzing"&&(
                      <div style={{ display:"flex", gap:3 }}>
                        {[0,1,2].map(d=>(
                          <div key={d} style={{ width:5, height:5, borderRadius:"50%",
                            background:T.orange, opacity:0.7,
                            animation:`pulse 1s ease ${d*0.2}s infinite` }}/>
                        ))}
                      </div>
                    )}
                  </div>
                  {ci < chunks.length-1 && <Sep/>}
                </div>
              );
            })}
          </div>
          <style>{`@keyframes pulse{0%,100%{transform:scale(0.8);opacity:0.4}50%{transform:scale(1.2);opacity:1}}`}</style>
        </div>
      )}

      {/* ── RESULT ── */}
      {step==="result"&&result&&(
        <>
          <div style={{ ...glassBox({ padding:"18px", marginBottom:16,
            background:"linear-gradient(135deg,rgba(61,220,132,0.08),rgba(90,200,250,0.05))",
            border:`1px solid rgba(61,220,132,0.22)` }) }}>
            <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
              <Pill label={result.category}
                color={(CAT[result.category]||CAT["기타"]).color}
                dim={(CAT[result.category]||CAT["기타"]).dim}/>
              <Pill label={`✨ ${files.length}개 파일 통합`} color={T.gold} dim={T.goldDim}/>
            </div>
            <div style={{ fontSize:17, fontWeight:700, color:T.l1, fontFamily:F,
              marginBottom:10, lineHeight:1.4 }}>{result.title}</div>
            <div style={{ fontSize:14, color:T.l2, fontFamily:F, lineHeight:1.85,
              whiteSpace:"pre-line" }}>{result.summary}</div>
          </div>

          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16,
            padding:"12px 14px", background:T.glass1, border:`1px solid ${T.border0}`, borderRadius:12 }}>
            <input type="checkbox" id="aipin" checked={savePinned}
              onChange={e=>setSavePinned(e.target.checked)}
              style={{ width:18, height:18, accentColor:T.green, cursor:"pointer" }}/>
            <label htmlFor="aipin" style={{ fontSize:14, color:T.l1, cursor:"pointer",
              userSelect:"none", fontFamily:F }}>상단 고정</label>
          </div>

          <div style={{ ...glassBox({ padding:"12px 14px", marginBottom:16,
            background:"rgba(255,255,255,0.03)", border:`1px solid ${T.border0}` }),
            display:"flex", gap:10, alignItems:"center" }}>
            <span style={{ fontSize:15, flexShrink:0 }}>💡</span>
            <span style={{ fontSize:12, color:T.l3, fontFamily:F, lineHeight:1.6 }}>
              할일은 공지 저장 후 할일 탭에서 직접 추가할 수 있어요.
            </span>
          </div>

          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>{setStep("upload");setResult(null);setChunks([]);}}
              style={{ flex:1, padding:"13px", borderRadius:14, border:`1px solid ${T.border1}`,
                background:T.glass1, color:T.l2, fontSize:14, fontWeight:600,
                cursor:"pointer", fontFamily:F }}>다시 업로드</button>
            <GreenBtn onClick={handleSave}>공지 저장하기</GreenBtn>
          </div>
        </>
      )}
    </Sheet>
  );
}

    setTesting(true); setError("");
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":k,
          "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({ model:"claude-haiku-4-5-20251001", max_tokens:10,
          messages:[{ role:"user", content:"hi" }] }),
      });
      const data = await resp.json();
      if (data.error) { setError("키가 유효하지 않아요: " + data.error.message); setTesting(false); return; }

          <div style={{ width:64, height:64, borderRadius:20,
            background:"linear-gradient(145deg,#1a5c38,#00704A)",

          </div>
          <div style={{ fontSize:11, fontWeight:700, color:T.l3, letterSpacing:4, marginBottom:6 }}>STARBUCKS</div>

          />
          {error && <div style={{ background:T.redDim, border:`1px solid rgba(255,107,107,0.3)`,
            borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:13, color:T.red }}>

/* ════════════════════════ MAIN APP ════════════════════════ */
function App() {
  /* API 키 */
  const [apiKeyReady, setApiKeyReady] = useState(false);

  useEffect(() => {
    const saved = localStorage.getItem("sbx_apikey");
    if (saved) { window.ANTHROPIC_API_KEY = saved; setApiKeyReady(true); }
  }, []);

  const handleApiKeyComplete = () => {
    window.ANTHROPIC_API_KEY = localStorage.getItem("sbx_apikey") || "";
    setApiKeyReady(true);
  };

  /* 프로필 */
  const [profile, setProfileRaw] = useState(null);
  const [profileLoading, setProfileLoading] = useState(true);
  const [showProfileSetup, setShowProfileSetup] = useState(false);

  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get("sbx_profile", false); setProfileRaw(r?JSON.parse(r.value):null); }
      catch { setProfileRaw(null); }
      finally { setProfileLoading(false); }
    })();
  }, []);

  const saveProfile = async (p) => {
    setProfileRaw(p);
    try { await window.storage.set("sbx_profile", JSON.stringify(p), false); } catch {}
    setShowProfileSetup(false);
  };

  /* 개인 할일 키 — 프로필 기반 */
  const taskKey     = profile ? `sbx_tasks_${profile.name}_${profile.role}` : null;
  /* 직급 공유 할일 키 — 같은 직급 전체 공유 */
  const roleTaskKey = "sbx_teamtasks";

  /* 공유 데이터 */
  const [notices,   saveNotices,   nL] = useShared("sbx6_notices", SEED_NOTICES);
  const [events,    saveEvents,    eL] = useShared("sbx6_events",  SEED_EVENTS);
  const [roleTasks, saveRoleTasks, rL] = useShared(roleTaskKey, []);
  /* 개인 할일 */
  const [tasks, saveTasks, tL] = usePersonal(taskKey, []);

  const [tab, setTab] = useState("home");
  const [taskMode,    setTaskMode]    = useState("personal"); // "personal" | "role"
  const [viewNotice,  setViewNotice]  = useState(null);
  const [addNotice,   setAddNotice]   = useState(false);
  const [addEvent,    setAddEvent]    = useState(false);
  const [addTask,     setAddTask]     = useState(false);
  const [aiAnalyze,   setAiAnalyze]   = useState(false);
  const [noticeCat,   setNoticeCat]   = useState("전체");

  const [calDate, setCalDate] = useState(new Date("2026-03-01"));
  const cY=calDate.getFullYear(), cM=calDate.getMonth();
  const firstDow=new Date(cY,cM,1).getDay();
  const daysInMo=new Date(cY,cM+1,0).getDate();

  const [nf, setNf] = useState({ title:"", category:"이벤트", content:"", pinned:false, author:"" });
  const [ef, setEf] = useState({ title:"", date:todayStr(), category:"이벤트", memo:"" });
  const [tf, setTf] = useState({ text:"", priority:"보통", dueDate:todayStr() });

  const pendingPersonal = (tasks||[]).filter(t=>!t.done).length;
  const pendingRole     = (roleTasks||[]).filter(t=>!t.done).length;

  const upcoming = (events||[]).filter(e=>e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4);

  const readNotice = id => saveNotices(p=>p.map(n=>n.id===id?{...n,_read:true}:n));
  const togglePin  = id => {
    saveNotices(p=>p.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));
    setViewNotice(prev=>prev&&prev.id===id?{...prev,pinned:!prev.pinned}:prev);
  };
  const toggleTask     = id => saveTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteTask     = id => saveTasks(p=>p.filter(t=>t.id!==id));
  const toggleRoleTask = id => saveRoleTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteRoleTask = id => saveRoleTasks(p=>p.filter(t=>t.id!==id));

  const submitNotice = () => {
    if (!nf.title.trim()) return;
    saveNotices(p=>[{ id:"n"+Date.now(), ...nf, date:todayStr(), _read:false, author:profile?.name||nf.author },...p]);
    setNf({ title:"", category:"이벤트", content:"", pinned:false, author:"" });
    setAddNotice(false);
  };
  const submitEvent = () => {
    if (!ef.title.trim()) return;
    saveEvents(p=>[...p,{id:"e"+Date.now(),...ef}].sort((a,b)=>a.date.localeCompare(b.date)));
    setEf({ title:"", date:todayStr(), category:"이벤트", memo:"" });
    setAddEvent(false);
  };
  const submitTask = () => {
    if (!tf.text.trim()) return;
    const newTask = { id:"t"+Date.now(), ...tf, done:false, author:profile?.name||"나" };
    if (taskMode === "role") saveRoleTasks(p=>[...p, newTask]);
    else                     saveTasks(p=>[...p, newTask]);
    setTf({ text:"", priority:"보통", dueDate:todayStr() });
    setAddTask(false);

  const handleAISave = ({ notice, tasks:newTasks }) => {
    saveNotices(p=>[notice,...p]);
    if (newTasks.length>0) {
      if (taskMode === "role") saveRoleTasks(p=>[...newTasks,...p]);
      else                     saveTasks(p=>[...newTasks,...p]);

  };
  const eventsOnDay = d => {
    const s=`${cY}-${String(cM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return (events||[]).filter(e=>e.date===s);

              <span style={{ fontSize:18, fontWeight:700, color:T.l1, fontFamily:F }}>

                ...glassBox({ width:40, height:40, display:"flex", alignItems:"center",

                    미완료 · {(tasks||[]).filter(t=>!t.done).length}
                  </div>
                  <div style={{ ...glassBox({ overflow:"hidden", marginBottom:16,
                    boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
                    {(tasks||[]).filter(t=>!t.done).map((t,i,arr)=>(
                      <div key={t.id}><TRow t={t} onToggle={()=>toggleTask(t.id)} onDelete={()=>deleteTask(t.id)}/>{i<arr.length-1&&<Sep/>}</div>
                    ))}
                  </div>
                </>
              )}
              {(tasks||[]).filter(t=>t.done).length>0&&(
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:T.l3, letterSpacing:1.5,
                    textTransform:"uppercase", marginBottom:8, paddingLeft:2, fontFamily:F }}>
                    완료 · {(tasks||[]).filter(t=>t.done).length}
                  </div>
                  <div style={{ ...glassBox({ overflow:"hidden",
                    boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
                    {(tasks||[]).filter(t=>t.done).map((t,i,arr)=>(
                      <div key={t.id}><TRow t={t} done onToggle={()=>toggleTask(t.id)} onDelete={()=>deleteTask(t.id)}/>{i<arr.length-1&&<Sep/>}</div>
                    ))}
                  </div>
                </>
              )}
              {(tasks||[]).length===0&&(
                <div style={{ ...glassBox({ overflow:"hidden" }) }}><EmptyRow text="할일을 추가해보세요"/></div>
              )}
            </>)}

            {/* 직급 공유 할일 */}
            {taskMode==="role"&&(<>
              <div style={{ ...glassBox({ padding:"10px 14px", marginBottom:14,
                background:"rgba(255,255,255,0.04)", border:`1px solid ${T.border0}` }),
                display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:16 }}>👥</span>
                <span style={{ fontSize:13, color:T.l3, fontFamily:F }}>
                  매장 전체와 공유되는 할일이에요
                </span>
              </div>
              {(roleTasks||[]).filter(t=>!t.done).length>0&&(
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:T.l3, letterSpacing:1.5,
                    textTransform:"uppercase", marginBottom:8, paddingLeft:2, fontFamily:F }}>
                    미완료 · {(roleTasks||[]).filter(t=>!t.done).length}
                  </div>
                  <div style={{ ...glassBox({ overflow:"hidden", marginBottom:16,
                    boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
                    {(roleTasks||[]).filter(t=>!t.done).map((t,i,arr)=>(
                      <div key={t.id}><TRow t={t} showAuthor onToggle={()=>toggleRoleTask(t.id)} onDelete={()=>deleteRoleTask(t.id)}/>{i<arr.length-1&&<Sep/>}</div>
                    ))}
                  </div>
                </>
              )}
              {(roleTasks||[]).filter(t=>t.done).length>0&&(
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:T.l3, letterSpacing:1.5,
                    textTransform:"uppercase", marginBottom:8, paddingLeft:2, fontFamily:F }}>
                    완료 · {(roleTasks||[]).filter(t=>t.done).length}
                  </div>
                  <div style={{ ...glassBox({ overflow:"hidden",
                    boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
                    {(roleTasks||[]).filter(t=>t.done).map((t,i,arr)=>(
                      <div key={t.id}><TRow t={t} done showAuthor onToggle={()=>toggleRoleTask(t.id)} onDelete={()=>deleteRoleTask(t.id)}/>{i<arr.length-1&&<Sep/>}</div>
                    ))}
                  </div>
                </>
              )}
              {(roleTasks||[]).length===0&&(
                <div style={{ ...glassBox({ overflow:"hidden" }) }}><EmptyRow text={`팀 공유 할일을 추가해보세요`}/></div>
              )}
            </>)}
          </div>
        )}
      </div>

      {/* ══ MODALS ══ */}
      {viewNotice&&(
        <Sheet title="" onClose={()=>setViewNotice(null)}>
          <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
            <Pill label={viewNotice.category}
              color={(CAT[viewNotice.category]||CAT["기타"]).color}
              dim={(CAT[viewNotice.category]||CAT["기타"]).dim}/>
            {viewNotice.pinned&&<Pill label="📌 고정됨" color={T.gold} dim={T.goldDim}/>}
            {viewNotice.author==="AI 분석"&&<Pill label="✨ AI 분석" color={T.green} dim={T.greenDim}/>}
          </div>
          <div style={{ fontSize:21, fontWeight:700, color:T.l1, lineHeight:1.35, marginBottom:8, fontFamily:F }}>
            {viewNotice.title}
          </div>
          <div style={{ fontSize:13, color:T.l3, marginBottom:20, fontFamily:F }}>
            {viewNotice.date}{viewNotice.author&&` · ${viewNotice.author}`}
          </div>
          <div style={{ height:1, background:T.border0, marginBottom:20 }}/>
          <div style={{ fontSize:15, color:T.l2, lineHeight:1.9, whiteSpace:"pre-line", fontFamily:F, marginBottom:28 }}>
            {viewNotice.content}
          </div>
          <button onClick={()=>togglePin(viewNotice.id)} style={{
            width:"100%", padding:"14px", borderRadius:14, cursor:"pointer", fontFamily:F,
            fontSize:15, fontWeight:700, transition:"all .2s",
            border:`1px solid ${viewNotice.pinned?"rgba(255,214,10,0.35)":T.border1}`,
            background:viewNotice.pinned?"rgba(255,214,10,0.10)":T.glass2,
            color:viewNotice.pinned?T.gold:T.l2,
            backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          }}>
            <span style={{ fontSize:18 }}>{viewNotice.pinned?"📌":"📍"}</span>
            {viewNotice.pinned?"고정 해제":"상단 고정"}
          </button>
        </Sheet>
      )}

      {addNotice&&(
        <Sheet title="공지 작성" onClose={()=>setAddNotice(false)}>
          <Field label="제목" value={nf.title} onChange={v=>setNf({...nf,title:v})} placeholder="공지 제목"/>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>카테고리</div>
            <Seg value={nf.category} onChange={v=>setNf({...nf,category:v})} options={["이벤트","운영","인사","기타"]}/>
          </div>
          <Field label="내용" value={nf.content} onChange={v=>setNf({...nf,content:v})} placeholder="공지 내용" multiline/>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20,
            padding:"12px 14px", background:T.glass1, border:`1px solid ${T.border0}`, borderRadius:12 }}>
            <input type="checkbox" id="pin4" checked={nf.pinned} onChange={e=>setNf({...nf,pinned:e.target.checked})}
              style={{ width:18, height:18, accentColor:T.green, cursor:"pointer" }}/>
            <label htmlFor="pin4" style={{ fontSize:14, color:T.l1, cursor:"pointer", userSelect:"none", fontFamily:F }}>상단 고정</label>
          </div>
          <GreenBtn full onClick={submitNotice}>등록하기</GreenBtn>
        </Sheet>
      )}

      {addEvent&&(
        <Sheet title="일정 추가" onClose={()=>setAddEvent(false)}>
          <Field label="일정 이름" value={ef.title} onChange={v=>setEf({...ef,title:v})} placeholder="일정 이름"/>
          <Field label="날짜" type="date" value={ef.date} onChange={v=>setEf({...ef,date:v})}/>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>카테고리</div>
            <Seg value={ef.category} onChange={v=>setEf({...ef,category:v})} options={["이벤트","운영","인사","기타"]}/>
          </div>
          <Field label="메모 (선택)" value={ef.memo} onChange={v=>setEf({...ef,memo:v})} placeholder="간단한 메모"/>
          <GreenBtn full onClick={submitEvent}>추가하기</GreenBtn>
        </Sheet>
      )}

      {addTask&&(
        <Sheet title="할일 추가" onClose={()=>setAddTask(false)}>
          {/* 개인 / 직급 공유 선택 */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>구분</div>
            <div style={{ display:"flex", gap:8 }}>
              {[
                { id:"personal", label:"내 할일", desc:"나만 볼 수 있어요" },
                { id:"role",     label:"팀 공유", desc:"매장 팀원 전체와 공유" },
              ].map(opt=>(
                <button key={opt.id} onClick={()=>setTaskMode(opt.id)} style={{
                  flex:1, padding:"10px 8px", borderRadius:12, cursor:"pointer", fontFamily:F,
                  border:`1px solid ${taskMode===opt.id?rc.color+"55":T.border0}`,
                  background:taskMode===opt.id?rc.bg:T.glass0,
                  transition:"all .15s",
                }}>
                  <div style={{ fontSize:13, fontWeight:700, color:taskMode===opt.id?rc.color:T.l2 }}>{opt.label}</div>
                  <div style={{ fontSize:11, color:T.l4, marginTop:2 }}>{opt.desc}</div>
                </button>
              ))}
            </div>
          </div>
          <Field label="할일 내용" value={tf.text} onChange={v=>setTf({...tf,text:v})} placeholder="할일 내용"/>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>우선순위</div>
            <Seg value={tf.priority} onChange={v=>setTf({...tf,priority:v})} options={["높음","보통","낮음"]}/>
          </div>
          <Field label="마감일" type="date" value={tf.dueDate} onChange={v=>setTf({...tf,dueDate:v})}/>
          <GreenBtn full onClick={submitTask}>추가하기</GreenBtn>
        </Sheet>
      )}

      {aiAnalyze&&<AIAnalyzeSheet onClose={()=>setAiAnalyze(false)} onSave={handleAISave}/>}
    </div>
  );
}

/* ── Sub components ── */
function SecHead({ title, onMore }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
      <span style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F }}>{title}</span>
      {onMore&&<button onClick={onMore} style={{ background:"none", border:"none",
        color:T.green, fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:F }}>전체보기</button>}
    </div>
  );
}
function EmptyRow({ text }) {
  return <div style={{ padding:"22px 16px", textAlign:"center", color:T.l3, fontSize:14, fontFamily:F }}>{text}</div>;
}
function NRow({ n, onClick }) {
  const meta=CAT[n.category]||CAT["기타"];
  return (
    <div onClick={onClick} style={{ padding:"14px 16px", cursor:"pointer",
      display:"flex", alignItems:"flex-start", gap:12, transition:"background .15s" }}
      onMouseEnter={e=>e.currentTarget.style.background=T.glassHover}
      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <div style={{ width:3, alignSelf:"stretch", borderRadius:2,
        background:n._read?T.l4:meta.color, flexShrink:0, minHeight:40 }}/>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:4 }}>
          <span style={{ fontSize:15, fontWeight:n._read?400:600, color:n._read?T.l2:T.l1,
            fontFamily:F, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{n.title}</span>
          <span style={{ fontSize:12, color:T.l3, flexShrink:0, fontFamily:F }}>{n.date}</span>
        </div>
        <div style={{ fontSize:13, color:T.l3, fontFamily:F, lineHeight:1.5, overflow:"hidden",
          display:"-webkit-box", WebkitLineClamp:1, WebkitBoxOrient:"vertical", marginBottom:6 }}>{n.content}</div>
        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
          <Pill label={n.category} color={meta.color} dim={meta.dim}/>
          {n.pinned&&<Pill label="고정" color={T.gold} dim={T.goldDim}/>}
          {n.author==="AI 분석"&&<Pill label="✨ AI" color={T.green} dim={T.greenDim}/>}
        </div>
      </div>
      <span style={{ color:T.l4, fontSize:16, flexShrink:0, paddingTop:2 }}>›</span>
    </div>
  );
}
function ERow({ e }) {
  const meta=CAT[e.category]||CAT["기타"];
  const d=new Date(e.date);
  return (
    <div style={{ padding:"12px 16px", display:"flex", alignItems:"center", gap:14 }}>
      <div style={{ width:48, height:48, borderRadius:13, background:meta.dim, border:`1px solid ${meta.border}`,
        backdropFilter:"blur(10px)", flexShrink:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center" }}>
        <div style={{ fontSize:20, fontWeight:800, color:meta.color, lineHeight:1, fontFamily:F }}>{d.getDate()}</div>
        <div style={{ fontSize:10, color:meta.color, opacity:0.7, fontFamily:F }}>
          {d.toLocaleDateString("ko-KR",{month:"short"})}
        </div>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F, marginBottom:2 }}>{e.title}</div>
        <div style={{ fontSize:13, color:T.l3, fontFamily:F }}>{e.category}{e.memo?` · ${e.memo}`:""}</div>
      </div>
    </div>
  );
}
function TRow({ t, done, onToggle, onDelete, showAuthor }) {
  const pMeta=PRIO[t.priority]||PRIO["보통"];
  return (
    <div style={{ padding:"13px 16px", display:"flex", alignItems:"center", gap:12 }}>
      <div onClick={onToggle} style={{
        width:24, height:24, borderRadius:"50%", flexShrink:0, cursor:"pointer",
        border:done?"none":`1.5px solid ${T.border2}`,
        background:done?`linear-gradient(135deg,${T.green},#28a864)`:"transparent",
        display:"flex", alignItems:"center", justifyContent:"center",
        boxShadow:done?`0 2px 12px rgba(61,220,132,0.35)`:"none", transition:"all .2s" }}>
        {done&&<svg width="11" height="11" viewBox="0 0 11 11">
          <path d="M2 5.5l2.5 2.5L9 3" stroke="#001808" strokeWidth={2} strokeLinecap="round" fill="none"/>
        </svg>}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:15, color:done?T.l3:T.l1, fontFamily:F,
          textDecoration:done?"line-through":"none",
          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", marginBottom:done?0:3 }}>{t.text}</div>
        {!done&&(
          <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
            <Pill label={t.priority} color={pMeta.color} dim={pMeta.dim}/>
            {t.dueDate&&<span style={{ fontSize:12, color:T.l3, fontFamily:F }}>{fmtShort(t.dueDate)}</span>}
            {showAuthor&&t.author&&<span style={{ fontSize:12, color:T.l3, fontFamily:F }}>· {t.author}</span>}
          </div>
        )}
      </div>
      <button onClick={onDelete} style={{ background:"none", border:"none",
        color:T.l4, fontSize:17, cursor:"pointer", padding:"0 2px", fontFamily:F }}>✕</button>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
