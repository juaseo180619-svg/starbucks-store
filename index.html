      set:async(k,v,s)=>{localStorage.setItem((s?"sh_":"pr_")+k,v);return{key:k,value:v,shared:s}},

/* ─── Storage hooks ─── */
/* 공유 데이터 (팀 전체) */
function useShared(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get(key, true); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

/* 개인 데이터 (본인만) */
function usePersonal(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!key) { setData(seed); setLoading(false); return; }
    (async () => {
      try { const r = await window.storage.get(key, false); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    if (!key) return;
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), false); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

function Sheet({ onClose, title, children, tall, full }) {
  const [expanded, setExpanded] = useState(!!full);
  const [dragging, setDragging] = useState(false);
  const [startY, setStartY] = useState(0);
  const [dragDY, setDragDY] = useState(0);
  const sheetRef = useRef();

  const handleTouchStart = (e) => {
    setDragging(true);
    setStartY(e.touches[0].clientY);
    setDragDY(0);
  };
  const handleTouchMove = (e) => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    setDragDY(dy);
  };
  const handleTouchEnd = () => {
    setDragging(false);
    if (dragDY < -60) setExpanded(true);
    else if (dragDY > 80) { if (expanded) setExpanded(false); else onClose(); }
    setDragDY(0);
  };

  const maxH = expanded ? "100vh" : (tall ? "93vh" : "82vh");
  return (
    <div style={{ position:"fixed", inset:0, zIndex:700, background:"rgba(0,0,0,0.55)",
      backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
      display:"flex", alignItems:"flex-end", justifyContent:"center" }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div ref={sheetRef}
        style={{ background:"rgba(245,250,247,0.98)",
          backdropFilter:"blur(40px)", WebkitBackdropFilter:"blur(40px)",
          borderTop:"2px solid "+T.green,
          borderLeft:"1px solid "+T.border0, borderRight:"1px solid "+T.border0,
          borderRadius: expanded ? "0" : "26px 26px 0 0",
          width:"100%", maxWidth:430,
          height: maxH,
          overflowY:"auto", paddingBottom:44,
          transform: dragDY > 0 ? "translateY("+Math.min(dragDY,120)+"px)" : "none",
          transition: dragging ? "none" : "height .35s cubic-bezier(.32,0,.67,0), border-radius .35s, transform .2s",
          boxShadow:"0 -20px 60px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.09)" }}>
        {/* 드래그 핸들 */}
        <div style={{ display:"flex", justifyContent:"center", padding:"14px 0 0", cursor:"grab" }}
          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
          onMouseDown={e=>{setDragging(true);setStartY(e.clientY);}}
          onMouseMove={e=>{if(dragging)setDragDY(e.clientY-startY);}}
          onMouseUp={()=>{if(dragDY<-60)setExpanded(true);else if(dragDY>80){if(expanded)setExpanded(false);else onClose();}setDragging(false);setDragDY(0);}}>
          <div style={{ width:44, height:5, borderRadius:3, background:T.glass3 }}/>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 22px 18px" }}>
          <span style={{ fontSize:20, fontWeight:700, color:T.l1, fontFamily:F }}>{title}</span>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <button onClick={()=>setExpanded(v=>!v)} style={{ background:T.glass2,
              border:"1px solid "+T.border1, borderRadius:8, width:30, height:30,
              cursor:"pointer", color:T.l3, fontSize:12,
              display:"flex", alignItems:"center", justifyContent:"center" }}>
              {expanded ? "↓" : "↑"}
            </button>
            <button onClick={onClose} style={{ background:T.glass2, border:"1px solid "+T.border1,
              borderRadius:"50%", width:30, height:30, cursor:"pointer", color:T.l2,
              fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
          </div>
        </div>
        <div style={{ padding:"0 22px" }}>{children}</div>
      </div>
    </div>
  );
}

/* ══════════════════ 리치텍스트 공지 작성 ══════════════════ */
function RichNoticeSheet({ onClose, onSave, initial, categories }) {
  const cats = categories && categories.length ? categories : DEFAULT_CATS;
  const [title, setTitle]       = useState(initial ? initial.title : "");
  const [category, setCategory] = useState(initial ? initial.category : cats[0]);
  const [pinned, setPinned]     = useState(initial ? !!initial.pinned : false);
  const [noticeDate, setNoticeDate] = useState(initial ? (initial.noticeDate||"") : "");
  const [noticeEndDate, setNoticeEndDate] = useState(initial ? (initial.noticeEndDate||"") : "");
  const editorRef = useRef();
  const imgRef = useRef();

  useEffect(() => {
    if (initial && editorRef.current) {
      editorRef.current.innerHTML = initial.content || "";
    }
  }, []);

  const execCmd = (cmd, val) => {
    document.execCommand(cmd, false, val || null);
    editorRef.current.focus();
  };

  const insertImage = async (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.margin = "6px 0";
      editorRef.current.focus();
      const sel = window.getSelection();
      if (sel && sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.insertNode(img);
        range.collapse(false);
      } else {
        editorRef.current.appendChild(img);
      }
    };
    reader.readAsDataURL(file);
  };

  const handleSave = () => {
    if (!title.trim()) return;
    const content = editorRef.current.innerHTML;
    onSave({ title: title.trim(), category, content, pinned, noticeDate, noticeEndDate });
  };

  const tools = [
    { icon:"B",  cmd:"bold",        style:{ fontWeight:800 },              tip:"굵게"    },
    { icon:"I",  cmd:"italic",      style:{ fontStyle:"italic" },          tip:"기울임"  },
    { icon:"U",  cmd:"underline",   style:{ textDecoration:"underline" },  tip:"밑줄"    },
  ];

  // 형광펜: 어두운 배경에서 잘 보이는 진한 색 사용
  const highlights = [
    { bg:"#FFE066", text:"#1a1a00", label:"노랑" },
    { bg:"#5DDE74", text:"#003010", label:"초록" },
    { bg:"#FF7B7B", text:"#2a0000", label:"빨강" },
    { bg:"#5BA8FF", text:"#001835", label:"파랑" },
  ];

  return (
    <Sheet title={initial ? "공지 수정" : "공지 작성"} onClose={onClose} tall>
      <style>{`.rich-editor b,.rich-editor strong{font-weight:800}.rich-editor mark{padding:1px 2px;border-radius:3px}`}</style>

      <input
        value={title}
        onChange={e => setTitle(e.target.value)}
        onKeyDown={e => { if(e.key==="Enter") e.preventDefault(); }}
        placeholder="공지 제목"
        style={{ ...fBase, marginBottom:10, fontSize:17, fontWeight:600 }}
      />

      {/* 카테고리 - 동적 */}
      <div style={{ marginBottom:10 }}>
        <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>카테고리</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {cats.map(cat => (
            <button key={cat} onMouseDown={e => { e.preventDefault(); setCategory(cat); }}
              style={{ padding:"7px 14px", borderRadius:20, fontSize:13, fontWeight:600,
                border:"1px solid "+(category===cat?T.green:T.border1),
                background:category===cat?T.greenDim:T.glass1,
                color:category===cat?T.green:T.l2,
                cursor:"pointer", fontFamily:F }}>
              {cat}
            </button>
          ))}
        </div>
      </div>

      {/* 날짜 */}
      <div style={{ marginBottom:10 }}>
        <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>
          날짜 <span style={{ color:T.l4 }}>(선택 · 캘린더에 자동 추가)</span>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, color:T.l4, fontFamily:F, marginBottom:4 }}>시작일</div>
            <input type="date" value={noticeDate} onChange={e=>setNoticeDate(e.target.value)}
              style={{ ...fBase, marginBottom:0 }}/>
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, color:T.l4, fontFamily:F, marginBottom:4 }}>종료일</div>
            <input type="date" value={noticeEndDate} onChange={e=>setNoticeEndDate(e.target.value)}
              min={noticeDate} style={{ ...fBase, marginBottom:0 }}/>
          </div>
        </div>
      </div>

      {/* 서식 툴바 */}
      <div style={{ display:"flex", gap:5, marginBottom:8, flexWrap:"wrap", alignItems:"center",
        padding:"8px 10px", background:T.glass1, borderRadius:12, border:"1px solid "+T.border0 }}>
        {/* B / I / U */}
        {tools.map(t => (
          <button key={t.cmd} onMouseDown={e => { e.preventDefault(); execCmd(t.cmd); }}
            title={t.tip}
            style={{ ...t.style, width:30, height:30, borderRadius:7,
              border:"1px solid "+T.border1, background:T.glass2,
              color:T.l1, fontSize:13, cursor:"pointer", fontFamily:F,
              display:"flex", alignItems:"center", justifyContent:"center" }}>

        {/* 들여쓰기 - 선택 텍스트 줄에 margin-left 16px */}

            e.preventDefault();
            const sel = window.getSelection();

            const range = sel.getRangeAt(0);

            if (node.nodeType === 3) node = node.parentElement;

              node = node.parentElement;
            }
            if (node && node !== editorRef.current) {
              const cur = parseInt(node.style.marginLeft || "0");
              node.style.marginLeft = Math.min(cur + 16, 80) + "px";
            }
          }}
          title="들여쓰기"
          style={{ width:30, height:30, borderRadius:7, border:"1px solid "+T.border1,
            background:T.glass2, color:T.l1, fontSize:13, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center" }}>→</button>
        <button onMouseDown={e => {
            e.preventDefault();
            const sel = window.getSelection();
            if (!sel || !sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            let node = range.startContainer;
            if (node.nodeType === 3) node = node.parentElement;
            while (node && node !== editorRef.current && !["P","DIV","LI","BLOCKQUOTE"].includes(node.tagName)) {
              node = node.parentElement;
            }

      <GreenBtn full onClick={handleSave} disabled={!title.trim()}>

/* ══════════════════ 카테고리 관리 ══════════════════ */
function CatManagerSheet({ onClose, categories, onSave }) {
  const cats = categories && categories.length ? [...categories] : [...DEFAULT_CATS];
  const [list, setList] = useState(cats);
  const [input, setInput] = useState("");

  const add = () => {
    const v = input.trim();
    if (!v || list.includes(v)) return;
    setList(prev => [...prev, v]);
    setInput("");
  };

  const remove = (name) => {
    if (list.length <= 1) return;
    setList(prev => prev.filter(c => c !== name));
  };

  return (
    <Sheet title="카테고리 관리" onClose={onClose}>
      <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:14, lineHeight:1.6 }}>
        공지 카테고리를 자유롭게 추가하거나 삭제할 수 있어요.
      </p>

      {/* 현재 카테고리 목록 */}
      <div style={{ ...glassBox({ overflow:"hidden", marginBottom:14 }) }}>
        {list.map((cat, i) => {
          const ci = CAT_COLORS[i % CAT_COLORS.length];
          return (
            <div key={cat} style={{ padding:"12px 16px", display:"flex",
              alignItems:"center", gap:12,
              borderBottom: i < list.length-1 ? "1px solid "+T.border0 : "none" }}>
              <div style={{ width:10, height:10, borderRadius:"50%",
                background:ci.color, flexShrink:0 }}/>
              <span style={{ flex:1, fontSize:15, color:T.l1, fontFamily:F }}>{cat}</span>
              {list.length > 1 && (
                <button onClick={() => remove(cat)}
                  style={{ background:"none", border:"none", color:T.l4,
                    fontSize:17, cursor:"pointer", padding:"0 4px" }}>✕</button>
              )}
            </div>
          );
        })}
      </div>

      {/* 새 카테고리 추가 */}
      <div style={{ display:"flex", gap:8, marginBottom:20 }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if(e.key==="Enter") add(); }}
          placeholder="새 카테고리 이름"
          style={{ ...fBase, flex:1, marginBottom:0 }}
        />
        <button onClick={add}
          style={{ padding:"0 18px", borderRadius:14, border:"1px solid "+T.green,
            background:T.greenDim, color:T.green, fontSize:14, fontWeight:700,
            cursor:"pointer", fontFamily:F, whiteSpace:"nowrap" }}>추가</button>
      </div>

      <GreenBtn full onClick={() => { onSave(list); onClose(); }}>저장하기</GreenBtn>
    </Sheet>
  );
}

/* ══════════════════ AI 공지 챗 ══════════════════ */
function AIChatSheet({ onClose, notices }) {
  const [messages, setMessages] = useState([
    { role:"assistant", text:"안녕하세요! 공지 내용에 대해 질문하거나 검색해보세요 😊" }
  ]);
  const [input, setInput]   = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [messages]);

  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem("sbx_apikey") || ""; } catch(e) { return ""; }
  });
  const [showKeyInput, setShowKeyInput] = useState(false);

  const saveKey = (k) => {
    setApiKey(k);
    try { localStorage.setItem("sbx_apikey", k); } catch(e) {}
  };

  const send = async () => {
    const q = input.trim();
    if (!q || loading) return;

    let key = apiKey;
    if (!key) { try { key = localStorage.getItem("sbx_apikey")||""; } catch(e) { key = ""; } }
    if (!key) {
      setShowKeyInput(true);
      setMessages(prev => [...prev, { role:"assistant",
        text:"AI 기능을 사용하려면 Anthropic API 키가 필요해요. 아래에 입력해주세요." }]);
      return;
    }

    setInput("");
    setMessages(prev => [...prev, { role:"user", text:q }]);
    setLoading(true);

    try {
      const noticeText = notices.slice(0, 20).map(n =>
        "[" + n.date + "] " + n.title + ": " + (n.content || "").replace(/<[^>]+>/g, "").slice(0, 300)
      ).join("\n");

      const systemPrompt = "당신은 스타벅스 매장 운영 도우미 AI입니다.\n"
        + "아래는 최근 매장 공지 목록입니다. 이 내용을 바탕으로 질문에 친절하게 답해주세요.\n"
        + "공지에 없는 내용이면 솔직하게 모른다고 말해주세요.\n\n"
        + "=== 공지 목록 ===\n" + noticeText;

      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": key,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body: JSON.stringify({
          model:"claude-haiku-4-5-20251001",
          max_tokens:1000,
          system: systemPrompt,
          messages:[{ role:"user", content:q }]
        })
      });
      if (!resp.ok) {
        const err = await resp.json().catch(()=>({}));
        const msg = err.error?.message || ("오류 "+resp.status);
        if (resp.status === 401) {
          setShowKeyInput(true);
          setMessages(prev=>[...prev,{role:"assistant",text:"API 키가 올바르지 않아요. 다시 확인해주세요."}]);
        } else {
          setMessages(prev=>[...prev,{role:"assistant",text:"오류: "+msg}]);
        }
        setLoading(false); return;
      }
      const data = await resp.json();
      const answer = data.content?.map(b => b.text||"").join("").trim() || "응답을 받지 못했어요.";
      setMessages(prev => [...prev, { role:"assistant", text:answer }]);
    } catch(e) {
      setMessages(prev => [...prev, { role:"assistant",
        text:"네트워크 오류가 발생했어요. 인터넷 연결을 확인하고 다시 시도해주세요." }]);
    }
    setLoading(false);
  };

  return (
    <Sheet title="AI 공지 검색" onClose={onClose} tall>
      {/* 메시지 목록 */}
      <div style={{ flex:1, overflowY:"auto", marginBottom:12, display:"flex", flexDirection:"column", gap:10, minHeight:300, maxHeight:440 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display:"flex", justifyContent: m.role==="user" ? "flex-end" : "flex-start" }}>
            {m.role==="assistant" && (
              <div style={{ width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg," + T.green + ",#28a864)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0, marginRight:8, marginTop:2 }}>
                🤖
              </div>
            )}
            <div style={{
              maxWidth:"78%", padding:"10px 14px", borderRadius: m.role==="user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
              background: m.role==="user"
                ? "linear-gradient(135deg," + T.green + ",#28a864)"
                : T.glass2,
              color: m.role==="user" ? "#001808" : T.l1,
              fontSize:14, lineHeight:1.6, fontFamily:F,
              border: m.role==="user" ? "none" : "1px solid " + T.border1,
              whiteSpace:"pre-wrap"
            }}>
              {m.text}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg," + T.green + ",#28a864)",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>🤖</div>
            <div style={{ background:T.glass2, border:"1px solid " + T.border1, borderRadius:"18px 18px 18px 4px",
              padding:"10px 16px", display:"flex", gap:5, alignItems:"center" }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:T.green,
                  animation:"bounce .8s " + (i*0.15) + "s infinite alternate" }}/>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <style>{`@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-5px)}}`}</style>

      {/* API 키 입력 */}
      {showKeyInput && (
        <div style={{ marginBottom:10, padding:"12px 14px", background:T.greenLight,
          borderRadius:12, border:"1px solid "+T.greenBorder }}>
          <div style={{ fontSize:12, color:T.green, fontWeight:700, fontFamily:F, marginBottom:6 }}>
            🔑 Anthropic API 키 입력
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <input
              type="password"
              placeholder="sk-ant-..."
              defaultValue={apiKey}
              id="apikey-input"
              style={{ ...fBase, flex:1, marginBottom:0, fontSize:13 }}
            />
            <button onClick={()=>{
                const v = document.getElementById("apikey-input").value.trim();
                if(v){ saveKey(v); setShowKeyInput(false);
                  setMessages(prev=>[...prev,{role:"assistant",text:"API 키가 저장됐어요! 이제 질문해보세요 😊"}]); }
              }}
              style={{ padding:"0 14px", borderRadius:10, border:"none", background:T.green,
                color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:F, whiteSpace:"nowrap" }}>
              저장
            </button>
          </div>
        </div>
      )}

      {/* 입력창 */}
      <div style={{ display:"flex", gap:8, alignItems:"center" }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key==="Enter" && !e.shiftKey && send()}
          placeholder="공지 내용에 대해 질문하세요..."
          style={{ ...fBase, flex:1, borderRadius:20, marginBottom:0 }}
          disabled={loading}
        />
        <button onClick={send} disabled={!input.trim()||loading}
          style={{ width:44, height:44, borderRadius:"50%", border:"none", flexShrink:0,
            background: input.trim()&&!loading ? "linear-gradient(135deg,"+T.green+",#1E3932)" : "#E8F0EB",
            color: input.trim()&&!loading ? "#fff" : T.l3,
            fontSize:20, cursor: input.trim()&&!loading ? "pointer" : "default",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow: input.trim()&&!loading ? "0 3px 12px rgba(0,112,74,0.3)" : "none" }}>
          ›
        </button>
      </div>
    </Sheet>
  );
}


/* ══════════════════ CALENDAR TAB ══════════════════ */
function CalendarTab({ events, calDate, setCalDate, selDay, setSelDay, todayStr, CAT, onAddEvent }) {
  var cY = calDate.getFullYear();
  var cM = calDate.getMonth();
  var firstDow = new Date(cY, cM, 1).getDay();
  var daysInMo = new Date(cY, cM + 1, 0).getDate();
  var WDAYS_CAL = ["일","월","화","수","목","금","토"];
  var mStr = cY + "-" + String(cM + 1).padStart(2, "0");

  var monthEvents = events.filter(function(e) {
    var s = e.date, en = e.endDate || e.date;
    return s.slice(0,7) === mStr || en.slice(0,7) === mStr ||
           (s < mStr + "-01" && en > mStr + "-31");
  });

  // 주 배열 생성
  var weeks = [];
  var d = 1, blanks = firstDow;
  while (d <= daysInMo) {
    var row = [];
    for (var col = 0; col < 7; col++) {
      if (blanks > 0) { row.push(null); blanks--; }
      else if (d <= daysInMo) { row.push(d); d++; }
      else row.push(null);
    }
    weeks.push(row);
  }

  var selDayEvents = events.filter(function(e) {
    return selDay >= e.date && selDay <= (e.endDate || e.date);
  });
  var selDateLabel = new Date(selDay + "T00:00:00")
    .toLocaleDateString("ko-KR", { month:"long", day:"numeric" });

  return (
    <div style={{ padding:"16px" }} className="fi">
      {/* 월 네비 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <button onClick={function(){ setCalDate(new Date(cY, cM-1, 1)); }} style={{
          width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:10, background:T.card, cursor:"pointer", color:T.l1,
          fontSize:18, border:"1px solid "+T.border0,
          boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>‹</button>
        <span style={{ fontSize:17, fontWeight:700, color:T.l1, fontFamily:F }}>
          {calDate.toLocaleDateString("ko-KR", { year:"numeric", month:"long" })}
        </span>
        <button onClick={function(){ setCalDate(new Date(cY, cM+1, 1)); }} style={{
          width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:10, background:T.card, cursor:"pointer", color:T.l1,
          fontSize:18, border:"1px solid "+T.border0,
          boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>›</button>
      </div>

      {/* 캘린더 카드 */}
      <div style={{ background:T.card, borderRadius:20, padding:"16px",
        boxShadow:"0 2px 20px rgba(30,57,50,0.08)", marginBottom:16 }}>

        {/* 요일 헤더 */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:8 }}>
          {WDAYS_CAL.map(function(wd, i) {
            return (
              <div key={wd} style={{ textAlign:"center", fontSize:11, fontWeight:600,
                fontFamily:F, padding:"2px 0 8px",
                color: i===0 ? T.red : i===6 ? T.blue : T.l3 }}>{wd}</div>
            );
          })}
        </div>

        {/* 날짜 그리드 - 그리드선 없음 */}
        {weeks.map(function(weekRow, wi) {
          // 이 주의 이벤트 찾기
          var validDays = weekRow.filter(function(x){ return x!==null; });
          if (!validDays.length) return null;
          var wStart = validDays[0], wEnd = validDays[validDays.length-1];

          var weekBars = [];
          monthEvents.forEach(function(ev) {
            var evS = parseInt((ev.date||"").slice(8,10)||"0");
            var evE = parseInt((ev.endDate||ev.date||"").slice(8,10)||"0");
            if (evS > wEnd || evE < wStart) return;
            var clampS = Math.max(evS, wStart);
            var clampE = Math.min(evE, wEnd);
            var colS = weekRow.indexOf(clampS);
            var colE = weekRow.indexOf(clampE);
            if (colS < 0 || colE < 0) return;
            weekBars.push({ ev:ev, colS:colS, colE:colE,
              startsHere: evS>=wStart, endsHere: evE<=wEnd, slot:null });
          });
          weekBars.forEach(function(bar) {
            var slot=0, busy=[];
            weekBars.forEach(function(b){
              if(b===bar||b.slot===null)return;
              if(b.colS<=bar.colE&&b.colE>=bar.colS)busy.push(b.slot);
            });
            while(busy.indexOf(slot)!==-1)slot++;
            bar.slot=slot;
          });
          var maxSlot = weekBars.reduce(function(m,b){return Math.max(m,b.slot+1);},0);
          var cellH = 34 + Math.min(maxSlot,2)*17;

          return (
            <div key={wi} style={{ position:"relative", marginBottom:2 }}>
              {/* 날짜 행 */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
                {weekRow.map(function(day, ci) {
                  if (day===null) return <div key={"n"+ci} style={{ height:cellH }}/>;
                  var dStr = cY+"-"+String(cM+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
                  var isTod = dStr===todayStr();
                  var isSel = dStr===selDay && !isTod;
                  var dayCol = ci===0?T.red:ci===6?T.blue:T.l1;
                  return (
                    <div key={day} onClick={function(){setSelDay(dStr);}}
                      style={{ height:cellH, cursor:"pointer", display:"flex",
                        justifyContent:"center", paddingTop:4,
                        background: isSel ? T.greenLight : "transparent",
                        borderRadius:10 }}>
                      {isTod ? (
                        <div style={{ width:26, height:26, borderRadius:"50%",
                          background:"linear-gradient(135deg,#00704A,#1E3932)",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          boxShadow:"0 2px 8px rgba(0,112,74,0.35)" }}>
                          <span style={{ fontSize:12, fontWeight:800, color:"#fff",
                            lineHeight:1, fontFamily:F }}>{day}</span>
                        </div>
                      ) : (
                        <span style={{ fontSize:13, fontWeight:isSel?700:400,
                          color:isSel?T.green:dayCol, lineHeight:"26px", fontFamily:F }}>{day}</span>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* 이벤트 바 */}
              {weekBars.filter(function(b){return b.slot<2;}).map(function(bar,bi){
                var meta = CAT[bar.ev.category] || { color:T.green };
                var topOff = 34 + bar.slot*17;
                var span = bar.colE - bar.colS + 1;
                return (
                  <div key={bar.ev.id+"_"+wi+"_"+bi} style={{
                    position:"absolute", top:topOff,
                    left:(bar.colS*100/7)+"%", width:(span*100/7)+"%",
                    height:14,
                    background: meta.color+"22",
                    borderLeft: bar.startsHere ? "3px solid "+meta.color : "none",
                    borderRadius: bar.startsHere?(bar.endsHere?"5px":"5px 0 0 5px"):(bar.endsHere?"0 5px 5px 0":"0"),
                    display:"flex", alignItems:"center", paddingLeft:bar.startsHere?4:2,
                    overflow:"hidden", pointerEvents:"none"
                  }}>
                    {bar.startsHere&&(
                      <span style={{ fontSize:9, fontWeight:700, color:meta.color,
                        fontFamily:F, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                        {bar.ev.title}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* 선택 날짜 일정 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <span style={{ fontSize:15, fontWeight:700, color:T.l1, fontFamily:F }}>{selDateLabel}</span>
          <span style={{ fontSize:13, color:T.l3, fontFamily:F, marginLeft:6 }}>
            {selDayEvents.length>0 ? selDayEvents.length+"개" : "없음"}
          </span>
        </div>
        <ActionBtn onClick={onAddEvent}>+ 추가</ActionBtn>
      </div>

      <div style={{ background:T.card, borderRadius:16, overflow:"hidden",
        boxShadow:"0 2px 16px rgba(30,57,50,0.07)" }}>
        {selDayEvents.length===0
          ? <EmptyRow text="이 날에 일정이 없어요"/>
          : selDayEvents.map(function(e,i){
              return (
                <div key={e.id}>
                  <ERow e={e}/>
                  {i<selDayEvents.length-1&&<Sep/>}
                </div>
              );
            })
        }
      </div>
    </div>
  );
}

function SecHead({ title, onMore }) {

    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
      <span style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F }}>{title}</span>
      {onMore&&<button onClick={onMore} style={{ background:"none", border:"none",
        color:T.green, fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:F }}>전체보기</button>}
    </div>
  );
}
function EmptyRow({ text }) {
  return <div style={{ padding:"22px 16px", textAlign:"center", color:T.l3, fontSize:14, fontFamily:F }}>{text}</div>;
}
function NRow({ n, onClick }) {
  const meta=CAT[n.category]||CAT["기타"];
  return (
    <div onClick={onClick} style={{ padding:"14px 16px", cursor:"pointer",
      display:"flex", alignItems:"flex-start", gap:12, transition:"background .15s" }}
      onMouseEnter={e=>e.currentTarget.style.background=T.glassHover}
      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <div style={{ width:3, alignSelf:"stretch", borderRadius:2,
        background:n._read?T.l4:meta.color, flexShrink:0, minHeight:40 }}/>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:4 }}>
          <span style={{ fontSize:15, fontWeight:n._read?400:600, color:n._read?T.l2:T.l1,
            fontFamily:F, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{n.title}</span>
          <span style={{ fontSize:12, color:T.l3, flexShrink:0, fontFamily:F }}>{n.date}</span>
        </div>
        <div style={{ fontSize:13, color:T.l3, fontFamily:F, lineHeight:1.5, overflow:"hidden",
          display:"-webkit-box", WebkitLineClamp:1, WebkitBoxOrient:"vertical", marginBottom:6 }}
          dangerouslySetInnerHTML={{ __html: (n.content||"").replace(/<[^>]+>/g,"").slice(0,80) }}
        />
        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
          <Pill label={n.category} color={meta.color} dim={meta.dim}/>
          {n.pinned&&<Pill label="고정" color={T.gold} dim={T.goldDim}/>}
          {n.author==="AI 분석"&&<Pill label="✨ AI" color={T.green} dim={T.greenDim}/>}
        </div>
      </div>
      <span style={{ color:T.l4, fontSize:16, flexShrink:0, paddingTop:2 }}>›</span>
    </div>
  );
}
function ERow({ e }) {
  const meta=CAT[e.category]||CAT["기타"];
  const d=new Date(e.date+"T00:00:00");
  const hasRange = e.endDate && e.endDate !== e.date;
  const d2 = hasRange ? new Date(e.endDate+"T00:00:00") : null;
  return (
    <div style={{ padding:"12px 16px", display:"flex", alignItems:"center", gap:14 }}>
      <div style={{ width:48, height:48, borderRadius:13, background:meta.dim, border:"1px solid "+(meta.border||meta.color+"33"),
        backdropFilter:"blur(10px)", flexShrink:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center" }}>
        <div style={{ fontSize:20, fontWeight:800, color:meta.color, lineHeight:1, fontFamily:F }}>{d.getDate()}</div>
        <div style={{ fontSize:10, color:meta.color, opacity:0.7, fontFamily:F }}>
          {d.toLocaleDateString("ko-KR",{month:"short"})}
        </div>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F, marginBottom:2 }}>{e.title}</div>
        <div style={{ fontSize:13, color:T.l3, fontFamily:F }}>
          {hasRange
            ? e.date+" ~ "+e.endDate+" · "+e.category
            : e.category+(e.memo?" · "+e.memo:"")}
        </div>
      </div>
    </div>
  );
}
function TRow({ t, done, onToggle, onDelete, showAuthor }) {
  const pMeta=PRIO[t.priority]||PRIO["보통"];
  return (
    <div style={{ padding:"13px 16px", display:"flex", alignItems:"center", gap:12 }}>
      <div onClick={onToggle} style={{
        width:24, height:24, borderRadius:"50%", flexShrink:0, cursor:"pointer",
        border:done?"none":`1.5px solid ${T.border2}`,
        background:done?`linear-gradient(135deg,${T.green},#28a864)`:"transparent",
        display:"flex", alignItems:"center", justifyContent:"center",
        boxShadow:done?`0 2px 12px rgba(61,220,132,0.35)`:"none", transition:"all .2s" }}>
        {done&&<svg width="11" height="11" viewBox="0 0 11 11">
          <path d="M2 5.5l2.5 2.5L9 3" stroke="#001808" strokeWidth={2} strokeLinecap="round" fill="none"/>
        </svg>}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:15, color:done?T.l3:T.l1, fontFamily:F,
          textDecoration:done?"line-through":"none",
          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", marginBottom:done?0:3 }}>{t.text}</div>
        {!done&&(
          <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
            <Pill label={t.priority} color={pMeta.color} dim={pMeta.dim}/>
            {t.dueDate&&<span style={{ fontSize:12, color:T.l3, fontFamily:F }}>{fmtShort(t.dueDate)}</span>}
            {showAuthor&&t.author&&<span style={{ fontSize:12, color:T.l3, fontFamily:F }}>· {t.author}</span>}
          </div>
        )}
      </div>
      <button onClick={onDelete} style={{ background:"none", border:"none",
        color:T.l4, fontSize:17, cursor:"pointer", padding:"0 2px", fontFamily:F }}>✕</button>
    </div>
  );
}


    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
