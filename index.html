function useDebounce(value, delay = 300) {
  const [debounced, setDebounced] = useState(value);
  useEffect(() => {
    const t = setTimeout(() => setDebounced(value), delay);
    return () => clearTimeout(t);
  }, [value, delay]);
  return debounced;
}

/* ─── Theme Hook ────────────────────────────────── */
function useTheme() {
  const [dark, setDark] = useState(() => {
    const saved = localStorage.getItem("sb_theme");
    if (saved === "dark") return true;
    if (saved === "light") return false;
    return window.matchMedia("(prefers-color-scheme:dark)").matches;
  });
  useEffect(() => {
    document.documentElement.classList.toggle("dark", dark);
    localStorage.setItem("sb_theme", dark ? "dark" : "light");
  }, [dark]);
  const toggle = useCallback(() => setDark(d => !d), []);
  return { dark, toggle, T: dark ? T_DARK : T_LIGHT };
}

/* 매장 공유 데이터 - Firebase Firestore 실시간 동기화 */
function useStoreData(storeId, key, seed) {
  const [data, setData] = useState(seed);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!storeId || !key) { setLoading(false); return; }
    const ref = db.collection("stores").doc(storeId).collection("data").doc(key);
    const unsub = ref.onSnapshot(
      snap => { setData(snap.exists ? snap.data().value : seed); setLoading(false); },
      () => { setData(seed); setLoading(false); }
    );
    return unsub;
  }, [storeId, key]);
  const save = useCallback(async (next) => {
    if (!storeId || !key) return;
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await db.collection("stores").doc(storeId).collection("data").doc(key).set({ value: val }); } catch(e) {}
  }, [storeId, key, data]);
  return [data, save, loading];
}

/* 개인 데이터 - 사번 기반 개인 저장 */
function useUserData(empId, key, seed) {
  const [data, setData] = useState(seed);
  useEffect(() => {
    if (!empId || !key) return;
    const ref = db.collection("users").doc(empId).collection("data").doc(key);
    const unsub = ref.onSnapshot(
      snap => { setData(snap.exists ? snap.data().value : seed); },
      () => {}
    );
    return unsub;
  }, [empId, key]);
  const save = useCallback(async (next) => {
    if (!empId || !key) return;
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await db.collection("users").doc(empId).collection("data").doc(key).set({ value: val }); } catch(e) {}
  }, [empId, key, data]);
  return [data, save];
}

function logActivity(storeId, { action, target, detail, user, empId }) {
  if (!storeId || !db) return;
  try {
    db.collection("stores").doc(storeId).collection("activityLog").add({
      action, target, detail: detail || "",
      user: user || "알 수 없음",
      empId: empId || "",
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      clientTs: new Date().toISOString(),
    });
  } catch(e) { console.warn("logActivity error:", e); }
}

function useActivityLog(storeId, limitCount = 50) {
  const [logs, setLogs] = useState([]);
  useEffect(() => {
    if (!storeId || !db) return;
    const ref = db.collection("stores").doc(storeId)
      .collection("activityLog")
      .orderBy("ts", "desc")
      .limit(limitCount);
    const unsub = ref.onSnapshot(
      snap => {
        const items = [];
        snap.forEach(doc => {
          const d = doc.data();
          items.push({ id: doc.id, ...d, ts: d.ts?.toDate?.() || new Date(d.clientTs) });
        });
        setLogs(items);
      },
      () => {}
    );
    return unsub;
  }, [storeId, limitCount]);
  return logs;
}

            </div>
          </div>

          <button onClick={submit} disabled={!nickname.trim()} style={{
            padding:"14px", borderRadius:12, border:"none",
            background:"linear-gradient(135deg,"+T.brand+","+T.brandDark+")",
            color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:F,
            opacity:nickname.trim()?1:0.5 }}>
            저장하기
          </button>
        </div>
      </Sheet>
    );
  }

  // 최초 설정 모드: 전체화면 (사용 안 함 — 로그인 화면에서 처리)
  return null;
}

/* ═══════════════════ LOGIN SCREEN ══════════════════ */
function LoginScreen({ onLogin }) {
  const [step, setStep] = useState("id");
  const [empId, setEmpId] = useState("");
  const [nickname, setNickname] = useState("");
  const [role, setRole] = useState("바리스타");
  const [storeId, setStoreId] = useState("");
  const [avatar, setAvatar] = useState("☕");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const ROLES = ["점장","부점장","SSV","바리스타"];
  const ROLE_C = { "점장":T.violet,"부점장":T.blue,"SSV":T.brand,"바리스타":T.amber };
  const ROLE_BG = { "점장":T.vDim,"부점장":T.bDim,"SSV":T.brandDim,"바리스타":T.aDim };
  const AVATARS = ["☕","🌿","⭐","🍵","🌸","🔥","🎯","💚","🍃","✨","🦋","🌙"];

  const handleCheckId = async () => {
    const id = empId.trim();
    if (!id) return setError("사번을 입력해주세요");
    setLoading(true); setError("");
    try {
      if (!window.db) throw new Error("Firebase 미연결");
      const snap = await db.collection("users").doc(id).get();
      if (snap.exists) { onLogin(snap.data()); }
      else { setStep("register"); }
    } catch(e) {
      console.error(e);
      setError("연결 오류: " + e.message);
    }
    setLoading(false);
  };

  const handleRegister = async () => {
    if (!nickname.trim()) return setError("닉네임을 입력해주세요");
    if (!storeId.trim()) return setError("매장 코드를 입력해주세요");
    setLoading(true); setError("");
    try {
      const userData = {
        empId: empId.trim(), name: nickname.trim(), role, storeId: storeId.trim(),
        avatar, color: ROLE_C[role]||T.brand, colorBg: ROLE_BG[role]||T.brandDim,
      };
      await db.collection("users").doc(empId.trim()).set(userData);
      onLogin(userData);
    } catch(e) {
      console.error(e);
      setError("등록 오류: " + e.message);
    }
    setLoading(false);
  };

  const fBase = { fontFamily:F, fontSize:15, color:T.t1, background:T.card,
    border:"1.5px solid "+T.b1, borderRadius:12, padding:"13px 16px",
    width:"100%", outline:"none", boxSizing:"border-box" };

  return (
    <div style={{ minHeight:"100dvh", background:T.bg, display:"flex", alignItems:"center",
      justifyContent:"center", padding:"20px", paddingBottom:"env(safe-area-inset-bottom,20px)" }}>
      <div style={{ width:"100%", maxWidth:360, background:T.card, borderRadius:20,
        padding:"32px 28px", boxShadow:T.sh3 }}>

        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:36, marginBottom:8 }}>☕</div>
          <div style={{ fontSize:20, fontWeight:900, color:T.brandDark, fontFamily:F, letterSpacing:-0.5 }}>
            매장 관리 앱
          </div>
          <div style={{ fontSize:13, color:T.t3, fontFamily:F, marginTop:4 }}>
            {step==="id" ? "사번으로 로그인하세요" : "처음 오셨군요! 정보를 입력해주세요 👋"}
          </div>
        </div>

        {step === "id" ? (
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <input value={empId} onChange={e=>setEmpId(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleCheckId()}
              placeholder="사번 입력" style={fBase} autoFocus/>
            {error && <div style={{ fontSize:12, color:T.red, fontFamily:F }}>{error}</div>}
            <button onClick={handleCheckId} disabled={loading} style={{
              padding:"14px", borderRadius:12, border:"none",
              background:"linear-gradient(135deg,"+T.brand+","+T.brandDark+")",
              color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:F,
              opacity:loading?0.7:1 }}>
              {loading ? "확인 중..." : "로그인"}
            </button>
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <div style={{ fontSize:12, color:T.t3, fontFamily:F, padding:"10px 14px",
              background:T.brandDim, borderRadius:10, border:"1px solid "+T.brandBorder }}>
              사번 <b style={{ color:T.brand }}>{empId}</b> — 처음 등록하는 계정이에요
            </div>

            {/* 아바타 선택 */}
            <div>
              <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:8 }}>아바타 선택</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {AVATARS.map(a => (
                  <button key={a} onClick={()=>setAvatar(a)} style={{
                    width:40, height:40, borderRadius:10, border:"2px solid "+(avatar===a?T.brand:T.b0),
                    background:avatar===a?T.brandDim:"#fff", fontSize:20, cursor:"pointer",
                    display:"flex", alignItems:"center", justifyContent:"center" }}>{a}</button>
                ))}
              </div>
            </div>

            <input value={nickname} onChange={e=>setNickname(e.target.value)}
              placeholder="닉네임 (예: 주이, 카페왕)" style={fBase} autoFocus/>
            <select value={role} onChange={e=>setRole(e.target.value)} style={{...fBase}}>
              {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
            <input value={storeId} onChange={e=>setStoreId(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleRegister()}
              placeholder="매장 코드 (팀원 모두 동일하게)" style={fBase}/>
            <div style={{ fontSize:11, color:T.t3, fontFamily:F, lineHeight:1.7 }}>
              💡 매장 코드는 팀원들과 동일하게 입력해야 공지·일정이 공유돼요
            </div>
            {error && <div style={{ fontSize:12, color:T.red, fontFamily:F }}>{error}</div>}
            <button onClick={handleRegister} disabled={loading} style={{
              padding:"14px", borderRadius:12, border:"none",
              background:"linear-gradient(135deg,"+T.brand+","+T.brandDark+")",
              color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:F,
              opacity:loading?0.7:1 }}>
              {loading ? "등록 중..." : "등록하고 시작하기"}
            </button>
            <button onClick={()=>{ setStep("id"); setError(""); }} style={{
              padding:"10px", borderRadius:10, border:"none", background:"none",
              color:T.t3, fontSize:13, cursor:"pointer", fontFamily:F }}>
              ← 사번 다시 입력
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


/* ═══════════════════ APP ══════════════════════════ */
function App() {
  const { dark, toggle: toggleTheme, T: themeT } = useTheme();
  T = themeT;

  /* ─── 로그인 유저 ─── */
  const [currentUser, setCurrentUser] = useState(() => {
    try { const u = localStorage.getItem("sbx_current_user"); return u ? JSON.parse(u) : null; } catch { return null; }
  });
  const [showLogin, setShowLogin] = useState(!currentUser);

  const handleLogin = (userData) => {
    localStorage.setItem("sbx_current_user", JSON.stringify(userData));
    setCurrentUser(userData);
    setShowLogin(false);
  };

  /* 프로필 = currentUser */
  const [showProfileSetup, setShowProfileSetup] = useState(false);
  const profile = currentUser || { name:"", role:"바리스타", color:T.brand, colorBg:T.brandDim, empId:"" };
  const saveProfile = async (p) => {
    const updated = { ...currentUser, ...p };
    try { await db.collection("users").doc(currentUser.empId).update(updated); } catch(e) {}
    localStorage.setItem("sbx_current_user", JSON.stringify(updated));
    setCurrentUser(updated);
    setShowProfileSetup(false);
  };

  /* 반응형 */
  const [isPC, setIsPC] = useState(typeof window !== "undefined" ? window.innerWidth >= 768 : false);
  useEffect(()=>{
    const fn = () => setIsPC(window.innerWidth >= 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);

  /* 데이터 - Firebase Firestore */
  const storeId = currentUser?.storeId || null;
  const empId   = currentUser?.empId   || null;
  

  const [notices,      saveNotices,      nL] = useStoreData(storeId, "notices",      SEED_NOTICES);
  const [categories,   saveCategories       ] = useStoreData(storeId, "categories",   DEFAULT_CATS);
  const [catColors,    saveCatColors        ] = useStoreData(storeId, "catColors",    {});
  const [memoNotes,    saveMemoNotes        ] = useStoreData(storeId, "memos",        []);
  const [events,       saveEvents,       eL ] = useStoreData(storeId, "events",       SEED_EVENTS);
  const [roleTasks,    saveRoleTasks,    rL ] = useStoreData(storeId, "teamTasks",    []);
  const [tasks,        saveTasks            ] = useUserData(empId, "tasks", []);
  // ── 활동 로그 ──
  const activityLogs = useActivityLog(storeId, 80);
  const [showActivityLog, setShowActivityLog] = useState(false);
  const log = useCallback((action, target, detail) => {
    logActivity(storeId, { action, target, detail, user: currentUser?.name, empId });
  }, [storeId, currentUser?.name, empId]);

  const [tab, setTab] = useState("home");
  const [taskMode,    setTaskMode]    = useState("personal"); // "personal" | "role"
  const [viewNotice,  setViewNotice]  = useState(null);
  const [addNotice,   setAddNotice]   = useState(false);
  const [aiChat,      setAiChat]      = useState(false);
  const [showBriefing,setShowBriefing]= useState(false);
  const [showQuiz,    setShowQuiz]    = useState(false);
  const [showMoreMenu,setShowMoreMenu]=useState(false);
  useEffect(()=>{
    if(!showMoreMenu) return;
    const close=()=>setShowMoreMenu(false);
    setTimeout(()=>document.addEventListener("click",close),0);
    return ()=>document.removeEventListener("click",close);
  },[showMoreMenu]);
  const [showSyncSheet,setShowSyncSheet]=useState(false);
  const [showSearch,  setShowSearch]  = useState(false);
  const [showAI,      setShowAI]      = useState(false);
  const [aiInitTab,   setAiInitTab]   = useState("chat");
  const [editNotice,  setEditNotice]  = useState(null);
  const [addEvent,    setAddEvent]    = useState(false);
  const [addTask,     setAddTask]     = useState(false);
  const [noticeCat,   setNoticeCat]   = useState("전체");
  const [showCatMgr,  setShowCatMgr]  = useState(false);

  // 모듈 레벨 CAT을 동적으로 업데이트 (NRow/ERow 등 모든 컴포넌트에서 참조)
  Object.keys(CAT).forEach(k => { if (!BASE_CAT[k]) delete CAT[k]; });
  Object.assign(CAT, BASE_CAT);
  (categories||DEFAULT_CATS).forEach((name, i) => {
    const customColor = (catColors||{})[name];
    if (customColor) {
      // 커스텀 색상 적용
      const hex = customColor;
      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      CAT[name] = { color:hex, dim:"rgba("+r+","+g+","+b+",0.12)", border:"rgba("+r+","+g+","+b+",0.25)" };
    } else if (!CAT[name]) {
      const ci = CAT_COLORS[i % CAT_COLORS.length];
      CAT[name] = { color:ci.color, dim:ci.dim, border:ci.color+"33" };
    }
  });

  const [calDate, setCalDate] = useState(new Date());
  const [selDay,  setSelDay]  = useState(todayStr());
  const cY=calDate.getFullYear(), cM=calDate.getMonth();
  const firstDow=new Date(cY,cM,1).getDay();
  const daysInMo=new Date(cY,cM+1,0).getDate();

  const [nf, setNf] = useState({ title:"", category:"이벤트", content:"", pinned:false, author:"" });
  const [ef, setEf] = useState({ title:"", date:todayStr(), endDate:"", category:(categories||DEFAULT_CATS)[0]||"이벤트", memo:"" });
  const [editingEventId, setEditingEventId] = useState(null);
  const [tf, setTf] = useState({ text:"", priority:"보통", dueDate:todayStr() });

  const loading = nL || eL || rL;

  const pendingPersonal = (tasks||[]).filter(t=>!t.done).length;
  const pendingRole     = (roleTasks||[]).filter(t=>!t.done).length;
  const pending         = pendingPersonal + pendingRole;
  const upcoming = (events||[]).filter(e=>e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4);
  const pinnedN  = (notices||[]).filter(n=>n.pinned);
  // 홈 브리핑용 계산
  const todayEvents = (events||[]).filter(e=>todayStr()>=e.date&&todayStr()<=(e.endDate||e.date));
  const unreadCount = (notices||[]).filter(n=>!n._read).length;
  // 홈 미니캘린더용
  const cY2=calDate.getFullYear(), cM2=calDate.getMonth();
  const fd2=new Date(cY2,cM2,1).getDay(), dm2=new Date(cY2,cM2+1,0).getDate();
  const mStr2=cY2+"-"+String(cM2+1).padStart(2,"0");
  const mEvs=(events||[]).filter(e=>{
    const s=e.date,en=e.endDate||e.date;
    return s.slice(0,7)===mStr2||en.slice(0,7)===mStr2;
  });
  const miniDays=[];
  for(let i=0;i<fd2;i++) miniDays.push(null);
  for(let i=1;i<=dm2;i++) miniDays.push(i);
  while(miniDays.length%7!==0) miniDays.push(null);
  const selDayEventsHome=(events||[]).filter(e=>selDay>=e.date&&selDay<=(e.endDate||e.date));
  const rc = ROLE_COLOR[profile?.role] || ROLE_COLOR["바리스타"];

  const readNotice = id => saveNotices(p=>p.map(n=>n.id===id?{...n,_read:true}:n));
  const togglePin  = id => {
    saveNotices(p=>p.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));
    setViewNotice(prev=>prev&&prev.id===id?{...prev,pinned:!prev.pinned}:prev);
  };
  const toggleTask = id => {
    const t = (tasks||[]).find(x=>x.id===id);
    saveTasks(p=>p.map(x=>x.id===id?{...x,done:!x.done}:x));
    if(t) log(t.done?"update":"complete", "task", t.done?`'${t.text}' 미완료로 변경`:`'${t.text}' 완료`);
  };
  const deleteTask = id => {
    const t = (tasks||[]).find(x=>x.id===id);
    saveTasks(p=>p.filter(x=>x.id!==id));
    if(t) log("delete", "task", `'${t.text}' 삭제`);
  };
  const toggleRoleTask = id => {
    const t = (roleTasks||[]).find(x=>x.id===id);
    saveRoleTasks(p=>p.map(x=>x.id===id?{...x,done:!x.done}:x));
    if(t) log(t.done?"update":"complete", "roleTask", t.done?`'${t.text}' 미완료로 변경`:`'${t.text}' 완료`);
  };
  const deleteRoleTask = id => {
    const t = (roleTasks||[]).find(x=>x.id===id);
    saveRoleTasks(p=>p.filter(x=>x.id!==id));
    if(t) log("delete", "roleTask", `'${t.text}' 삭제`);
  };

  const submitNotice = () => {
    if (!nf.title.trim()) return;
    saveNotices(p=>[{ id:"n"+Date.now(), ...nf, date:todayStr(), _read:false, author:profile?.name||nf.author },...p]);
    log("create", "notice", `'${nf.title}' 작성`);
    setNf({ title:"", category:"이벤트", content:"", pinned:false, author:"" });
    setAddNotice(false);
  };
  const deleteNoticeWithEvents = (nid) => {
    const n = (notices||[]).find(x=>x.id===nid);
    saveNotices(p=>(p||[]).filter(x=>x.id!==nid));
    saveEvents(p=>(p||[]).filter(e=>e.noticeId!==nid));
    if(n) log("delete", "notice", `'${n.title}' 삭제`);
  };

  const submitNoticeRich = (data) => {
    if (!data.title.trim()) return;
    const now_id = Date.now();
    const newNotice = { id:"n"+now_id, ...data, date:todayStr(), _read:false, author:profile?.name||"" };
    saveNotices([newNotice, ...(notices||[])]);
    log("create", "notice", `'${data.title}' 작성`);
    if (data.noticeDate) {
      const newEv = {
        id:"ev"+now_id, title:data.title, date:data.noticeDate,
        endDate:data.noticeEndDate||data.noticeDate, category:data.category, memo:"공지 연동",
        noticeId:"n"+now_id
      };
      const updatedEvents = [...(events||[]), newEv].sort((a,b)=>a.date.localeCompare(b.date));
      saveEvents(updatedEvents);
      log("create", "event", `'${data.title}' 일정 자동 등록`);
    }
  };
  const submitEvent = () => {
    if (!ef.title.trim()) return;
    if (editingEventId) {
      saveEvents(p=>(p||[]).map(e=>e.id===editingEventId?{...e,...ef,endDate:ef.endDate||ef.date}:e));
      log("update", "event", `'${ef.title}' 수정`);
      setEditingEventId(null);
    } else {
      saveEvents(p=>[...(p||[]),{id:"e"+Date.now(),...ef,endDate:ef.endDate||ef.date}].sort((a,b)=>a.date.localeCompare(b.date)));
      log("create", "event", `'${ef.title}' 등록 (${ef.date})`);
    }

    const s=`${cY}-${String(cM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return (events||[]).filter(e=>e.date===s);
  };
  const now = new Date();


  /* 로그인 안된 경우 - LoginScreen은 showLogin state로 처리 (App 최상단) */
  if (showLogin) return <LoginScreen onLogin={handleLogin}/>;
  // 프로필 수정은 overlay Sheet로 (early return 제거)
  /* --- 메인 UI --- */
  return (
    <div style={{ minHeight:"100vh", background:T.bg,
      fontFamily:F, position:"relative", overflowX:"hidden",
      display:isPC?"flex":"block", justifyContent:isPC?"center":"flex-start",
      transition:"background .35s ease, color .35s ease" }}>
      <style>{`
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        ::placeholder{color:${T.t3};font-family:${F};}
        ::-webkit-scrollbar{display:none;}
        input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.4);}

            // 캘린더 이벤트도 날짜 동기화 (events 직접 참조)
            if (data.noticeDate) {
              const alreadyLinked = (events||[]).some(e => e.noticeId===editNotice.id);

                  ? {...e, title:data.title, date:data.noticeDate, endDate:data.noticeEndDate||data.noticeDate, category:data.category}
                  : e));
              } else {
                // 기존에 연동 이벤트 없으면 신규 추가
                const newEv = {
                  id:"ev"+Date.now(), title:data.title, date:data.noticeDate,

              saveEvents((events||[]).filter(e=>e.noticeId!==editNotice.id));
            }
            setEditNotice(null);
          }}
        />
      )}

  );

/* ================== CALENDAR TAB ================== */
function CalendarTab({ events, notices, calDate, setCalDate, selDay, setSelDay, todayStr, CAT, onAddEvent, onDeleteEvent, onEditEvent, onViewNotice }) {
  var cY = calDate.getFullYear();
  var cM = calDate.getMonth();
  var firstDow = new Date(cY, cM, 1).getDay();
  var daysInMo = new Date(cY, cM + 1, 0).getDate();
  var WDAYS_CAL = ["일","월","화","수","목","금","토"];
  var mStr = cY + "-" + String(cM + 1).padStart(2, "0");

  var monthEvents = events.filter(function(e) {
    var s = e.date, en = e.endDate || e.date;
    return s.slice(0,7) === mStr || en.slice(0,7) === mStr ||
           (s < mStr + "-01" && en > mStr + "-31");
  });

  // 주 배열 생성
  var weeks = [];
  var d = 1, blanks = firstDow;
  while (d <= daysInMo) {
    var row = [];
    for (var col = 0; col < 7; col++) {
      if (blanks > 0) { row.push(null); blanks--; }
      else if (d <= daysInMo) { row.push(d); d++; }
      else row.push(null);
    }
    weeks.push(row);
  }

  var selDayEvents = events.filter(function(e) {
    return selDay >= e.date && selDay <= (e.endDate || e.date);
  });
  var selDateLabel = new Date(selDay + "T00:00:00")
    .toLocaleDateString("ko-KR", { month:"long", day:"numeric" });

  return (
    <div style={{ padding:"16px" }} className="fi">
      {/* 월 네비 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <button onClick={function(){ setCalDate(new Date(cY, cM-1, 1)); }} style={{
          width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:10, background:T.card, cursor:"pointer", color:T.l1,
          fontSize:18, border:"1px solid "+T.border0,
          boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>‹</button>
        <span style={{ fontSize:17, fontWeight:700, color:T.l1, fontFamily:F }}>
          {calDate.toLocaleDateString("ko-KR", { year:"numeric", month:"long" })}
        </span>
        <button onClick={function(){ setCalDate(new Date(cY, cM+1, 1)); }} style={{
          width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:10, background:T.card, cursor:"pointer", color:T.l1,
          fontSize:18, border:"1px solid "+T.border0,
          boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>›</button>
      </div>

      {/* 캘린더 카드 */}
      <div style={{ background:T.card, borderRadius:20, padding:"16px",
        boxShadow:"0 2px 20px rgba(30,57,50,0.08)", marginBottom:16 }}>

        {/* 요일 헤더 */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:8 }}>
          {WDAYS_CAL.map(function(wd, i) {
            return (
              <div key={wd} style={{ textAlign:"center", fontSize:11, fontWeight:600,
                fontFamily:F, padding:"2px 0 8px",
                color: i===0 ? T.red : i===6 ? T.blue : T.l3 }}>{wd}</div>
            );
          })}
        </div>

        {/* 날짜 그리드 - 그리드선 없음 */}
        {weeks.map(function(weekRow, wi) {
          // 이 주의 이벤트 찾기
          var validDays = weekRow.filter(function(x){ return x!==null; });
          if (!validDays.length) return null;
          var wStart = validDays[0], wEnd = validDays[validDays.length-1];

          var weekBars = [];
          var mPfx = cY+"-"+String(cM+1).padStart(2,"0")+"-";
          monthEvents.forEach(function(ev) {
            var sDate = ev.date||"";
            var eDate = (ev.endDate&&ev.endDate.length>=10?ev.endDate:ev.date)||"";
            // 시작일이 이번 달보다 이전이면 1일로 간주
            var evS = sDate.slice(0,7) < mPfx.slice(0,7) ? 1
                    : parseInt(sDate.slice(8,10)||"0");
            // 종료일이 이번 달보다 이후이면 31일로 간주 (월말까지 표시)
            var evE = eDate.slice(0,7) > mPfx.slice(0,7) ? 31
                    : parseInt(eDate.slice(8,10)||"0");
            if (evS > wEnd || evE < wStart) return;
            var clampS = Math.max(evS, wStart);
            var clampE = Math.min(evE, wEnd);
            var colS = weekRow.indexOf(clampS);
            var colE = weekRow.indexOf(clampE);
            if (colS < 0) colS = 0;
            if (colE < 0) colE = weekRow.filter(function(x){return x!==null;}).length - 1;
            // 시작/끝이 이 주에 없으면 첫날~마지막날로 clamp
            weekBars.push({ ev:ev, colS:colS, colE:colE,
              startsHere: evS>=wStart && sDate.slice(0,7)===mPfx.slice(0,7),
              endsHere: evE<=wEnd && eDate.slice(0,7)===mPfx.slice(0,7), slot:null });
          });
          weekBars.forEach(function(bar) {
            var slot=0, busy=[];
            weekBars.forEach(function(b){
              if(b===bar||b.slot===null)return;
              if(b.colS<=bar.colE&&b.colE>=bar.colS)busy.push(b.slot);
            });
            while(busy.indexOf(slot)!==-1)slot++;
            bar.slot=slot;
          });
          var maxSlot = weekBars.reduce(function(m,b){return Math.max(m,b.slot+1);},0);
          var cellH = 34 + maxSlot*18;

          return (
            <div key={wi} style={{ position:"relative", marginBottom:2 }}>
              {/* 날짜 행 */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
                {weekRow.map(function(day, ci) {
                  if (day===null) return <div key={"n"+ci} style={{ height:cellH }}/>;
                  var dStr = cY+"-"+String(cM+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
                  var isTod = dStr===todayStr();
                  var isSel = dStr===selDay && !isTod;
                  var dayCol = ci===0?T.red:ci===6?T.blue:T.l1;
                  return (
                    <div key={day} onClick={function(){setSelDay(dStr);}}
                      style={{ height:cellH, cursor:"pointer", position:"relative",
                        background: isSel ? T.greenLight : "transparent",
                        borderRadius:10 }}>
                      <div style={{ position:"relative", zIndex:2,
                        display:"flex", justifyContent:"center", paddingTop:4 }}>
                      {isTod ? (
                        <div style={{ width:26, height:26, borderRadius:"50%",
                          background:"linear-gradient(135deg,#00704A,#1E3932)",
                          display:"flex", alignItems:"center", justifyContent:"center",
                          boxShadow:"0 2px 8px rgba(0,112,74,0.35)" }}>
                          <span style={{ fontSize:12, fontWeight:800, color:"#fff",
                            lineHeight:1, fontFamily:F }}>{day}</span>
                        </div>
                      ) : (
                        <span style={{ fontSize:13, fontWeight:isSel?700:400,
                          color:isSel?T.green:dayCol, lineHeight:"26px", fontFamily:F }}>{day}</span>
                      )}
                    </div>
                    </div>
                  );
                })}
              </div>

              {/* 이벤트 바 */}
              {weekBars.map(function(bar,bi){
                var meta = CAT[bar.ev.category] || { color:T.green };
                var topOff = 34 + bar.slot*18;
                var span = bar.colE - bar.colS + 1;
                return (
                  <div key={bar.ev.id+"_"+wi+"_"+bi} style={{
                    position:"absolute", top:topOff, zIndex:3,
                    left:(bar.colS*100/7)+"%", width:(span*100/7)+"%",
                    height:14,
                    background: meta.color+"30",
                    borderLeft: bar.startsHere ? "3px solid "+meta.color : "none",
                    borderRight: bar.endsHere ? "1px solid "+meta.color+"50" : "none",
                    borderTop: "1px solid "+meta.color+"40",
                    borderBottom: "1px solid "+meta.color+"40",
                    borderRadius: bar.startsHere?(bar.endsHere?"5px":"5px 0 0 5px"):(bar.endsHere?"0 5px 5px 0":"0"),
                    display:"flex", alignItems:"center", paddingLeft:bar.startsHere?4:2,
                    overflow:"hidden", pointerEvents:"none"
                  }}>
                    {bar.startsHere&&(
                      <span style={{ fontSize:9, fontWeight:700, color:meta.color,
                        fontFamily:F, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                        {bar.ev.title}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* 선택 날짜 일정 */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div>
          <span style={{ fontSize:15, fontWeight:700, color:T.l1, fontFamily:F }}>{selDateLabel}</span>
          <span style={{ fontSize:13, color:T.l3, fontFamily:F, marginLeft:6 }}>
            {selDayEvents.length>0 ? selDayEvents.length+"개" : "없음"}
          </span>
        </div>
        <ActionBtn onClick={onAddEvent}>+ 추가</ActionBtn>
      </div>

      <div style={{ background:T.card, borderRadius:16, overflow:"hidden",
        boxShadow:"0 2px 16px rgba(30,57,50,0.07)" }}>
        {selDayEvents.length===0
          ? <EmptyRow text="이 날에 일정이 없어요"/>
          : selDayEvents.map(function(e,i){
              var linkedNotice = notices ? (
                e.noticeId
                  ? notices.find(function(n){ return n.id===e.noticeId; })
                  : notices.find(function(n){ return n.title===e.title; })
              ) : null;
              return (
                <div key={e.id} style={{ position:"relative" }}>
                  <ERow e={e}/>
                  <div style={{ display:"flex", gap:6, padding:"0 16px 10px", justifyContent:"flex-end" }}>
                    {linkedNotice&&(
                      <button onClick={()=>onViewNotice&&onViewNotice(linkedNotice)} style={{
                        padding:"4px 12px", borderRadius:8, fontSize:12, fontFamily:F,
                        border:"1px solid "+T.greenBorder, background:T.greenDim, color:T.green,
                        cursor:"pointer", fontWeight:600 }}>📢 공지 보기</button>
                    )}
                    <button onClick={()=>onEditEvent&&onEditEvent(e)} style={{
                      padding:"4px 12px", borderRadius:8, fontSize:12, fontFamily:F,
                      border:"1px solid "+T.border1, background:T.glass1, color:T.l2, cursor:"pointer" }}>수정</button>
                    <button onClick={()=>{ if(window.confirm("일정을 삭제할까요?")) onDeleteEvent&&onDeleteEvent(e.id); }} style={{
                      padding:"4px 12px", borderRadius:8, fontSize:12, fontFamily:F,
                      border:"1px solid #ff6b6b44", background:"#ff6b6b11", color:"#e05252", cursor:"pointer" }}>삭제</button>
                  </div>
                  {i<selDayEvents.length-1&&<Sep/>}
                </div>
              );
            })
        }
      </div>
    </div>
  );
}

function CatManagerSheet({ onClose, categories, onSave, catColors, onSaveColors }) {
  const cats = categories && categories.length ? [...categories] : [...DEFAULT_CATS];
  const [list, setList] = useState(cats);
  const [input, setInput] = useState("");
  const [colors, setColors] = useState(catColors||{});
  const PALETTE = ["#00704A","#C07020","#2563EB","#7C3AED","#DC2626","#EA580C","#0891B2","#059669","#DB2777","#65A30D"];

  const add = () => {
    const v = input.trim();
    if (!v || list.includes(v)) return;
    setList(prev => [...prev, v]);
    setInput("");
  };
  const remove = (name) => {
    if (list.length <= 1) return;
    setList(prev => prev.filter(c => c !== name));
  };
  const setColor = (name, color) => {
    setColors(prev => ({...prev, [name]: color}));
  };
  const handleSave = () => {
    onSave(list);
    onSaveColors(colors);
    onClose();
  };

  return (
    <Sheet title="카테고리 관리" onClose={onClose}>
      <p style={{ fontSize:13, color:T.l3, fontFamily:F, marginBottom:14, lineHeight:1.6 }}>
        카테고리를 추가하고 캘린더 표시 색상을 지정해요.
      </p>

      {/* 카테고리 목록 */}
      <div style={{ marginBottom:14 }}>
        {list.map(function(name){
          const curColor = colors[name] || BASE_CAT[name]?.color || CAT_COLORS[0].color;
          return (
            <div key={name} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <div style={{ width:14, height:14, borderRadius:4, background:curColor, flexShrink:0 }}/>
                <span style={{ fontSize:14, fontWeight:600, color:T.l1, fontFamily:F, flex:1 }}>{name}</span>
                {!DEFAULT_CATS.includes(name) && (
                  <button onClick={()=>remove(name)} style={{
                    background:"none", border:"none", color:T.red, fontSize:18,
                    cursor:"pointer", lineHeight:1, padding:"0 4px" }}>×</button>
                )}
              </div>
              {/* 색상 팔레트 */}
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", paddingLeft:22 }}>
                {PALETTE.map(function(hex){
                  const isSelected = curColor === hex;
                  return (
                    <button key={hex} onClick={()=>setColor(name, hex)} style={{
                      width:24, height:24, borderRadius:6, background:hex, border:"none",
                      cursor:"pointer", flexShrink:0,
                      outline:isSelected?"3px solid "+hex:"none",
                      outlineOffset:isSelected?"2px":"0",
                      opacity:isSelected?1:0.65,
                      transform:isSelected?"scale(1.15)":"scale(1)",
                      transition:"all .15s" }}/>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* 새 카테고리 추가 */}
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&add()}
          placeholder="새 카테고리 이름"
          style={{ flex:1, padding:"10px 14px", borderRadius:12, border:"1px solid "+T.border1,
            background:T.card, color:T.l1, fontSize:14, fontFamily:F, outline:"none" }}/>
        <button onClick={add} style={{
          padding:"10px 16px", borderRadius:12, border:"none",
          background:T.green, color:"#fff", fontSize:14, fontWeight:700,
          cursor:"pointer", fontFamily:F }}>추가</button>
      </div>

      <GreenBtn full onClick={handleSave}>저장하기</GreenBtn>
    </Sheet>
  );
}


function RichNoticeSheet({ onClose, onSave, initial, categories, notices }) {
  const cats = categories && categories.length ? categories : DEFAULT_CATS;
  const [aiDrafting, setAiDrafting] = useState(false);
  const [title, setTitle]       = useState(initial ? initial.title : "");
  const [category, setCategory] = useState(initial ? initial.category : cats[0]);
  const [pinned, setPinned]     = useState(initial ? !!initial.pinned : false);
  const [noticeDate, setNoticeDate] = useState(initial ? (initial.noticeDate||"") : "");
  const [noticeEndDate, setNoticeEndDate] = useState(initial ? (initial.noticeEndDate||"") : "");
  const editorRef = useRef();
  const imgRef = useRef();

  useEffect(() => {
    if (initial && editorRef.current) {
      editorRef.current.innerHTML = initial.content || "";
    }
  }, []);

  const execCmd = (cmd, val) => {
    document.execCommand(cmd, false, val || null);
    editorRef.current.focus();
  };

  const insertImage = async (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.margin = "6px 0";
      editorRef.current.focus();
      const sel = window.getSelection();
      if (sel && sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.insertNode(img);
        range.collapse(false);
      } else {
        editorRef.current.appendChild(img);
      }
    };
    reader.readAsDataURL(file);
  };

  // body 스크롤 잠금 (iOS 키보드 밀림 방지)
  useEffect(() => {
    const y = window.scrollY;
    document.body.style.cssText = "position:fixed;top:-"+y+"px;left:0;right:0;overflow:hidden;width:100%;";
    return () => { document.body.style.cssText = ""; window.scrollTo(0, y); };
  }, []);

  const handleSave = () => {
    if (!title.trim()) return;
    const content = editorRef.current ? editorRef.current.innerHTML : "";
    onSave({ title: title.trim(), category, content, pinned, noticeDate, noticeEndDate });
  };

  const tools = [
    { icon:"B",  cmd:"bold",        style:{ fontWeight:800 },              tip:"굵게"    },
    { icon:"I",  cmd:"italic",      style:{ fontStyle:"italic" },          tip:"기울임"  },
    { icon:"U",  cmd:"underline",   style:{ textDecoration:"underline" },  tip:"밑줄"    },
  ];

  // 형광펜: 어두운 배경에서 잘 보이는 진한 색 사용
  const highlights = [
    { bg:"#FFE066", text:"#1a1a00", label:"노랑" },
    { bg:"#5DDE74", text:"#003010", label:"초록" },
    { bg:"#FF7B7B", text:"#2a0000", label:"빨강" },
    { bg:"#5BA8FF", text:"#001835", label:"파랑" },
  ];

  const btnS = { padding:"5px 9px", borderRadius:7, border:"1px solid "+T.border1,
    background:T.glass1, color:T.l1, cursor:"pointer", fontFamily:F, fontSize:13 };

  const insertHR = () => {
    const sel=window.getSelection(); if(!sel||!sel.rangeCount) return;
    const r=sel.getRangeAt(0);
    const hr=document.createElement("hr");
    hr.style.cssText="border:none;border-top:1.5px solid #C8DDD4;margin:10px 0";
    const br=document.createElement("br");
    r.collapse(false); r.insertNode(br); r.insertNode(hr);
    r.setStartAfter(br); r.collapse(true);
    sel.removeAllRanges(); sel.addRange(r);
  };

  const lastEnterRef = useRef(null); // 엔터 두번 감지용

  /* ── 에디터 블록 유틸 ── */
  // 노드에서 ed 직계 자식 블록 찾기
  const getEdBlock = (node, ed) => {
    let n = node && node.nodeType === 3 ? node.parentNode : node;
    while (n && n.parentNode && n.parentNode !== ed) n = n.parentNode;
    return (n && n !== ed && n.parentNode === ed) ? n : null;
  };

  // 선택 범위 내 ed 직계 블록 목록 수집
  const getSelectedBlocks = (ed) => {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return [];
    const range = sel.getRangeAt(0);
    const startBlock = getEdBlock(range.startContainer, ed);
    const endBlock   = getEdBlock(range.endContainer,   ed);
    if (!startBlock) return [];
    const blocks = [];
    let cur = startBlock;
    while (cur) {
      if (cur.nodeType === 1) blocks.push(cur);
      if (cur === endBlock) break;
      cur = cur.nextSibling;
    }
    return blocks.length ? blocks : (startBlock ? [startBlock] : []);
  };

  /* ── 커스텀 들여쓰기 (paddingLeft 직접 조작 — execCommand indent 대체) ── */
  const customIndent = (dir) => {
    const ed = editorRef.current;
    if (!ed) return;
    ed.focus();
    const blocks = getSelectedBlocks(ed);
    if (!blocks.length) return;
    blocks.forEach(block => {
      const curr = parseInt(block.style.paddingLeft) || 0;
      block.style.paddingLeft = dir === "in"
        ? (curr + 24) + "px"
        : Math.max(0, curr - 24) + "px";
    });
  };

  /* ── 폰트 크기 적용 — 선택 범위에만 span 래핑 ── */
  const applyFontSize = (size, weight) => {
    const ed = editorRef.current;
    if (!ed) return;
    ed.focus();
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    let range = sel.getRangeAt(0);

    // 선택 없을 때(커서만) → 현재 블록 전체 선택
    if (range.collapsed) {
      const block = getEdBlock(range.startContainer, ed);
      if (!block) return;
      const newR = document.createRange();
      newR.selectNodeContents(block);
      sel.removeAllRanges();
      sel.addRange(newR);
      range = sel.getRangeAt(0);
    }

    // 선택 범위에서 기존 fontSize/fontWeight 제거 후 span 래핑
    const frag = range.extractContents();
    const strip = (n) => {
      if (n.style) { n.style.fontSize = ""; n.style.fontWeight = ""; }
      n.childNodes && n.childNodes.forEach(strip);
    };
    strip(frag);
    const sp = document.createElement("span");
    sp.style.fontSize = size;
    sp.style.fontWeight = weight;
    sp.appendChild(frag);
    range.insertNode(sp);
    // 커서를 span 뒤로 이동
    const newR = document.createRange();
    newR.setStartAfter(sp);
    newR.collapse(true);
    sel.removeAllRanges();
    sel.addRange(newR);
    ed.focus();
  };

  const ToolbarContent = () => (
    <div style={{ display:"flex", gap:4, flexWrap:"wrap", alignItems:"center" }}>
      {/* 서식: 굵게/기울임/밑줄 */}
      <button onMouseDown={e=>{e.preventDefault();document.execCommand("bold");}}
        style={{ ...btnS, fontWeight:800 }}>B</button>
      <button onMouseDown={e=>{e.preventDefault();document.execCommand("italic");}}
        style={{ ...btnS, fontStyle:"italic" }}>I</button>
      <button onMouseDown={e=>{e.preventDefault();document.execCommand("underline");}}
        style={{ ...btnS, textDecoration:"underline" }}>U</button>
      {/* 취소선 */}
      <button onMouseDown={e=>{e.preventDefault();document.execCommand("strikeThrough");}}
        style={{ ...btnS, textDecoration:"line-through" }}>S</button>

      {/* 구분선 */}
      <div style={{ width:1, height:22, background:T.border1, margin:"0 2px" }}/>

      {/* 글자 크기 */}
      <button onMouseDown={e=>{e.preventDefault();applyFontSize("20px","700");}}
        style={{ ...btnS }}>제목</button>
      <button onMouseDown={e=>{e.preventDefault();applyFontSize("17px","600");}}
        style={{ ...btnS }}>소제목</button>
      <button onMouseDown={e=>{e.preventDefault();applyFontSize("15px","400");}}
        style={{ ...btnS }}>본문</button>

      {/* 구분선 */}
      <div style={{ width:1, height:22, background:T.border1, margin:"0 2px" }}/>

      {/* 들여쓰기 / 내어쓰기 */}
      <button onMouseDown={e=>{e.preventDefault();customIndent("in");}}
        title="들여쓰기 (Tab)"
        style={{ ...btnS, fontSize:15 }}>⇥</button>
      <button onMouseDown={e=>{e.preventDefault();customIndent("out");}}
        title="내어쓰기 (Shift+Tab)"
        style={{ ...btnS, fontSize:15 }}>⇤</button>

      {/* 구분선 */}
      <div style={{ width:1, height:22, background:T.border1, margin:"0 2px" }}/>

      {/* 형광펜 */}
      {["#FFEB3B","#A5D6A7","#EF9A9A","#90CAF9"].map(bg=>(
        <button key={bg} onMouseDown={e=>{e.preventDefault();document.execCommand("hiliteColor",false,bg);}}
          style={{ width:24, height:24, borderRadius:5, background:bg,
            border:"1px solid rgba(0,0,0,0.12)", cursor:"pointer", flexShrink:0 }}/>
      ))}
      <button onMouseDown={e=>{e.preventDefault();document.execCommand("hiliteColor",false,"transparent");}}
        style={{ ...btnS, color:T.l3, fontSize:11 }}>지우기</button>

      {/* 구분선 */}
      <div style={{ width:1, height:22, background:T.border1, margin:"0 2px" }}/>

      {/* 가로선 삽입 */}

        if(url && url.trim()) document.execCommand("createLink", false, url.trim());
      }} title="링크 삽입" style={{ ...btnS }}>🔗</button>

      {/* 이미지 삽입 */}
      <button onMouseDown={e=>{e.preventDefault();imgRef.current&&imgRef.current.click();}}
        title="이미지" style={{ ...btnS }}>🖼</button>

      {/* 실행취소 */}
      <button onMouseDown={e=>{e.preventDefault();document.execCommand("undo");}}
        title="실행취소" style={{ ...btnS }}>↩</button>

      <input ref={imgRef} type="file" accept="image/*" style={{ display:"none" }}
        onChange={e=>{
          const file=e.target.files[0]; if(!file)return;
          const r=new FileReader(); r.onload=ev=>{
            const img=document.createElement("img");
            img.src=ev.target.result; img.style.maxWidth="100%";
            img.style.borderRadius="10px"; img.style.margin="4px 0";
            const sel=window.getSelection();
            if(sel&&sel.rangeCount){
              const rng=sel.getRangeAt(0); rng.collapse(false); rng.insertNode(img);
              rng.setStartAfter(img); rng.collapse(true);
              sel.removeAllRanges(); sel.addRange(rng);
            }
          }; r.readAsDataURL(file);
        }}/>
    </div>
  );

  return (

      background:"rgba(0,0,0,0.55)",
      backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
      display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
      <div style={{
        background:"rgba(245,250,247,0.98)",
        borderTop:"2px solid "+T.green,
        width:"100%", maxWidth: window.innerWidth >= 768 ? 800 : 430,
        height:"100%",
        display:"flex", flexDirection:"column",
        boxShadow:"0 -20px 60px rgba(0,0,0,0.7)" }}>

        {/* ① 헤더 - 고정 */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
          padding:"16px 22px 14px", flexShrink:0,
          borderBottom:"1px solid "+T.border0 }}>
          <span style={{ fontSize:20, fontWeight:700, color:T.l1, fontFamily:F }}>
            {initial ? "공지 수정" : "공지 작성"}
          </span>
          <button onClick={onClose} style={{ background:T.glass2, border:"1px solid "+T.border1,
            borderRadius:"50%", width:32, height:32, cursor:"pointer", color:T.l2,
            fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
        </div>

        {/* PC 2단 레이아웃 */}

            {/* 왼쪽: 메타정보 + 버튼 */}
            <div style={{ width:260, flexShrink:0, display:"flex", flexDirection:"column" }}>
              <input value={title} onChange={e=>setTitle(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")e.preventDefault();}}
                placeholder="공지 제목"
                style={{ ...fBase, marginBottom:10, fontSize:17, fontWeight:600 }}/>
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>카테고리</div>

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:800,
          system:buildContext(),
          messages:apiMsgs
        })
      });
      const d = await res.json();
      const reply = (d.content||[]).map(b=>b.text||"").join("") || "답변을 가져오지 못했어요.";
      setMessages(p=>[...p, { role:"assistant", text:reply }]);
    } catch(e) {
      setMessages(p=>[...p, { role:"assistant", text:"⚠ API 키를 확인해주세요. (홈 → 설정 → Gist 설정 하단에서 AI API 키 입력)" }]);
    }
    setLoading(false);
    setTimeout(()=>msgEnd.current?.scrollIntoView({behavior:"smooth"}),100);
  }, [input, messages, loading, buildContext]);

  /* ── 빠른 질문 버튼 ── */
  const quickAsk = (q) => { setInput(q); setTimeout(()=>{ inputRef.current?.focus(); },50); };

  /* ── Briefing 생성 ── */
  const generateBriefing = useCallback(async () => {
    setBriefLoading(true); setBriefing("");
    try {
      const today = new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"});
      const noticeCtx = (notices||[]).slice(0,12).map(n=>`• ${n.title} [${n.category||""}]`).join("\n");
      const evCtx = (events||[]).filter(e=>e.date>=new Date().toISOString().slice(0,10)).slice(0,6)
        .map(e=>`• ${e.date} ${e.title}`).join("\n");
      const taskCtx = [...(tasks||[]).filter(t=>!t.done).slice(0,5), ...(roleTasks||[]).filter(t=>!t.done).slice(0,3)]
        .map(t=>`• ${t.text}`).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:500,
          messages:[{role:"user", content:
            `오늘(${today}) 스타벅스 매장 파트너 ${profile?.name||""}(${profile?.role||""})를 위한 AI 브리핑을 작성해주세요.\n\n최근 공지:\n${noticeCtx||"(없음)"}\n\n예정 일정:\n${evCtx||"(없음)"}\n\n미완료 할일:\n${taskCtx||"(없음)"}\n\n형식: 오늘의 핵심 3~5가지를 이모지+번호 리스트로. 친근하고 동기부여가 되도록. 마지막에 응원 한마디.`
          }]
        })
      });
      const d = await res.json();
      setBriefing((d.content||[]).map(b=>b.text||"").join("") || "브리핑을 생성할 수 없어요.");
    } catch(e) { setBriefing("⚠ API 키를 확인해주세요."); }
    setBriefLoading(false);
  }, [notices, events, tasks, roleTasks, profile]);

  /* ── Quiz 생성 ── */
  const generateQuiz = useCallback(async () => {
    setQuizLoading(true); setQuiz(null); setSelected(null);
    try {
      const ctx = (notices||[]).slice(0,15).map(n=>{
        const body = n.content ? n.content.replace(/<[^>]*>/g,"").slice(0,80) : (n.body ? n.body.replace(/<[^>]*>/g,"").slice(0,80) : "");
        return n.title+(body?": "+body:"");
      }).join("\n");
      const fmt = '{"question":"질문","options":["A","B","C","D"],"answer":0,"explanation":"설명"}';
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.ANTHROPIC_API_KEY||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:400,
          messages:[{role:"user",content:"공지 내용으로 퀴즈 1문제를 만들어줘:\n"+ctx+"\n\n반드시 JSON만 반환해: "+fmt}]
        })
      });
      const d = await res.json();
      const txt = (d.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
      setQuiz(JSON.parse(txt));
    } catch(e) { setQuiz({question:"API 오류",options:["확인"],answer:0,explanation:"API 키를 확인해주세요."}); }
    setQuizLoading(false);
  }, [notices]);

  useEffect(()=>{
    if (tab==="briefing" && !briefing) generateBriefing();
    if (tab==="quiz" && !quiz) generateQuiz();
  }, [tab]);

  // localStorage에서 API key 로딩
  const storedKey = (() => { try { return localStorage.getItem("sbx_apikey")||""; } catch(e) { return ""; } })();
  if (storedKey && !window.ANTHROPIC_API_KEY) window.ANTHROPIC_API_KEY = storedKey;
  const apiKey = window.ANTHROPIC_API_KEY;

  return (
    <Sheet title="✨ AI 어시스턴트" onClose={onClose}>
      {/* API 키 없음 경고 */}
      {!apiKey && (
        <div style={{ padding:"10px 14px", borderRadius:12, background:T.aDim,
          border:"1px solid "+T.aBdr, marginBottom:12, fontSize:12, color:T.amber, fontFamily:F }}>
          ⚠ AI API 키가 설정되지 않았어요. <br/>
          <span style={{ color:T.t2 }}>사이드바 하단 &gt; Gist 설정 &gt; AI(Anthropic) API 키 입력</span>
        </div>
      )}

      {/* 탭 */}
      <div style={{ display:"flex", gap:6, marginBottom:16,
        background:T.card2, borderRadius:12, padding:4 }}>
        {[{id:"chat",l:"💬 AI 채팅"},{id:"briefing",l:"🔍 브리핑"},{id:"quiz",l:"📝 퀴즈"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1, padding:"8px 6px", borderRadius:9, border:"none", cursor:"pointer",
            background:tab===t.id?T.card:"transparent",
            color:tab===t.id?T.brand:T.t3, fontSize:12, fontWeight:tab===t.id?700:500,
            fontFamily:F, boxShadow:tab===t.id?T.sh1:"none", transition:"all .18s" }}>
            {t.l}
          </button>
        ))}
      </div>

      {/* ── 채팅 탭 ── */}
      {tab==="chat" && (
        <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
          {/* 빠른 질문 */}
          {messages.length===0 && (
            <div>
              <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:8 }}>빠른 질문</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }}>
                {[
                  "오늘 공지 요약해줘",
                  "이번 주 일정 알려줘",
                  "미완료 할일 정리해줘",
                  "이번 달 프로모션은?",
                  "주요 체크포인트 알려줘",
                ].map(q=>(
                  <button key={q} onClick={()=>quickAsk(q)} style={{
                    padding:"7px 12px", borderRadius:20, border:"1px solid "+T.brandBorder,
                    background:T.brandDim, color:T.brand, fontSize:12, fontWeight:500,
                    cursor:"pointer", fontFamily:F }}>
                    {q}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* 메시지 */}
          {messages.length>0 && (
            <div style={{ maxHeight:340, overflowY:"auto", marginBottom:12,
              display:"flex", flexDirection:"column", gap:10 }}>
              {messages.map((m,i)=>(
                <div key={i} style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start" }}>
                  {m.role==="assistant" && (
                    <div style={{ width:28, height:28, borderRadius:"50%", background:T.brandDim,
                      border:"1px solid "+T.brandBorder, flexShrink:0, marginRight:8, marginTop:2,
                      display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>✨</div>
                  )}
                  <div style={{
                    maxWidth:"82%", padding:"10px 14px", borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",
                    background:m.role==="user"?"linear-gradient(135deg,"+T.brand+","+T.brandDark+")":T.card2,
                    color:m.role==="user"?"#fff":T.t1, fontSize:13, fontFamily:F, lineHeight:1.6,
                    whiteSpace:"pre-wrap", boxShadow:T.sh1,
                    border:m.role==="user"?"none":"1px solid "+T.b0 }}>
                    {m.text}
                  </div>
                </div>
              ))}
              {loading && (
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ width:28, height:28, borderRadius:"50%", background:T.brandDim,
                    border:"1px solid "+T.brandBorder, flexShrink:0,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>✨</div>
                  <div style={{ padding:"10px 14px", borderRadius:"4px 16px 16px 16px",
                    background:T.card2, border:"1px solid "+T.b0, display:"flex", gap:5, alignItems:"center" }}>
                    {[0,1,2].map(i=>(
                      <div key={i} style={{ width:6, height:6, borderRadius:"50%", background:T.t3,
                        animation:`bounce .9s ${i*0.15}s infinite` }}/>
                    ))}
                  </div>
                </div>
              )}
              <div ref={msgEnd}/>
            </div>
          )}

          {/* 입력창 */}
          <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
            <textarea ref={inputRef}
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();} }}
              placeholder="공지, 일정, 할일에 대해 질문해보세요..."
              style={{ flex:1, border:"1px solid "+T.brandBorder, borderRadius:14,
                padding:"11px 14px", fontSize:13, fontFamily:F, color:T.t1, background:T.card,
                resize:"none", outline:"none", minHeight:44, maxHeight:100, lineHeight:1.5 }}
              rows={1}/>
            <button onClick={sendChat} disabled={loading||!input.trim()} style={{
              width:44, height:44, borderRadius:12, border:"none", flexShrink:0,
              background:input.trim()&&!loading?"linear-gradient(135deg,"+T.brand+","+T.brandDark+")":T.card2,
              color:input.trim()&&!loading?"#fff":T.t3, cursor:input.trim()&&!loading?"pointer":"default",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
              transition:"all .15s" }}>↑</button>
          </div>

          {/* 대화 초기화 */}
          {messages.length>0 && (
            <button onClick={()=>setMessages([])} style={{
              marginTop:8, width:"100%", padding:"8px", border:"none",
              background:"none", color:T.t3, fontSize:12, cursor:"pointer", fontFamily:F }}>
              대화 초기화
            </button>
          )}
        </div>
      )}

      {/* ── 브리핑 탭 ── */}
      {tab==="briefing" && (
        <div>
          {briefLoading ? (
            <div style={{ padding:"50px 0", display:"flex", flexDirection:"column",
              alignItems:"center", gap:14 }}>
              <Spin size={28}/>
              <div style={{ fontSize:13, color:T.t3, fontFamily:F }}>AI가 오늘의 브리핑을 분석 중...</div>
            </div>
          ) : (
            <div>
              <div style={{ padding:"16px", borderRadius:14, background:T.brandDim,
                border:"1px solid "+T.brandBorder, marginBottom:12 }}>
                <div style={{ fontSize:14, color:T.t1, fontFamily:F, lineHeight:1.8,
                  whiteSpace:"pre-wrap" }}>{briefing||"내용을 불러오는 중이에요."}</div>
              </div>
              <button onClick={generateBriefing} style={{
                width:"100%", padding:"11px", borderRadius:12, border:"1px solid "+T.b1,
                background:T.card2, color:T.t2, cursor:"pointer", fontFamily:F, fontSize:13, fontWeight:600 }}>
                🔄 새로 생성
              </button>
            </div>
          )}
        </div>
      )}

      {/* ── 퀴즈 탭 ── */}
      {tab==="quiz" && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
              공지 내용 이해 체크 🎯
            </div>
            {quizCount > 0 && (
              <div style={{ fontSize:13, fontWeight:700, color:T.brand, fontFamily:F }}>
                {quizScore}/{quizCount}점
              </div>
            )}
          </div>
          {quizLoading ? (
            <div style={{ padding:"50px 0", display:"flex", flexDirection:"column",
              alignItems:"center", gap:14 }}>
              <Spin size={28}/>
              <div style={{ fontSize:13, color:T.t3, fontFamily:F }}>문제 생성 중...</div>
            </div>
          ) : quiz ? (
            <div>
              <div style={{ padding:"16px", borderRadius:14, background:T.card,
                border:"1px solid "+T.b1, marginBottom:14, boxShadow:T.sh1 }}>
                <div style={{ fontSize:15, fontWeight:700, color:T.t1, fontFamily:F,
                  marginBottom:14, lineHeight:1.6 }}>{quiz.question}</div>
                {(quiz.options||[]).map((opt,i)=>{
                  const isRight=i===quiz.answer, isWrong=selected!==null&&selected===i&&!isRight;
                  const bg=selected===null?T.card2:isRight?"rgba(0,112,74,0.10)":isWrong?"rgba(212,53,28,0.08)":T.card2;
                  const bdr=selected===null?T.b1:isRight?T.brand:isWrong?T.red:T.b1;
                  const col=selected===null?T.t1:isRight?T.brand:isWrong?T.red:T.t1;
                  return (
                    <button key={i} onClick={()=>{
                      if(selected!==null) return;
                      setSelected(i);
                      setQuizCount(p=>p+1);
                      if(i===quiz.answer) setQuizScore(p=>p+1);
                    }} style={{
                      width:"100%", padding:"11px 14px", borderRadius:12, marginBottom:8,
                      border:"1px solid "+bdr, background:bg, color:col,
                      fontSize:14, fontFamily:F, cursor:selected===null?"pointer":"default",
                      textAlign:"left", transition:"all .2s",
                      display:"flex", alignItems:"center", gap:10 }}>
                      <span style={{ width:22, height:22, borderRadius:"50%",
                        background:selected!==null&&isRight?T.brand:selected!==null&&isWrong?T.red:T.b0,
                        color:selected!==null&&(isRight||isWrong)?"#fff":T.t2,
                        display:"inline-flex", alignItems:"center", justifyContent:"center",
                        fontSize:11, fontWeight:700, flexShrink:0 }}>
                        {["A","B","C","D"][i]}
                      </span>
                      {opt}
                    </button>
                  );
                })}
                {selected!==null && (
                  <div style={{ padding:"11px 14px", borderRadius:12,
                    background:selected===quiz.answer?T.brandDim:T.rDim,
                    border:"1px solid "+(selected===quiz.answer?T.brandBorder:T.rBdr), marginTop:4 }}>
                    <div style={{ fontSize:13, fontWeight:700,
                      color:selected===quiz.answer?T.brand:T.red, fontFamily:F, marginBottom:4 }}>
                      {selected===quiz.answer?"✅ 정답!":"❌ 오답"} — 정답: {["A","B","C","D"][quiz.answer]}
                    </div>
                    <div style={{ fontSize:13, color:T.t2, fontFamily:F, lineHeight:1.6 }}>
                      {quiz.explanation}
                    </div>
                  </div>
                )}
              </div>
              <button onClick={generateQuiz} style={{
                width:"100%", padding:"11px", borderRadius:12, border:"1px solid "+T.b1,
                background:T.card2, color:T.t2, cursor:"pointer", fontFamily:F, fontSize:13, fontWeight:600 }}>
                🔄 다음 문제
              </button>
            </div>
          ) : null}
        </div>
      )}
    </Sheet>
  );
}

/* ════════════════ GLOBAL SEARCH ════════════════════ */
function GlobalSearchSheet({ onClose, notices, events, tasks, roleTasks, onViewNotice, setTab }) {
  const [q, setQ] = useState("");
  const debouncedQ = useDebounce(q, 300);
  const inputRef = useRef();

  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),100); },[]);

  const results = debouncedQ.trim().length < 1 ? [] : (() => {
    const kw = debouncedQ.toLowerCase();
    const res = [];

    (notices||[]).forEach(n=>{
      const body = n.content ? n.content.replace(/<[^>]*>/g,"") : (n.body||"");
      if ((n.title||"").toLowerCase().includes(kw) || body.toLowerCase().includes(kw)) {
        res.push({ type:"notice", icon:"📢", title:n.title, sub:n.category+" · "+n.date, item:n });
      }
    });
    (events||[]).forEach(e=>{
      if ((e.title||"").toLowerCase().includes(kw)||(e.memo||"").toLowerCase().includes(kw)) {
        res.push({ type:"event", icon:"📅", title:e.title, sub:e.date+" · "+e.category, item:e });
      }
    });
    (tasks||[]).filter(t=>!t.done).forEach(t=>{
      if ((t.text||"").toLowerCase().includes(kw)) {
        res.push({ type:"task", icon:"✅", title:t.text, sub:"개인 할일 · "+t.priority, item:t });
      }
    });
    (roleTasks||[]).filter(t=>!t.done).forEach(t=>{
      if ((t.text||"").toLowerCase().includes(kw)) {
        res.push({ type:"roletask", icon:"👥", title:t.text, sub:"팀 할일", item:t });
      }
    });
    return res;
  })();

  return (
    <Sheet title="🔍 전체 검색" onClose={onClose} noPadding>
      {/* 검색 입력창 - 상단 고정 */}
      <div style={{ padding:"14px 22px 12px", borderBottom:"1px solid "+T.border0,
        flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8,
          border:"1.5px solid "+T.brandBorder, borderRadius:14, padding:"0 14px",
          background:T.card, boxShadow:T.sh1 }}>
          <span style={{ fontSize:16 }}>🔍</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="공지, 일정, 할일 검색..."
            style={{ flex:1, border:"none", outline:"none", background:"transparent",
              padding:"12px 0", fontSize:14, fontFamily:F, color:T.t1 }}/>
          {q && <button onClick={()=>setQ("")} style={{
            background:"none", border:"none", color:T.t3, cursor:"pointer", fontSize:16 }}>✕</button>}
        </div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"14px 22px", paddingBottom:32 }}>

      {q.trim().length > 0 && results.length === 0 && (
        <EmptyState emoji="🔎" text={`"${q}" 검색 결과가 없어요`} sub="다른 키워드로 시도해보세요"/>
      )}

      {results.length > 0 && (
        <div style={{ ...glassBox({ overflow:"hidden" }) }}>
          {results.map((r,i)=>(
            <div key={r.type+i}>
              <button onClick={()=>{
                if (r.type==="notice") { onViewNotice(r.item); onClose(); }
                else if (r.type==="event") { setTab("calendar"); onClose(); }
                else { setTab("tasks"); onClose(); }
              }} style={{
                width:"100%", display:"flex", alignItems:"center", gap:12,
                padding:"12px 16px", border:"none", background:"none", cursor:"pointer",
                textAlign:"left" }}>
                <div style={{ width:36, height:36, borderRadius:10, background:T.card2,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:16, flexShrink:0 }}>{r.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:500, color:T.t1, fontFamily:F,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.title}</div>
                  <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginTop:2 }}>{r.sub}</div>
                </div>
                <span style={{ fontSize:11, fontWeight:600, color:T.t3,
                  background:T.card2, borderRadius:8, padding:"2px 8px", flexShrink:0, fontFamily:F }}>
                  {r.type==="notice"?"공지":r.type==="event"?"일정":"할일"}
                </span>
              </button>
              {i<results.length-1 && <div style={{ height:1, background:T.b0, margin:"0 16px" }}/>}
            </div>
          ))}
        </div>
      )}

      {q.trim().length === 0 && (
        <div>
          <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:8 }}>최근 공지</div>
          <div style={{ ...glassBox({ overflow:"hidden" }) }}>
            {(notices||[]).slice(0,5).map((n,i,arr)=>(
              <div key={n.id}>
                <button onClick={()=>{ onViewNotice(n); onClose(); }} style={{
                  width:"100%", display:"flex", alignItems:"center", gap:12,
                  padding:"12px 16px", border:"none", background:"none", cursor:"pointer",
                  textAlign:"left" }}>
                  <span style={{ fontSize:16 }}>📢</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:500, color:T.t1, fontFamily:F,
                      overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{n.title}</div>
                    <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>{n.date}</div>
                  </div>
                </button>
                {i<arr.length-1 && <div style={{ height:1, background:T.b0, margin:"0 16px" }}/>}
              </div>
            ))}
          </div>
        </div>
      )}
      </div>
    </Sheet>
  );
}


    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
