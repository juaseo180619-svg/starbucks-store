/* ─── Storage hooks ─── */
/* 공유 데이터 (팀 전체) */
function useShared(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get(key, true); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

/* 개인 데이터 (본인만) */
function usePersonal(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!key) { setData(seed); setLoading(false); return; }
    (async () => {
      try { const r = await window.storage.get(key, false); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    if (!key) return;
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), false); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

        {/* ── CALENDAR ── */}
        {tab==="calendar"&&(()=>{
          // 멀티데이 이벤트 레이아웃 계산
          // 각 날짜 셀: 7열 고정, 셀 너비 = 1/7
          const monthEvents = (events||[]).filter(e => {
            const start = e.date;
            const end   = e.endDate || e.date;
            const mStr  = cY+"-"+String(cM+1).padStart(2,"0");
            return start.slice(0,7)===mStr || end.slice(0,7)===mStr ||
                   (start < mStr+"-01" && end > mStr+"-31");
          });

          // 각 주(row)별 이벤트 바 계산
          const weeks = [];
          let day = 1;
          let weekStart = firstDow; // 첫 주 앞 빈칸
          while (day <= daysInMo) {
            const row = [];
            for (let col = 0; col < 7; col++) {
              if (weekStart > 0) { row.push(null); weekStart--; }
              else if (day <= daysInMo) { row.push(day); day++; }
              else row.push(null);
            }
            weeks.push(row);
          }

          // 이벤트 바: 각 주에 어떤 이벤트가 몇 번째 슬롯에?
          const getEventBars = (weekDays) => {
            const validDays = weekDays.filter(d => d !== null);
            if (!validDays.length) return [];
            const wStart = validDays[0];
            const wEnd   = validDays[validDays.length-1];
            const mStr   = cY+"-"+String(cM+1).padStart(2,"0")+"-";
            const bars = [];
            monthEvents.forEach(ev => {
              const evStart = parseInt((ev.date||"").slice(8,10));
              const evEnd   = parseInt((ev.endDate||ev.date||"").slice(8,10));
              const overlap = evStart <= wEnd && evEnd >= wStart;
              if (!overlap) return;
              const barStart = Math.max(evStart, wStart);
              const barEnd   = Math.min(evEnd,   wEnd);
              const colStart = weekDays.indexOf(barStart);
              const colEnd   = weekDays.indexOf(barEnd);
              const span     = (colEnd >= 0 ? colEnd : 6) - (colStart >= 0 ? colStart : 0) + 1;
              const startCol = colStart >= 0 ? colStart : 0;
              bars.push({ ev, startCol, span,
                startsHere: evStart >= wStart,
                endsHere:   evEnd   <= wEnd });
            });
            // 슬롯 배치 (겹침 방지)
            const slots = [];
            bars.forEach(bar => {
              let slot = 0;
              while (slots[slot] && slots[slot].some(b =>
                b.startCol < bar.startCol + bar.span &&
                b.startCol + b.span > bar.startCol)) slot++;
              if (!slots[slot]) slots[slot] = [];
              slots[slot].push(bar);
              bar.slot = slot;
            });
            return bars;
          };

          const maxSlots = 3;

          return (
            <div style={{ padding:"16px" }} className="fi">
              {/* 월 네비 */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                <button onClick={()=>setCalDate(new Date(cY,cM-1,1))} style={{
                  ...glassBox({ width:40,height:40,display:"flex",alignItems:"center",
                    justifyContent:"center",borderRadius:13,padding:0,background:T.glass2 }),
                  cursor:"pointer",color:T.l1,fontSize:20,border:"1px solid "+T.border1 }}>‹</button>
                <span style={{ fontSize:18,fontWeight:700,color:T.l1,fontFamily:F }}>
                  {calDate.toLocaleDateString("ko-KR",{year:"numeric",month:"long"})}
                </span>
                <button onClick={()=>setCalDate(new Date(cY,cM+1,1))} style={{
                  ...glassBox({ width:40,height:40,display:"flex",alignItems:"center",
                    justifyContent:"center",borderRadius:13,padding:0,background:T.glass2 }),
                  cursor:"pointer",color:T.l1,fontSize:20,border:"1px solid "+T.border1 }}>›</button>
              </div>

              {/* 요일 헤더 */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:4 }}>
                {WDAYS.map((d,i)=>(
                  <div key={d} style={{ textAlign:"center",fontSize:11,fontWeight:600,
                    fontFamily:F,padding:"2px 0",
                    color:i===0?T.red:i===6?T.blue:T.l3 }}>{d}</div>
                ))}
              </div>

              {/* 주 단위 렌더링 */}
              {weeks.map((weekDays, wi) => {
                const bars = getEventBars(weekDays);
                const slotCount = bars.length > 0 ? Math.min(bars.reduce((m,b)=>Math.max(m,b.slot+1),0), maxSlots) : 0;
                const cellHeight = 28 + slotCount * 20;

                return (
                  <div key={wi} style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:2, position:"relative" }}>
                    {/* 날짜 숫자 셀 - 고정 높이 */}
                    {weekDays.map((d, ci) => {
                      if (d === null) return <div key={"e"+ci} style={{ height:cellHeight }}/>;
                      const dStr = cY+"-"+String(cM+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
                      const isTod = dStr === todayStr();
                      const isSun = ci===0, isSat = ci===6;
                      return (
                        <div key={d} style={{
                          height: cellHeight,
                          background: isTod?"linear-gradient(145deg,"+T.green+",#28a864)":T.glass1,
                          backdropFilter:"blur(20px) saturate(180%)",
                          WebkitBackdropFilter:"blur(20px) saturate(180%)",
                          border:"1px solid "+(isTod?"rgba(61,220,132,0.5)":T.border0),
                          borderRadius:8,
                          display:"flex", alignItems:"flex-start", justifyContent:"center",
                          paddingTop:5,
                          boxShadow:isTod?"0 4px 20px rgba(61,220,132,0.35)":"none"
                        }}>
                          <span style={{ fontSize:12,fontWeight:isTod?800:500,lineHeight:1,fontFamily:F,
                            color:isTod?"#001808":isSun?T.red:isSat?T.blue:T.l1 }}>{d}</span>
                        </div>
                      );
                    })}

                    {/* 이벤트 바 오버레이 */}
                    {bars.filter(b=>b.slot < maxSlots).map((bar, bi) => {
                      const meta = CAT[bar.ev.category]||CAT["기타"];
                      const GAP = 2;
                      const topOffset = 24 + bar.slot * 20;
                      // 셀 너비: (100% - gaps) / 7
                      const cellW = "calc((100% - "+((7-1)*GAP)+"px) / 7)";
                      const leftPct = bar.startCol * (100/7);
                      return (
                        <div key={bar.ev.id+"_"+wi+"_"+bi} style={{
                          position:"absolute",
                          top: topOffset,
                          left:"calc("+leftPct+"% + "+(bar.startCol > 0 ? GAP : 0)+"px"+(bar.startsHere?" + 1px":"")+  ")",
                          width:"calc("+(bar.span/7*100)+"% - "+(bar.span>1?(bar.span-1)*GAP:0)+"px"+(bar.startsHere?" - 2px":"")+(bar.endsHere?" - 2px":"")+")",
                          height:16,
                          background:meta.color+"44",
                          borderLeft: bar.startsHere ? "3px solid "+meta.color : "none",
                          borderRight: "none",
                          borderRadius: bar.startsHere ? (bar.endsHere?"6px":"6px 0 0 6px") : (bar.endsHere?"0 6px 6px 0":"0"),
                          display:"flex", alignItems:"center",
                          paddingLeft: bar.startsHere ? 5 : 3,
                          overflow:"hidden",
                          zIndex:2,
                          pointerEvents:"none",
                        }}>
                          {bar.startsHere && (
                            <span style={{ fontSize:9,fontWeight:700,color:meta.color,
                              fontFamily:F,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>
                              {bar.ev.title}
                            </span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );

/* ══════════════════ 리치텍스트 공지 작성 ══════════════════ */
function RichNoticeSheet({ onClose, onSave, initial }) {
  const [title, setTitle]       = useState(initial ? initial.title : "");
  const [category, setCategory] = useState(initial ? initial.category : "이벤트");
  const [pinned, setPinned]     = useState(initial ? !!initial.pinned : false);
  const editorRef = useRef();
  const imgRef = useRef();

  // 수정 모드일 때 에디터 초기 내용 설정
  useEffect(() => {
    if (initial && editorRef.current) {
      editorRef.current.innerHTML = initial.content || "";
    }
  }, []);

  const execCmd = (cmd, val) => {
    document.execCommand(cmd, false, val || null);
    editorRef.current.focus();
  };

  const insertImage = async (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.margin = "6px 0";
      const sel = window.getSelection();
      if (sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.insertNode(img);
        range.collapse(false);
      } else {
        editorRef.current.appendChild(img);
      }
    };
    reader.readAsDataURL(file);
  };

  const handleSave = () => {
    if (!title.trim()) return;
    const content = editorRef.current.innerHTML;
    onSave({ title: title.trim(), category, content, pinned });
  };

  const tools = [
    { icon: "B", cmd: "bold",   style: { fontWeight:800 }, title: "굵게" },
    { icon: "I", cmd: "italic", style: { fontStyle:"italic" }, title: "기울임" },
    { icon: "U", cmd: "underline", style: { textDecoration:"underline" }, title: "밑줄" },
  ];

  const highlights = [
    { color: "#FFE066", label: "노랑" },
    { color: "#A8FFB0", label: "초록" },
    { color: "#FFB3B3", label: "빨강" },
    { color: "#B3D4FF", label: "파랑" },
    { color: "transparent", label: "없음" },
  ];

  return (
    <Sheet title={initial ? "공지 수정" : "공지 작성"} onClose={onClose} tall>
      <style>{`
        .rich-editor { outline: none; min-height: 180px; }
        .rich-editor img { max-width: 100%; border-radius: 10px; margin: 4px 0; }
        .rich-editor b, .rich-editor strong { font-weight: 800; }
      `}</style>

      {/* 제목 */}
      <input
        value={title}
        onChange={e => setTitle(e.target.value)}
        onKeyDown={e => { if(e.key==="Enter") e.preventDefault(); }}
        placeholder="공지 제목"
        style={{ ...fBase, marginBottom:10, fontSize:17, fontWeight:600 }}
      />

      {/* 카테고리 */}
      <div style={{ marginBottom:10 }}>
        <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>카테고리</div>
        <Seg value={category} onChange={setCategory} options={["이벤트","운영","인사","기타"]}/>
      </div>

      {/* 서식 툴바 */}
      <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap", alignItems:"center" }}>
        {tools.map(t => (
          <button key={t.cmd} onMouseDown={e => { e.preventDefault(); execCmd(t.cmd); }}
            title={t.title}
            style={{ ...t.style, padding:"5px 12px", borderRadius:8, border:"1px solid " + T.border1,
              background:T.glass2, color:T.l1, fontSize:13, cursor:"pointer", fontFamily:F }}>
            {t.icon}
          </button>
        ))}
        <div style={{ width:1, height:22, background:T.border1, margin:"0 2px" }}/>
        {/* 형광펜 */}
        {highlights.map(h => (
          <button key={h.color} onMouseDown={e => {
            e.preventDefault();
            if (h.color === "transparent") execCmd("removeFormat");
            else execCmd("hiliteColor", h.color);
          }}
            title={"형광펜 " + h.label}
            style={{ width:22, height:22, borderRadius:5, border:"1px solid " + T.border1,
              background: h.color === "transparent" ? T.glass2 : h.color,
              cursor:"pointer", fontSize:h.color === "transparent" ? 11 : 0 }}>
            {h.color === "transparent" ? "✕" : ""}
          </button>
        ))}
        <div style={{ width:1, height:22, background:T.border1, margin:"0 2px" }}/>
        {/* 이미지 삽입 */}
        <button onMouseDown={e => { e.preventDefault(); imgRef.current.click(); }}
          title="이미지 삽입"
          style={{ padding:"5px 10px", borderRadius:8, border:"1px solid " + T.border1,
            background:T.glass2, color:T.l2, fontSize:13, cursor:"pointer", fontFamily:F }}>
          🖼
        </button>
        <input ref={imgRef} type="file" accept="image/*" style={{ display:"none" }}
          onChange={e => e.target.files[0] && insertImage(e.target.files[0])} />
      </div>

      {/* 에디터 */}
      <div
        ref={editorRef}
        contentEditable
        suppressContentEditableWarning
        className="rich-editor"
        data-placeholder="공지 내용을 입력하세요..."
        style={{ ...fBase, minHeight:180, fontSize:15, lineHeight:1.8, padding:"12px 14px",
          whiteSpace:"pre-wrap", overflowY:"auto", marginBottom:10 }}
      />

      {/* 고정 */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16,
        padding:"12px 14px", background:T.glass1, border:"1px solid " + T.border0, borderRadius:12 }}>
        <input type="checkbox" id="richpin" checked={pinned} onChange={e => setPinned(e.target.checked)}
          style={{ width:18, height:18, accentColor:T.green, cursor:"pointer" }}/>
        <label htmlFor="richpin" style={{ fontSize:14, color:T.l1, cursor:"pointer", userSelect:"none", fontFamily:F }}>
          상단 고정
        </label>
      </div>

      <GreenBtn full onClick={handleSave} disabled={!title.trim()}>등록하기</GreenBtn>
    </Sheet>
  );
}

/* ══════════════════ AI 공지 챗 ══════════════════ */
function AIChatSheet({ onClose, notices }) {
  const [messages, setMessages] = useState([
    { role:"assistant", text:"안녕하세요! 공지 내용에 대해 질문하거나 검색해보세요 😊" }
  ]);
  const [input, setInput]   = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [messages]);

  const send = async () => {
    const q = input.trim();
    if (!q || loading) return;
    setInput("");
    setMessages(prev => [...prev, { role:"user", text:q }]);
    setLoading(true);

    try {
      const noticeText = notices.slice(0, 20).map(n =>
        "[" + n.date + "] " + n.title + ": " + (n.content || "").replace(/<[^>]+>/g, "").slice(0, 300)
      ).join("\n");

      const systemPrompt = "당신은 스타벅스 매장 운영 도우미 AI입니다.\n"
        + "아래는 최근 매장 공지 목록입니다. 이 내용을 바탕으로 질문에 친절하게 답해주세요.\n"
        + "공지에 없는 내용이면 솔직하게 모른다고 말해주세요.\n\n"
        + "=== 공지 목록 ===\n" + noticeText;

      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": window.ANTHROPIC_API_KEY || "",
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body: JSON.stringify({
          model:"claude-haiku-4-5-20251001",
          max_tokens:1000,
          system: systemPrompt,
          messages:[{ role:"user", content:q }]
        })
      });
      const data = await resp.json();
      const answer = data.content?.map(b => b.text||"").join("").trim() || "응답을 받지 못했어요.";
      setMessages(prev => [...prev, { role:"assistant", text:answer }]);
    } catch(e) {
      setMessages(prev => [...prev, { role:"assistant", text:"오류가 발생했어요. 다시 시도해주세요." }]);
    }
    setLoading(false);
  };

  return (
    <Sheet title="AI 공지 검색" onClose={onClose} tall>
      {/* 메시지 목록 */}
      <div style={{ flex:1, overflowY:"auto", marginBottom:12, display:"flex", flexDirection:"column", gap:10, minHeight:300, maxHeight:440 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display:"flex", justifyContent: m.role==="user" ? "flex-end" : "flex-start" }}>
            {m.role==="assistant" && (
              <div style={{ width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg," + T.green + ",#28a864)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0, marginRight:8, marginTop:2 }}>
                🤖
              </div>
            )}
            <div style={{
              maxWidth:"78%", padding:"10px 14px", borderRadius: m.role==="user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
              background: m.role==="user"
                ? "linear-gradient(135deg," + T.green + ",#28a864)"
                : T.glass2,
              color: m.role==="user" ? "#001808" : T.l1,
              fontSize:14, lineHeight:1.6, fontFamily:F,
              border: m.role==="user" ? "none" : "1px solid " + T.border1,
              whiteSpace:"pre-wrap"
            }}>
              {m.text}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg," + T.green + ",#28a864)",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>🤖</div>
            <div style={{ background:T.glass2, border:"1px solid " + T.border1, borderRadius:"18px 18px 18px 4px",
              padding:"10px 16px", display:"flex", gap:5, alignItems:"center" }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:T.green,
                  animation:"bounce .8s " + (i*0.15) + "s infinite alternate" }}/>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <style>{`@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-5px)}}`}</style>

      {/* 입력창 */}
      <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key==="Enter" && !e.shiftKey && send()}
          placeholder="공지 내용에 대해 질문하세요..."
          style={{ ...fBase, flex:1, borderRadius:20 }}
          disabled={loading}
        />
        <button onClick={send} disabled={!input.trim()||loading}
          style={{ width:44, height:44, borderRadius:"50%", border:"none",
            background: input.trim() && !loading ? "linear-gradient(135deg," + T.green + ",#28a864)" : T.glass2,
            color: input.trim() && !loading ? "#001808" : T.l3,
            fontSize:18, cursor: input.trim() && !loading ? "pointer" : "default",
            display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          ›
        </button>
      </div>
    </Sheet>
  );
}


/* ── Sub components ── */
function SecHead({ title, onMore }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
      <span style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F }}>{title}</span>
      {onMore&&<button onClick={onMore} style={{ background:"none", border:"none",
        color:T.green, fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:F }}>전체보기</button>}
    </div>
  );
}
function EmptyRow({ text }) {
  return <div style={{ padding:"22px 16px", textAlign:"center", color:T.l3, fontSize:14, fontFamily:F }}>{text}</div>;
}
function NRow({ n, onClick }) {
  const meta=CAT[n.category]||CAT["기타"];
  return (
    <div onClick={onClick} style={{ padding:"14px 16px", cursor:"pointer",
      display:"flex", alignItems:"flex-start", gap:12, transition:"background .15s" }}
      onMouseEnter={e=>e.currentTarget.style.background=T.glassHover}
      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <div style={{ width:3, alignSelf:"stretch", borderRadius:2,
        background:n._read?T.l4:meta.color, flexShrink:0, minHeight:40 }}/>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:4 }}>
          <span style={{ fontSize:15, fontWeight:n._read?400:600, color:n._read?T.l2:T.l1,
            fontFamily:F, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{n.title}</span>
          <span style={{ fontSize:12, color:T.l3, flexShrink:0, fontFamily:F }}>{n.date}</span>
        </div>
        <div style={{ fontSize:13, color:T.l3, fontFamily:F, lineHeight:1.5, overflow:"hidden",
          display:"-webkit-box", WebkitLineClamp:1, WebkitBoxOrient:"vertical", marginBottom:6 }}
          dangerouslySetInnerHTML={{ __html: (n.content||"").replace(/<[^>]+>/g,"").slice(0,80) }}
        />
        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
          <Pill label={n.category} color={meta.color} dim={meta.dim}/>
          {n.pinned&&<Pill label="고정" color={T.gold} dim={T.goldDim}/>}
          {n.author==="AI 분석"&&<Pill label="✨ AI" color={T.green} dim={T.greenDim}/>}
        </div>
      </div>
      <span style={{ color:T.l4, fontSize:16, flexShrink:0, paddingTop:2 }}>›</span>
    </div>
  );
}
function ERow({ e }) {
  const meta=CAT[e.category]||CAT["기타"];
  const d=new Date(e.date+"T00:00:00");
  const hasRange = e.endDate && e.endDate !== e.date;
  const d2 = hasRange ? new Date(e.endDate+"T00:00:00") : null;
  return (
    <div style={{ padding:"12px 16px", display:"flex", alignItems:"center", gap:14 }}>
      <div style={{ width:48, height:48, borderRadius:13, background:meta.dim, border:"1px solid "+(meta.border||meta.color+"33"),
        backdropFilter:"blur(10px)", flexShrink:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center" }}>
        <div style={{ fontSize:20, fontWeight:800, color:meta.color, lineHeight:1, fontFamily:F }}>{d.getDate()}</div>
        <div style={{ fontSize:10, color:meta.color, opacity:0.7, fontFamily:F }}>
          {d.toLocaleDateString("ko-KR",{month:"short"})}
        </div>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F, marginBottom:2 }}>{e.title}</div>
        <div style={{ fontSize:13, color:T.l3, fontFamily:F }}>
          {hasRange
            ? e.date+" ~ "+e.endDate+" · "+e.category
            : e.category+(e.memo?" · "+e.memo:"")}
        </div>
      </div>
    </div>
  );
}
function TRow({ t, done, onToggle, onDelete, showAuthor }) {
  const pMeta=PRIO[t.priority]||PRIO["보통"];
  return (
    <div style={{ padding:"13px 16px", display:"flex", alignItems:"center", gap:12 }}>
      <div onClick={onToggle} style={{
        width:24, height:24, borderRadius:"50%", flexShrink:0, cursor:"pointer",
        border:done?"none":`1.5px solid ${T.border2}`,
        background:done?`linear-gradient(135deg,${T.green},#28a864)`:"transparent",
        display:"flex", alignItems:"center", justifyContent:"center",
        boxShadow:done?`0 2px 12px rgba(61,220,132,0.35)`:"none", transition:"all .2s" }}>
        {done&&<svg width="11" height="11" viewBox="0 0 11 11">
          <path d="M2 5.5l2.5 2.5L9 3" stroke="#001808" strokeWidth={2} strokeLinecap="round" fill="none"/>
        </svg>}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:15, color:done?T.l3:T.l1, fontFamily:F,
          textDecoration:done?"line-through":"none",
          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", marginBottom:done?0:3 }}>{t.text}</div>
        {!done&&(
          <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
            <Pill label={t.priority} color={pMeta.color} dim={pMeta.dim}/>
            {t.dueDate&&<span style={{ fontSize:12, color:T.l3, fontFamily:F }}>{fmtShort(t.dueDate)}</span>}
            {showAuthor&&t.author&&<span style={{ fontSize:12, color:T.l3, fontFamily:F }}>· {t.author}</span>}
          </div>
        )}
      </div>
      <button onClick={onDelete} style={{ background:"none", border:"none",
        color:T.l4, fontSize:17, cursor:"pointer", padding:"0 2px", fontFamily:F }}>✕</button>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
