      set: async (key, value, shared) => {

        return { key, value, shared };

      delete: async (key, shared) => {

/* ─── Storage hooks ─── */
/* 공유 데이터 (팀 전체) */
function useShared(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get(key, true); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

/* 개인 데이터 (본인만) */
function usePersonal(key, seed) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!key) { setData(seed); setLoading(false); return; }
    (async () => {
      try { const r = await window.storage.get(key, false); setData(r ? JSON.parse(r.value) : seed); }
      catch { setData(seed); }
      finally { setLoading(false); }
    })();
  }, [key]);
  const save = useCallback(async (next) => {
    if (!key) return;
    const val = typeof next === "function" ? next(data) : next;
    setData(val);
    try { await window.storage.set(key, JSON.stringify(val), false); } catch {}
  }, [key, data]);
  return [data, save, loading];
}

function AIChatSheet({ onClose, notices }) {
  const [msgs, setMsgs]   = useState([
    { role:"ai", text:"안녕하세요! 공지 내용에 대해 무엇이든 물어보세요. 예: '이번 달 이벤트 알려줘', '음료 관련 공지 요약해줘'" }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [msgs]);

  const send = async () => {
    const q = input.trim();
    if (!q || loading) return;
    setInput("");
    setMsgs(prev => [...prev, { role:"user", text:q }]);
    setLoading(true);

    const noticeContext = (notices||[]).slice(0,30).map(n =>
      "[" + n.date + "] [" + n.category + "] " + n.title + "\n" + n.content
    ).join("\n\n---\n\n");

    const systemPrompt = "당신은 스타벅스 매장 파트너를 돕는 AI 어시스턴트입니다.\n"
      + "아래는 매장의 공지사항 목록입니다. 이 내용을 바탕으로 질문에 답하세요.\n"
      + "공지에 없는 내용은 '공지에서 찾을 수 없어요'라고 말하세요.\n"
      + "답변은 한국어로, 친근하고 간결하게 해주세요.\n\n"
      + "=== 공지 목록 ===\n" + noticeContext;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": window.ANTHROPIC_API_KEY || "",
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1024,
          system: systemPrompt,
          messages: [{ role:"user", content: q }]
        })
      });
      const data = await resp.json();
      const answer = data.content?.map(b => b.text||"").join("").trim() || "답변을 가져오지 못했어요.";
      setMsgs(prev => [...prev, { role:"ai", text:answer }]);
    } catch(e) {
      setMsgs(prev => [...prev, { role:"ai", text:"오류가 발생했어요. 다시 시도해주세요." }]);
    }
    setLoading(false);
  };

  return (
    <Sheet title="AI 공지 검색" onClose={onClose} tall>
      <div style={{ display:"flex", flexDirection:"column", height:"60vh" }}>
        {/* 메시지 목록 */}
        <div style={{ flex:1, overflowY:"auto", marginBottom:12, display:"flex", flexDirection:"column", gap:10 }}>
          {msgs.map((m, i) => (
            <div key={i} style={{ display:"flex", justifyContent: m.role==="user" ? "flex-end" : "flex-start" }}>
              {m.role==="ai" && (
                <div style={{ width:28, height:28, borderRadius:"50%", background:T.greenDim,

              )}
              <div style={{
                maxWidth:"78%", padding:"10px 14px", borderRadius: m.role==="user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
                background: m.role==="user" ? "linear-gradient(135deg," + T.green + ",#28a864)" : T.glass2,
                color: m.role==="user" ? "#001808" : T.l1,
                fontSize:14, fontFamily:F, lineHeight:1.6, whiteSpace:"pre-wrap",
                border: m.role==="user" ? "none" : "1px solid " + T.border1
              }}>{m.text}</div>
            </div>
          ))}
          {loading && (
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ width:28, height:28, borderRadius:"50%", background:T.greenDim,
                border:"1px solid " + T.green, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>✨</div>
              <div style={{ padding:"10px 14px", borderRadius:"18px 18px 18px 4px",
                background:T.glass2, border:"1px solid " + T.border1, display:"flex", gap:5, alignItems:"center" }}>
                {[0,1,2].map(i => (
                  <div key={i} style={{ width:6, height:6, borderRadius:"50%", background:T.l3,
                    animation:"pulse 1.2s ease-in-out " + (i*0.2) + "s infinite" }}/>
                ))}
              </div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>
        {/* 입력창 */}
        <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
          <textarea
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder="공지 내용에 대해 질문하세요..."
            rows={2}
            style={{ flex:1, padding:"12px 14px", borderRadius:14, background:T.glass2,
              border:"1px solid " + T.border1, color:T.l1, fontSize:14, fontFamily:F,
              resize:"none", outline:"none", lineHeight:1.5 }}
          />
          <button onClick={send} disabled={!input.trim() || loading}
            style={{ width:44, height:44, borderRadius:14, background: input.trim() ? T.green : T.glass2,
              border:"none", cursor: input.trim() ? "pointer" : "default",
              color: input.trim() ? "#001808" : T.l3, fontSize:18, display:"flex",
              alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all .2s" }}>↑</button>
        </div>
      </div>
    </Sheet>
  );
}


/* ════════════════════════ MAIN APP ════════════════════════ */
function App() {
  /* 프로필 */
  const [profile, setProfileRaw] = useState(null);
  const [profileLoading, setProfileLoading] = useState(true);
  const [showProfileSetup, setShowProfileSetup] = useState(false);

  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get("sbx_profile", false); setProfileRaw(r?JSON.parse(r.value):null); }
      catch { setProfileRaw(null); }
      finally { setProfileLoading(false); }
    })();
  }, []);

  const saveProfile = async (p) => {
    setProfileRaw(p);
    try { await window.storage.set("sbx_profile", JSON.stringify(p), false); } catch {}
    setShowProfileSetup(false);
  };

  /* 개인 할일 키 — 프로필 기반 */
  const taskKey     = profile ? `sbx_tasks_${profile.name}_${profile.role}` : null;
  /* 직급 공유 할일 키 — 같은 직급 전체 공유 */
  const roleTaskKey = "sbx_teamtasks";

  /* 공유 데이터 */
  const [notices,   saveNotices,   nL] = useShared("sbx6_notices", SEED_NOTICES);
  const [events,    saveEvents,    eL] = useShared("sbx6_events",  SEED_EVENTS);
  const [roleTasks, saveRoleTasks, rL] = useShared(roleTaskKey, []);
  /* 개인 할일 */
  const [tasks, saveTasks, tL] = usePersonal(taskKey, []);

  const [tab, setTab] = useState("home");
  const [taskMode,    setTaskMode]    = useState("personal"); // "personal" | "role"
  const [viewNotice,  setViewNotice]  = useState(null);
  const [addNotice,   setAddNotice]   = useState(false);
  const [addEvent,    setAddEvent]    = useState(false);
  const [addTask,     setAddTask]     = useState(false);
  const [aiChat,      setAiChat]      = useState(false);
  const [noticeCat,   setNoticeCat]   = useState("전체");

  const [calDate, setCalDate] = useState(new Date("2026-03-01"));
  const cY=calDate.getFullYear(), cM=calDate.getMonth();
  const firstDow=new Date(cY,cM,1).getDay();
  const daysInMo=new Date(cY,cM+1,0).getDate();

  const [nf, setNf] = useState({ title:"", category:"이벤트", content:"", pinned:false, author:"" });
  const [ef, setEf] = useState({ title:"", date:todayStr(), category:"이벤트", memo:"" });
  const [tf, setTf] = useState({ text:"", priority:"보통", dueDate:todayStr() });

  const loading = profileLoading || nL || eL || tL || rL;

  const pendingPersonal = (tasks||[]).filter(t=>!t.done).length;
  const pendingRole     = (roleTasks||[]).filter(t=>!t.done).length;
  const pending         = pendingPersonal + pendingRole;
  const upcoming = (events||[]).filter(e=>e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4);
  const pinnedN  = (notices||[]).filter(n=>n.pinned);
  const rc = ROLE_COLOR[profile?.role] || ROLE_COLOR["바리스타"];

  const readNotice = id => saveNotices(p=>p.map(n=>n.id===id?{...n,_read:true}:n));
  const togglePin  = id => {
    saveNotices(p=>p.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));
    setViewNotice(prev=>prev&&prev.id===id?{...prev,pinned:!prev.pinned}:prev);
  };
  const toggleTask     = id => saveTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteTask     = id => saveTasks(p=>p.filter(t=>t.id!==id));
  const toggleRoleTask = id => saveRoleTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteRoleTask = id => saveRoleTasks(p=>p.filter(t=>t.id!==id));

  const submitNotice = () => {
    if (!nf.title.trim()) return;
    saveNotices(p=>[{ id:"n"+Date.now(), ...nf, date:todayStr(), _read:false, author:profile?.name||nf.author },...p]);
    setNf({ title:"", category:"이벤트", content:"", pinned:false, author:"" });
    setAddNotice(false);
  };
  const submitEvent = () => {
    if (!ef.title.trim()) return;
    saveEvents(p=>[...p,{id:"e"+Date.now(),...ef}].sort((a,b)=>a.date.localeCompare(b.date)));
    setEf({ title:"", date:todayStr(), category:"이벤트", memo:"" });
    setAddEvent(false);
  };
  const submitTask = () => {
    if (!tf.text.trim()) return;
    const newTask = { id:"t"+Date.now(), ...tf, done:false, author:profile?.name||"나" };

              <span style={{ fontSize:18, fontWeight:700, color:T.l1, fontFamily:F }}>
                {calDate.toLocaleDateString("ko-KR",{year:"numeric",month:"long"})}

                ...glassBox({ width:40, height:40, display:"flex", alignItems:"center",
                  justifyContent:"center", borderRadius:13, padding:0, background:T.glass2 }),
                cursor:"pointer", color:T.l1, fontSize:20, border:`1px solid ${T.border1}` }}>›</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:8 }}>
              {WDAYS.map((d,i)=>(
                <div key={d} style={{ textAlign:"center", fontSize:12, fontWeight:600, fontFamily:F,
                  padding:"2px 0", color:i===0?T.red:i===6?T.blue:T.l3 }}>{d}</div>
              ))}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:20 }}>
              {Array(firstDow).fill(null).map((_,i)=><div key={"x"+i}/>)}
              {Array(daysInMo).fill(null).map((_,i)=>{
                const d=i+1;
                const ev=eventsOnDay(d);
                const dStr=`${cY}-${String(cM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                const isTod=dStr===todayStr();
                const dow=(firstDow+i)%7;
                return (
                  <div key={d} style={{
                    background:isTod?`linear-gradient(145deg,${T.green},#28a864)`:T.glass1,
                    backdropFilter:"blur(20px) saturate(180%)", WebkitBackdropFilter:"blur(20px) saturate(180%)",
                    border:`1px solid ${isTod?"rgba(61,220,132,0.5)":T.border0}`,
                    borderRadius:10, padding:"5px 4px",
                    minHeight: ev.length>0 ? (56 + ev.length*18) : 48,
                    boxShadow:isTod?`0 4px 20px rgba(61,220,132,0.35)`:"none" }}>
                    <div style={{ textAlign:"center", fontSize:13, fontWeight:isTod?800:500,
                      color:isTod?"#001808":dow===0?T.red:dow===6?T.blue:T.l1,
                      fontFamily:F, marginBottom:ev.length>0?3:0, lineHeight:1.3 }}>{d}</div>
                    {ev.map(e=>(
                      <div key={e.id} style={{
                        fontSize:9, borderRadius:4, padding:"1px 4px", marginBottom:2,
                        background:(CAT[e.category]||CAT["기타"]).color+"33",
                        borderLeft:"2px solid "+(CAT[e.category]||CAT["기타"]).color,
                        color:isTod?"#001808":T.l1, fontFamily:F,
                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                        lineHeight:1.4
                      }}>{e.title}</div>
                    ))}
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <span style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F }}>이달의 일정</span>
              <ActionBtn onClick={()=>setAddEvent(true)}>+ 추가</ActionBtn>
            </div>
            <div style={{ ...glassBox({ overflow:"hidden",
              boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
              {(events||[]).filter(e=>e.date.startsWith(`${cY}-${String(cM+1).padStart(2,"0")}`))
                .map((e,i,arr)=>(
                  <div key={e.id}><ERow e={e}/>{i<arr.length-1&&<Sep/>}</div>
                ))}
              {(events||[]).filter(e=>e.date.startsWith(`${cY}-${String(cM+1).padStart(2,"0")}`)).length===0
                &&<EmptyRow text="이달 일정 없음"/>}
            </div>
          </div>
        )}

        {/* ── TASKS ── */}
        {/* ── TASKS ── */}
        {tab==="tasks"&&(
          <div style={{ padding:"16px" }} className="fi">
            {/* 프로필 + 세그먼트 헤더 */}
            <div style={{ ...glassBox({ padding:"14px 16px", marginBottom:16,
              background:`linear-gradient(135deg,${rc.bg},${T.glass1})`,
              border:`1px solid ${rc.color}22` }) }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
                <div style={{ width:44, height:44, borderRadius:"50%", background:rc.bg,
                  border:`2px solid ${rc.color}44`, display:"flex", flexDirection:"column",
                  alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <div style={{ fontSize:18, fontWeight:800, color:rc.color, lineHeight:1 }}>{profile.name[0]}</div>
                  <div style={{ fontSize:9, color:rc.color, opacity:0.7, fontWeight:600 }}>{profile.role.slice(0,2)}</div>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:15, fontWeight:700, color:T.l1, fontFamily:F }}>{profile.name}</div>
                  <div style={{ fontSize:12, color:rc.color, fontFamily:F }}>{profile.role}</div>
                </div>
                <ActionBtn onClick={()=>setAddTask(true)}>+ 추가</ActionBtn>
              </div>
              {/* 세그먼트 */}
              <div style={{ display:"flex", gap:4 }}>
                {[
                  { id:"personal", label:"내 할일",             badge:pendingPersonal },
                  { id:"role",     label:"팀 공유", badge:pendingRole     },
                ].map(seg=>(
                  <button key={seg.id} onClick={()=>setTaskMode(seg.id)} style={{
                    flex:1, padding:"8px 4px", borderRadius:10, border:"none", cursor:"pointer",
                    fontFamily:F, fontSize:13, fontWeight:taskMode===seg.id?700:400,
                    background:taskMode===seg.id?T.glass3:"transparent",
                    color:taskMode===seg.id?T.l1:T.l3, transition:"all .15s",
                    boxShadow:taskMode===seg.id?`inset 0 0 0 1px ${T.border2}`:"none",
                  }}>
                    {seg.label}
                    {seg.badge>0&&<span style={{ marginLeft:5, background:T.redDim, color:T.red,
                      borderRadius:8, fontSize:10, fontWeight:700, padding:"1px 6px" }}>{seg.badge}</span>}
                  </button>
                ))}
              </div>
            </div>

            {/* 개인 할일 */}
            {taskMode==="personal"&&(<>
              {(tasks||[]).filter(t=>!t.done).length>0&&(
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:T.l3, letterSpacing:1.5,
                    textTransform:"uppercase", marginBottom:8, paddingLeft:2, fontFamily:F }}>
                    미완료 · {(tasks||[]).filter(t=>!t.done).length}
                  </div>
                  <div style={{ ...glassBox({ overflow:"hidden", marginBottom:16,
                    boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
                    {(tasks||[]).filter(t=>!t.done).map((t,i,arr)=>(
                      <div key={t.id}><TRow t={t} onToggle={()=>toggleTask(t.id)} onDelete={()=>deleteTask(t.id)}/>{i<arr.length-1&&<Sep/>}</div>
                    ))}
                  </div>
                </>
              )}
              {(tasks||[]).filter(t=>t.done).length>0&&(
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:T.l3, letterSpacing:1.5,
                    textTransform:"uppercase", marginBottom:8, paddingLeft:2, fontFamily:F }}>
                    완료 · {(tasks||[]).filter(t=>t.done).length}
                  </div>
                  <div style={{ ...glassBox({ overflow:"hidden",
                    boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
                    {(tasks||[]).filter(t=>t.done).map((t,i,arr)=>(
                      <div key={t.id}><TRow t={t} done onToggle={()=>toggleTask(t.id)} onDelete={()=>deleteTask(t.id)}/>{i<arr.length-1&&<Sep/>}</div>
                    ))}
                  </div>
                </>
              )}
              {(tasks||[]).length===0&&(
                <div style={{ ...glassBox({ overflow:"hidden" }) }}><EmptyRow text="할일을 추가해보세요"/></div>
              )}
            </>)}

            {/* 직급 공유 할일 */}
            {taskMode==="role"&&(<>
              <div style={{ ...glassBox({ padding:"10px 14px", marginBottom:14,
                background:"rgba(255,255,255,0.04)", border:`1px solid ${T.border0}` }),
                display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:16 }}>👥</span>
                <span style={{ fontSize:13, color:T.l3, fontFamily:F }}>
                  매장 전체와 공유되는 할일이에요
                </span>
              </div>
              {(roleTasks||[]).filter(t=>!t.done).length>0&&(
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:T.l3, letterSpacing:1.5,
                    textTransform:"uppercase", marginBottom:8, paddingLeft:2, fontFamily:F }}>
                    미완료 · {(roleTasks||[]).filter(t=>!t.done).length}
                  </div>
                  <div style={{ ...glassBox({ overflow:"hidden", marginBottom:16,
                    boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
                    {(roleTasks||[]).filter(t=>!t.done).map((t,i,arr)=>(
                      <div key={t.id}><TRow t={t} showAuthor onToggle={()=>toggleRoleTask(t.id)} onDelete={()=>deleteRoleTask(t.id)}/>{i<arr.length-1&&<Sep/>}</div>
                    ))}
                  </div>
                </>
              )}
              {(roleTasks||[]).filter(t=>t.done).length>0&&(
                <>
                  <div style={{ fontSize:11, fontWeight:600, color:T.l3, letterSpacing:1.5,
                    textTransform:"uppercase", marginBottom:8, paddingLeft:2, fontFamily:F }}>
                    완료 · {(roleTasks||[]).filter(t=>t.done).length}
                  </div>
                  <div style={{ ...glassBox({ overflow:"hidden",
                    boxShadow:"0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)" }) }}>
                    {(roleTasks||[]).filter(t=>t.done).map((t,i,arr)=>(
                      <div key={t.id}><TRow t={t} done showAuthor onToggle={()=>toggleRoleTask(t.id)} onDelete={()=>deleteRoleTask(t.id)}/>{i<arr.length-1&&<Sep/>}</div>
                    ))}
                  </div>
                </>
              )}
              {(roleTasks||[]).length===0&&(
                <div style={{ ...glassBox({ overflow:"hidden" }) }}><EmptyRow text={`팀 공유 할일을 추가해보세요`}/></div>
              )}
            </>)}
          </div>
        )}
      </div>

      {/* ══ MODALS ══ */}
      {viewNotice&&(
        <Sheet title="" onClose={()=>setViewNotice(null)}>
          <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
            <Pill label={viewNotice.category}
              color={(CAT[viewNotice.category]||CAT["기타"]).color}
              dim={(CAT[viewNotice.category]||CAT["기타"]).dim}/>
            {viewNotice.pinned&&<Pill label="📌 고정됨" color={T.gold} dim={T.goldDim}/>}
            {viewNotice.author==="AI 분석"&&<Pill label="✨ AI 분석" color={T.green} dim={T.greenDim}/>}
          </div>
          <div style={{ fontSize:21, fontWeight:700, color:T.l1, lineHeight:1.35, marginBottom:8, fontFamily:F }}>
            {viewNotice.title}
          </div>
          <div style={{ fontSize:13, color:T.l3, marginBottom:20, fontFamily:F }}>
            {viewNotice.date}{viewNotice.author&&` · ${viewNotice.author}`}
          </div>
          <div style={{ height:1, background:T.border0, marginBottom:20 }}/>
          <div style={{ fontSize:15, color:T.l2, lineHeight:1.9, whiteSpace:"pre-line", fontFamily:F, marginBottom:28 }}>
            {viewNotice.content}
          </div>
          <button onClick={()=>togglePin(viewNotice.id)} style={{
            width:"100%", padding:"14px", borderRadius:14, cursor:"pointer", fontFamily:F,
            fontSize:15, fontWeight:700, transition:"all .2s",
            border:`1px solid ${viewNotice.pinned?"rgba(255,214,10,0.35)":T.border1}`,
            background:viewNotice.pinned?"rgba(255,214,10,0.10)":T.glass2,
            color:viewNotice.pinned?T.gold:T.l2,
            backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          }}>
            <span style={{ fontSize:18 }}>{viewNotice.pinned?"📌":"📍"}</span>
            {viewNotice.pinned?"고정 해제":"상단 고정"}
          </button>
        </Sheet>
      )}

      {addNotice&&(
        <Sheet title="공지 작성" onClose={()=>setAddNotice(false)} tall>
          <Field label="제목" value={nf.title} onChange={v=>setNf({...nf,title:v})} placeholder="공지 제목"/>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>카테고리</div>
            <Seg value={nf.category} onChange={v=>setNf({...nf,category:v})} options={["이벤트","운영","인사","기타"]}/>
          </div>
          <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:6 }}>내용</div>
          <div style={{ display:"flex", gap:5, marginBottom:8, flexWrap:"wrap", alignItems:"center" }}>
            {[["bold","B",{fontWeight:700}],["italic","I",{fontStyle:"italic"}],["underline","U",{textDecoration:"underline"}]].map(([cmd,icon,st])=>(
              <button key={cmd} onMouseDown={e=>{e.preventDefault();document.execCommand(cmd);}}
                style={{ width:32,height:32,borderRadius:8,border:"1px solid "+T.border1,background:T.glass2,color:T.l1,cursor:"pointer",fontFamily:F,fontSize:13,...st }}>{icon}</button>
            ))}
            <div style={{ width:1,height:24,background:T.border1,margin:"0 2px" }}/>
            {[["#FFE066","노"],["#80FF9E","초"],["#80CFFF","파"],["#FF9E9E","빨"]].map(([col,lbl])=>(
              <button key={col} onMouseDown={e=>{e.preventDefault();document.execCommand("hiliteColor",false,col);}}
                style={{ width:32,height:32,borderRadius:8,border:"2px solid rgba(255,255,255,0.15)",background:col,cursor:"pointer",fontSize:10,color:"#333",fontWeight:700 }}>{lbl}</button>
            ))}
            <div style={{ width:1,height:24,background:T.border1,margin:"0 2px" }}/>
            <label style={{ width:32,height:32,borderRadius:8,border:"1px solid "+T.border1,background:T.glass2,color:T.l1,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16 }}>
              🖼<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                const f=e.target.files[0];if(!f)return;
                const r=new FileReader();
                r.onload=ev=>{document.execCommand("insertImage",false,ev.target.result);};
                r.readAsDataURL(f);e.target.value="";
              }}/>
            </label>
          </div>
          <div id="notice-editor" contentEditable suppressContentEditableWarning
            onInput={e=>setNf(prev=>({...prev,content:e.currentTarget.innerHTML}))}
            style={{ minHeight:200,padding:"12px 14px",borderRadius:14,background:T.glass2,
              border:"1px solid "+T.border1,color:T.l1,fontSize:14,fontFamily:F,lineHeight:1.7,
              outline:"none",marginBottom:12,overflowY:"auto" }}
          />
          <style dangerouslySetInnerHTML={{__html:`
            #notice-editor:empty:after{content:'공지 내용을 입력하세요...';color:`+T.l4+`;pointer-events:none;}
            #notice-editor img{max-width:100%;border-radius:8px;margin:4px 0;display:block;}
          `}}/>
          <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:16,padding:"12px 14px",background:T.glass1,border:"1px solid "+T.border0,borderRadius:12 }}>
            <input type="checkbox" id="pin4" checked={nf.pinned} onChange={e=>setNf({...nf,pinned:e.target.checked})} style={{ width:18,height:18,accentColor:T.green,cursor:"pointer" }}/>
            <label htmlFor="pin4" style={{ fontSize:14,color:T.l1,cursor:"pointer",userSelect:"none",fontFamily:F }}>상단 고정</label>
          </div>
          <GreenBtn full onClick={()=>{
            if(!nf.title.trim())return;
            saveNotices(p=>[{id:"n"+Date.now(),...nf,date:todayStr(),_read:false,author:profile?.name||nf.author},...p]);
            setNf({title:"",category:"이벤트",content:"",pinned:false,author:""});
            const ed=document.getElementById("notice-editor");if(ed)ed.innerHTML="";
            setAddNotice(false);
          }} disabled={!nf.title.trim()}>저장하기</GreenBtn>
        </Sheet>
      )}

      {addEvent&&(
        <Sheet title="일정 추가" onClose={()=>setAddEvent(false)}>
          <Field label="일정 이름" value={ef.title} onChange={v=>setEf({...ef,title:v})} placeholder="일정 이름"/>
          <Field label="날짜" type="date" value={ef.date} onChange={v=>setEf({...ef,date:v})}/>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>카테고리</div>
            <Seg value={ef.category} onChange={v=>setEf({...ef,category:v})} options={["이벤트","운영","인사","기타"]}/>
          </div>
          <Field label="메모 (선택)" value={ef.memo} onChange={v=>setEf({...ef,memo:v})} placeholder="간단한 메모"/>
          <GreenBtn full onClick={submitEvent}>추가하기</GreenBtn>
        </Sheet>
      )}

      {addTask&&(
        <Sheet title="할일 추가" onClose={()=>setAddTask(false)}>
          {/* 개인 / 직급 공유 선택 */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>구분</div>
            <div style={{ display:"flex", gap:8 }}>
              {[
                { id:"personal", label:"내 할일", desc:"나만 볼 수 있어요" },
                { id:"role",     label:"팀 공유", desc:"매장 팀원 전체와 공유" },
              ].map(opt=>(
                <button key={opt.id} onClick={()=>setTaskMode(opt.id)} style={{
                  flex:1, padding:"10px 8px", borderRadius:12, cursor:"pointer", fontFamily:F,
                  border:`1px solid ${taskMode===opt.id?rc.color+"55":T.border0}`,
                  background:taskMode===opt.id?rc.bg:T.glass0,
                  transition:"all .15s",
                }}>
                  <div style={{ fontSize:13, fontWeight:700, color:taskMode===opt.id?rc.color:T.l2 }}>{opt.label}</div>
                  <div style={{ fontSize:11, color:T.l4, marginTop:2 }}>{opt.desc}</div>
                </button>
              ))}
            </div>
          </div>
          <Field label="할일 내용" value={tf.text} onChange={v=>setTf({...tf,text:v})} placeholder="할일 내용"/>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:12, color:T.l3, fontFamily:F, marginBottom:5 }}>우선순위</div>
            <Seg value={tf.priority} onChange={v=>setTf({...tf,priority:v})} options={["높음","보통","낮음"]}/>
          </div>
          <Field label="마감일" type="date" value={tf.dueDate} onChange={v=>setTf({...tf,dueDate:v})}/>
          <GreenBtn full onClick={submitTask}>추가하기</GreenBtn>
        </Sheet>
      )}

      {aiChat&&<AIChatSheet onClose={()=>setAiChat(false)} notices={notices}/>}
    </div>
  );
}

/* ── Sub components ── */
function SecHead({ title, onMore }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
      <span style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F }}>{title}</span>
      {onMore&&<button onClick={onMore} style={{ background:"none", border:"none",
        color:T.green, fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:F }}>전체보기</button>}
    </div>
  );
}
function EmptyRow({ text }) {
  return <div style={{ padding:"22px 16px", textAlign:"center", color:T.l3, fontSize:14, fontFamily:F }}>{text}</div>;
}
function NRow({ n, onClick }) {
  const meta=CAT[n.category]||CAT["기타"];
  return (
    <div onClick={onClick} style={{ padding:"14px 16px", cursor:"pointer",
      display:"flex", alignItems:"flex-start", gap:12, transition:"background .15s" }}
      onMouseEnter={e=>e.currentTarget.style.background=T.glassHover}
      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <div style={{ width:3, alignSelf:"stretch", borderRadius:2,
        background:n._read?T.l4:meta.color, flexShrink:0, minHeight:40 }}/>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:4 }}>
          <span style={{ fontSize:15, fontWeight:n._read?400:600, color:n._read?T.l2:T.l1,
            fontFamily:F, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{n.title}</span>
          <span style={{ fontSize:12, color:T.l3, flexShrink:0, fontFamily:F }}>{n.date}</span>
        </div>
        <div style={{ fontSize:13, color:T.l3, fontFamily:F, lineHeight:1.5, overflow:"hidden",
          display:"-webkit-box", WebkitLineClamp:1, WebkitBoxOrient:"vertical", marginBottom:6 }}>{n.content}</div>
        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
          <Pill label={n.category} color={meta.color} dim={meta.dim}/>
          {n.pinned&&<Pill label="고정" color={T.gold} dim={T.goldDim}/>}
          {n.author==="AI 분석"&&<Pill label="✨ AI" color={T.green} dim={T.greenDim}/>}
        </div>
      </div>
      <span style={{ color:T.l4, fontSize:16, flexShrink:0, paddingTop:2 }}>›</span>
    </div>
  );
}
function ERow({ e }) {
  const meta=CAT[e.category]||CAT["기타"];
  const d=new Date(e.date);
  return (
    <div style={{ padding:"12px 16px", display:"flex", alignItems:"center", gap:14 }}>
      <div style={{ width:48, height:48, borderRadius:13, background:meta.dim, border:`1px solid ${meta.border}`,
        backdropFilter:"blur(10px)", flexShrink:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center" }}>
        <div style={{ fontSize:20, fontWeight:800, color:meta.color, lineHeight:1, fontFamily:F }}>{d.getDate()}</div>
        <div style={{ fontSize:10, color:meta.color, opacity:0.7, fontFamily:F }}>
          {d.toLocaleDateString("ko-KR",{month:"short"})}
        </div>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:15, fontWeight:600, color:T.l1, fontFamily:F, marginBottom:2 }}>{e.title}</div>
        <div style={{ fontSize:13, color:T.l3, fontFamily:F }}>{e.category}{e.memo?` · ${e.memo}`:""}</div>
      </div>
    </div>
  );
}
function TRow({ t, done, onToggle, onDelete, showAuthor }) {
