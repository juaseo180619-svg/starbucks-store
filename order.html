<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── Design Tokens ─────────────────────────────── */
const F = "'Noto Sans KR', -apple-system, sans-serif";
const T = {

/* ─── Storage (로컬 캐시) ───────────────────────── */
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem("sborder_"+k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem("sborder_"+k, JSON.stringify(v)); } catch {} },
};

/* ─── Firestore 동기화 헬퍼 ─────────────────────── */
const DB = {
  // 매장별 경로
  path: (storeId) => window.db.collection("orderStores").doc(storeId),

  // 설정 문서 (manualItems, buffers, skuAliases)
  saveConfig: async (storeId, data) => {
    try {
      await DB.path(storeId).collection("data").doc("config").set(data, { merge: true });
      return true;
    } catch(e) { console.warn("Firestore saveConfig error:", e); return false; }
  },
  loadConfig: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("data").doc("config").get();
      return snap.exists ? snap.data() : null;
    } catch(e) { console.warn("Firestore loadConfig error:", e); return null; }
  },

  // 수동 기록 (manualRecords)
  saveManualRecords: async (storeId, records) => {
    try {
      await DB.path(storeId).collection("data").doc("manualRecords").set({ records }, { merge: false });
      return true;
    } catch(e) { console.warn("Firestore saveManualRecords error:", e); return false; }
  },
  loadManualRecords: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("data").doc("manualRecords").get();
      return snap.exists ? (snap.data().records || []) : null;
    } catch(e) { console.warn("Firestore loadManualRecords error:", e); return null; }
  },

  // 업로드 이력 (history) - 각 엔트리를 별도 문서로 저장
  saveHistoryEntry: async (storeId, entry) => {
    try {
      const { id, filename, date, rows, uploadedAt } = entry;
      await DB.path(storeId).collection("history").doc(String(id)).set(
        { id, filename, date, rows, uploadedAt: uploadedAt || Date.now() }
      );
      return true;
    } catch(e) { console.warn("Firestore saveHistoryEntry error:", e); return false; }
  },
  deleteHistoryEntry: async (storeId, id) => {
    try {
      await DB.path(storeId).collection("history").doc(String(id)).delete();
      return true;
    } catch(e) { console.warn("Firestore deleteHistoryEntry error:", e); return false; }
  },
  loadHistory: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("history").orderBy("date", "asc").get();
      return snap.docs.map(d => d.data());
    } catch(e) { console.warn("Firestore loadHistory error:", e); return null; }
  },
};

/* ─── Utils ─────────────────────────────────────── */
const todayStr = () => new Date().toISOString().slice(0,10);
const DOW_KR = ["일","월","화","수","목","금","토"];
const fmtDate = (s) => { if (!s) return ""; const d = new Date(s+"T00:00:00"); return d.toLocaleDateString("ko-KR",{month:"short",day:"numeric"}); };
const getDow = (s) => new Date(s+"T00:00:00").getDay();

/* ─── Filename Date Extraction ───────────────────── */
function isValidDateStr(s) {
  const d = new Date(s+"T00:00:00");
  return !isNaN(d.getTime()) && s.length === 10;
}
function extractDateFromFilename(filename) {
  const name = filename.replace(/\.[^.]+$/, "");
  // YYYYMMDD (8자리)
  const m2 = name.match(/(\d{4})(\d{2})(\d{2})/);
  if (m2) { const d = m2[1]+"-"+m2[2]+"-"+m2[3]; if (isValidDateStr(d)) return d; }
  // YYMMDD (6자리)
  const m1 = name.match(/(?<!\d)(\d{2})(\d{2})(\d{2})(?!\d)/);
  if (m1) {
    const yy = parseInt(m1[1]);
    const year = (yy >= 50 ? 1900+yy : 2000+yy);
    const d = year+"-"+m1[2]+"-"+m1[3];
    if (isValidDateStr(d)) return d;
  }
  // YYYY-MM-DD
  const m3 = name.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m3) { const d = m3[1]+"-"+m3[2]+"-"+m3[3]; if (isValidDateStr(d)) return d; }
  return todayStr();
}

/* ─── Excel Parsing ──────────────────────────────── */
function parseInventoryExcel(arrayBuffer, dateOverride) {
  const wb = XLSX.read(arrayBuffer, { type:"array", cellDates:true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

  // 헤더 2행, 데이터 3행부터
  const items = {};
  const dateStr = dateOverride || todayStr();

  for (let i = 2; i < raw.length; i++) {
    const row = raw[i];
    if (!row[2]) continue; // SKU명 없으면 skip
    const sku   = String(row[1] || "").trim();
    const name  = String(row[2] || "").trim();
    const cat   = String(row[3] || "").trim();
    const unit  = String(row[4] || "EA").trim();
    const actual = parseFloat(row[7]) || 0;
    const actualSum = parseFloat(row[8]) || 0;
    const sold   = parseFloat(row[20]) || 0;
    const tmrIn  = parseFloat(row[21]) || 0;
    const d2In   = parseFloat(row[22]) || 0;
    const dayIn  = parseFloat(row[14]) || 0;

    // 유통기한
    let expDate = null;
    let dday = null;
    if (row[11] && row[11] instanceof Date) {
      expDate = row[11].toISOString().slice(0,10);
    } else if (row[11] && typeof row[11] === "string") {
      expDate = row[11].slice(0,10);
    }
    const ddayRaw = String(row[10] || "").trim();
    if (ddayRaw) {
      const m = ddayRaw.match(/-?(\d+)/);
      dday = m ? parseInt(ddayRaw.replace("D-","").replace("D+","")) : null;
      if (ddayRaw.startsWith("D-") || ddayRaw === "D-day") {
        dday = ddayRaw === "D-day" ? 0 : -parseInt(m[1]);
        // D-3 means expires in 3 days
        dday = parseInt(m ? m[0] : "0") * -1;
        const parts = ddayRaw.match(/D-(\d+)/);
        dday = parts ? parseInt(parts[1]) : (ddayRaw === "D-day" ? 0 : null);
      }
    }

    if (!items[sku]) {
      items[sku] = {
        sku, name, cat, unit,
        batches: [],
        actualSum: 0,
        sold: 0,
        tmrIn: 0,
        d2In: 0,
        dayIn: 0,
      };
    }
    items[sku].batches.push({ actual, expDate, dday: dday });
    // actualSum은 마지막 행 기준 (같은 값 반복됨)
    items[sku].actualSum = actualSum || items[sku].actualSum || actual;
    items[sku].sold = sold || items[sku].sold;
    items[sku].tmrIn = tmrIn || items[sku].tmrIn;
    items[sku].d2In = d2In || items[sku].d2In;
    items[sku].dayIn = dayIn || items[sku].dayIn;
  }

  return { date: dateStr, dow: getDow(dateStr), items };
}

/* ─── App Entry ──────────────────────────────────── */
function App() {

  const isPC = window.innerWidth >= 768;

  // ── Firebase 동기화 상태 ──

  const [syncStatus, setSyncStatus] = useState("idle"); // idle|loading|ok|error
  const [dataLoaded, setDataLoaded] = useState(false);

  // 핵심 데이터
  const [uploadHistory, setUploadHistory] = useState(() => LS.get("history", []));
  const [manualItems,   setManualItems]   = useState(() => LS.get("manualItems", ["우유","저지방우유","두유","오트유","바닐라크림베이스","딸기베이스","유자베이스"]));
  const [manualRecords, setManualRecords] = useState(() => LS.get("manualRecords", []));
  const [buffers,       setBuffers]       = useState(() => LS.get("buffers", {}));
  const [skuAliases,    setSkuAliases]    = useState(() => LS.get("skuAliases", {}));

  // ── 초기 Firebase 데이터 로드 ──
  useEffect(() => {
    if (!storeId || !window.db) { setDataLoaded(true); return; }
    setSyncStatus("loading");
    (async () => {
      try {
        const [cfg, recs, hist] = await Promise.all([
          DB.loadConfig(storeId),
          DB.loadManualRecords(storeId),
          DB.loadHistory(storeId),
        ]);
        if (cfg) {
          if (cfg.manualItems)  { setManualItems(cfg.manualItems);  LS.set("manualItems", cfg.manualItems); }
          if (cfg.buffers)      { setBuffers(cfg.buffers);          LS.set("buffers", cfg.buffers); }
          if (cfg.skuAliases)   { setSkuAliases(cfg.skuAliases);   LS.set("skuAliases", cfg.skuAliases); }
        }
        if (recs !== null) { setManualRecords(recs); LS.set("manualRecords", recs); }
        if (hist !== null && hist.length > 0) { setUploadHistory(hist); LS.set("history", hist); }
        setSyncStatus("ok");
      } catch(e) {
        console.warn("Firebase 로드 실패, 로컬 캐시 사용:", e);
        setSyncStatus("error");
      } finally {
        setDataLoaded(true);
      }
    })();

    if (!storeId || !window.db) return;
    setSyncStatus("loading");
    const ok = await DB.saveConfig(storeId, { manualItems: items, buffers: bufs, skuAliases: aliases });

  const saveHistory = async (v, newEntry) => {
    setUploadHistory(v); LS.set("history", v);
    if (storeId && window.db && newEntry) {
      setSyncStatus("loading");
      const ok = await DB.saveHistoryEntry(storeId, newEntry);
      setSyncStatus(ok ? "ok" : "error");
    }
  };
  const deleteHistoryEntry = async (id) => {
    if (storeId && window.db) {
      setSyncStatus("loading");
      await DB.deleteHistoryEntry(storeId, id);
      setSyncStatus("ok");
    }
  };
  const saveManualItems = async (v) => {
    setManualItems(v); LS.set("manualItems", v);
    await syncConfig(v, buffers, skuAliases);
  };
  const saveManualRecords = async (v) => {
    setManualRecords(v); LS.set("manualRecords", v);
    if (!storeId || !window.db) return;
    setSyncStatus("loading");
    const ok = await DB.saveManualRecords(storeId, v);
    setSyncStatus(ok ? "ok" : "error");
  };
  const saveBuffers = async (v) => {
    setBuffers(v); LS.set("buffers", v);
    await syncConfig(manualItems, v, skuAliases);
  };
  const saveSkuAliases = async (v) => {
    setSkuAliases(v); LS.set("skuAliases", v);
    await syncConfig(manualItems, buffers, v);
  };

  // 매장번호 등록
  const handleSetStore = () => {
    const sid = storeInput.trim();
    if (!sid) return;
    LS.set("storeId", sid);
    setStoreId(sid);
    setDataLoaded(false);
  };

  // UploadTab에서 삭제 접근 가능하게 window에 노출
  useEffect(() => {
    window._deleteHistoryEntry = (id) => deleteHistoryEntry(id);

      {/* ── 모바일 상단 헤더 ── */}

          display:"flex", alignItems:"center", padding:"0 16px", height:56 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:32, height:32, borderRadius:10,

            </div>
          </div>
          <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8 }}>
            {storeId && (
              <div style={{
                fontSize:10, fontWeight:700, letterSpacing:0.5,

                {syncStatus==="loading" && <span style={{ display:"inline-block", width:10, height:10, border:"1.5px solid currentColor", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite" }}/>}

/* ─── 대시보드 ───────────────────────────────────── */
function DashboardTab({ latestUpload, uploadHistory, manualRecords, manualItems, buffers, setTab, skuAliases }) {
  const today = todayStr();
  const dow = getDow(today);

  // 유통기한 임박 항목 (D-3 이하)
  const expiring = useMemo(() => {
    if (!latestUpload) return [];
    return Object.values(latestUpload.items||{})
      .flatMap(item => item.batches.map(b => ({ ...item, ...b })))
      .filter(b => b.dday !== null && b.dday !== undefined && b.dday <= 3 && b.actual > 0)
      .sort((a,b) => (a.dday||99) - (b.dday||99));
  }, [latestUpload]);

  // 재고 부족 (추천 발주량 > 0인 항목)
  const needOrder = useMemo(() => {
    if (!latestUpload) return 0;
    let cnt = 0;
    Object.entries(latestUpload.items||{}).forEach(([sku, item]) => {
      const hist = uploadHistory.filter(h => h.date < latestUpload.date && h.items?.[sku]);
      if (hist.length < 2) return;
      const avgSold = Math.round(hist.reduce((s,h)=>s+(h.items[sku]?.sold||0),0)/hist.length * 10) / 10;
      const buf = parseFloat(buffers[sku]||buffers[item.name]||2);
      const rec = Math.max(0, Math.ceil(avgSold*2 + buf - item.actualSum - item.tmrIn));
      if (rec > 0) cnt++;
    });
    return cnt;
  }, [latestUpload, uploadHistory, buffers]);

  // 총 SKU 수
  const totalSku = latestUpload ? Object.keys(latestUpload.items||{}).length : 0;
  // 재고 0인 SKU
  const zeroStock = latestUpload ? Object.values(latestUpload.items||{}).filter(i=>i.actualSum===0).length : 0;

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
      {/* 히어로 카드 */}
      <div style={{ background:"linear-gradient(135deg,#00704A 0%,#1E3932 100%)",
        borderRadius:22, padding:"22px 20px", marginBottom:18, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", right:-30, top:-30, width:120, height:120,
          borderRadius:"50%", background:"rgba(255,255,255,0.05)" }}/>
        <div style={{ position:"relative", zIndex:1 }}>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.6)", fontFamily:F, marginBottom:4 }}>
            {new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}
          </div>
          <div style={{ fontSize:18, fontWeight:800, color:"#fff", fontFamily:F, marginBottom:16 }}>
            발주 관리 대시보드 ☕
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            {[
              { v:totalSku, l:"총 SKU", tab:"upload" },
              { v:expiring.length, l:"유통임박", tab:"recommend" },
              { v:needOrder, l:"발주필요", tab:"recommend" },
            ].map(s => (
              <button key={s.l} onClick={() => setTab(s.tab)} style={{
                background:"rgba(255,255,255,0.14)", borderRadius:12,
                padding:"10px 8px", border:"none", cursor:"pointer", textAlign:"center" }}>
                <div style={{ fontSize:22, fontWeight:900, color:"#fff", fontFamily:F, lineHeight:1 }}>{s.v}</div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.70)", fontFamily:F, marginTop:3 }}>{s.l}</div>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* 업로드 없음 안내 */}
      {!latestUpload && (
        <Card style={{ marginBottom:16 }}>
          <EmptyState emoji="📁" text="실사 데이터가 없어요"
            sub="실사 탭에서 엑셀 파일을 업로드해보세요"/>
          <div style={{ padding:"0 16px 16px" }}>
            <GreenBtn full onClick={() => setTab("upload")}>📁 실사 업로드하기</GreenBtn>
          </div>
        </Card>
      )}

      {/* 유통기한 임박 */}
      {expiring.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <SH title="⚠ 유통기한 임박" sub={expiring.length+"개"}/>
          <Card>
            {expiring.slice(0,6).map((item, i, arr) => {
              const dday = item.dday;
              const color = dday === 0 ? T.red : dday <= 1 ? T.red : dday <= 3 ? T.amber : T.t3;
              const dim   = dday === 0 ? T.rDim : dday <= 1 ? T.rDim : T.aDim;
              const dispName = skuAliases[item.sku] || item.name;
              return (
                <div key={item.sku+"_"+i} style={{
                  padding:"12px 16px", display:"flex", alignItems:"center", gap:12,
                  borderBottom:i<arr.length-1?"1px solid "+T.b0:"none" }}>
                  <div style={{ width:40, height:40, borderRadius:10, background:dim,
                    display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", flexShrink:0 }}>
                    <div style={{ fontSize:13, fontWeight:900, color, lineHeight:1 }}>
                      {dday === 0 ? "D-day" : "D-"+dday}
                    </div>
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F,
                      overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {dispName}

                    <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
                      재고 {item.actual}개 · {item.expDate ? fmtDate(item.expDate) + " 만료" : ""}

          <SH title="최근 실사 현황" sub={fmtDate(latestUpload.date)+" ("+DOW_KR[latestUpload.dow]+"요일)"}
            action={
              <button onClick={() => setTab("upload")} style={{
                padding:"5px 12px", borderRadius:8, border:"none",
                background:T.brand, color:"#fff", fontSize:12, fontWeight:600,
                cursor:"pointer", fontFamily:F }}>+ 업로드</button>
            }/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {[
              { label:"총 품목", value:totalSku+"개", color:T.brand, dim:T.brandDim },
              { label:"재고 없음", value:zeroStock+"개", color:T.red, dim:T.rDim },
              { label:"내일 입고", value:Object.values(latestUpload.items||{}).filter(i=>i.tmrIn>0).length+"개", color:T.blue, dim:T.bDim },
              { label:"당일 판매", value:Math.round(Object.values(latestUpload.items||{}).reduce((s,i)=>s+i.sold,0))+"개", color:T.amber, dim:T.aDim },
            ].map(stat => (
              <div key={stat.label} style={{ background:stat.dim, borderRadius:14,
                padding:"14px 16px", border:"1px solid "+stat.color+"22" }}>
                <div style={{ fontSize:11, fontWeight:700, color:stat.color, fontFamily:F, marginBottom:4 }}>
                  {stat.label}
                </div>
                <div style={{ fontSize:24, fontWeight:900, color:stat.color, fontFamily:F, letterSpacing:-1 }}>
                  {stat.value}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 바로가기 버튼 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {[
          { icon:"📁", label:"실사 업로드", tab:"upload", color:T.brand },
          { icon:"📦", label:"발주 추천",   tab:"recommend", color:T.amber },
          { icon:"📝", label:"수동 입력",   tab:"manual",  color:T.blue },

        ].map(btn => (
          <button key={btn.tab} onClick={() => setTab(btn.tab)} style={{
            background:T.card, borderRadius:14, border:"1px solid "+T.b0,
            padding:"16px 14px", cursor:"pointer", display:"flex",
            alignItems:"center", gap:10, boxShadow:T.sh1,
            transition:"transform .15s" }}
          onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"}
          onMouseLeave={e=>e.currentTarget.style.transform="none"}>
            <div style={{ width:38, height:38, borderRadius:10,
              background:btn.color+"15", border:"1px solid "+btn.color+"25",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:18, flexShrink:0 }}>{btn.icon}</div>
            <span style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F }}>{btn.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ─── 실사 업로드 탭 ─────────────────────────────── */
function UploadTab({ uploadHistory, onSave, skuAliases, onSaveAliases }) {
  const [dragging, setDragging] = useState(false);
  const [pending,  setPending]  = useState([]); // [{id,filename,data,customDate,expanded}]
  const [error,    setError]    = useState("");
  const fileRef = useRef();

  const parseFiles = async (files) => {
    setError("");
    const newItems = [];
    for (const file of files) {
      const ext = file.name.split(".").pop().toLowerCase();
      if (!["xlsx","xls"].includes(ext)) { setError('"'+file.name+'" — xlsx 또는 xls 파일만 지원해요'); continue; }
      try {
        const buf = await file.arrayBuffer();
        const guessDate = extractDateFromFilename(file.name);
        const data = parseInventoryExcel(buf, guessDate);
        newItems.push({ id:Date.now()+Math.random(), filename:file.name, data, customDate:guessDate, expanded:false });
      } catch(e) {
        setError('"'+file.name+'" 파싱 오류: '+e.message);
      }
    }
    if (newItems.length) setPending(prev => [...prev, ...newItems]);
  };

  const handleDrop = (e) => { e.preventDefault(); setDragging(false); parseFiles(Array.from(e.dataTransfer.files)); };

  const updateDate = (id, newDate) => {
    setPending(prev => prev.map(p => {
      if (p.id !== id) return p;
      return { ...p, customDate:newDate, data:{ ...p.data, date:newDate, dow:getDow(newDate) } };
    }));
  };

  const removePending = (id) => setPending(prev => prev.filter(p => p.id !== id));

  const saveOne = (item) => {
    const exists = uploadHistory.findIndex(h => h.date === item.data.date);
    let updated;
    if (exists >= 0) {
      if (!window.confirm(item.data.date+" 날짜의 기존 데이터가 있어요. 덮어쓸까요?")) return;
      updated = uploadHistory.map((h,i) => i===exists ? item.data : h);
    } else {
      updated = [...uploadHistory, item.data].sort((a,b) => a.date.localeCompare(b.date));
    }
    // 새 항목이면 newEntry로 Firebase 개별 저장, 덮어쓰기면 배열 전체 저장
    const isNew = exists < 0;
    onSave(updated, isNew ? item.data : null);
    removePending(item.id);
  };

  const saveAll = () => {
    let updated = [...uploadHistory];
    const newEntries = [];
    for (const item of pending) {
      const exists = updated.findIndex(h => h.date === item.data.date);
      if (exists >= 0) updated = updated.map((h,i) => i===exists ? item.data : h);
      else { updated = [...updated, item.data]; newEntries.push(item.data); }
    }
    const sorted = updated.sort((a,b) => a.date.localeCompare(b.date));
    // 새 항목들 개별 Firebase 저장
    newEntries.forEach(entry => onSave(sorted, entry));
    if (newEntries.length === 0) onSave(sorted, null);
    setPending([]);
    alert(pending.length+"개 파일이 저장되었습니다 ✓");
  };

  const deleteHistory = (idx) => {
    if (!window.confirm("이 기록을 삭제할까요?")) return;
    const toDelete = uploadHistory[idx];
    onSave(uploadHistory.filter((_,i) => i!==idx), null);
    // Firebase에서도 삭제 (App의 deleteHistoryEntry 직접 호출 불가 → onSave 시그니처 활용)
    if (toDelete && toDelete.id) window._deleteHistoryEntry && window._deleteHistoryEntry(toDelete.id);
  };

  const toggleExpand = (id) => setPending(prev => prev.map(p => p.id===id ? {...p,expanded:!p.expanded} : p));

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
      <SH title="📁 실사 데이터 업로드"
        sub="엑셀 파일 업로드 → 날짜 설정 → 발주 추천에 반영"/>

      {/* 드롭존 — 항상 표시, multiple 지원 */}
      <div
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={handleDrop}
        onClick={()=>fileRef.current?.click()}
        style={{ border:"2px dashed "+(dragging?T.brand:T.b1),
          borderRadius:18, padding:"28px 20px", textAlign:"center",
          background:dragging?T.brandDim:T.card, cursor:"pointer",
          transition:"all .2s", marginBottom:14 }}>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" multiple style={{ display:"none" }}
          onChange={e=>{ parseFiles(Array.from(e.target.files)); e.target.value=""; }}/>
        <div style={{ fontSize:34, marginBottom:8 }}>📊</div>
        <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:2 }}>
          실사 엑셀 파일을 올려주세요
        </div>
        <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
          여러 파일 동시 업로드 가능 · .xlsx / .xls
        </div>
      </div>

      {error && (
        <div style={{ padding:"10px 14px", borderRadius:12, background:T.rDim,
          border:"1px solid "+T.rBdr, color:T.red, fontSize:13, fontFamily:F, marginBottom:12 }}>
          ⚠ {error}
        </div>
      )}

      {/* 대기 중인 파일들 */}
      {pending.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F }}>
              파싱 완료 — {pending.length}개 파일
            </div>
            {pending.length > 1 && (
              <GreenBtn small onClick={saveAll}>전체 저장</GreenBtn>
            )}
          </div>
          {pending.map(item => (
            <PendingFileCard
              key={item.id}
              item={item}
              skuAliases={skuAliases}
              onUpdateDate={updateDate}
              onSave={saveOne}
              onRemove={removePending}
              onToggle={toggleExpand}
            />
          ))}
        </div>
      )}

      {/* 업로드 히스토리 */}
      {uploadHistory.length > 0 && (
        <div style={{ marginTop:pending.length>0?4:0 }}>
          <SH title="업로드 기록" sub={uploadHistory.length+"건"}/>
          <Card>
            {[...uploadHistory].reverse().map((h, i, arr) => (
              <div key={h.date} style={{ padding:"12px 16px",
                display:"flex", alignItems:"center", gap:12,
                borderBottom:i<arr.length-1?"1px solid "+T.b0:"none" }}>
                <div style={{ width:40, height:40, borderRadius:10, background:T.brandDim,
                  display:"flex", flexDirection:"column", alignItems:"center",
                  justifyContent:"center", flexShrink:0 }}>
                  <div style={{ fontSize:14, fontWeight:800, color:T.brand, lineHeight:1 }}>
                    {new Date(h.date+"T00:00:00").getDate()}
                  </div>
                  <div style={{ fontSize:9, color:T.brand, opacity:0.7 }}>
                    {new Date(h.date+"T00:00:00").toLocaleDateString("ko-KR",{month:"short"})}
                  </div>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F }}>
                    {fmtDate(h.date)} ({DOW_KR[h.dow]}요일)
                  </div>
                  <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
                    {Object.keys(h.items||{}).length}개 SKU · 판매합계 {Math.round(Object.values(h.items||{}).reduce((s,i)=>s+i.sold,0))}
                  </div>
                </div>
                <button onClick={() => deleteHistory(uploadHistory.length-1-i)} style={{
                  padding:"5px 10px", borderRadius:8, border:"1px solid "+T.rBdr,
                  background:T.rDim, color:T.red, cursor:"pointer",
                  fontSize:12, fontFamily:F }}>삭제</button>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
}
