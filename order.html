  );
}


function HistoryTab({ uploadHistory, bevHistory=[], skuAliases }) {
  const [statMode, setStatMode] = React.useState("inventory"); // "inventory" | "bev"
  const DOW = ["일","월","화","수","목","금","토"];
  const rnd = (v,d=1) => Math.round(v*Math.pow(10,d))/Math.pow(10,d);
  const today = new Date().toISOString().slice(0,10);

  // ── 기간 프리셋 ──
  const PRESETS = [
    { label:"이번 주", getRange:() => {
        const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7));
        return [d.toISOString().slice(0,10), today];
    }},
    { label:"저번 주", getRange:() => {
        const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)-7);
        const e=new Date(d); e.setDate(d.getDate()+6);
        return [d.toISOString().slice(0,10), e.toISOString().slice(0,10)];
    }},
    { label:"최근 14일", getRange:() => {
        const d=new Date(); d.setDate(d.getDate()-13);
        return [d.toISOString().slice(0,10), today];
    }},
    { label:"이번 달", getRange:() => {
        const d=new Date(new Date().getFullYear(), new Date().getMonth(), 1);
        return [d.toISOString().slice(0,10), today];
    }},
    { label:"전체", getRange:() => {
        if (!uploadHistory.length) return [today,today];
        const s=[...uploadHistory].sort((a,b)=>a.date.localeCompare(b.date));
        return [s[0].date, s[s.length-1].date];
    }},
  ];

  const [preset,     setPreset]     = React.useState("최근 14일");
  const [customFrom, setCustomFrom] = React.useState("");
  const [customTo,   setCustomTo]   = React.useState("");
  const [showCustom, setShowCustom] = React.useState(false);
  const [catFilter,  setCatFilter]  = React.useState("전체");
  const [viewMode,   setViewMode]   = React.useState("overview"); // overview | heatmap | matrix | drill
  const [drillSku,   setDrillSku]   = React.useState(null);
  const [sortKey,    setSortKey]    = React.useState("totalSold");
  const [sortAsc,    setSortAsc]    = React.useState(false);
  const [search,     setSearch]     = React.useState("");

  // ── 기간 계산 ──
  const [rangeFrom, rangeTo] = React.useMemo(() => {
    if (showCustom && customFrom && customTo) return [customFrom, customTo];
    const p = PRESETS.find(p=>p.label===preset);
    return p ? p.getRange() : PRESETS[2].getRange();
  }, [preset, showCustom, customFrom, customTo, uploadHistory]);

  const periodHist = React.useMemo(() =>
    [...uploadHistory].filter(h=>h.date>=rangeFrom&&h.date<=rangeTo)
      .sort((a,b)=>a.date.localeCompare(b.date)),
    [uploadHistory, rangeFrom, rangeTo]);

  const allCats = React.useMemo(() => {
    const s=new Set(); uploadHistory.forEach(h=>Object.values(h.items||{}).forEach(i=>s.add(i.cat)));
    return [...s].sort();
  }, [uploadHistory]);

  // ── 자동 누락 감지 ──
  const autoSkipSet = React.useMemo(() => {
    const sk=new Set();
    const sorted=[...uploadHistory].sort((a,b)=>a.date.localeCompare(b.date));
    for(let i=1;i<sorted.length;i++){
      const c=sorted[i],p=sorted[i-1];
      Object.keys(c.items||{}).forEach(sku=>{
        const ci=c.items[sku],pi=p.items?.[sku];
        if(ci&&pi&&ci.sold===0&&Math.abs(ci.actualSum-pi.actualSum)===0&&pi.sold>0)
          sk.add(`${c.date}__${sku}`);
      });
    }
    return sk;
  }, [uploadHistory]);

  // ── 품목별 통계 계산 ──
  const skuStats = React.useMemo(() => {
    const map={};
    periodHist.forEach(h=>{
      Object.entries(h.items||{}).forEach(([sku,item])=>{
        if(autoSkipSet.has(`${h.date}__${sku}`)) return;
        if(catFilter!=="전체"&&item.cat!==catFilter) return;
        if(!map[sku]) map[sku]={
          name:skuAliases[sku]||item.name, cat:item.cat,
          days:[], soldArr:[], zeroArr:[], inArr:[], spark:[]
        };
        const s=map[sku];
        s.days.push({date:h.date,dow:h.dow});
        s.soldArr.push(item.sold||0);
        s.zeroArr.push(item.actualSum===0?1:0);
        s.inArr.push(item.dayIn||0);
        s.spark.push({date:h.date,sold:item.sold||0,dow:h.dow});
      });
    });
    return Object.entries(map).map(([sku,s])=>{
      const totalSold=rnd(s.soldArr.reduce((a,b)=>a+b,0),0);
      const avgSold=s.soldArr.length?rnd(totalSold/s.soldArr.length,1):0;
      const zeroRate=s.zeroArr.length?rnd(s.zeroArr.reduce((a,b)=>a+b,0)/s.zeroArr.length*100,0):0;
      const totalIn=rnd(s.inArr.reduce((a,b)=>a+b,0),0);
      const wasteRate=totalIn>0?rnd(Math.max(0,totalIn-totalSold)/totalIn*100,1):null;
      // 요일별 평균
      const dowMap={};
      s.days.forEach((d,i)=>{
        if(!dowMap[d.dow]) dowMap[d.dow]=[];
        if(s.soldArr[i]>0) dowMap[d.dow].push(s.soldArr[i]);
      });
      const dowAvg={};
      [0,1,2,3,4,5,6].forEach(d=>{
        const v=dowMap[d]; dowAvg[d]=v&&v.length?rnd(v.reduce((a,b)=>a+b,0)/v.length,1):null;
      });
      const wdAvg=rnd(([1,2,3,4,5].flatMap(d=>dowMap[d]||[])).reduce((s,v,_,a)=>s+v/(a.length||1),0),1)||null;
      const weAvg=rnd(([0,6].flatMap(d=>dowMap[d]||[])).reduce((s,v,_,a)=>s+v/(a.length||1),0),1)||null;
      const weDiff=(wdAvg&&weAvg)?Math.round(((weAvg-wdAvg)/wdAvg)*100):null;
      return {sku,name:s.name,cat:s.cat,totalSold,avgSold,zeroRate,totalIn,wasteRate,dowAvg,wdAvg,weAvg,weDiff,spark:s.spark,days:s.days.length};
    });
  }, [periodHist, catFilter, autoSkipSet, skuAliases]);

  // ── 기간 KPI ──
  const kpi = React.useMemo(()=>{
    if(!periodHist.length) return null;
    const totalSold=rnd(periodHist.reduce((s,h)=>
      s+Object.entries(h.items||{}).reduce((ss,[sku,i])=>
        autoSkipSet.has(`${h.date}__${sku}`)?ss:ss+(i.sold||0),0),0),0);
    const dayAvg=rnd(totalSold/(periodHist.length||1),0);
    const zeroEvents=periodHist.reduce((s,h)=>
      s+Object.entries(h.items||{}).filter(([sku,i])=>i.actualSum===0&&!autoSkipSet.has(`${h.date}__${sku}`)).length,0);
    const latest=[...uploadHistory].sort((a,b)=>b.date.localeCompare(a.date))[0];
    const todayZero=latest?Object.values(latest.items||{}).filter(i=>i.actualSum===0).length:0;
    const todayExpiry=latest?Object.values(latest.items||{}).filter(i=>(i.batches||[]).some(b=>b.dday!==null&&b.dday<=3&&b.actual>0)).length:0;
    return {totalSold,dayAvg,zeroEvents,todayZero,todayExpiry,days:periodHist.length};
  },[periodHist,autoSkipSet,uploadHistory]);

  // ── 일별 총 판매 ──
  const dailySales=React.useMemo(()=>periodHist.map(h=>({
    date:h.date,dow:h.dow,
    sold:rnd(Object.entries(h.items||{}).reduce((s,[sku,i])=>
      autoSkipSet.has(`${h.date}__${sku}`)?s:s+(i.sold||0),0),0)
  })),[periodHist,autoSkipSet]);

  // ── 필터/정렬 테이블 ──
  const tableData=React.useMemo(()=>{
    let rows=[...skuStats];
    if(search) rows=rows.filter(s=>(s.name||"").toLowerCase().includes(search.toLowerCase()));
    rows.sort((a,b)=>{
      const va=a[sortKey]??-999, vb=b[sortKey]??-999;
      return sortAsc?va-vb:vb-va;
    });
    return rows;
  },[skuStats,search,sortKey,sortAsc]);

  // ── 차트 컴포넌트들 ──
  const LineChart=({data})=>{
    if(!data||data.length<2) return null;
    const W=500,H=90,PL=36,PR=8,PT=8,PB=22;
    const maxV=Math.max(...data.map(d=>d.sold),1);
    const xs=data.map((_,i)=>PL+i*(W-PL-PR)/(data.length-1));
    const ys=data.map(d=>PT+(H-PT-PB)*(1-d.sold/maxV));
    const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(" ");
    const area=`${path} L${xs[xs.length-1]},${H-PB} L${PL},${H-PB} Z`;
    const yTicks=[0,0.5,1];
    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
        <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={T.brand} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={T.brand} stopOpacity="0.01"/>
        </linearGradient></defs>
        {yTicks.map(r=>(
          <g key={r}>
            <line x1={PL} y1={PT+(H-PT-PB)*(1-r)} x2={W-PR} y2={PT+(H-PT-PB)*(1-r)}
              stroke="#E5E5EA" strokeWidth="0.7"/>
            <text x={PL-4} y={PT+(H-PT-PB)*(1-r)+4} fontSize="8" fill="#8E8E93" textAnchor="end">
              {Math.round(maxV*r)}
            </text>
          </g>
        ))}
        <path d={area} fill="url(#lg1)"/>
        <path d={path} fill="none" stroke={T.brand} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((d,i)=>(
          <g key={d.date}>
            <circle cx={xs[i]} cy={ys[i]} r="3" fill={T.brand}/>
            {(data.length<=14||i%2===0)&&(
              <text x={xs[i]} y={H-2} fontSize="8.5" textAnchor="middle"
                fill={d.dow===0?T.red:d.dow===6?T.blue:"#8E8E93"}>
                {DOW[d.dow]}
              </text>
            )}
          </g>
        ))}
      </svg>
    );
  };

  const Spark=({data})=>{
    const W=56,H=18;
    if(!data||data.length<2) return <svg width={W} height={H}/>;
    const maxV=Math.max(...data.map(d=>d.sold),1);
    const xs=data.map((_,i)=>2+i*(W-4)/(data.length-1));
    const ys=data.map(d=>H-3-(d.sold/maxV)*(H-6));
    const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(" ");
    return(
      <svg width={W} height={H} style={{display:"block"}}>
        <path d={path} fill="none" stroke={T.brand} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="2" fill={T.brand}/>
      </svg>
    );
  };

  // ── 히트맵 ──
  const HeatmapView=()=>{
    const rows=tableData.slice(0,30);
    const dates=periodHist.map(h=>h.date);
    if(!rows.length||!dates.length) return <div style={{padding:20,textAlign:"center",color:T.t3,fontFamily:F}}>데이터 없음</div>;
    const soldMap={};
    periodHist.forEach(h=>Object.entries(h.items||{}).forEach(([sku,item])=>{
      soldMap[`${sku}__${h.date}`]=item.sold||0;
    }));
    const maxSold=Math.max(...rows.flatMap(r=>dates.map(d=>soldMap[`${r.sku}__${d}`]||0)),1);
    const getColor=(v,max)=>{
      if(v===0) return "#F2F2F7";
      const t=v/max;
      if(t<0.25) return "#C6E6D4";
      if(t<0.5)  return "#7EC8A3";
      if(t<0.75) return "#3DAB72";
      return "#00704A";
    };
    return(
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",fontSize:10,fontFamily:F,minWidth:"100%"}}>
          <thead>
            <tr>
              <th style={{padding:"4px 8px",textAlign:"left",color:T.t3,fontWeight:600,minWidth:110,position:"sticky",left:0,background:T.card,zIndex:1}}>품목</th>
              {dates.map(d=>{
                const dd=new Date(d+"T00:00:00");
                return(
                  <th key={d} style={{padding:"2px 3px",textAlign:"center",color:dd.getDay()===0||dd.getDay()===6?T.red:T.t3,fontWeight:400,minWidth:26}}>
                    <div>{d.slice(8)}</div>
                    <div>{DOW[dd.getDay()]}</div>
                  </th>
                );
              })}
              <th style={{padding:"4px 8px",textAlign:"right",color:T.brand,fontWeight:700}}>합계</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((row,ri)=>(
              <tr key={row.sku} style={{cursor:"pointer"}} onClick={()=>{setDrillSku(row.sku);setViewMode("drill");}}>
                <td style={{padding:"4px 8px",color:T.t1,fontWeight:500,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:110,
                  position:"sticky",left:0,background:ri%2===0?T.card2:T.card,zIndex:1}}>
                  {row.name.length>14?row.name.slice(0,13)+"…":row.name}
                </td>
                {dates.map(d=>{
                  const v=soldMap[`${row.sku}__${d}`]||0;
                  return(
                    <td key={d} style={{padding:"2px 3px",textAlign:"center",
                      background:getColor(v,maxSold),color:v>maxSold*0.5?"#fff":"#333",
                      borderRadius:3,fontSize:9}}>
                      {v>0?v:""}
                    </td>
                  );
                })}
                <td style={{padding:"4px 8px",textAlign:"right",fontWeight:700,color:T.brand,fontSize:11}}>
                  {row.totalSold}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{fontSize:10,color:T.t4,fontFamily:F,marginTop:8,textAlign:"center"}}>
          행 클릭 → 품목 상세 · 상위 30개 표시 · 색이 진할수록 판매 많음
        </div>
      </div>
    );
  };

  // ── 소진율-폐기율 매트릭스 ──
  const MatrixView=()=>{
    const rows=skuStats.filter(s=>s.days>=3&&(s.wasteRate!==null||s.zeroRate>0));
    if(!rows.length) return <div style={{padding:20,textAlign:"center",color:T.t3,fontFamily:F}}>데이터 부족 (3일 이상 필요)</div>;
    // 4분면: X=소진율, Y=폐기율
    const q={A:[],B:[],C:[],D:[]};
    rows.forEach(r=>{
      const hi_zero=r.zeroRate>15, hi_waste=r.wasteRate!==null&&r.wasteRate>8;
      if(hi_zero&&hi_waste)  q.A.push(r); // 둘다 높음 → 발주 사이클 문제
      else if(hi_zero)       q.B.push(r); // 소진 높음 → 발주 늘려야
      else if(hi_waste)      q.C.push(r); // 폐기 높음 → 발주 줄여야
      else                   q.D.push(r); // 양호
    });
    const QuadCard=({title,items,color,dim,icon,desc})=>(
      <div style={{background:dim,border:"1px solid "+color+"44",borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:13,fontWeight:800,color,fontFamily:F,marginBottom:4}}>
          {icon} {title}
          <span style={{fontSize:10,fontWeight:400,color:T.t3,marginLeft:6}}>{desc}</span>
        </div>
        {items.length===0
          ? <div style={{fontSize:11,color:T.t4,fontFamily:F}}>해당 없음 ✓</div>
          : items.slice(0,6).map(item=>(
            <div key={item.sku} onClick={()=>{setDrillSku(item.sku);setViewMode("drill");}}
              style={{display:"flex",justifyContent:"space-between",padding:"4px 0",
                borderBottom:"1px solid "+T.b0+"88",cursor:"pointer",
                transition:"background .1s"}}
              onMouseEnter={e=>e.currentTarget.style.background=T.card2}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:12,color:T.t1,fontFamily:F,flex:1,
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {item.name.length>16?item.name.slice(0,15)+"…":item.name}
              </span>
              <span style={{fontSize:11,color,fontFamily:F,flexShrink:0,marginLeft:8}}>
                소진{item.zeroRate}% / 폐기{item.wasteRate??"-"}%
              </span>
            </div>
          ))
        }
        {items.length>6&&<div style={{fontSize:10,color:T.t4,fontFamily:F,marginTop:4}}>+{items.length-6}개 더</div>}
      </div>
    );
    return(
      <div>
        <div style={{fontSize:12,color:T.t3,fontFamily:F,marginBottom:12,lineHeight:1.6}}>
          소진율(재고=0 비율)과 폐기율(입고 대비 판매 손실)로 품목을 분류해요.
          <strong style={{color:T.t1}}> 클릭하면 상세 추이를 볼 수 있어요.</strong>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <QuadCard title="발주 불규칙" items={q.A} color="#AF52DE" dim="rgba(175,82,222,0.07)"
            icon="⚠️" desc="소진↑ 폐기↑"/>
          <QuadCard title="발주 부족" items={q.B} color={T.red} dim={T.rDim}
            icon="📉" desc="소진↑ 폐기 양호"/>
          <QuadCard title="발주 과잉" items={q.C} color={T.amber} dim={T.aDim}
            icon="📦" desc="소진 양호 폐기↑"/>
          <QuadCard title="양호" items={q.D} color={T.brand} dim={T.brandDim}
            icon="✅" desc="소진·폐기 모두 양호"/>
        </div>
      </div>
    );
  };

  // ── 품목 드릴다운 ──
  const DrillView=()=>{
    const stat=skuStats.find(s=>s.sku===drillSku);
    if(!stat) return null;
    const sparkData=stat.spark.slice(-21);
    const maxSpark=Math.max(...sparkData.map(d=>d.sold),1);
    return(
      <div>
        <button onClick={()=>setViewMode("overview")} style={{
          fontSize:12,color:T.brand,background:T.brandDim,border:"1px solid "+T.brandBorder,
          borderRadius:8,padding:"5px 12px",cursor:"pointer",fontFamily:F,marginBottom:14}}>
          ← 목록으로
        </button>
        <div style={{fontSize:16,fontWeight:800,color:T.t1,fontFamily:F,marginBottom:4}}>{stat.name}</div>
        <div style={{fontSize:12,color:T.t3,fontFamily:F,marginBottom:14}}>{stat.cat} · {rangeFrom} ~ {rangeTo}</div>
        {/* KPI */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
          {[
            {label:"기간 총 판매",value:stat.totalSold+"개",color:T.brand},
            {label:"일 평균",value:stat.avgSold+"개",color:T.t2},
            {label:"소진율",value:stat.zeroRate+"%",color:stat.zeroRate>20?T.red:T.t2},
            {label:"폐기율",value:stat.wasteRate!==null?stat.wasteRate+"%":"-",
              color:stat.wasteRate!==null&&stat.wasteRate>8?T.amber:T.t2},
          ].map(k=>(
            <div key={k.label} style={{background:T.card,border:"1px solid "+T.b0,
              borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:10,color:T.t3,fontFamily:F,marginBottom:3}}>{k.label}</div>
              <div style={{fontSize:18,fontWeight:900,color:k.color,fontFamily:F}}>{k.value}</div>
            </div>
          ))}
        </div>
        {/* 판매 추이 바차트 */}
        <div style={{background:T.card,border:"1px solid "+T.b0,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:F,marginBottom:10}}>일별 판매 추이</div>
          <div style={{display:"flex",gap:3,alignItems:"flex-end",height:80}}>
            {sparkData.map((d,i)=>{
              const h=Math.max(4,(d.sold/maxSpark)*72);
              const isWe=d.dow===0||d.dow===6;
              return(
                <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{fontSize:8,color:T.t4,fontFamily:F,lineHeight:1}}>
                    {d.sold>0?d.sold:""}
                  </div>
                  <div style={{width:"100%",height:h,
                    background:isWe?T.amber:T.brand,
                    borderRadius:"3px 3px 0 0",opacity:0.85}}/>
                  <div style={{fontSize:8,color:isWe?T.amber:T.t4,fontFamily:F}}>
                    {DOW[d.dow]}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        {/* 요일별 평균 */}
        <div style={{background:T.card,border:"1px solid "+T.b0,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:F,marginBottom:10}}>요일별 평균 판매</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
            {[0,1,2,3,4,5,6].map(dow=>{
              const avg=stat.dowAvg[dow];
              const maxA=Math.max(...Object.values(stat.dowAvg).map(v=>parseFloat(v)||0),1);
              const ratio=(parseFloat(avg)||0)/maxA;
              const col=dow===0?T.red:dow===6?T.amber:T.brand;
              return(
                <div key={dow} style={{textAlign:"center"}}>
                  <div style={{fontSize:10,fontWeight:700,color:col,fontFamily:F,marginBottom:2}}>{DOW[dow]}</div>
                  <div style={{height:36,background:T.card3,borderRadius:4,position:"relative",overflow:"hidden",marginBottom:2}}>
                    <div style={{position:"absolute",bottom:0,left:0,right:0,
                      height:(ratio*100)+"%",background:col,opacity:0.8,borderRadius:4}}/>
                  </div>
                  <div style={{fontSize:11,fontWeight:700,color:col,fontFamily:F}}>{avg??"-"}</div>
                </div>
              );
            })}
          </div>
          {stat.wdAvg&&stat.weAvg&&(
            <div style={{display:"flex",gap:10,marginTop:10,fontSize:11,fontFamily:F}}>
              <span style={{color:T.t2}}>📅 평일 평균 {stat.wdAvg}개</span>
              <span style={{color:T.amber}}>🌅 주말 평균 {stat.weAvg}개</span>
              {stat.weDiff!==null&&(
                <span style={{color:stat.weDiff>0?T.amber:T.blue,fontWeight:700}}>
                  주말 {stat.weDiff>0?"▲":"▼"}{Math.abs(stat.weDiff)}%
                </span>
              )}
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── 정렬 헤더 ──
  const SortTh=({k,label,color=T.t3,minW=60})=>{
    const active=sortKey===k;
    return(
      <th onClick={()=>{if(active)setSortAsc(a=>!a);else{setSortKey(k);setSortAsc(false);}}}
        style={{padding:"8px 8px",textAlign:"center",color:active?color:T.t3,
          fontWeight:700,cursor:"pointer",minWidth:minW,whiteSpace:"nowrap",
          background:active?color+"11":"transparent",userSelect:"none",fontSize:11}}>
        {label}{active?(sortAsc?"↑":"↓"):""}
      </th>
    );
  };

  if(statMode==="bev") return (
    <BevStatView bevHistory={bevHistory} onSwitchMode={setStatMode}/>
  );

  if(!uploadHistory.length) return(
    <div style={{padding:"40px 20px",textAlign:"center"}}>
      <div style={{display:"flex",background:T.card2,borderRadius:12,padding:3,
        marginBottom:20,border:"1px solid "+T.b0}}>
        {[["inventory","📦 재고 통계"],["bev","🧃 음료 통계"]].map(([id,label])=>(
          <button key={id} onClick={()=>setStatMode(id)}
            style={{flex:1,padding:"9px 0",borderRadius:10,border:"none",cursor:"pointer",
              fontFamily:F,fontSize:13,fontWeight:statMode===id?700:400,
              background:statMode===id?T.card:"transparent",
              color:statMode===id?T.t1:T.t3,
              boxShadow:statMode===id?"0 1px 4px rgba(0,0,0,0.1)":"none",
              transition:"all .15s"}}>
            {label}
          </button>
        ))}
      </div>
      <EmptyState emoji="📦" text="재고 실사 데이터가 없어요" sub="실사 탭에서 엑셀 파일을 업로드하면 통계를 볼 수 있어요"/>
    </div>
  );

  return(
    <div style={{padding:window.innerWidth>=768?"24px 28px":"12px"}}>
      {/* ── 재고/음료 세그먼트 컨트롤 ── */}
      <div style={{display:"flex",background:T.card2,borderRadius:12,padding:3,
        marginBottom:14,border:"1px solid "+T.b0}}>
        {[["inventory","📦 재고 통계"],["bev","🧃 음료 통계"]].map(([id,label])=>(
          <button key={id} onClick={()=>setStatMode(id)}
            style={{flex:1,padding:"9px 0",borderRadius:10,border:"none",cursor:"pointer",
              fontFamily:F,fontSize:13,fontWeight:statMode===id?700:400,
              background:statMode===id?T.card:"transparent",
              color:statMode===id?T.t1:T.t3,
              boxShadow:statMode===id?"0 1px 4px rgba(0,0,0,0.1)":"none",
              transition:"all .15s"}}>
            {label}
          </button>
        ))}
      </div>

      {/* ── 컨트롤 바 sticky ── */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14,
        position:"sticky",top:0,zIndex:10,background:T.bg,
        paddingTop:8,paddingBottom:10,marginLeft:window.innerWidth>=768?-28:-12,
        marginRight:window.innerWidth>=768?-28:-12,
        paddingLeft:window.innerWidth>=768?28:12,
        paddingRight:window.innerWidth>=768?28:12,
        borderBottom:"1px solid "+T.b0}}>
        {/* 기간 프리셋 */}
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {PRESETS.map(p=>(
            <button key={p.label} onClick={()=>{setPreset(p.label);setShowCustom(false);}} style={{
              padding:"5px 11px",borderRadius:20,cursor:"pointer",fontFamily:F,fontSize:12,
              border:"1px solid "+(preset===p.label&&!showCustom?T.brand:T.b1),
              background:preset===p.label&&!showCustom?T.brandDim:T.card,
              color:preset===p.label&&!showCustom?T.brand:T.t2,
              fontWeight:preset===p.label&&!showCustom?700:400}}>
              {p.label}
            </button>
          ))}
          <button onClick={()=>setShowCustom(v=>!v)} style={{
            padding:"5px 11px",borderRadius:20,cursor:"pointer",fontFamily:F,fontSize:12,
            border:"1px solid "+(showCustom?T.brand:T.b1),
            background:showCustom?T.brandDim:T.card,
            color:showCustom?T.brand:T.t2,fontWeight:showCustom?700:400}}>
            직접 설정
          </button>
        </div>
        {/* 카테고리 */}
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginLeft:"auto"}}>
          {["전체",...allCats].map(c=>(
            <button key={c} onClick={()=>setCatFilter(c)} style={{
              padding:"5px 10px",borderRadius:16,cursor:"pointer",fontFamily:F,fontSize:11,
              border:"1px solid "+(catFilter===c?T.brand:T.b1),
              background:catFilter===c?T.brandDim:T.card,
              color:catFilter===c?T.brand:T.t2,fontWeight:catFilter===c?700:400}}>
              {c.replace("[10] ","").replace("[20] ","").replace("[50] ","")}
            </button>
          ))}
        </div>
      </div>

      {showCustom&&(
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:T.t3,fontFamily:F}}>기간</span>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
            style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+T.b1,fontFamily:F,fontSize:12,background:T.card}}/>
          <span style={{color:T.t3}}>~</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
            style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+T.b1,fontFamily:F,fontSize:12,background:T.card}}/>
        </div>
      )}

      {/* ── 드릴다운 뷰 ── */}
      {viewMode==="drill" ? <DrillView/> : (
        <>
          {/* ── 기간 요약 배지 ── */}
          <div style={{fontSize:11,color:T.t3,fontFamily:F,marginBottom:12}}>
            📅 {rangeFrom} ~ {rangeTo}
            {periodHist.length>0?` (${periodHist.length}일)`:` — 해당 기간 데이터 없음`}
          </div>

          {/* ── Action Items ── */}
          {kpi&&(kpi.todayZero>0||kpi.todayExpiry>0)&&(
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              {kpi.todayZero>0&&(
                <div style={{flex:1,minWidth:130,display:"flex",alignItems:"center",gap:8,
                  padding:"10px 14px",borderRadius:12,background:T.rDim,border:"1px solid "+T.rBdr}}>
                  <span style={{fontSize:18}}>🚨</span>
                  <div style={{fontFamily:F}}>
                    <div style={{fontSize:12,fontWeight:700,color:T.red}}>오늘 품절 {kpi.todayZero}개</div>
                    <div style={{fontSize:10,color:T.t3}}>재고 0 품목</div>
                  </div>
                </div>
              )}
              {kpi.todayExpiry>0&&(
                <div style={{flex:1,minWidth:130,display:"flex",alignItems:"center",gap:8,
                  padding:"10px 14px",borderRadius:12,
                  background:"rgba(192,64,0,0.07)",border:"1px solid rgba(192,64,0,0.2)"}}>
                  <span style={{fontSize:18}}>⏰</span>
                  <div style={{fontFamily:F}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#C04000"}}>유통임박 {kpi.todayExpiry}개</div>
                    <div style={{fontSize:10,color:T.t3}}>D-3 이하</div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ── KPI 카드 ── */}
          {kpi&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
              {[
                {label:"기간 총 판매",value:kpi.totalSold+"개",color:T.brand},
                {label:"일 평균 판매",value:kpi.dayAvg+"개",color:T.t2},
                {label:"재고소진 횟수",value:kpi.zeroEvents+"회",color:kpi.zeroEvents>30?T.amber:T.t2},
              ].map(c=>(
                <div key={c.label} style={{background:T.card,border:"1px solid "+T.b0,
                  borderRadius:12,padding:"12px 14px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:T.t3,fontFamily:F,marginBottom:4}}>{c.label}</div>
                  <div style={{fontSize:20,fontWeight:900,color:c.color,fontFamily:F,lineHeight:1}}>{c.value}</div>
                </div>
              ))}
            </div>
          )}

          {/* ── 일별 판매 라인차트 ── */}
          {dailySales.length>=2&&(
            <Card style={{padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:F,marginBottom:8}}>
                일별 총 판매 추이
              </div>
              <LineChart data={dailySales}/>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>
                {[0,1,2,3,4,5,6].map(dow=>{
                  const days=dailySales.filter(d=>d.dow===dow);
                  if(!days.length) return null;
                  const avg=Math.round(days.reduce((s,d)=>s+d.sold,0)/days.length);
                  const isWe=dow===0||dow===6;
                  return(
                    <div key={dow} style={{fontSize:11,
                      background:isWe?T.aDim:T.card2,borderRadius:6,
                      padding:"2px 8px",fontFamily:F,
                      color:dow===0?T.red:dow===6?T.amber:T.t2,
                      fontWeight:isWe?700:400}}>
                      {DOW[dow]} avg {avg}
                    </div>
                  );
                })}
              </div>
            </Card>
          )}

          {/* ── 뷰 모드 탭 ── */}
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {[["overview","📋 품목 분석"],["heatmap","🟩 히트맵"],["matrix","🎯 소진-폐기 분류"]].map(([id,label])=>(
              <button key={id} onClick={()=>setViewMode(id)} style={{
                padding:"7px 14px",borderRadius:10,border:"none",cursor:"pointer",
                fontFamily:F,fontSize:12,fontWeight:viewMode===id?700:400,
                background:viewMode===id?T.brand:T.card2,
                color:viewMode===id?"#fff":T.t2}}>
                {label}
              </button>
            ))}
          </div>

          {/* ── 히트맵 ── */}
          {viewMode==="heatmap"&&(
            <Card style={{padding:"14px 16px",overflow:"hidden"}}>
              <div style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:F,marginBottom:2}}>
                품목별 일별 판매 히트맵
              </div>
              <div style={{fontSize:10,color:T.t3,fontFamily:F,marginBottom:10}}>
                상위 30개 품목 · 셀 색이 진할수록 판매량 많음
              </div>
              <HeatmapView/>
            </Card>
          )}

          {/* ── 소진-폐기 매트릭스 ── */}
          {viewMode==="matrix"&&(
            <div>
              <div style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:F,marginBottom:10}}>
                🎯 소진율 vs 폐기율 분류
              </div>
              <MatrixView/>
            </div>
          )}

          {/* ── 품목 분석 테이블 ── */}
          {viewMode==="overview"&&(
            <Card style={{overflow:"hidden"}}>
              <div style={{padding:"12px 14px",borderBottom:"1px solid "+T.b0}}>
                {/* 검색 */}
                <div style={{position:"relative",marginBottom:0}}>
                  <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",
                    fontSize:14,pointerEvents:"none"}}>🔍</span>
                  <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="품목명 검색..."
                    style={{width:"100%",padding:"8px 10px 8px 32px",borderRadius:8,
                      border:"1px solid "+T.b1,fontFamily:F,fontSize:12,
                      background:T.card,outline:"none",boxSizing:"border-box"}}/>
                  {search&&<button onClick={()=>setSearch("")}
                    style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
                      fontSize:14,background:"none",border:"none",cursor:"pointer",color:T.t3}}>✕</button>}
                </div>
                <div style={{fontSize:11,color:T.t4,fontFamily:F,marginTop:6}}>
                  {tableData.length}개 품목 · 헤더 클릭으로 정렬 · 행 클릭 → 상세 추이
                </div>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:F}}>
                  <thead>
                    <tr style={{background:T.brandDim}}>
                      <th style={{padding:"8px 10px",textAlign:"left",color:T.brand,fontWeight:700,minWidth:130}}>품목명</th>
                      {catFilter==="전체"&&<th style={{padding:"8px 8px",textAlign:"center",color:T.t3,fontWeight:700,minWidth:55}}>카테고리</th>}
                      <SortTh k="totalSold" label="총 판매" color={T.brand} minW={55}/>
                      <SortTh k="avgSold"   label="일 평균" color={T.brand} minW={55}/>
                      <SortTh k="wdAvg"     label="📅 평일" color={T.t2}   minW={50}/>
                      <SortTh k="weAvg"     label="🌅 주말" color={T.amber} minW={50}/>
                      <SortTh k="weDiff"    label="주말증감" color={T.amber} minW={55}/>
                      <SortTh k="zeroRate"  label="소진율"  color={T.red}   minW={50}/>
                      <SortTh k="wasteRate" label="폐기율"  color={T.amber} minW={50}/>
                      <th style={{padding:"8px 8px",textAlign:"center",color:T.t3,fontWeight:700,minWidth:60}}>추이</th>
                    </tr>
                  </thead>
                  <tbody>
                    {tableData.map((s,i)=>{
                      const weColor=s.weDiff===null?T.t4:s.weDiff>=30?T.amber:s.weDiff<=-30?T.blue:T.t2;
                      const zeroColor=s.zeroRate>30?T.red:s.zeroRate>15?T.amber:T.t3;
                      const wasteColor=s.wasteRate!==null&&s.wasteRate>8?T.amber:T.t3;
                      return(
                        <tr key={s.sku} onClick={()=>{setDrillSku(s.sku);setViewMode("drill");}}
                          style={{borderTop:"1px solid "+T.b0,cursor:"pointer",
                            background:i%2===0?T.card2:T.card,transition:"background .1s"}}
                          onMouseEnter={e=>e.currentTarget.style.background=T.brandDim}
                          onMouseLeave={e=>e.currentTarget.style.background=i%2===0?T.card2:T.card}>
                          <td style={{padding:"7px 10px",color:T.t1,fontWeight:500,maxWidth:160}}>
                            <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                              {s.name}
                            </div>
                          </td>
                          {catFilter==="전체"&&(
                            <td style={{padding:"7px 6px",textAlign:"center"}}>
                              <span style={{fontSize:9,color:T.t3,background:T.card3,
                                borderRadius:4,padding:"1px 5px",whiteSpace:"nowrap"}}>
                                {s.cat.replace("[10] ","").replace("[20] ","").replace("[50] ","")}
                              </span>
                            </td>
                          )}
                          <td style={{padding:"7px 8px",textAlign:"center",color:T.brand,fontWeight:700}}>
                            {s.totalSold>0?s.totalSold:<span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{padding:"7px 8px",textAlign:"center",color:T.t2,fontWeight:600}}>
                            {s.avgSold>0?s.avgSold:<span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{padding:"7px 8px",textAlign:"center",color:T.t2}}>
                            {s.wdAvg??<span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{padding:"7px 8px",textAlign:"center",color:T.amber,fontWeight:s.weAvg?600:400}}>
                            {s.weAvg??<span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{padding:"7px 8px",textAlign:"center",color:weColor,fontWeight:700}}>
                            {s.weDiff!==null?(s.weDiff>0?"▲":"▼")+Math.abs(s.weDiff)+"%"+(s.weDiff>=30?" 🌅":""):<span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{padding:"7px 8px",textAlign:"center",color:zeroColor,fontWeight:600}}>
                            {s.zeroRate>0?s.zeroRate+"%":<span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{padding:"7px 8px",textAlign:"center",color:wasteColor,fontWeight:600}}>
                            {s.wasteRate!==null?s.wasteRate+"%":<span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{padding:"4px 8px",textAlign:"center"}}>
                            <Spark data={s.spark.slice(-7)}/>
                          </td>
                        </tr>
                      );
                    })}
                    {tableData.length===0&&(
                      <tr><td colSpan="10" style={{padding:24,textAlign:"center",color:T.t3,fontFamily:F}}>
                        검색 결과가 없어요
                      </td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </Card>
          )}
        </>
      )}
    </div>
  );
}



/* ─── Render ─────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
