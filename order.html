/* ─── CatOverview Component ─────────────────────── */

function CatOverview({ uploadHistory, skuAliases, autoSkipSet }) {
  const DOW_KR_L = ["일","월","화","수","목","금","토"];
  const rnd = (v, d=1) => Math.round(v * Math.pow(10,d)) / Math.pow(10,d);
  const [viewMode, setViewMode] = React.useState("overview"); // overview | table

  const sorted = React.useMemo(
    () => [...uploadHistory].sort((a,b) => a.date.localeCompare(b.date)),
    [uploadHistory]
  );
  const latest = sorted[sorted.length - 1];

  const allCats = React.useMemo(() => {
    const cats = new Set();
    uploadHistory.forEach(h => Object.values(h.items||{}).forEach(i => cats.add(i.cat)));
    return [...cats].sort();
  }, [uploadHistory]);

  // ── 전체 품목 × 평일/주말/공휴일 평균 계산 ──
  const allSkuStats = React.useMemo(() => {
    const skuMap = {};
    sorted.slice(-21).forEach(h => {
      Object.entries(h.items||{}).forEach(([sku, item]) => {
        if (autoSkipSet && autoSkipSet.has(`${h.date}__${sku}`)) return;
        if (!skuMap[sku]) skuMap[sku] = {
          name: skuAliases[sku] || item.name,
          cat: item.cat,
          weekday: [], weekend: [], holiday: [], zeroCount: 0, days: 0
        };
        const s = skuMap[sku];
        const t = getDayType(h.date, h.dow);
        const sold = item.sold || 0;
        s.days++;
        if (item.actualSum === 0) s.zeroCount++;
        if (sold > 0) {
          if (t === "weekday") s.weekday.push(sold);
          else if (t === "weekend") s.weekend.push(sold);
          else s.holiday.push(sold);
        }
      });
    });
    const avg = arr => arr.length ? rnd(arr.reduce((a,b)=>a+b,0)/arr.length,1) : null;
    return Object.entries(skuMap).map(([sku, s]) => ({
      sku,
      name: s.name,
      cat: s.cat,
      foodSub: s.cat === "[20] Food" ? getFoodSub(s.name) : null,
      weekday: avg(s.weekday),
      weekend: avg(s.weekend),
      holiday: avg(s.holiday),
      weekdayCnt: s.weekday.length,
      weekendCnt: s.weekend.length,
      zeroRate: s.days > 0 ? rnd(s.zeroCount / s.days * 100, 0) : 0,
      weDiff: (avg(s.weekday) && avg(s.weekend))
        ? Math.round(((avg(s.weekend) - avg(s.weekday)) / avg(s.weekday)) * 100)
        : null,
    }));
  }, [sorted, autoSkipSet, skuAliases]);

  // ── 카테고리별 요약 통계 ──
  const catStats = React.useMemo(() => {
    const stats = {};
    allCats.forEach(cat => {
      const days = sorted.slice(-14).map(h => {
        const items = Object.entries(h.items||{}).filter(([,i]) => i.cat === cat);
        const sold = rnd(items.reduce((s,[sku,i]) => {
          if (autoSkipSet && autoSkipSet.has(`${h.date}__${sku}`)) return s;
          return s + (i.sold||0);
        }, 0), 1);
        const zeroStk = items.filter(([sku,i]) =>
          i.actualSum === 0 && !(autoSkipSet && autoSkipSet.has(`${h.date}__${sku}`))
        ).length;
        return { date:h.date, dow:h.dow, sold, zeroStk, total:items.length };
      });
      const last7 = days.slice(-7);
      const prev7 = days.slice(-14,-7);
      const thisTotal = rnd(last7.reduce((s,d)=>s+d.sold,0), 0);
      const prevTotal = rnd(prev7.reduce((s,d)=>s+d.sold,0), 0);
      const diffPct = prevTotal > 0 ? rnd(((thisTotal-prevTotal)/prevTotal)*100,1) : null;

      const typeMap = { weekday:[], weekend:[], holiday:[] };
      days.forEach(d => {
        if (d.sold > 0) typeMap[getDayType(d.date, d.dow)].push(d.sold);
      });
      const typeAvgFn = arr => arr.length ? rnd(arr.reduce((a,b)=>a+b,0)/arr.length,1) : null;
      const typeAvg = { weekday: typeAvgFn(typeMap.weekday), weekend: typeAvgFn(typeMap.weekend), holiday: typeAvgFn(typeMap.holiday) };

      const latestItems = latest ? Object.entries(latest.items||{}).filter(([,i])=>i.cat===cat) : [];
      const zeroToday = latestItems.filter(([,i])=>i.actualSum===0).length;
      const expiringToday = latestItems.filter(([,i])=>(i.batches||[]).some(b=>b.dday!==null&&b.dday<=3&&b.actual>0)).length;
      const totalSkus = latestItems.length;
      const stockoutRate = totalSkus > 0 ? rnd(zeroToday/totalSkus*100,0) : 0;

      // TOP 소진 (최근 14일)
      const skuZero = {};
      sorted.slice(-14).forEach(h => {
        Object.entries(h.items||{}).filter(([,i])=>i.cat===cat).forEach(([sku,i]) => {
          if (i.actualSum===0) skuZero[sku] = (skuZero[sku]||0)+1;
        });
      });
      const topZero = Object.entries(skuZero).sort((a,b)=>b[1]-a[1]).slice(0,3)
        .map(([sku,cnt]) => ({ sku, cnt, name:(skuAliases[sku]||latest?.items?.[sku]?.name||sku) }));

      // TOP 판매 (최근 7일)
      const skuSold = {};
      last7.forEach(dayData => {
        const h = sorted.find(h=>h.date===dayData.date);
        if (!h) return;
        Object.entries(h.items||{}).filter(([,i])=>i.cat===cat).forEach(([sku,i]) => {
          if (autoSkipSet && autoSkipSet.has(`${h.date}__${sku}`)) return;
          skuSold[sku] = (skuSold[sku]||0) + (i.sold||0);
        });
      });
      const topSold = Object.entries(skuSold).sort((a,b)=>b[1]-a[1]).slice(0,3)
        .map(([sku,v]) => ({ sku, sold:rnd(v,1), name:(skuAliases[sku]||latest?.items?.[sku]?.name||sku) }));

      // 요일별 평균
      const dowMap = {};
      days.forEach(d => {
        if (!dowMap[d.dow]) dowMap[d.dow] = [];
        if (d.sold > 0) dowMap[d.dow].push(d.sold);
      });
      const dowAvg = {};
      Object.entries(dowMap).forEach(([d,vals]) => {
        dowAvg[d] = vals.length ? rnd(vals.reduce((a,b)=>a+b,0)/vals.length,1) : null;
      });

      // 푸드 서브카테고리
      let foodSubs = null;
      if (cat === "[20] Food") {
        const subMap = {};
        sorted.slice(-14).forEach(h => {
          Object.entries(h.items||{}).filter(([,i])=>i.cat===cat).forEach(([sku,i]) => {
            if (autoSkipSet && autoSkipSet.has(`${h.date}__${sku}`)) return;
            const sub = getFoodSub(i.name);
            if (!subMap[sub]) subMap[sub] = { sold:0, skuSet:new Set() };
            subMap[sub].sold += (i.sold||0);
            subMap[sub].skuSet.add(sku);
          });
        });
        foodSubs = Object.entries(subMap)
          .map(([sub,v]) => ({ sub, sold:rnd(v.sold,0), skus:v.skuSet.size }))
          .sort((a,b)=>b.sold-a.sold);
      }

      stats[cat] = { days, last7, thisTotal, prevTotal, diffPct, typeAvg, totalSkus,
        zeroToday, expiringToday, stockoutRate, topSold, topZero, dowAvg, foodSubs };
    });
    return stats;
  }, [allCats, sorted, uploadHistory, autoSkipSet, skuAliases, latest]);

  const CAT_META = {
    "[10] Bev":    { icon:"🧃", color:T.blue,  label:"음료" },
    "[20] Food":   { icon:"🥐", color:T.amber, label:"푸드" },
    "[50] 원재료": { icon:"🥛", color:T.brand, label:"원재료" },
  };

  // ── 미니 라인차트 ──
  const MiniLine = ({ data, color }) => {
    if (!data || data.length < 2) return null;
    const W=200, H=44, PL=4, PR=4, PT=4, PB=4;
    const maxV = Math.max(...data.map(d=>d.sold), 1);
    const xs = data.map((_,i) => PL + i*(W-PL-PR)/(data.length-1));
    const ys = data.map(d => PT + (H-PT-PB)*(1-d.sold/maxV));
    const path = xs.map((x,i) => (i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(" ");
    const area = `${path} L${xs[xs.length-1]},${H-PB} L${xs[0]},${H-PB} Z`;
    const gid = `mg${color.replace(/[^a-z0-9]/gi,'')}`;
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:H, display:"block" }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        <path d={area} fill={`url(#${gid})`}/>
        <path d={path} fill="none" stroke={color} strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((d,i) => (
          <circle key={i} cx={xs[i]} cy={ys[i]} r="2.5" fill={color}/>
        ))}
      </svg>
    );
  };

  // ── 도넛 게이지 ──
  const Gauge = ({ pct, color, size=44 }) => {
    const r=16, cx=size/2, cy=size/2;
    const circ = 2*Math.PI*r;
    const dash = (pct/100)*circ;
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={T.card3} strokeWidth="5"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="5"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}/>
        <text x={cx} y={cy+4} textAnchor="middle" fontSize="9" fontWeight="800" fill={color}>{pct}%</text>
      </svg>
    );
  };

  // ── 뷰 모드 탭 ──
  return (
    <div>
      {/* 상단 모드 전환 */}
      <div style={{ display:"flex", gap:6, marginBottom:16 }}>
        {[["overview","📊 카테고리 개요"],["table","📋 전체 품목 평일/주말"]].map(([id,label]) => (
          <button key={id} onClick={()=>setViewMode(id)} style={{
            padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer",
            fontFamily:F, fontSize:13, fontWeight:viewMode===id?700:500,
            background:viewMode===id?T.brand:T.card2,
            color:viewMode===id?"#fff":T.t2
          }}>{label}</button>
        ))}
      </div>

      {/* ── 카테고리 개요 ── */}
      {viewMode === "overview" && (
        <div>
          <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:14 }}>
            카테고리별 최근 7일 현황 · {latest ? fmtDate(latest.date)+" 기준" : ""}
          </div>
          {allCats.map(cat => {
            const s = catStats[cat];
            if (!s) return null;
            const meta = CAT_META[cat] || { icon:"📦", color:T.brand, label:cat };
            const diffColor = s.diffPct === null ? T.t3 : s.diffPct >= 0 ? T.brand : T.red;
            const zeroColor = s.stockoutRate > 30 ? T.red : s.stockoutRate > 15 ? T.amber : T.brand;
            const wd = s.typeAvg.weekday, we = s.typeAvg.weekend, hl = s.typeAvg.holiday;
            const weDiff = wd && we ? Math.round(((parseFloat(we)-parseFloat(wd))/parseFloat(wd))*100) : null;
            return (
              <div key={cat} style={{ marginBottom:16, background:T.card,
                borderRadius:16, overflow:"hidden", border:"1px solid "+T.b0, boxShadow:T.sh1 }}>
                {/* 헤더 */}
                <div style={{ background:`linear-gradient(135deg,${meta.color}18,${meta.color}08)`,
                  borderBottom:"1px solid "+T.b0, padding:"14px 16px",
                  display:"flex", alignItems:"center", gap:12 }}>
                  <span style={{ fontSize:24 }}>{meta.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:15, fontWeight:800, color:T.t1, fontFamily:F }}>{cat}</div>
                    <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>{s.totalSkus}개 품목</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:20, fontWeight:900, color:meta.color, fontFamily:F, lineHeight:1 }}>
                      {s.thisTotal}<span style={{ fontSize:11, fontWeight:400, marginLeft:2 }}>개</span>
                    </div>
                    <div style={{ fontSize:11, fontWeight:700, color:diffColor, fontFamily:F, marginTop:2 }}>
                      {s.diffPct === null ? "-" : (s.diffPct>=0?"▲":"▼")+Math.abs(s.diffPct)+"% 전주比"}
                    </div>
                  </div>
                </div>
                <div style={{ padding:"12px 16px" }}>
                  {/* 상태 뱃지 */}
                  {(s.zeroToday > 0 || s.expiringToday > 0) && (
                    <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
                      {s.zeroToday > 0 && (
                        <span style={{ fontSize:11, fontWeight:700, color:T.red,
                          background:T.rDim, border:"1px solid "+T.rBdr,
                          borderRadius:8, padding:"3px 10px", fontFamily:F }}>
                          🚨 품절 {s.zeroToday}개 품목
                        </span>
                      )}
                      {s.expiringToday > 0 && (
                        <span style={{ fontSize:11, fontWeight:700, color:"#C04000",
                          background:"rgba(192,64,0,0.08)", border:"1px solid rgba(192,64,0,0.2)",
                          borderRadius:8, padding:"3px 10px", fontFamily:F }}>
                          ⏰ 유통임박 {s.expiringToday}개 품목
                        </span>
                      )}
                    </div>
                  )}
                  {/* KPI 4개 */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8, marginBottom:14 }}>
                    {[
                      { label:"📅 평일 평균", value:wd ? wd+"개" : "-", color:T.t2, sub:null },
                      { label:"🌅 주말 평균", value:we ? we+"개" : "-",
                        color:weDiff!==null&&weDiff>=20?T.amber:T.t2,
                        sub:weDiff!==null?(weDiff>0?"▲":"▼")+Math.abs(weDiff)+"%":null },
                      { label:"🎌 공휴일 평균", value:hl ? hl+"개" : "-", color:"#C04000", sub:null },
                      { label:"재고소진율", value:s.stockoutRate+"%", color:zeroColor,
                        sub:s.avgZero>0?"일평균 "+rnd(s.last7.reduce((a,d)=>a+d.zeroStk,0)/(s.last7.length||1),1)+"개":null },
                    ].map(k => (
                      <div key={k.label} style={{ background:T.card2, borderRadius:10, padding:"8px 6px", textAlign:"center" }}>
                        <div style={{ fontSize:9, color:T.t3, fontFamily:F, marginBottom:3, lineHeight:1.3 }}>{k.label}</div>
                        <div style={{ fontSize:15, fontWeight:800, color:k.color, fontFamily:F }}>{k.value}</div>
                        {k.sub && <div style={{ fontSize:9, color:k.color, fontFamily:F, marginTop:2, opacity:0.8 }}>{k.sub}</div>}
                      </div>
                    ))}
                  </div>
                  {/* 미니차트 + 게이지 */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:12, marginBottom:14, alignItems:"center" }}>
                    <div>
                      <div style={{ fontSize:10, color:T.t3, fontFamily:F, marginBottom:4 }}>7일 판매 추이</div>
                      <MiniLine data={s.last7} color={meta.color}/>
                      <div style={{ display:"grid", gridTemplateColumns:`repeat(${s.last7.length},1fr)`, marginTop:2 }}>
                        {s.last7.map(d => (
                          <div key={d.date} style={{ fontSize:8, textAlign:"center",
                            color:d.dow===0?T.red:d.dow===6?T.blue:T.t4, fontFamily:F }}>
                            {DOW_KR_L[d.dow]}
                          </div>
                        ))}
                      </div>
                    </div>
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:10, color:T.t3, fontFamily:F, marginBottom:6 }}>재고소진율</div>
                      <Gauge pct={s.stockoutRate} color={zeroColor}/>
                      <div style={{ fontSize:9, color:T.t3, fontFamily:F, marginTop:4 }}>
                        {s.zeroToday}/{s.totalSkus} 품목
                      </div>
                    </div>
                  </div>
                  {/* 요일별 평균 바 */}
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:10, color:T.t3, fontFamily:F, marginBottom:6 }}>요일별 평균 판매</div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
                      {[0,1,2,3,4,5,6].map(dow => {
                        const avg = s.dowAvg[dow];
                        const maxA = Math.max(...Object.values(s.dowAvg).map(v=>parseFloat(v)||0),1);
                        const ratio = (parseFloat(avg)||0)/maxA;
                        const col = dow===0?T.red:dow===6?T.blue:meta.color;
                        return (
                          <div key={dow} style={{ textAlign:"center" }}>
                            <div style={{ fontSize:9, fontWeight:700, color:col, fontFamily:F, marginBottom:2 }}>{DOW_KR_L[dow]}</div>
                            <div style={{ height:28, background:T.card3, borderRadius:4, position:"relative", overflow:"hidden", marginBottom:2 }}>
                              <div style={{ position:"absolute", bottom:0, left:0, right:0,
                                height:(ratio*100)+"%", background:col, opacity:0.75, borderRadius:4 }}/>
                            </div>
                            <div style={{ fontSize:9, fontWeight:700, color:col, fontFamily:F }}>{avg||"-"}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  {/* 푸드 서브카테고리 */}
                  {s.foodSubs && s.foodSubs.length > 0 && (
                    <div style={{ marginBottom:14 }}>
                      <div style={{ fontSize:10, fontWeight:700, color:T.t3, fontFamily:F, marginBottom:6 }}>🥐 푸드 유형별 판매 (14일)</div>
                      {s.foodSubs.map(sub => (
                        <div key={sub.sub} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5 }}>
                          <div style={{ fontSize:11, color:T.t1, fontFamily:F, width:88, flexShrink:0 }}>
                            {sub.sub}<span style={{ fontSize:10, color:T.t4, marginLeft:3 }}>({sub.skus}종)</span>
                          </div>
                          <div style={{ flex:1, height:10, background:T.card3, borderRadius:3, overflow:"hidden" }}>
                            <div style={{ width:(sub.sold/(s.foodSubs[0]?.sold||1)*100)+"%", height:"100%",
                              background:meta.color, opacity:0.75, borderRadius:3 }}/>
                          </div>
                          <div style={{ fontSize:11, fontWeight:700, color:meta.color, fontFamily:F, width:30, textAlign:"right", flexShrink:0 }}>{sub.sold}</div>
                        </div>
                      ))}
                    </div>
                  )}
                  {/* TOP 판매 + TOP 소진 */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    <div style={{ background:T.card2, borderRadius:10, padding:"10px 10px" }}>
                      <div style={{ fontSize:10, fontWeight:700, color:meta.color, fontFamily:F, marginBottom:8 }}>🔥 7일 TOP 판매</div>
                      {s.topSold.length === 0
                        ? <div style={{ fontSize:11, color:T.t4, fontFamily:F }}>데이터 없음</div>
                        : s.topSold.map((item,i) => (
                          <div key={item.sku} style={{ marginBottom:i<s.topSold.length-1?6:0 }}>
                            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                              <span style={{ fontSize:11, color:T.t1, fontFamily:F, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"80%" }}>
                                {i+1}. {item.name.length>16?item.name.slice(0,15)+"…":item.name}
                              </span>
                              <span style={{ fontSize:11, fontWeight:700, color:meta.color, fontFamily:F, flexShrink:0 }}>{item.sold}</span>
                            </div>
                            <div style={{ height:4, background:T.card3, borderRadius:2, overflow:"hidden" }}>
                              <div style={{ width:(item.sold/(s.topSold[0]?.sold||1)*100)+"%", height:"100%", background:meta.color, opacity:0.7, borderRadius:2 }}/>
                            </div>
                          </div>
                        ))}
                    </div>
                    <div style={{ background:T.card2, borderRadius:10, padding:"10px 10px" }}>
                      <div style={{ fontSize:10, fontWeight:700, color:T.red, fontFamily:F, marginBottom:8 }}>🚨 소진 빈발</div>
                      {s.topZero.length === 0
                        ? <div style={{ fontSize:11, color:T.t4, fontFamily:F }}>소진 없음 ✓</div>
                        : s.topZero.map((item,i) => (
                          <div key={item.sku} style={{ marginBottom:i<s.topZero.length-1?6:0 }}>
                            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                              <span style={{ fontSize:11, color:T.t1, fontFamily:F, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"80%" }}>
                                {i+1}. {item.name.length>16?item.name.slice(0,15)+"…":item.name}
                              </span>
                              <span style={{ fontSize:11, fontWeight:700, color:T.red, fontFamily:F, flexShrink:0 }}>{item.cnt}회</span>
                            </div>
                            <div style={{ height:4, background:T.card3, borderRadius:2, overflow:"hidden" }}>
                              <div style={{ width:(item.cnt/(s.topZero[0]?.cnt||1)*100)+"%", height:"100%", background:T.red, opacity:0.7, borderRadius:2 }}/>
                            </div>
                          </div>
                        ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── 전체 품목 평일/주말 테이블 ── */}
      {viewMode === "table" && (
        <div>
          <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:6 }}>
            전체 {allSkuStats.length}개 품목 · 최근 21일 기준 · 판매 0인 날 제외
          </div>
          {/* 카테고리별로 묶어서 표시 */}
          {allCats.map(cat => {
            const meta = CAT_META[cat] || { icon:"📦", color:T.brand };
            const catItems = allSkuStats
              .filter(i => i.cat === cat)
              .sort((a,b) => (b.weekday||0)+(b.weekend||0) - ((a.weekday||0)+(a.weekend||0)));
            if (!catItems.length) return null;
            return (
              <div key={cat} style={{ marginBottom:20 }}>
                {/* 카테고리 헤더 */}
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8,
                  padding:"8px 12px", background:`linear-gradient(135deg,${meta.color}15,${meta.color}05)`,
                  borderRadius:10, border:"1px solid "+meta.color+"22" }}>
                  <span style={{ fontSize:18 }}>{meta.icon}</span>
                  <span style={{ fontSize:13, fontWeight:800, color:meta.color, fontFamily:F }}>{cat}</span>
                  <span style={{ fontSize:11, color:T.t3, fontFamily:F }}>{catItems.length}개 품목</span>
                  {cat === "[20] Food" && (
                    <span style={{ fontSize:10, color:T.t4, fontFamily:F, marginLeft:4 }}>
                      (케이크/샌드위치/빵 등 분류 포함)
                    </span>
                  )}
                </div>
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, fontFamily:F }}>
                    <thead>
                      <tr style={{ background:T.brandDim }}>
                        <th style={{ padding:"8px 10px", textAlign:"left", color:T.brand, fontWeight:700, minWidth:130 }}>품목명</th>
                        {cat === "[20] Food" && (
                          <th style={{ padding:"8px 8px", textAlign:"center", color:T.t3, fontWeight:700, minWidth:70 }}>분류</th>
                        )}
                        <th style={{ padding:"8px 8px", textAlign:"center", color:T.brand, fontWeight:700, minWidth:55 }}>평일 avg</th>
                        <th style={{ padding:"8px 8px", textAlign:"center", color:T.amber, fontWeight:700, minWidth:55 }}>주말 avg</th>
                        <th style={{ padding:"8px 8px", textAlign:"center", color:"#C04000", fontWeight:700, minWidth:55 }}>공휴일</th>
                        <th style={{ padding:"8px 8px", textAlign:"center", color:T.t3, fontWeight:700, minWidth:60 }}>주말 증감</th>
                        <th style={{ padding:"8px 8px", textAlign:"center", color:T.red, fontWeight:700, minWidth:55 }}>소진율</th>
                      </tr>
                    </thead>
                    <tbody>
                      {catItems.map((item, i) => {
                        const weDiff = item.weDiff;
                        const weColor = weDiff === null ? T.t4
                          : weDiff >= 30 ? T.amber
                          : weDiff <= -30 ? T.blue
                          : T.t2;
                        const weBadge = weDiff === null ? "-"
                          : (weDiff > 0 ? "▲" : "▼") + Math.abs(weDiff) + "%";
                        const zeroColor = item.zeroRate > 50 ? T.red : item.zeroRate > 25 ? T.amber : T.t3;
                        const isHighWeekend = weDiff !== null && weDiff >= 30;
                        return (
                          <tr key={item.sku} style={{
                            background: isHighWeekend
                              ? "rgba(255,149,0,0.04)"
                              : i%2===0 ? T.card2 : T.card
                          }}>
                            <td style={{ padding:"7px 10px", color:T.t1, fontWeight:isHighWeekend?600:400 }}>
                              {item.name.length > 18 ? item.name.slice(0,17)+"…" : item.name}
                            </td>
                            {cat === "[20] Food" && (
                              <td style={{ padding:"7px 8px", textAlign:"center" }}>
                                {item.foodSub && (
                                  <span style={{ fontSize:10, color:T.t2, background:T.card3,
                                    borderRadius:5, padding:"2px 6px", whiteSpace:"nowrap" }}>
                                    {item.foodSub}
                                  </span>
                                )}
                              </td>
                            )}
                            <td style={{ padding:"7px 8px", textAlign:"center", color:T.t2, fontWeight:600 }}>
                              {item.weekday !== null ? item.weekday : <span style={{color:T.t4}}>-</span>}
                            </td>
                            <td style={{ padding:"7px 8px", textAlign:"center", color:T.amber, fontWeight:700 }}>
                              {item.weekend !== null ? item.weekend : <span style={{color:T.t4}}>-</span>}
                            </td>
                            <td style={{ padding:"7px 8px", textAlign:"center", color:"#C04000", fontWeight:700 }}>
                              {item.holiday !== null ? item.holiday : <span style={{color:T.t4}}>-</span>}
                            </td>
                            <td style={{ padding:"7px 8px", textAlign:"center", color:weColor, fontWeight:700 }}>
                              {weBadge}
                              {isHighWeekend && <span style={{ fontSize:9, marginLeft:2 }}>🌅</span>}
                            </td>
                            <td style={{ padding:"7px 8px", textAlign:"center", color:zeroColor, fontWeight:600 }}>
                              {item.zeroRate > 0 ? item.zeroRate+"%" : <span style={{color:T.t4}}>-</span>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}
          <div style={{ fontSize:10, color:T.t4, fontFamily:F, marginTop:4, textAlign:"center" }}>
            주말 증감 🌅 = 평일 대비 +30% 이상 · 소진율 = 기간 내 재고=0 비율
          </div>
        </div>
      )}
    </div>
  );
}



function HistoryTab({ uploadHistory, manualRecords, manualItems, skuAliases }) {
  const DOW_KR_L = ["일","월","화","수","목","금","토"];
  const rnd = (v, d=1) => Math.round(v * Math.pow(10,d)) / Math.pow(10,d);

  /* ── 기간 프리셋 ── */
  const today = new Date(); today.setHours(0,0,0,0);
  const fmt = (d) => d.toISOString().slice(0,10);
  const sub = (d, n) => { const x=new Date(d); x.setDate(x.getDate()-n); return x; };

  const PRESETS = [
    { label:"이번 주",  getRange: () => {
        const mon = new Date(today); mon.setDate(today.getDate()-((today.getDay()+6)%7));
        return [fmt(mon), fmt(today)];
      }
    },
    { label:"저번 주",  getRange: () => {
        const mon = new Date(today); mon.setDate(today.getDate()-((today.getDay()+6)%7)-7);
        const sun = new Date(mon); sun.setDate(mon.getDate()+6);
        return [fmt(mon), fmt(sun)];
      }
    },
    { label:"최근 14일", getRange: () => [fmt(sub(today,13)), fmt(today)] },
    { label:"이번 달",   getRange: () => {
        const s = new Date(today.getFullYear(), today.getMonth(), 1);
        return [fmt(s), fmt(today)];
      }
    },
    { label:"전체",     getRange: () => {
        if (!uploadHistory.length) return [fmt(today), fmt(today)];
        const sorted = [...uploadHistory].sort((a,b)=>a.date.localeCompare(b.date));
        return [sorted[0].date, sorted[sorted.length-1].date];
      }
    },
  ];

  const [preset, setPreset]     = React.useState("최근 14일");
  const [customFrom, setCustomFrom] = React.useState("");
  const [customTo,   setCustomTo]   = React.useState("");
  const [showCustom, setShowCustom] = React.useState(false);
  const [catFilter, setCatFilter]   = React.useState("전체");
  const [sortKey, setSortKey]       = React.useState("weekendDiff");
  const [sortAsc, setSortAsc]       = React.useState(false);
  const [viewMode, setViewMode]     = React.useState("insight"); // insight | manual
  const exportRef = React.useRef(null);

  /* ── 기간 범위 결정 ── */
  const [rangeFrom, rangeTo] = React.useMemo(() => {
    if (showCustom && customFrom && customTo) return [customFrom, customTo];
    const p = PRESETS.find(p => p.label === preset);
    return p ? p.getRange() : PRESETS[2].getRange();
  }, [preset, showCustom, customFrom, customTo, uploadHistory]);

  /* ── 기간 내 히스토리 필터 ── */
  const periodHist = React.useMemo(() =>
    uploadHistory.filter(h => h.date >= rangeFrom && h.date <= rangeTo)
      .sort((a,b)=>a.date.localeCompare(b.date)),
    [uploadHistory, rangeFrom, rangeTo]
  );

  /* ── 이전 기간 (비교용) ── */
  const prevPeriodHist = React.useMemo(() => {
    const days = periodHist.length || 7;
    const prevTo   = fmt(sub(new Date(rangeFrom+"T00:00:00"), 1));
    const prevFrom = fmt(sub(new Date(rangeFrom+"T00:00:00"), days));
    return uploadHistory.filter(h => h.date >= prevFrom && h.date <= prevTo);
  }, [uploadHistory, rangeFrom, periodHist.length]);

  /* ── 자동 누락 감지 ── */
  const autoSkipSet = React.useMemo(() => {
    const skipped = new Set();
    const sorted = [...uploadHistory].sort((a,b)=>a.date.localeCompare(b.date));
    for (let i=1; i<sorted.length; i++) {
      const cur=sorted[i], prev=sorted[i-1];
      Object.keys(cur.items||{}).forEach(sku => {
        const ci=cur.items[sku], pi=prev.items?.[sku];
        if (!ci||!pi) return;
        if (ci.sold===0 && Math.abs(ci.actualSum-pi.actualSum)===0 && pi.sold>0)
          skipped.add(`${cur.date}__${sku}`);
      });
    }
    return skipped;
  }, [uploadHistory]);

  /* ── 전체 SKU 목록 ── */
  const allCats = React.useMemo(() => {
    const cats = new Set();
    uploadHistory.forEach(h => Object.values(h.items||{}).forEach(i=>cats.add(i.cat)));
    return [...cats].sort();
  }, [uploadHistory]);

  /* ── 품목별 통계 계산 (기간 적용) ── */
  const skuStats = React.useMemo(() => {
    const map = {};
    periodHist.forEach(h => {
      Object.entries(h.items||{}).forEach(([sku, item]) => {
        if (autoSkipSet.has(`${h.date}__${sku}`)) return;
        if (!map[sku]) map[sku] = {
          name: skuAliases[sku]||item.name, cat: item.cat,
          foodSub: item.cat==="[20] Food" ? getFoodSub(item.name) : null,
          wd:[], we:[], hl:[], zeroCount:0, days:0,
          soldDays:[], spark:[]
        };
        const s = map[sku];
        const t = getDayType(h.date, h.dow);
        const sold = item.sold||0;
        s.days++;
        s.spark.push({ date:h.date, sold, dow:h.dow });
        if (item.actualSum===0) s.zeroCount++;
        if (sold>0) {
          if (t==="weekday") s.wd.push(sold);
          else if (t==="weekend") s.we.push(sold);
          else s.hl.push(sold);
        }
      });
    });
    const avg = arr => arr.length ? rnd(arr.reduce((a,b)=>a+b,0)/arr.length,1) : null;
    return Object.entries(map).map(([sku, s]) => {
      const wdAvg=avg(s.wd), weAvg=avg(s.we), hlAvg=avg(s.hl);
      const weDiff = wdAvg&&weAvg ? Math.round(((weAvg-wdAvg)/wdAvg)*100) : null;
      const zeroRate = s.days>0 ? rnd(s.zeroCount/s.days*100,0) : 0;
      // 재고 회전 지수: 총 판매량 / 평균 재고
      const totalSold = s.wd.concat(s.we,s.hl).reduce((a,b)=>a+b,0);
      return { sku, ...s, wdAvg, weAvg, hlAvg, weDiff, zeroRate, totalSold };
    });
  }, [periodHist, autoSkipSet, skuAliases]);

  /* ── 기간 KPI ── */
  const kpi = React.useMemo(() => {
    if (!periodHist.length) return null;
    const totalSold = rnd(periodHist.reduce((s,h) =>
      s + Object.entries(h.items||{}).reduce((ss,[sku,i]) =>
        autoSkipSet.has(`${h.date}__${sku}`) ? ss : ss+(i.sold||0), 0), 0), 0);
    const prevSold = rnd(prevPeriodHist.reduce((s,h) =>
      s + Object.values(h.items||{}).reduce((ss,i)=>ss+(i.sold||0),0), 0), 0);
    const diff = prevSold>0 ? rnd((totalSold-prevSold)/prevSold*100,1) : null;
    const dayAvg = rnd(totalSold/(periodHist.length||1),0);
    // 오늘 기준 Action Items
    const latest = [...uploadHistory].sort((a,b)=>b.date.localeCompare(a.date))[0];
    const latestItems = latest ? Object.values(latest.items||{}) : [];
    const zeroCount = latestItems.filter(i=>i.actualSum===0).length;
    const expiringCount = latestItems.filter(i=>(i.batches||[]).some(b=>b.dday!==null&&b.dday<=3&&b.actual>0)).length;
    const zeroSkus = periodHist.reduce((cnt, h) =>
      cnt + Object.entries(h.items||{}).filter(([sku,i])=>
        i.actualSum===0&&!autoSkipSet.has(`${h.date}__${sku}`)
      ).length, 0);
    return { totalSold, prevSold, diff, dayAvg, zeroCount, expiringCount, zeroSkus };
  }, [periodHist, prevPeriodHist, autoSkipSet, uploadHistory]);

  /* ── 일별 총 판매 (라인차트용) ── */
  const dailySales = React.useMemo(() =>
    periodHist.map(h => ({
      date:h.date, dow:h.dow,
      sold: rnd(Object.entries(h.items||{}).reduce((s,[sku,i])=>
        autoSkipSet.has(`${h.date}__${sku}`) ? s : s+(i.sold||0), 0), 0)
    })),
    [periodHist, autoSkipSet]
  );

  /* ── 필터/정렬 적용 ── */
  const tableData = React.useMemo(() => {
    let rows = skuStats.filter(s => catFilter==="전체"||s.cat===catFilter);
    rows.sort((a,b) => {
      let va = a[sortKey] ?? -999, vb = b[sortKey] ?? -999;
      return sortAsc ? va-vb : vb-va;
    });
    return rows;
  }, [skuStats, catFilter, sortKey, sortAsc]);

  /* ── 스파크라인 SVG ── */
  const Spark = ({ data }) => {
    const W=60, H=20;
    if (!data||data.length<2) return <svg width={W} height={H}><text x="4" y="14" fontSize="8" fill="#CCC">-</text></svg>;
    const maxV = Math.max(...data.map(d=>d.sold),1);
    const xs = data.map((_,i)=>4+i*(W-8)/(data.length-1));
    const ys = data.map(d=>H-4-(d.sold/maxV)*(H-8));
    const path = xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(" ");
    return (
      <svg width={W} height={H} style={{ display:"block" }}>
        <path d={path} fill="none" stroke={T.brand} strokeWidth="1.5"
          strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((d,i)=>(
          <circle key={i} cx={xs[i]} cy={ys[i]} r="1.8" fill={T.brand}/>
        ))}
      </svg>
    );
  };

  /* ── 전체 라인차트 SVG ── */
  const LineChart = ({ data }) => {
    if (!data||data.length<2) return null;
    const W=500, H=100, PL=40, PR=12, PT=10, PB=24;
    const maxV = Math.max(...data.map(d=>d.sold),1);
    const xtick = (i) => PL+i*(W-PL-PR)/(data.length-1);
    const ytick = (v) => PT+(H-PT-PB)*(1-v/maxV);
    const xs=data.map((_,i)=>xtick(i));
    const ys=data.map(d=>ytick(d.sold));
    const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(" ");
    const area=`${path} L${xs[xs.length-1]},${H-PB} L${PL},${H-PB} Z`;
    const yLines = [0.25,0.5,0.75,1];
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:H, display:"block" }}>
        <defs>
          <linearGradient id="lgrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={T.brand} stopOpacity="0.22"/>
            <stop offset="100%" stopColor={T.brand} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        {yLines.map(r=>(
          <line key={r} x1={PL} y1={ytick(maxV*r)} x2={W-PR} y2={ytick(maxV*r)}
            stroke="#E5E5EA" strokeWidth="0.8"/>
        ))}
        <text x={PL-4} y={PT+4} fontSize="9" fill="#8E8E93" textAnchor="end">{maxV}</text>
        <text x={PL-4} y={H-PB} fontSize="9" fill="#8E8E93" textAnchor="end">0</text>
        <path d={area} fill="url(#lgrad)"/>
        <path d={path} fill="none" stroke={T.brand} strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((d,i)=>(
          <g key={d.date}>
            <circle cx={xs[i]} cy={ys[i]} r="3" fill={T.brand}/>
            <text x={xs[i]} y={H-2} fontSize="8.5" fill={d.dow===0?T.red:d.dow===6?T.blue:"#8E8E93"}
              textAnchor="middle">{DOW_KR_L[d.dow]}</text>
          </g>
        ))}
      </svg>
    );
  };

  /* ── 정렬 헤더 ── */
  const SortTh = ({ k, label, color, minW=60 }) => {
    const active = sortKey===k;
    return (
      <th onClick={()=>{ if(active) setSortAsc(a=>!a); else { setSortKey(k); setSortAsc(false); } }}
        style={{ padding:"8px 8px", textAlign:"center", color:active?color:T.t3,
          fontWeight:700, cursor:"pointer", minWidth:minW, whiteSpace:"nowrap",
          background:active?color+"11":"transparent",
          userSelect:"none" }}>
        {label}{active ? (sortAsc?"↑":"↓") : ""}
      </th>
    );
  };

  /* ── Excel 내보내기 ── */
  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    // 시트 1: 기간 요약
    const sumRows = [
      ["기간", rangeFrom+" ~ "+rangeTo],
      ["카테고리", catFilter],
      ["총 판매량", kpi?.totalSold||0],
      ["일 평균 판매", kpi?.dayAvg||0],
      ["전기 대비", kpi?.diff !== null ? (kpi.diff>0?"+":"")+kpi.diff+"%" : "-"],
      [],
      ["품목명","카테고리","분류","평일 avg","주말 avg","공휴일 avg","주말 증감%","소진율%","7일 총 판매"],
      ...tableData.map(s=>[
        s.name, s.cat, s.foodSub||"",
        s.wdAvg??"-", s.weAvg??"-", s.hlAvg??"-",
        s.weDiff!==null?s.weDiff+"%":"-",
        s.zeroRate+"%",
        s.totalSold
      ])
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sumRows), "통계 요약");
    // 시트 2: 일별 판매
    const dailyRows = [
      ["날짜","요일","총 판매량"],
      ...dailySales.map(d=>[d.date, DOW_KR_L[d.dow], d.sold])
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dailyRows), "일별 판매");
    XLSX.writeFile(wb, `발주통계_${rangeFrom}_${rangeTo}.xlsx`);
  };

  /* ── 이미지 내보내기 ── */
  const exportImage = async () => {
    const el = exportRef.current;
    if (!el || !window.html2canvas) { alert("html2canvas가 로드되지 않았어요"); return; }
    try {
      const canvas = await window.html2canvas(el, {
        backgroundColor: "#F2F2F7", scale: 2,
        useCORS: true, allowTaint: true,
        scrollX: 0, scrollY: -window.scrollY
      });
      const link = document.createElement("a");
      link.download = `발주통계_${rangeFrom}_${rangeTo}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    } catch(e) {
      alert("이미지 저장 중 오류가 발생했어요: "+e.message);
    }
  };

  if (viewMode === "manual") {
    return (
      <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
        <div style={{ display:"flex", gap:6, marginBottom:16 }}>
          <button onClick={()=>setViewMode("insight")} style={{
            padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer",
            fontFamily:F, fontSize:13, fontWeight:500,
            background:T.card2, color:T.t2 }}>← 인사이트로</button>
        </div>
        <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>수동 입력 요일별 평균</div>
        {manualRecords.length === 0
          ? <EmptyState emoji="📝" text="수동 입력 기록이 없어요" sub="수동 입력 탭에서 재고를 입력해주세요"/>
          : manualItems.slice(0,5).map(item => {
            const avgs = [0,1,2,3,4,5,6].map(dow => {
              const vals = manualRecords.filter(r=>r.dow===dow&&!r.items?.[item]?.skipped&&r.items?.[item]?.used>0)
                .map(r=>r.items[item].used);
              return vals.length ? rnd(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
            });
            const maxAvg = Math.max(...avgs.map(v=>parseFloat(v)||0));
            return (
              <Card key={item} style={{ padding:"12px 14px", marginBottom:10 }}>
                <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>{item}</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
                  {avgs.map((avg,dow) => {
                    const ratio=maxAvg>0?(parseFloat(avg)||0)/maxAvg:0;
                    const col=dow===0?T.red:dow===6?T.blue:T.brand;
                    return (
                      <div key={dow} style={{ textAlign:"center" }}>
                        <div style={{ fontSize:10, color:col, fontWeight:700, fontFamily:F, marginBottom:2 }}>{["일","월","화","수","목","금","토"][dow]}</div>
                        <div style={{ height:36, background:T.card3, borderRadius:4, position:"relative", overflow:"hidden", marginBottom:2 }}>
                          <div style={{ position:"absolute", bottom:0, left:0, right:0, height:(ratio*100)+"%", background:col, opacity:0.8 }}/>
                        </div>
                        <div style={{ fontSize:11, fontWeight:700, color:col, fontFamily:F }}>{avg||"-"}</div>
                      </div>
                    );
                  })}
                </div>
              </Card>
            );
          })
        }
      </div>
    );
  }

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">

      {/* ── 상단 컨트롤 바 ── */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:16, alignItems:"center" }}>
        {/* 기간 프리셋 */}
        <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
          {PRESETS.map(p=>(
            <button key={p.label} onClick={()=>{setPreset(p.label);setShowCustom(false);}} style={{
              padding:"6px 12px", borderRadius:20, border:"1px solid "+(preset===p.label&&!showCustom?T.brand:T.b1),
              background:preset===p.label&&!showCustom?T.brandDim:T.card,
              color:preset===p.label&&!showCustom?T.brand:T.t2,
              fontSize:12, fontWeight:preset===p.label&&!showCustom?700:400,
              cursor:"pointer", fontFamily:F
            }}>{p.label}</button>
          ))}
          <button onClick={()=>setShowCustom(v=>!v)} style={{
            padding:"6px 12px", borderRadius:20,
            border:"1px solid "+(showCustom?T.brand:T.b1),
            background:showCustom?T.brandDim:T.card,
            color:showCustom?T.brand:T.t2,
            fontSize:12, fontWeight:showCustom?700:400, cursor:"pointer", fontFamily:F
          }}>직접 설정</button>
        </div>
        {/* 카테고리 필터 */}
        <div style={{ display:"flex", gap:4, marginLeft:"auto", flexWrap:"wrap" }}>
          {["전체",...allCats].map(c=>(
            <button key={c} onClick={()=>setCatFilter(c)} style={{
              padding:"6px 10px", borderRadius:16,
              border:"1px solid "+(catFilter===c?T.brand:T.b1),
              background:catFilter===c?T.brandDim:T.card,
              color:catFilter===c?T.brand:T.t2,
              fontSize:11, fontWeight:catFilter===c?700:400, cursor:"pointer", fontFamily:F
            }}>{c.replace("[10] ","").replace("[20] ","").replace("[50] ","")}</button>
          ))}
        </div>
        {/* 내보내기 버튼 */}
        <div style={{ display:"flex", gap:6 }}>
          <button onClick={exportExcel} style={{
            padding:"6px 12px", borderRadius:8, border:"1px solid "+T.b1,
            background:T.card, color:T.t2, fontSize:11, fontWeight:600,
            cursor:"pointer", fontFamily:F, display:"flex", alignItems:"center", gap:4
          }}>📊 Excel</button>
          <button onClick={exportImage} style={{
            padding:"6px 12px", borderRadius:8, border:"1px solid "+T.b1,
            background:T.card, color:T.t2, fontSize:11, fontWeight:600,
            cursor:"pointer", fontFamily:F, display:"flex", alignItems:"center", gap:4
          }}>🖼 이미지</button>
          <button onClick={()=>setViewMode("manual")} style={{
            padding:"6px 12px", borderRadius:8, border:"1px solid "+T.b1,
            background:T.card, color:T.t2, fontSize:11, fontWeight:500,
            cursor:"pointer", fontFamily:F
          }}>📝 수동</button>
        </div>
      </div>

      {/* 직접 설정 날짜 피커 */}
      {showCustom && (
        <div style={{ display:"flex", gap:8, marginBottom:12, alignItems:"center", flexWrap:"wrap" }}>
          <span style={{ fontSize:12, color:T.t3, fontFamily:F }}>기간 직접 설정</span>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
            style={{ padding:"6px 10px", borderRadius:8, border:"1px solid "+T.b1,
              fontFamily:F, fontSize:12, background:T.card }}/>
          <span style={{ color:T.t3 }}>~</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
            style={{ padding:"6px 10px", borderRadius:8, border:"1px solid "+T.b1,
              fontFamily:F, fontSize:12, background:T.card }}/>
        </div>
      )}

      {/* 내보내기 대상 영역 */}
      <div ref={exportRef}>

        {/* 기간 표시 */}
        <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginBottom:14 }}>
          📅 {rangeFrom} ~ {rangeTo}
          {periodHist.length > 0
            ? ` (${periodHist.length}일치 데이터)`
            : " — 해당 기간에 업로드된 데이터가 없어요"}
        </div>

        {uploadHistory.length === 0 ? (
          <EmptyState emoji="📁" text="업로드된 실사 데이터가 없어요" sub="실사 탭에서 엑셀을 업로드해주세요"/>
        ) : periodHist.length === 0 ? (
          <div style={{ textAlign:"center", padding:"40px 0", color:T.t3, fontFamily:F, fontSize:14 }}>
            해당 기간에 데이터가 없어요
          </div>
        ) : (
          <div>
            {/* ── Action Items ── */}
            {kpi && (kpi.zeroCount > 0 || kpi.expiringCount > 0) && (
              <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
                {kpi.zeroCount > 0 && (
                  <div style={{ display:"flex", alignItems:"center", gap:8,
                    background:T.rDim, border:"1px solid "+T.rBdr,
                    borderRadius:12, padding:"10px 14px", flex:1, minWidth:140 }}>
                    <span style={{ fontSize:20 }}>🚨</span>
                    <div>
                      <div style={{ fontSize:13, fontWeight:700, color:T.red, fontFamily:F }}>오늘 품절 {kpi.zeroCount}개 품목</div>
                      <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>발주 우선 검토</div>
                    </div>
                  </div>
                )}
                {kpi.expiringCount > 0 && (
                  <div style={{ display:"flex", alignItems:"center", gap:8,
                    background:"rgba(192,64,0,0.07)", border:"1px solid rgba(192,64,0,0.2)",
                    borderRadius:12, padding:"10px 14px", flex:1, minWidth:140 }}>
                    <span style={{ fontSize:20 }}>⏰</span>
                    <div>
                      <div style={{ fontSize:13, fontWeight:700, color:"#C04000", fontFamily:F }}>유통임박 {kpi.expiringCount}개 품목</div>
                      <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>D-3 이하</div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── KPI 카드 ── */}
            {kpi && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:16 }}>
                {[
                  { label:"기간 총 판매", value:kpi.totalSold+"개", color:T.brand,
                    sub: kpi.diff!==null ? (kpi.diff>=0?"▲":"▼")+Math.abs(kpi.diff)+"% 전기비" : "" },
                  { label:"일 평균 판매", value:kpi.dayAvg+"개", color:T.t2, sub:"" },
                  { label:"재고소진 횟수", value:kpi.zeroSkus+"회", color:kpi.zeroSkus>10?T.amber:T.t2,
                    sub:"기간 누적" },
                  { label:"자동 누락 제외", value:autoSkipSet.size+"건",
                    color:T.t3, sub:"통계 정확도 보정" },
                ].map(c=>(
                  <div key={c.label} style={{ background:T.card, border:"1px solid "+T.b0,
                    borderRadius:12, padding:"12px 14px" }}>
                    <div style={{ fontSize:10, color:T.t3, fontFamily:F, marginBottom:4 }}>{c.label}</div>
                    <div style={{ fontSize:20, fontWeight:900, color:c.color, fontFamily:F, lineHeight:1 }}>{c.value}</div>
                    {c.sub && <div style={{ fontSize:10, color:c.color, fontFamily:F, marginTop:4, opacity:0.8 }}>{c.sub}</div>}
                  </div>
                ))}
              </div>
            )}

            {/* ── 일별 판매 추이 라인차트 ── */}
            {dailySales.length >= 2 && (
              <Card style={{ padding:"14px 16px", marginBottom:16 }}>
                <div style={{ fontSize:12, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>
                  일별 총 판매 추이
                </div>
                <LineChart data={dailySales}/>
                {/* 요일 평균 요약 */}
                <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginTop:10 }}>
                  {[0,1,2,3,4,5,6].map(dow=>{
                    const days=dailySales.filter(d=>d.dow===dow);
                    if (!days.length) return null;
                    const avg=rnd(days.reduce((s,d)=>s+d.sold,0)/days.length,0);
                    const isWeekend=dow===0||dow===6;
                    return (
                      <div key={dow} style={{ fontSize:11, background:isWeekend?T.aDim:T.card2,
                        borderRadius:6, padding:"3px 9px", fontFamily:F,
                        color:dow===0?T.red:dow===6?T.blue:T.t2, fontWeight:isWeekend?700:400 }}>
                        {DOW_KR_L[dow]} avg {avg}
                      </div>
                    );
                  })}
                </div>
              </Card>
            )}

            {/* ── 스마트 통합 테이블 ── */}
            <Card style={{ overflow:"hidden", marginBottom:8 }}>
              <div style={{ padding:"12px 14px", borderBottom:"1px solid "+T.b0,
                display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F }}>
                  📋 전체 품목 인사이트
                  <span style={{ fontSize:11, color:T.t3, fontWeight:400, marginLeft:8 }}>
                    {tableData.length}개 품목
                  </span>
                </div>
                <div style={{ fontSize:11, color:T.t4, fontFamily:F, marginLeft:"auto" }}>
                  헤더 클릭 → 정렬
                </div>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, fontFamily:F }}>
                  <thead>
                    <tr style={{ background:T.brandDim, position:"sticky", top:0, zIndex:1 }}>
                      <th style={{ padding:"8px 10px", textAlign:"left", color:T.brand, fontWeight:700, minWidth:140 }}>품목명</th>
                      {catFilter==="전체"&&<th style={{ padding:"8px 8px", textAlign:"center", color:T.t3, fontWeight:700, minWidth:60 }}>카테고리</th>}
                      {catFilter==="[20] Food"&&<th style={{ padding:"8px 8px", textAlign:"center", color:T.t3, fontWeight:700, minWidth:75 }}>분류</th>}
                      <SortTh k="wdAvg"       label="📅 평일avg"  color={T.brand}  minW={65}/>
                      <SortTh k="weAvg"       label="🌅 주말avg"  color={T.amber}  minW={65}/>
                      <SortTh k="hlAvg"       label="🎌 공휴일"   color="#C04000"  minW={60}/>
                      <SortTh k="weDiff"      label="주말증감"    color={T.amber}  minW={65}/>
                      <SortTh k="zeroRate"    label="소진율"      color={T.red}    minW={60}/>
                      <SortTh k="totalSold"   label="기간 판매"   color={T.brand}  minW={65}/>
                      <th style={{ padding:"8px 8px", textAlign:"center", color:T.t3, fontWeight:700, minWidth:70 }}>추이</th>
                    </tr>
                  </thead>
                  <tbody>
                    {tableData.map((s, i) => {
                      const weColor = s.weDiff===null ? T.t4
                        : s.weDiff >= 30 ? T.amber
                        : s.weDiff <= -30 ? T.blue : T.t2;
                      const zeroColor = s.zeroRate > 50 ? T.red : s.zeroRate > 25 ? T.amber : T.t3;
                      const isHighWeekend = s.weDiff !== null && s.weDiff >= 30;
                      return (
                        <tr key={s.sku} style={{
                          background:isHighWeekend
                            ? "rgba(255,149,0,0.04)"
                            : i%2===0 ? T.card2 : T.card,
                          borderTop:"1px solid "+T.b0
                        }}>
                          <td style={{ padding:"7px 10px", color:T.t1, fontWeight:isHighWeekend?600:400, maxWidth:180 }}>
                            <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                              {s.name}
                            </div>
                          </td>
                          {catFilter==="전체"&&(
                            <td style={{ padding:"7px 6px", textAlign:"center" }}>
                              <span style={{ fontSize:10, color:T.t3, background:T.card3,
                                borderRadius:4, padding:"1px 5px", whiteSpace:"nowrap" }}>
                                {s.cat.replace("[10] ","").replace("[20] ","").replace("[50] ","")}
                              </span>
                            </td>
                          )}
                          {catFilter==="[20] Food"&&(
                            <td style={{ padding:"7px 6px", textAlign:"center" }}>
                              {s.foodSub && (
                                <span style={{ fontSize:10, color:T.t2, background:T.card3,
                                  borderRadius:4, padding:"1px 5px", whiteSpace:"nowrap" }}>
                                  {s.foodSub}
                                </span>
                              )}
                            </td>
                          )}
                          <td style={{ padding:"7px 8px", textAlign:"center", color:T.t2, fontWeight:600 }}>
                            {s.wdAvg ?? <span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{ padding:"7px 8px", textAlign:"center", color:T.amber, fontWeight:700 }}>
                            {s.weAvg ?? <span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{ padding:"7px 8px", textAlign:"center", color:"#C04000", fontWeight:700 }}>
                            {s.hlAvg ?? <span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{ padding:"7px 8px", textAlign:"center", color:weColor, fontWeight:700 }}>
                            {s.weDiff !== null
                              ? (s.weDiff>0?"▲":"▼")+Math.abs(s.weDiff)+"%"+(isHighWeekend?" 🌅":"")
                              : <span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{ padding:"7px 8px", textAlign:"center", color:zeroColor, fontWeight:600 }}>
                            {s.zeroRate > 0 ? s.zeroRate+"%" : <span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{ padding:"7px 8px", textAlign:"center", color:T.brand, fontWeight:700 }}>
                            {s.totalSold > 0 ? s.totalSold : <span style={{color:T.t4}}>-</span>}
                          </td>
                          <td style={{ padding:"4px 8px", textAlign:"center" }}>
                            <Spark data={s.spark.slice(-7)}/>
                          </td>
                        </tr>
                      );
                    })}
                    {tableData.length === 0 && (
                      <tr>
                        <td colSpan="10" style={{ padding:"30px", textAlign:"center", color:T.t3, fontFamily:F }}>
                          해당 기간에 데이터가 없어요
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </Card>
            <div style={{ fontSize:10, color:T.t4, fontFamily:F, textAlign:"center", paddingBottom:4 }}>
              주말증감 🌅 = 평일 대비 +30% 이상 · 소진율 = 기간 내 재고=0 비율 · 추이 = 최근 7일 판매 스파크라인
            </div>
          </div>
        )}
      </div>
    </div>
  );
}



/* ─── Render ─────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
