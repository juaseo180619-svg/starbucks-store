/* ─── 발주 추천 탭 ───────────────────────────────── */
function RecommendTab({ latestUpload, uploadHistory, manualRecords, manualItems, buffers, onSaveBuffers, skuAliases }) {
  const [catFilter, setCatFilter] = useState("전체");
  const [showBufEdit, setShowBufEdit] = useState(false);
  const [bufEdit, setBufEdit] = useState({});

  if (!latestUpload) {
    return (
      <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
        <EmptyState emoji="📁" text="실사 데이터가 없어요" sub="실사 탭에서 엑셀을 먼저 업로드해주세요"/>
      </div>
    );
  }

  const today = latestUpload.date;
  const todayDow = latestUpload.dow;

  // SKU별 과거 평균 판매량 계산
  function getAvgSold(sku) {
    const hist = uploadHistory.filter(h => h.date <= today && h.items?.[sku]?.sold > 0);
    if (!hist.length) return null;
    const total = hist.reduce((s,h) => s+(h.items[sku]?.sold||0), 0);
    return Math.round(total/hist.length * 10) / 10;
  }
  function getAvgSoldByDow(sku, dow) {
    const hist = uploadHistory.filter(h => h.dow===dow && h.date<=today && h.items?.[sku]?.sold > 0);
    if (!hist.length) return null;
    const total = hist.reduce((s,h) => s+(h.items[sku]?.sold||0), 0);
    return Math.round(total/hist.length * 10) / 10;
  }

  // 발주 추천량 계산
  // 발주일 기준: 내일(+1) + 모레(+2=입고일) 사용량 커버
  function calcRecommend(sku, item) {
    const current = item.actualSum;
    const tmrIn   = item.tmrIn;
    const d2In    = item.d2In;
    const dow1    = (todayDow + 1) % 7;
    const dow2    = (todayDow + 2) % 7;
    const avg1    = parseFloat(getAvgSoldByDow(sku, dow1)) || parseFloat(getAvgSold(sku)) || 0;
    const avg2    = parseFloat(getAvgSoldByDow(sku, dow2)) || parseFloat(getAvgSold(sku)) || 0;
    const totalUsage = avg1 + avg2;
    const buf     = parseFloat(buffers[sku] ?? buffers[item.name] ?? 2);
    const rec     = Math.max(0, Math.ceil(totalUsage + buf - current - tmrIn - d2In));
    return { rec, avg1, avg2, totalUsage, buf, current, tmrIn, d2In, dow1, dow2 };
  }

  const cats = ["전체", ...new Set(Object.values(latestUpload.items).map(i=>i.cat))];
  const items = Object.entries(latestUpload.items).filter(([,item]) =>
    catFilter === "전체" || item.cat === catFilter
  );

  // 발주 필요 항목만 상단 정렬
  const sortedItems = [...items].sort((a,b) => {
    const ra = calcRecommend(a[0], a[1]);
    const rb = calcRecommend(b[0], b[1]);
    return rb.rec - ra.rec;
  });

  const totalRec = items.reduce((s,[sku,item]) => s+calcRecommend(sku,item).rec, 0);
  const needOrderItems = items.filter(([sku,item]) => calcRecommend(sku,item).rec > 0);

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
      <SH title="📦 발주 추천"
        sub={fmtDate(today)+" 기준"}
        action={
          <button onClick={() => setShowBufEdit(!showBufEdit)} style={{
            padding:"5px 12px", borderRadius:8, border:"1px solid "+T.b1,
            background:showBufEdit?T.brandDim:T.card,
            color:showBufEdit?T.brand:T.t2,
            fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:F }}>
            🛡 버퍼 설정
          </button>
        }/>

      {/* 요약 배너 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:14 }}>
        {[
          { label:"발주 필요", value:needOrderItems.length+"개 품목", color:T.brand, dim:T.brandDim },
          { label:"총 발주량", value:totalRec+"개", color:T.amber, dim:T.aDim },
          { label:"충분한 품목", value:(items.length-needOrderItems.length)+"개", color:T.blue, dim:T.bDim },
        ].map(s => (
          <div key={s.label} style={{ background:s.dim, borderRadius:12, padding:"12px 12px",
            border:"1px solid "+s.color+"22", textAlign:"center" }}>
            <div style={{ fontSize:10, fontWeight:700, color:s.color, fontFamily:F }}>{s.label}</div>
            <div style={{ fontSize:16, fontWeight:900, color:s.color, fontFamily:F, marginTop:2 }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* 발주 기준 설명 */}
      <div style={{ background:T.brandDim, border:"1px solid "+T.brandBorder,
        borderRadius:12, padding:"10px 14px", marginBottom:14, fontSize:12, color:T.brand, fontFamily:F }}>
        📅 발주일 {DOW_KR[todayDow]}요일 → 입고 예정 {DOW_KR[(todayDow+2)%7]}요일<br/>
        <span style={{ color:T.t2 }}>내일({DOW_KR[(todayDow+1)%7]}) + 입고일({DOW_KR[(todayDow+2)%7]}) 평균판매량 합산 → 현재고/예정입고 차감</span>
      </div>

      {/* 버퍼 설정 패널 */}
      {showBufEdit && (
        <Card style={{ marginBottom:14, padding:"14px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F }}>
              🛡 품목별 버퍼 재고 설정
            </div>
            <button onClick={()=>{
              // 유통기한 기반 버퍼 자동 추천 일괄 적용
              const recs = {};
              items.forEach(([sku, item]) => {
                const minDday = item.batches && item.batches.length > 0
                  ? Math.min(...item.batches.filter(b=>b.dday!==null&&b.actual>0).map(b=>b.dday).filter(v=>v!==null))
                  : null;
                const avgSold = (() => {
                  const hist = uploadHistory.filter(h=>h.items?.[sku]?.sold>0);
                  if (!hist.length) return 1;
                  return hist.reduce((s,h)=>s+(h.items[sku]?.sold||0),0)/hist.length;
                })();
                let suggested;
                if (minDday !== null && isFinite(minDday)) {
                  if (minDday <= 2)      suggested = Math.max(1, Math.ceil(avgSold * 0.5));
                  else if (minDday <= 5) suggested = Math.max(1, Math.ceil(avgSold * 1.0));
                  else if (minDday <= 10) suggested = Math.max(2, Math.ceil(avgSold * 1.5));
                  else                   suggested = Math.max(2, Math.ceil(avgSold * 2.0));
                } else {
                  suggested = Math.max(2, Math.ceil(avgSold * 2.0));
                }
                recs[sku] = suggested;
              });
              setBufEdit(recs);
              onSaveBuffers({...buffers,...Object.fromEntries(Object.entries(recs).map(([k,v])=>[k,v]))});
              alert("✅ 유통기한 기반 버퍼 추천값으로 업데이트됐어요!");
            }} style={{
              padding:"5px 12px", borderRadius:8, border:"1px solid "+T.brand,
              background:T.brandDim, color:T.brand,
              fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:F
            }}>✨ 자동 추천 적용</button>
          </div>
          {/* 안내 */}
          <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginBottom:10, lineHeight:1.6 }}>
            💡 추천 기준: 유통기한 D-2 이하 → 소량 / D-3~5 → 1일치 / D-6~10 → 1.5일치 / D+11 이상 → 2일치
          </div>
          {items.slice(0,10).map(([sku, item]) => {
            const key = sku;
            const cur = bufEdit[key]!==undefined ? bufEdit[key] : (buffers[key]??2);
            // 유통기한 기반 추천값 계산
            const minDday = item.batches && item.batches.length > 0
              ? Math.min(...item.batches.filter(b=>b.dday!==null&&b.actual>0).map(b=>b.dday).filter(v=>v!==null))
              : null;
            const avgSold = (() => {
              const hist = uploadHistory.filter(h=>h.items?.[sku]?.sold>0);
              if (!hist.length) return 1;
              return Math.round(hist.reduce((s,h)=>s+(h.items[sku]?.sold||0),0)/hist.length * 10)/10;
            })();
            let suggested = null, suggLabel = null, suggColor = T.t3;
            if (minDday !== null && isFinite(minDday)) {
              if (minDday <= 2)       { suggested = Math.max(1, Math.ceil(avgSold*0.5)); suggLabel="D-"+minDday+" 주의"; suggColor=T.red; }
              else if (minDday <= 5)  { suggested = Math.max(1, Math.ceil(avgSold*1.0)); suggLabel="D-"+minDday; suggColor=T.amber; }
              else if (minDday <= 10) { suggested = Math.max(2, Math.ceil(avgSold*1.5)); suggLabel="D-"+minDday; suggColor=T.brand; }
              else                    { suggested = Math.max(2, Math.ceil(avgSold*2.0)); suggLabel="여유"; suggColor=T.t3; }
            } else {
              suggested = Math.max(2, Math.ceil(avgSold*2.0)); suggLabel="기본"; suggColor=T.t3;
            }
            const isSame = parseFloat(cur) === suggested;
            return (
              <div key={key} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, color:T.t1, fontFamily:F,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {skuAliases[sku]||item.name}
                  </div>
                  <div style={{ fontSize:10, color:suggColor, fontFamily:F }}>
                    추천 {suggested} ({suggLabel} · 일평균 {avgSold}개)
                  </div>
                </div>
                <input type="number" min="0" step="1" value={cur}
                  onChange={e => setBufEdit(b=>({...b,[key]:e.target.value}))}
                  onBlur={() => {
                    if (bufEdit[key]!==undefined) {
                      onSaveBuffers({...buffers,[key]:parseFloat(bufEdit[key])||0});
                    }
                  }}
                  style={{ width:58, padding:"6px 8px", borderRadius:8,
                    border:"1px solid "+(isSame?T.b1:T.brand),
                    background:isSame?T.card2:T.brandDim,
                    fontSize:13, fontFamily:F, textAlign:"center", outline:"none",
                    color:isSame?T.t1:T.brand, fontWeight:isSame?400:700 }}/>
                {!isSame && (
                  <button onClick={()=>{
                    setBufEdit(b=>({...b,[key]:suggested}));
                    onSaveBuffers({...buffers,[key]:suggested});
                  }} style={{ padding:"4px 8px", borderRadius:6, border:"none",
                    background:T.brandDim, color:T.brand, fontSize:11,
                    fontWeight:700, cursor:"pointer", fontFamily:F, flexShrink:0 }}>
                    적용
                  </button>
                )}
              </div>
            );
          })}
        </Card>
      )}

      {/* 카테고리 필터 */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
        {cats.map(c => (
          <button key={c} onClick={() => setCatFilter(c)} style={{
            padding:"5px 12px", borderRadius:20, border:"1px solid "+(catFilter===c?T.brand:T.b1),
            background:catFilter===c?T.brandDim:T.card,
            color:catFilter===c?T.brand:T.t2,
            fontSize:12, fontWeight:catFilter===c?700:400, cursor:"pointer", fontFamily:F }}>
            {c}
          </button>
        ))}
      </div>

      {/* 추천 테이블 */}
      <Card>
        <div style={{ display:"grid", gridTemplateColumns:"1.6fr 0.7fr 0.6fr 0.6fr 0.7fr 0.6fr 0.9fr",
          padding:"9px 14px", background:T.brandDim, gap:4 }}>
          {["품목","현재고","내일avg","입고avg","합계","버퍼","권장"].map(h => (
            <div key={h} style={{ fontSize:11, fontWeight:700, color:T.brand, fontFamily:F, textAlign:"center" }}>{h}</div>
          ))}
        </div>
        {sortedItems.map(([sku, item], idx) => {
          const { rec, avg1, avg2, totalUsage, buf, current, tmrIn, d2In, dow1, dow2 } = calcRecommend(sku, item);
          const dispName = skuAliases[sku] || item.name;
          const isNeed = rec > 0;
          return (
            <div key={sku} style={{ display:"grid", gridTemplateColumns:"1.6fr 0.7fr 0.6fr 0.6fr 0.7fr 0.6fr 0.9fr",
              padding:"10px 14px", gap:4, alignItems:"center",
              background: isNeed ? (idx%2===0?"rgba(255,149,0,0.04)":"rgba(255,149,0,0.02)") : (idx%2===0?T.card2:T.card),
              borderTop:idx>0?"1px solid "+T.b0:"none" }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:T.t1, fontFamily:F,
                  overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {dispName}
                </div>
                <div style={{ fontSize:10, color:T.t3, fontFamily:F }}>{item.cat}</div>
              </div>
              <div style={{ textAlign:"center", fontSize:13, fontWeight:current===0?700:400,
                color:current===0?T.red:T.t1, fontFamily:F }}>{current}</div>
              <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}
                title={DOW_KR[dow1]+"요일 평균"}>{avg1||"-"}</div>
              <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}
                title={DOW_KR[dow2]+"요일 평균"}>{avg2||"-"}</div>
              <div style={{ textAlign:"center", fontSize:13, fontWeight:600, color:T.amber, fontFamily:F }}>
                {totalUsage>0?totalUsage.toFixed(1):"-"}
              </div>
              <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}>{buf}</div>
              <div style={{ textAlign:"center", fontSize:15, fontWeight:800,
                color:isNeed?T.brand:T.t4, fontFamily:F }}>
                {isNeed ? "▶ "+rec : "✓"}
              </div>
            </div>
          );
        })}
      </Card>
      <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginTop:8 }}>
        * 버퍼 기본값 2 · 예정입고(내일/모레) 차감 반영됨 · 과거 데이터 부족 시 "-" 표시
      </div>
    </div>
  );
}

/* ─── 수동 입력 탭 (기존 OrderTab 개선) ─────────── */
function ManualTab({ records, items, buffers, onSaveRecords, onSaveItems, onSaveBuffers }) {
  const [mode, setMode] = useState("input");
  const [inputDate, setInputDate] = useState(todayStr);
  const [form, setForm] = useState({});
  const [skippedItems, setSkippedItems] = useState({});
  const [newItem, setNewItem] = useState("");
  const [bufEdit, setBufEdit] = useState({});
  const [statsItem, setStatsItem] = useState(() => items && items[0] ? items[0] : "");
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const DOW_KR_LOCAL = ["일","월","화","수","목","금","토"];

  const recordsRef = useRef(records);
  recordsRef.current = records;
  const itemsRef = useRef(items);
  itemsRef.current = items;

  useEffect(() => {
    const recs = recordsRef.current;
    const itms = itemsRef.current;
    const existRec = recs.find(r => r.date === inputDate);
    const init = {};
    const initSkipped = {};
    if (existRec) {
      itms.forEach(item => {
        const d = existRec.items[item] || {};
        if (d.skipped) { initSkipped[item] = true; init[item] = { prev:"", received:"", closing:"" }; }
        else { init[item] = { prev:String(d.prev??""), received:String(d.received??""), closing:String(d.closing??"") }; }
      });
    } else {
      itms.forEach(item => {
        const prevRec = recs.filter(r=>r.date<inputDate&&!r.items?.[item]?.skipped&&r.items?.[item]?.closing!=null)
          .sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
        const prevClosing = prevRec?(prevRec.items[item]?.closing??""):"";
        init[item] = { prev:String(prevClosing!==""?prevClosing:""), received:"", closing:"" };
      });
    }
    setForm(init);
    setSkippedItems(initSkipped);
  }, [inputDate]);

  function calcUsed(prev, received, closing) {
    const p=parseFloat(prev)||0, r=parseFloat(received)||0, c=parseFloat(closing)||0;
    if (prev===""&&received===""&&closing==="") return null;
    return Math.max(0,p+r-c);
  }

  function getAvgByDow(item, dow) {
    const vals = records.filter(r=>r.dow===dow&&!r.items?.[item]?.skipped&&r.items?.[item]?.used>0)
      .map(r=>r.items[item].used);
    if (!vals.length) return null;
    return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
  }

  function getRecommend(item) {
    const baseDow = new Date(inputDate+"T00:00:00").getDay();
    const todayRec = records.find(r=>r.date===inputDate);
    const currentStock = todayRec?(todayRec.items[item]?.closing??0):0;
    const dow1=(baseDow+1)%7, dow2=(baseDow+2)%7;
    const avg1=parseFloat(getAvgByDow(item,dow1))||0;
    const avg2=parseFloat(getAvgByDow(item,dow2))||0;
    const totalAvgUsage=avg1+avg2;
    const buf=parseFloat(buffers[item])||2;
    const rec=Math.max(0,Math.ceil(totalAvgUsage+buf-currentStock));
    return {rec,avg1,avg2,totalAvgUsage,buf,currentStock,dow1,dow2};
  }

  function getWeeklyStats(item) {
    const sorted=[...records].sort((a,b)=>b.date.localeCompare(a.date));
    const weeks=[];
    sorted.forEach(r=>{
      const d=new Date(r.date+"T00:00:00");
      const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk=mon.toISOString().slice(0,10);
      let w=weeks.find(x=>x.week===wk);
      if(!w){w={week:wk,days:{}}; weeks.push(w);}
      w.days[r.dow]=r.items?.[item]?.skipped?"누락":(r.items?.[item]?.used??null);
    });
    return weeks.slice(0,8).reverse();
  }

  function handleSaveRecord() {
    const dow=new Date(inputDate+"T00:00:00").getDay();
    const itemData={};
    items.forEach(item=>{
      if(skippedItems[item]){
        itemData[item]={skipped:true,prev:0,received:0,closing:0,used:0};
      } else {
        const f=form[item]||{};
        const used=calcUsed(f.prev,f.received,f.closing);
        itemData[item]={prev:parseFloat(f.prev)||0,received:parseFloat(f.received)||0,closing:parseFloat(f.closing)||0,used:used!==null?used:0};
      }
    });
    const newRec={date:inputDate,dow,items:itemData};
    const exists=records.findIndex(r=>r.date===inputDate);
    let updated;
    if(exists>=0){updated=records.map((r,i)=>i===exists?newRec:r);}
    else{updated=[...records,newRec].sort((a,b)=>a.date.localeCompare(b.date));}
    onSaveRecords(updated);
    alert("저장되었습니다 ✓");
  }

  function toggleItemSkip(item) {
    setSkippedItems(prev=>{
      const next={...prev};
      if(next[item]){
        delete next[item];
        const prevRec=records.filter(r=>r.date<inputDate&&!r.items?.[item]?.skipped&&r.items?.[item]?.closing!=null)
          .sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
        const prevClosing=prevRec?(prevRec.items[item]?.closing??""):"";
        setForm(f=>({...f,[item]:{prev:String(prevClosing!==""?prevClosing:""),received:"",closing:""}}));
      } else {
        next[item]=true;
        setForm(f=>({...f,[item]:{prev:"",received:"",closing:""}}));
      }
      return next;
    });
  }

  const btnStyle = (active) => ({
    padding:"8px 14px", borderRadius:10, border:"none", cursor:"pointer",
    fontFamily:F, fontSize:13, fontWeight:active?700:500,
    background:active?T.brand:T.card2, color:active?"#fff":T.t2, transition:"all .15s"
  });

  const inputSt = {
    width:"100%", padding:"8px 8px", borderRadius:8,
    border:"1px solid "+T.b1, background:T.card,
    fontSize:14, fontFamily:F, color:T.t1,
    textAlign:"center", outline:"none"
  };

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
      <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
        {[["input","📝 재고 입력"],["recommend","📦 발주 추천"],["stats","📊 통계"],["settings","⚙️ 설정"]].map(([id,label])=>(
          <button key={id} onClick={()=>setMode(id)} style={btnStyle(mode===id)}>{label}</button>
        ))}
      </div>

      {/* ── 재고 입력 ── */}
      {mode==="input" && (
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12, flexWrap:"wrap" }}>
            <input type="date" value={inputDate} onChange={e=>setInputDate(e.target.value)}
              style={{ ...inputSt, width:"auto", textAlign:"left", padding:"8px 12px" }}/>
            <span style={{ fontSize:13, color:T.t3, fontFamily:F }}>
              ({DOW_KR_LOCAL[new Date(inputDate+"T00:00:00").getDay()]}요일)
            </span>
            {records.find(r=>r.date===inputDate) && (
              <span style={{ padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:700,
                background:T.brandDim, color:T.brand, border:"1px solid "+T.brandBorder }}>✓ 저장됨</span>
            )}
          </div>
          <Card style={{ marginBottom:14 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1.2fr 1fr 1fr 1fr 0.7fr 0.5fr",
              padding:"9px 14px", background:T.brandDim, gap:6 }}>
              {["품목","전일재고","당일입고","마감재고","사용량","누락"].map(h=>(
                <div key={h} style={{ fontSize:11, fontWeight:700, color:T.brand, fontFamily:F, textAlign:"center" }}>{h}</div>
              ))}
            </div>
            {items.map((item, idx) => {
              const skipped=!!skippedItems[item];
              const f=form[item]||{prev:"",received:"",closing:""};
              const used=skipped?null:calcUsed(f.prev,f.received,f.closing);
              return (
                <div key={item} style={{ display:"grid", gridTemplateColumns:"1.2fr 1fr 1fr 1fr 0.7fr 0.5fr",
                  padding:"10px 14px", gap:6, alignItems:"center",
                  background:skipped?"rgba(255,149,0,0.05)":idx%2===0?T.card2:T.card,
                  borderTop:idx>0?"1px solid "+T.b0:"none" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:skipped?T.amber:T.t1, fontFamily:F }}>
                    {item}
                    {skipped&&<div style={{ fontSize:10, color:T.amber, fontWeight:500 }}>누락</div>}
                  </div>
                  {["prev","received","closing"].map(field=>(
                    <input key={field} type="number" min="0" step="0.5"
                      value={skipped?"":(f[field]||"")}
                      disabled={skipped}
                      onChange={e=>setForm(fm=>({...fm,[item]:{...(fm[item]||{}),[field]:e.target.value}}))}
                      placeholder={skipped?"-":"0"}
                      style={{ ...inputSt, fontSize:14,
                        background:skipped?"rgba(255,149,0,0.05)":field==="prev"?T.card3:T.card,
                        color:skipped?T.t4:T.t1,
                        borderColor:skipped?"rgba(255,149,0,0.2)":T.b1,
                        cursor:skipped?"not-allowed":"auto" }}/>
                  ))}
                  <div style={{ textAlign:"center", fontSize:14, fontWeight:700,
                    color:skipped?T.amber:used!==null?T.brand:T.t4, fontFamily:F }}>
                    {skipped?"누락":used!==null?used:"-"}
                  </div>
                  <button onClick={()=>toggleItemSkip(item)} style={{
                    width:"100%", height:32, borderRadius:8, border:"none",
                    background:skipped?"rgba(255,149,0,0.18)":T.card3,
                    color:skipped?T.amber:T.t3,
                    fontSize:14, cursor:"pointer", fontWeight:skipped?700:400 }}>
                    {skipped?"✕":"⚠"}
                  </button>
                </div>
              );
            })}
          </Card>
          <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:12 }}>
            💡 전일재고는 자동 입력 · ⚠ 버튼으로 항목별 누락 처리
          </div>
          <button onMouseDown={e=>{e.preventDefault();handleSaveRecord();}}
            style={{ width:"100%", padding:"14px", borderRadius:14, border:"none",
              background:"linear-gradient(135deg,#00704A,#1E3932)",
              color:"#fff", fontSize:15, fontWeight:700, fontFamily:F,
              cursor:"pointer", boxShadow:"0 4px 20px rgba(0,112,74,0.28)" }}>
            저장하기
          </button>
        </div>
      )}

      {/* ── 발주 추천 (수동 데이터 기반) ── */}
      {mode==="recommend" && (
        <div>
          <div style={{ background:T.brandDim, border:"1px solid "+T.brandBorder,
            borderRadius:12, padding:"10px 14px", marginBottom:14, fontSize:13, color:T.brand, fontFamily:F }}>
            📅 기준일: {inputDate} ({DOW_KR_LOCAL[new Date(inputDate+"T00:00:00").getDay()]}요일)<br/>
            <span style={{ fontSize:11, color:T.t2 }}>내일+입고일 평균사용량 합산 → 현재고 차감</span>
          </div>
          <Card>
            <div style={{ display:"grid", gridTemplateColumns:"1.2fr 0.8fr 0.7fr 0.7fr 0.8fr 0.6fr 1fr",
              padding:"9px 14px", background:T.brandDim, gap:4 }}>
              {["품목","현재고","내일","입고일","합계","버퍼","권장"].map(h=>(
                <div key={h} style={{ fontSize:11, fontWeight:700, color:T.brand, fontFamily:F, textAlign:"center" }}>{h}</div>
              ))}
            </div>
            {items.map((item, idx) => {
              const {rec,avg1,avg2,totalAvgUsage,buf,currentStock,dow1,dow2}=getRecommend(item);
              return (
                <div key={item} style={{ display:"grid", gridTemplateColumns:"1.2fr 0.8fr 0.7fr 0.7fr 0.8fr 0.6fr 1fr",
                  padding:"10px 14px", gap:4, alignItems:"center",
                  background:idx%2===0?T.card2:T.card,
                  borderTop:idx>0?"1px solid "+T.b0:"none" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:T.t1, fontFamily:F }}>{item}</div>
                  <div style={{ textAlign:"center", fontSize:13, color:T.t2, fontFamily:F }}>{currentStock}</div>
                  <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}>{avg1||"-"}</div>
                  <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}>{avg2||"-"}</div>
                  <div style={{ textAlign:"center", fontSize:13, fontWeight:600, color:T.amber, fontFamily:F }}>
                    {totalAvgUsage>0?totalAvgUsage.toFixed(1):"-"}
                  </div>
                  <div style={{ textAlign:"center", fontSize:13, color:T.t3, fontFamily:F }}>{buf}</div>
                  <div style={{ textAlign:"center", fontSize:15, fontWeight:800,
                    color:rec>0?T.brand:T.t4, fontFamily:F }}>
                    {rec>0?"▶ "+rec:"✓"}
                  </div>
                </div>
              );
            })}
          </Card>
        </div>
      )}

      {/* ── 통계 ── */}
      {mode==="stats" && (
        <div>
          <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
            {items.map(item=>(
              <button key={item} onClick={()=>setStatsItem(item)}
                style={{ padding:"6px 12px", borderRadius:20,
                  border:"1px solid "+(statsItem===item?T.brand:T.b1),
                  background:statsItem===item?T.brandDim:T.card,
                  color:statsItem===item?T.brand:T.t2,
                  fontSize:12, fontWeight:statsItem===item?700:400, cursor:"pointer", fontFamily:F }}>
                {item}
              </button>
            ))}
          </div>
          {/* 요일별 평균 */}
          <Card style={{ padding:"14px", marginBottom:14 }}>
            <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:12 }}>
              📊 요일별 평균 사용량 — {statsItem}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:6 }}>
              {[0,1,2,3,4,5,6].map(dow=>{
                const avg=getAvgByDow(statsItem,dow);
                const maxAvg=Math.max(...[0,1,2,3,4,5,6].map(d=>parseFloat(getAvgByDow(statsItem,d))||0));
                const ratio=maxAvg>0?(parseFloat(avg)||0)/maxAvg:0;
                const isWe=dow===0||dow===6;
                const col=dow===0?T.red:dow===6?T.blue:T.brand;
                return (
                  <div key={dow} style={{ textAlign:"center" }}>
                    <div style={{ fontSize:11, fontWeight:700, color:col, fontFamily:F, marginBottom:4 }}>
                      {DOW_KR_LOCAL[dow]}
                    </div>
                    <div style={{ height:60, background:T.card3, borderRadius:6,
                      position:"relative", overflow:"hidden", marginBottom:4 }}>
                      <div style={{ position:"absolute", bottom:0, left:0, right:0,
                        height:(ratio*100)+"%", background:col,
                        borderRadius:6, opacity:0.8, transition:"height .3s" }}/>
                    </div>
                    <div style={{ fontSize:12, fontWeight:700, color:col, fontFamily:F }}>
                      {avg||"-"}
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
          {/* 주차별 테이블 */}
          <Card>
            <div style={{ padding:"12px 14px 8px", fontSize:13, fontWeight:700, color:T.t1, fontFamily:F }}>
              주차별 기록 — {statsItem}
            </div>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, fontFamily:F }}>
                <thead>
                  <tr style={{ background:T.brandDim }}>
                    <th style={{ padding:"8px 10px", textAlign:"left", color:T.brand, fontWeight:700 }}>주차</th>
                    {[0,1,2,3,4,5,6].map(d=>(
                      <th key={d} style={{ padding:"8px 6px", textAlign:"center",
                        color:d===0?T.red:d===6?T.blue:T.brand, fontWeight:700 }}>
                        {DOW_KR_LOCAL[d]}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {getWeeklyStats(statsItem).map((wk,wi)=>(
                    <tr key={wk.week} style={{ background:wi%2===0?T.card2:T.card }}>
                      <td style={{ padding:"8px 10px", color:T.t2, fontWeight:500 }}>
                        {wk.week.slice(5)}
                      </td>
                      {[0,1,2,3,4,5,6].map(d=>{
                        const val=wk.days[d];
                        const isSkip=val==="누락";
                        return (
                          <td key={d} style={{ padding:"8px 6px", textAlign:"center",
                            color:isSkip?T.amber:val!=null?(d===0?T.red:d===6?T.blue:T.t1):T.t4,
                            fontWeight:val!=null?600:400, fontSize:isSkip?10:12 }}>
                            {isSkip?"누락":val!=null?val:"·"}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                  {getWeeklyStats(statsItem).length===0&&(
                    <tr><td colSpan={8} style={{ padding:"20px", textAlign:"center", color:T.t3 }}>
                      아직 기록이 없어요
                    </td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}

      {/* ── 설정 ── */}
      {mode==="settings" && (
        <div>
          <Card style={{ padding:"16px", marginBottom:14 }}>
            <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:12 }}>📋 품목 관리</div>
            {items.map((item,idx)=>(
              <div key={item}
                draggable
                onDragStart={()=>setDragIdx(idx)}
                onDragOver={e=>{e.preventDefault();setDragOverIdx(idx);}}
                onDrop={()=>{
                  if(dragIdx===null||dragIdx===idx)return;
                  const arr=[...items];const[moved]=arr.splice(dragIdx,1);arr.splice(idx,0,moved);
                  onSaveItems(arr);setDragIdx(null);setDragOverIdx(null);
                }}
                onDragEnd={()=>{setDragIdx(null);setDragOverIdx(null);}}
                style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8,
                  opacity:dragIdx===idx?0.4:1,
                  border:dragOverIdx===idx&&dragIdx!==idx?"2px solid "+T.brand:"2px solid transparent",
                  borderRadius:12, transition:"border .1s" }}>
                <div style={{ display:"flex", flexDirection:"column", gap:1, flexShrink:0 }}>
                  <button onClick={()=>{ if(idx===0)return; const arr=[...items];[arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]];onSaveItems(arr); }}
                    disabled={idx===0} style={{ width:24,height:22,border:"none",borderRadius:"4px 4px 0 0",
                      background:idx===0?"transparent":T.card2,color:idx===0?T.t4:T.t2,
                      cursor:idx===0?"default":"pointer",fontSize:12 }}>▲</button>
                  <button onClick={()=>{ if(idx===items.length-1)return; const arr=[...items];[arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]];onSaveItems(arr); }}
                    disabled={idx===items.length-1} style={{ width:24,height:22,border:"none",borderRadius:"0 0 4px 4px",
                      background:idx===items.length-1?"transparent":T.card2,color:idx===items.length-1?T.t4:T.t2,
                      cursor:idx===items.length-1?"default":"pointer",fontSize:12 }}>▼</button>
                </div>
                <div style={{ flex:1,padding:"10px 14px",borderRadius:10,background:T.card2,
                  border:"1px solid "+T.b0,fontSize:14,color:T.t1,fontFamily:F }}>{item}</div>
                <button onClick={()=>{if(!window.confirm(`"${item}" 삭제?`))return;onSaveItems(items.filter((_,i)=>i!==idx));}}
                  style={{ padding:"8px 10px",borderRadius:8,border:"1px solid "+T.rBdr,
                    background:T.rDim,color:T.red,cursor:"pointer",fontFamily:F,fontSize:12,flexShrink:0 }}>삭제</button>
              </div>
            ))}
            <div style={{ display:"flex", gap:8, marginTop:10 }}>
              <input value={newItem} onChange={e=>setNewItem(e.target.value)}
                placeholder="새 품목명"
                onKeyDown={e=>{ if(e.key==="Enter"&&newItem.trim()){onSaveItems([...items,newItem.trim()]);setNewItem("");}}}
                style={{ flex:1,padding:"10px 14px",borderRadius:10,border:"1px solid "+T.b1,
                  background:T.card,fontSize:14,fontFamily:F,color:T.t1,outline:"none",height:44 }}/>
              <button onClick={()=>{if(newItem.trim()){onSaveItems([...items,newItem.trim()]);setNewItem("");}}}
                style={{ padding:"0 18px",borderRadius:10,border:"none",height:44,flexShrink:0,
                  background:T.brand,color:"#fff",cursor:"pointer",fontFamily:F,fontSize:14,fontWeight:600 }}>추가</button>
            </div>
          </Card>
          <Card style={{ padding:"16px" }}>
            <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:6 }}>🛡 품목별 버퍼 재고</div>
            <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:12 }}>발주 추천 시 추가하는 안전 재고량</div>
            {items.map(item=>(
              <div key={item} style={{ display:"flex",alignItems:"center",gap:10,marginBottom:10 }}>
                <div style={{ flex:1,fontSize:14,color:T.t1,fontFamily:F }}>{item}</div>
                <input type="number" min="0" step="0.5"
                  value={bufEdit[item]!==undefined?bufEdit[item]:(buffers[item]??2)}
                  onChange={e=>setBufEdit(b=>({...b,[item]:e.target.value}))}
                  onBlur={()=>{if(bufEdit[item]!==undefined)onSaveBuffers({...buffers,[item]:parseFloat(bufEdit[item])||0});}}
                  style={{ width:70,padding:"8px 10px",borderRadius:8,border:"1px solid "+T.b1,
                    background:T.card2,fontSize:14,fontFamily:F,textAlign:"center",outline:"none" }}/>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
}

/* ─── 통계/히스토리 탭 ───────────────────────────── */

/* ─── CatOverview Component ─────────────────────── */
function CatOverview({ uploadHistory, skuAliases, autoSkipSet }) {
  const DOW_KR_L = ["일","월","화","수","목","금","토"];
  const rnd = (v, d=1) => Math.round(v * Math.pow(10,d)) / Math.pow(10,d);

  // 정렬된 히스토리
  const sorted = [...uploadHistory].sort((a,b) => a.date.localeCompare(b.date));
  const latest = sorted[sorted.length - 1];

  // 전체 카테고리 목록 추출
  const allCats = useMemo(() => {
    const cats = new Set();
    uploadHistory.forEach(h => Object.values(h.items||{}).forEach(i => cats.add(i.cat)));
    return [...cats].sort();
  }, [uploadHistory]);

  // 카테고리별 종합 통계 계산
  const catStats = useMemo(() => {
    const stats = {};
    allCats.forEach(cat => {
      // 최근 14일 일별 데이터
      const days = sorted.slice(-14).map(h => {
        const items = Object.entries(h.items||{}).filter(([,i]) => i.cat === cat);
        const sold = rnd(items.reduce((s,[sku,i]) => {
          if (autoSkipSet && autoSkipSet.has(`${h.date}__${sku}`)) return s;
          return s + (i.sold||0);
        }, 0), 1);
        const zeroStk = items.filter(([sku,i]) =>
          i.actualSum === 0 && !(autoSkipSet && autoSkipSet.has(`${h.date}__${sku}`))
        ).length;
        const expiring = items.filter(([,i]) =>
          (i.batches||[]).some(b => b.dday !== null && b.dday <= 3 && b.actual > 0)
        ).length;
        return { date:h.date, dow:h.dow, sold, zeroStk, total:items.length, expiring };
      });

      const last7 = days.slice(-7);
      const prev7 = days.slice(-7, -0).length >= 14 ? days.slice(0, 7) : days.slice(-14, -7);
      const thisTotal = rnd(last7.reduce((s,d) => s+d.sold, 0), 0);
      const prevTotal = rnd(prev7.reduce((s,d) => s+d.sold, 0), 0);
      const diffPct   = prevTotal > 0 ? rnd(((thisTotal - prevTotal) / prevTotal) * 100, 1) : null;
      const dayAvg    = last7.length ? rnd(thisTotal / last7.length, 1) : 0;
      const avgZero   = last7.length ? rnd(last7.reduce((s,d) => s+d.zeroStk, 0) / last7.length, 1) : 0;

      // 오늘 기준 카테고리 품목 상태
      const latestItems = latest ? Object.entries(latest.items||{}).filter(([,i]) => i.cat === cat) : [];
      const totalSkus   = latestItems.length;
      const zeroToday   = latestItems.filter(([,i]) => i.actualSum === 0).length;
      const expiringToday = latestItems.filter(([,i]) =>
        (i.batches||[]).some(b => b.dday !== null && b.dday <= 3 && b.actual > 0)
      ).length;
      const stockoutRate = totalSkus > 0 ? rnd(zeroToday / totalSkus * 100, 0) : 0;

      // TOP 판매 품목 (최근 7일 누적)
      const skuSold = {};
      last7.forEach(dayData => {
        const h = sorted.find(h => h.date === dayData.date);
        if (!h) return;
        Object.entries(h.items||{}).filter(([,i])=>i.cat===cat).forEach(([sku,i]) => {
          if (autoSkipSet && autoSkipSet.has(`${h.date}__${sku}`)) return;
          skuSold[sku] = (skuSold[sku]||0) + (i.sold||0);
        });
      });
      const topSold = Object.entries(skuSold)
        .sort((a,b) => b[1]-a[1]).slice(0,3)
        .map(([sku,v]) => ({ sku, sold:rnd(v,1), name:(skuAliases[sku]||latest?.items?.[sku]?.name||sku).slice(0,16) }));

      // TOP 소진 품목 (재고=0 빈도)
      const skuZero = {};
      sorted.slice(-14).forEach(h => {
        Object.entries(h.items||{}).filter(([,i])=>i.cat===cat).forEach(([sku,i]) => {
          if (i.actualSum === 0) skuZero[sku] = (skuZero[sku]||0)+1;
        });
      });
      const topZero = Object.entries(skuZero)
        .sort((a,b) => b[1]-a[1]).slice(0,3)
        .map(([sku,v]) => ({ sku, cnt:v, name:(skuAliases[sku]||latest?.items?.[sku]?.name||sku).slice(0,16) }));

      // 요일별 평균 (최근 14일)
      const dowMap = {};
      days.forEach(d => {
        if (!dowMap[d.dow]) dowMap[d.dow] = [];
        if (d.sold > 0) dowMap[d.dow].push(d.sold);
      });
      const dowAvg = {};
      Object.entries(dowMap).forEach(([d,vals]) => {
        dowAvg[d] = vals.length ? rnd(vals.reduce((a,b)=>a+b,0)/vals.length, 1) : null;
      });

      stats[cat] = {
        days, last7, thisTotal, prevTotal, diffPct, dayAvg, avgZero,
        totalSkus, zeroToday, expiringToday, stockoutRate,
        topSold, topZero, dowAvg
      };
    });
    return stats;
  }, [allCats, sorted, uploadHistory, autoSkipSet, skuAliases, latest]);

  /* 미니 라인차트 SVG */
  const MiniLine = ({ data, color }) => {
    if (!data || data.length < 2) return null;
    const W=160, H=40, PL=4, PR=4, PT=4, PB=4;
    const maxV = Math.max(...data.map(d=>d.sold), 1);
    const xs = data.map((_,i) => PL + i*(W-PL-PR)/(data.length-1));
    const ys = data.map(d => PT + (H-PT-PB)*(1 - d.sold/maxV));
    const path = xs.map((x,i) => (i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(" ");
    const area = `${path} L${xs[xs.length-1]},${H-PB} L${xs[0]},${H-PB} Z`;
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:H, display:"block" }}>
        <defs>
          <linearGradient id={`mg${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        <path d={area} fill={`url(#mg${color.replace('#','')})`}/>
        <path d={path} fill="none" stroke={color} strokeWidth="1.8"
          strokeLinecap="round" strokeLinejoin="round"/>
        {data.map((d,i) => (
          <circle key={i} cx={xs[i]} cy={ys[i]} r="2.2" fill={color}/>
        ))}
      </svg>
    );
  };

  /* 도넛형 게이지 */
  const Gauge = ({ pct, color, size=44 }) => {
    const r = 16, cx = size/2, cy = size/2;
    const circ = 2 * Math.PI * r;
    const dash = (pct/100) * circ;
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={T.card3} strokeWidth="5"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="5"
          strokeDasharray={`${dash} ${circ}`}
          strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}/>
        <text x={cx} y={cy+4} textAnchor="middle" fontSize="9" fontWeight="800" fill={color}>{pct}%</text>
      </svg>
    );
  };

  const CAT_META = {
    "[10] Bev":    { icon:"🧃", color:T.blue,  label:"음료" },
    "[20] Food":   { icon:"🥐", color:T.amber, label:"푸드" },
    "[50] 원재료": { icon:"🥛", color:T.brand, label:"원재료" },
  };

  return (
    <div>
      <div style={{ fontSize:13, color:T.t3, fontFamily:F, marginBottom:14 }}>
        카테고리별 최근 7일 현황 · {latest ? fmtDate(latest.date)+" 기준" : ""}
      </div>
      {allCats.map(cat => {
        const s   = catStats[cat];
        const meta = CAT_META[cat] || { icon:"📦", color:T.brand, label:cat };
        const diffColor = s.diffPct === null ? T.t3 : s.diffPct >= 0 ? T.brand : T.red;
        const diffText  = s.diffPct === null ? "-" : `${s.diffPct >= 0 ? "▲" : "▼"} ${Math.abs(s.diffPct)}%`;
        const zeroColor = s.stockoutRate > 30 ? T.red : s.stockoutRate > 15 ? T.amber : T.brand;
        return (
          <div key={cat} style={{ marginBottom:16,
            background:T.card, borderRadius:16, overflow:"hidden",
            border:"1px solid "+T.b0, boxShadow:T.sh1 }}>

            {/* 카드 헤더 */}
            <div style={{ background:`linear-gradient(135deg,${meta.color}18,${meta.color}08)`,
              borderBottom:"1px solid "+T.b0, padding:"14px 16px",
              display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:24 }}>{meta.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:15, fontWeight:800, color:T.t1, fontFamily:F }}>{cat}</div>
                <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>{s.totalSkus}개 품목</div>
              </div>
              {/* 이번 주 총 판매 + 전주 대비 */}
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:20, fontWeight:900, color:meta.color, fontFamily:F, lineHeight:1 }}>
                  {s.thisTotal}<span style={{ fontSize:11, fontWeight:400, marginLeft:2 }}>개</span>
                </div>
                <div style={{ fontSize:11, fontWeight:700, color:diffColor, fontFamily:F, marginTop:2 }}>
                  {diffText} 전주比
                </div>
              </div>
            </div>

            <div style={{ padding:"12px 16px" }}>
              {/* KPI 4개 */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8, marginBottom:14 }}>
                {[
                  { label:"일 평균", value:s.dayAvg+"개", color:meta.color },
                  { label:"소진율(오늘)", value:s.stockoutRate+"%", color:zeroColor },
                  { label:"일평균 소진", value:s.avgZero+"개", color:s.avgZero>3?T.amber:T.t2 },
                  { label:"유통임박(오늘)", value:s.expiringToday+"개", color:s.expiringToday>0?T.red:T.t2 },
                ].map(k => (
                  <div key={k.label} style={{ background:T.card2, borderRadius:10,
                    padding:"8px 8px", textAlign:"center" }}>
                    <div style={{ fontSize:9, color:T.t3, fontFamily:F, marginBottom:3 }}>{k.label}</div>
                    <div style={{ fontSize:15, fontWeight:800, color:k.color, fontFamily:F }}>{k.value}</div>
                  </div>
                ))}
              </div>

              {/* 2컬럼: 미니차트 + 재고소진 게이지 */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:12, marginBottom:14, alignItems:"center" }}>
                <div>
                  <div style={{ fontSize:10, color:T.t3, fontFamily:F, marginBottom:4 }}>7일 판매 추이</div>
                  <MiniLine data={s.last7} color={meta.color}/>
                  {/* 요일 레이블 */}
                  <div style={{ display:"grid", gridTemplateColumns:`repeat(${s.last7.length},1fr)`, marginTop:2 }}>
                    {s.last7.map(d => (
                      <div key={d.date} style={{ fontSize:8, textAlign:"center",
                        color:d.dow===0?T.red:d.dow===6?T.blue:T.t4, fontFamily:F }}>
                        {DOW_KR_L[d.dow]}
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ textAlign:"center" }}>
                  <div style={{ fontSize:10, color:T.t3, fontFamily:F, marginBottom:6 }}>재고소진율</div>
                  <Gauge pct={s.stockoutRate} color={zeroColor}/>
                  <div style={{ fontSize:9, color:T.t3, fontFamily:F, marginTop:4 }}>
                    {s.zeroToday}/{s.totalSkus} 품목
                  </div>
                </div>
              </div>

              {/* 요일별 평균 미니바 */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:10, color:T.t3, fontFamily:F, marginBottom:6 }}>요일별 평균 판매</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
                  {[0,1,2,3,4,5,6].map(dow => {
                    const avg = s.dowAvg[dow];
                    const maxA = Math.max(...Object.values(s.dowAvg).map(v=>parseFloat(v)||0),1);
                    const ratio = (parseFloat(avg)||0)/maxA;
                    const col = dow===0?T.red:dow===6?T.blue:meta.color;
                    return (
                      <div key={dow} style={{ textAlign:"center" }}>
                        <div style={{ fontSize:9, fontWeight:700, color:col, fontFamily:F, marginBottom:2 }}>
                          {DOW_KR_L[dow]}
                        </div>
                        <div style={{ height:28, background:T.card3, borderRadius:4, position:"relative", overflow:"hidden", marginBottom:2 }}>
                          <div style={{ position:"absolute", bottom:0, left:0, right:0,
                            height:(ratio*100)+"%", background:col, opacity:0.75, borderRadius:4 }}/>
                        </div>
                        <div style={{ fontSize:9, fontWeight:700, color:col, fontFamily:F }}>{avg||"-"}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* TOP 판매 + TOP 소진 2컬럼 */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {/* TOP 판매 */}
                <div style={{ background:T.card2, borderRadius:10, padding:"10px 10px" }}>
                  <div style={{ fontSize:10, fontWeight:700, color:meta.color, fontFamily:F, marginBottom:8 }}>
                    🔥 7일 TOP 판매
                  </div>
                  {s.topSold.length === 0
                    ? <div style={{ fontSize:11, color:T.t4, fontFamily:F }}>데이터 없음</div>
                    : s.topSold.map((item, i) => {
                      const maxSold = s.topSold[0]?.sold || 1;
                      return (
                        <div key={item.sku} style={{ marginBottom: i < s.topSold.length-1 ? 6 : 0 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                            <span style={{ fontSize:11, color:T.t1, fontFamily:F,
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                              maxWidth:"80%" }}>
                              {i+1}. {item.name}
                            </span>
                            <span style={{ fontSize:11, fontWeight:700, color:meta.color, fontFamily:F, flexShrink:0 }}>
                              {item.sold}
                            </span>
                          </div>
                          <div style={{ height:4, background:T.card3, borderRadius:2, overflow:"hidden" }}>
                            <div style={{ width:(item.sold/maxSold*100)+"%", height:"100%",
                              background:meta.color, borderRadius:2, opacity:0.7 }}/>
                          </div>
                        </div>
                      );
                    })}
                </div>

                {/* TOP 소진 */}
                <div style={{ background:T.card2, borderRadius:10, padding:"10px 10px" }}>
                  <div style={{ fontSize:10, fontWeight:700, color:T.red, fontFamily:F, marginBottom:8 }}>
                    🚨 소진 빈발
                  </div>
                  {s.topZero.length === 0
                    ? <div style={{ fontSize:11, color:T.t4, fontFamily:F }}>소진 없음 ✓</div>
                    : s.topZero.map((item, i) => {
                      const maxCnt = s.topZero[0]?.cnt || 1;
                      return (
                        <div key={item.sku} style={{ marginBottom: i < s.topZero.length-1 ? 6 : 0 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                            <span style={{ fontSize:11, color:T.t1, fontFamily:F,
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                              maxWidth:"80%" }}>
                              {i+1}. {item.name}
                            </span>
                            <span style={{ fontSize:11, fontWeight:700, color:T.red, fontFamily:F, flexShrink:0 }}>
                              {item.cnt}회
                            </span>
                          </div>
                          <div style={{ height:4, background:T.card3, borderRadius:2, overflow:"hidden" }}>
                            <div style={{ width:(item.cnt/maxCnt*100)+"%", height:"100%",
                              background:T.red, borderRadius:2, opacity:0.7 }}/>
                          </div>
                        </div>
                      );
                    })}
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}


function HistoryTab({ uploadHistory, manualRecords, manualItems, skuAliases }) {
  const [viewMode, setViewMode] = useState("excel");
  const [selSku, setSelSku]     = useState(null);
  const [skuSearch, setSkuSearch] = useState("");
  const [catFilter, setCatFilter] = useState("전체");

  const DOW_KR_L = ["일","월","화","수","목","금","토"];

  /* ── 숫자 반올림 헬퍼 ── */
  const rnd = (v,d=1) => Math.round(v * Math.pow(10,d)) / Math.pow(10,d);

  /* ── 자동 누락 감지 ──
     조건: sold=0 이면서, 직전 날 재고 ≈ 당일 재고 (변동 없음)
     → 파트너가 실사를 안 했거나 누락일 가능성 높음
  */
  const autoSkipSet = useMemo(() => {
    const skipped = new Set();
    if (uploadHistory.length < 2) return skipped;
    const sorted = [...uploadHistory].sort((a,b) => a.date.localeCompare(b.date));
    for (let i = 1; i < sorted.length; i++) {
      const cur  = sorted[i];
      const prev = sorted[i-1];
      const skus = Object.keys(cur.items||{});
      skus.forEach(sku => {
        const ci = cur.items[sku];
        const pi = prev.items?.[sku];
        if (!ci || !pi) return;
        // sold=0 이고 재고 변동이 없으면 (±0) 누락 의심
        if (ci.sold === 0 && Math.abs(ci.actualSum - pi.actualSum) === 0 && pi.sold > 0) {
          skipped.add(`${cur.date}__${sku}`);
        }
      });
    }
    return skipped;
  }, [uploadHistory]);

  /* ── 전체 SKU 목록 + 카테고리 ── */
  const allSkus = useMemo(() => {
    const skus = {};
    uploadHistory.forEach(h => {
      Object.entries(h.items||{}).forEach(([sku, item]) => {
        if (!skus[sku]) skus[sku] = { name: item.name, cat: item.cat };
      });
    });
    return skus;
  }, [uploadHistory]);

  const cats = useMemo(() => {
    const c = new Set(["전체"]);
    Object.values(allSkus).forEach(v => c.add(v.cat));
    return [...c];
  }, [allSkus]);

  const filteredSkus = useMemo(() => {
    return Object.entries(allSkus).filter(([sku, info]) => {
      const disp = skuAliases[sku] || info.name;
      const matchCat  = catFilter === "전체" || info.cat === catFilter;
      const matchSearch = !skuSearch || disp.toLowerCase().includes(skuSearch.toLowerCase());
      return matchCat && matchSearch;
    });
  }, [allSkus, catFilter, skuSearch, skuAliases]);

  /* ── 선택 SKU 트렌드 (자동누락 제외) ── */
  const skuTrend = useMemo(() => {
    if (!selSku) return [];
    return uploadHistory
      .filter(h => h.items?.[selSku])
      .map(h => {
        const autoSkip = autoSkipSet.has(`${h.date}__${selSku}`);
        return { date:h.date, dow:h.dow, sold: autoSkip ? null : (h.items[selSku].sold||0), stock:h.items[selSku].actualSum||0, autoSkip };
      })
      .sort((a,b) => a.date.localeCompare(b.date));
  }, [selSku, uploadHistory, autoSkipSet]);

  /* ── 요일별 평균 (자동누락 제외) ── */
  const dowAvgs = useMemo(() => {
    if (!selSku) return {};
    const byDow = {};
    uploadHistory.forEach(h => {
      if (!h.items?.[selSku]) return;
      if (autoSkipSet.has(`${h.date}__${selSku}`)) return;
      const d = h.dow;
      if (!byDow[d]) byDow[d] = [];
      if ((h.items[selSku].sold||0) > 0) byDow[d].push(h.items[selSku].sold);
    });
    const avgs = {};
    Object.entries(byDow).forEach(([d, vals]) => {
      avgs[d] = vals.length ? rnd(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
    });
    return avgs;
  }, [selSku, uploadHistory, autoSkipSet]);

  /* ── 일별 총 판매량 (누락 제외, 소수점 보정) ── */
  const dailySales = useMemo(() => {
    return [...uploadHistory]
      .sort((a,b) => a.date.localeCompare(b.date))
      .slice(-14)
      .map(h => {
        const total = Object.entries(h.items||{}).reduce((s,[sku,item]) => {
          if (autoSkipSet.has(`${h.date}__${sku}`)) return s;
          return s + (item.sold||0);
        }, 0);
        return { date: h.date, dow: h.dow, total: rnd(total,0) };
      });
  }, [uploadHistory, autoSkipSet]);

  /* ── 주간 KPI ── */
  const weekKpi = useMemo(() => {
    if (dailySales.length === 0) return null;
    const thisWeek = dailySales.slice(-7);
    const lastWeek = dailySales.slice(-14, -7);
    const thisTotal = thisWeek.reduce((s,d)=>s+d.total,0);
    const lastTotal = lastWeek.reduce((s,d)=>s+d.total,0);
    const thisDayAvg = thisWeek.length ? rnd(thisTotal/thisWeek.length,0) : 0;
    const diff = lastTotal > 0 ? rnd(((thisTotal-lastTotal)/lastTotal)*100,1) : null;

    // 재고소진 일수 (자동누락 제외)
    const zeroCount = uploadHistory.slice(-7).reduce((s,h) => {
      return s + Object.entries(h.items||{}).filter(([sku,i]) =>
        i.actualSum === 0 && !autoSkipSet.has(`${h.date}__${sku}`)
      ).length;
    }, 0);

    return { thisTotal, diff, thisDayAvg, zeroCount };
  }, [dailySales, uploadHistory, autoSkipSet]);

  /* ── TOP 소진 품목 (actualSum=0 빈도) ── */
  const topStockout = useMemo(() => {
    const cnt = {};
    uploadHistory.forEach(h => {
      Object.entries(h.items||{}).forEach(([sku,item]) => {
        if (item.actualSum === 0 && !autoSkipSet.has(`${h.date}__${sku}`)) {
          cnt[sku] = (cnt[sku]||0) + 1;
        }
      });
    });
    return Object.entries(cnt)
      .sort((a,b) => b[1]-a[1])
      .slice(0,8)
      .map(([sku,count]) => ({ sku, count, name: skuAliases[sku]||allSkus[sku]?.name||sku }));
  }, [uploadHistory, autoSkipSet, allSkus, skuAliases]);

  /* ── 자동 누락 건수 ── */
  const autoSkipCount = autoSkipSet.size;

  /* ── 라인차트 SVG ── */
  const LineChart = ({ data }) => {
    if (!data.length) return null;
    const W=480, H=90, PL=36, PR=12, PT=8, PB=24;
    const maxV = Math.max(...data.map(d=>d.total), 1);
    const xs = data.map((_,i) => PL + i*(W-PL-PR)/(data.length-1||1));
    const ys = data.map(d => PT + (H-PT-PB)*(1-d.total/maxV));
    const path = xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(" ");
    const area = `${path} L${xs[xs.length-1]},${H-PB} L${xs[0]},${H-PB} Z`;
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:H, display:"block" }}>
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#00704A" stopOpacity="0.25"/>
            <stop offset="100%" stopColor="#00704A" stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        {/* 가로선 */}
        {[0.25,0.5,0.75,1].map(r => (
          <line key={r} x1={PL} y1={PT+(H-PT-PB)*(1-r)} x2={W-PR} y2={PT+(H-PT-PB)*(1-r)}
            stroke="#E5E5EA" strokeWidth="0.8"/>
        ))}
        {/* Y축 레이블 */}
        <text x={PL-4} y={PT+4} fontSize="8" fill="#8E8E93" textAnchor="end">{rnd(maxV,0)}</text>
        <text x={PL-4} y={H-PB} fontSize="8" fill="#8E8E93" textAnchor="end">0</text>
        {/* 면적 */}
        <path d={area} fill="url(#sg)"/>
        {/* 선 */}
        <path d={path} fill="none" stroke="#00704A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {/* 점 + X축 날짜 */}
        {data.map((d,i) => (
          <g key={d.date}>
            <circle cx={xs[i]} cy={ys[i]} r="3" fill="#00704A"/>
            {(i===0 || i===data.length-1 || data.length<=7 || i%2===0) && (
              <text x={xs[i]} y={H-2} fontSize="8" fill="#8E8E93" textAnchor="middle">
                {DOW_KR_L[d.dow]}
              </text>
            )}
          </g>
        ))}
      </svg>
    );
  };

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
      <SH title="📈 통계 & 히스토리"/>

      {/* 모드 탭 */}
      <div style={{ display:"flex", gap:6, marginBottom:16 }}>
        {[["cat","🗂 카테고리 개요"],["excel","📊 품목 분석"],["manual","📝 수동 입력"]].map(([id,label])=>(
          <button key={id} onClick={()=>setViewMode(id)} style={{
            padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer",
            fontFamily:F, fontSize:13, fontWeight:viewMode===id?700:500,
            background:viewMode===id?T.brand:T.card2, color:viewMode===id?"#fff":T.t2 }}>
            {label}
          </button>
        ))}
      </div>

      {/* ─── 실사 데이터 통계 ─── */}
      {viewMode==="excel" && (
        <div>
          {uploadHistory.length === 0 ? (
            <EmptyState emoji="📁" text="업로드된 실사 데이터가 없어요" sub="실사 탭에서 엑셀을 업로드해주세요"/>
          ) : (
            <div>
              {/* ① 자동 누락 배너 */}
              {autoSkipCount > 0 && (
                <div style={{ background:"rgba(255,149,0,0.08)", border:"1px solid rgba(255,149,0,0.25)",
                  borderRadius:12, padding:"10px 14px", marginBottom:14,
                  display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:18 }}>🔍</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:T.amber, fontFamily:F }}>
                      자동 누락 감지 {autoSkipCount}건
                    </div>
                    <div style={{ fontSize:12, color:T.t2, fontFamily:F }}>
                      재고 변동 없이 판매 0인 항목은 통계에서 제외했어요
                    </div>
                  </div>
                </div>
              )}

              {/* ② 주간 KPI 카드 */}
              {weekKpi && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:16 }}>
                  {[
                    { label:"최근 7일 총 판매", value: weekKpi.thisTotal+"개",
                      sub: weekKpi.diff !== null ? (weekKpi.diff >= 0 ? "▲" : "▼")+" 전주 대비 "+Math.abs(weekKpi.diff)+"%" : "전주 없음",
                      color: weekKpi.diff === null ? T.brand : weekKpi.diff >= 0 ? T.brand : T.red, dim: T.brandDim },
                    { label:"일 평균 판매", value: weekKpi.thisDayAvg+"개",
                      sub: "최근 7일 기준", color: T.amber, dim: T.aDim },
                    { label:"재고소진 횟수", value: weekKpi.zeroCount+"회",
                      sub: "최근 7일 누적", color: T.red, dim: T.rDim },
                  ].map(c => (
                    <div key={c.label} style={{ background:c.dim, border:"1px solid "+c.color+"33",
                      borderRadius:12, padding:"12px 12px" }}>
                      <div style={{ fontSize:10, fontWeight:700, color:c.color, fontFamily:F }}>{c.label}</div>
                      <div style={{ fontSize:18, fontWeight:900, color:c.color, fontFamily:F, margin:"4px 0 2px" }}>{c.value}</div>
                      <div style={{ fontSize:10, color:T.t3, fontFamily:F }}>{c.sub}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* ③ 전체 판매 추이 라인차트 */}
              {dailySales.length >= 2 && (
                <Card style={{ padding:"14px 14px 10px", marginBottom:16 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F }}>
                      일별 총 판매 추이 <span style={{ fontSize:11, color:T.t3, fontWeight:400 }}>(최근 {dailySales.length}일)</span>
                    </div>
                  </div>
                  <LineChart data={dailySales}/>
                  {/* 요일별 합계 작게 */}
                  <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginTop:8 }}>
                    {["일","월","화","수","목","금","토"].map((d,dow) => {
                      const days = dailySales.filter(x=>x.dow===dow);
                      if (!days.length) return null;
                      const avg = rnd(days.reduce((s,x)=>s+x.total,0)/days.length,0);
                      return (
                        <div key={dow} style={{ fontSize:11, color:dow===0?T.red:dow===6?T.blue:T.t2,
                          background:T.card2, borderRadius:6, padding:"2px 7px", fontFamily:F }}>
                          {d} avg {avg}
                        </div>
                      );
                    })}
                  </div>
                </Card>
              )}

              {/* ④ TOP 소진 품목 */}
              {topStockout.length > 0 && (
                <Card style={{ padding:"14px", marginBottom:16 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>
                    🚨 재고소진 빈도 TOP {topStockout.length}
                    <span style={{ fontSize:11, color:T.t3, fontWeight:400, marginLeft:6 }}>버퍼 추가 검토 대상</span>
                  </div>
                  {topStockout.map((item, i) => {
                    const ratio = item.count / uploadHistory.length;
                    const barColor = ratio > 0.5 ? T.red : ratio > 0.25 ? T.amber : T.brand;
                    return (
                      <div key={item.sku} style={{ display:"flex", alignItems:"center", gap:10,
                        marginBottom: i < topStockout.length-1 ? 8 : 0 }}>
                        <div style={{ width:22, fontSize:12, fontWeight:700,
                          color:T.t3, fontFamily:F, textAlign:"right", flexShrink:0 }}>
                          {i+1}
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:T.t1, fontFamily:F,
                            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                            {item.name.length > 18 ? item.name.slice(0,18)+"…" : item.name}
                          </div>
                          <div style={{ height:5, background:T.card3, borderRadius:3, marginTop:3, overflow:"hidden" }}>
                            <div style={{ width:(ratio*100)+"%", height:"100%",
                              background:barColor, borderRadius:3, transition:"width .3s" }}/>
                          </div>
                        </div>
                        <div style={{ fontSize:12, fontWeight:700, color:barColor,
                          fontFamily:F, flexShrink:0, minWidth:36, textAlign:"right" }}>
                          {item.count}회
                        </div>
                      </div>
                    );
                  })}
                </Card>
              )}

              {/* ⑤ SKU 개별 분석 */}
              <Card style={{ padding:"14px", marginBottom:16 }}>
                <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>
                  🔍 품목별 판매 분석
                </div>
                {/* 검색 + 카테고리 필터 */}
                <div style={{ display:"flex", gap:8, marginBottom:10, flexWrap:"wrap" }}>
                  <input value={skuSearch} onChange={e=>setSkuSearch(e.target.value)}
                    placeholder="품목명 검색..."
                    style={{ flex:1, minWidth:140, padding:"7px 12px", borderRadius:8,
                      border:"1px solid "+T.b1, fontFamily:F, fontSize:13,
                      background:T.card, color:T.t1 }}/>
                  <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                    {cats.map(c => (
                      <button key={c} onClick={()=>setCatFilter(c)} style={{
                        padding:"5px 10px", borderRadius:8, border:"1px solid "+(catFilter===c?T.brand:T.b1),
                        background:catFilter===c?T.brandDim:T.card, color:catFilter===c?T.brand:T.t2,
                        fontSize:12, fontWeight:catFilter===c?700:400, cursor:"pointer", fontFamily:F }}>
                        {c}
                      </button>
                    ))}
                  </div>
                </div>
                {/* SKU 칩 목록 */}
                <div style={{ display:"flex", gap:5, flexWrap:"wrap", maxHeight:100, overflowY:"auto" }}>
                  {filteredSkus.slice(0,50).map(([sku, info]) => {
                    const disp = skuAliases[sku] || info.name;
                    const isSelected = selSku === sku;
                    return (
                      <button key={sku} onClick={()=>setSelSku(isSelected ? null : sku)} style={{
                        padding:"4px 10px", borderRadius:16,
                        border:"1px solid "+(isSelected?T.brand:T.b1),
                        background:isSelected?T.brandDim:T.card,
                        color:isSelected?T.brand:T.t2,
                        fontSize:12, fontWeight:isSelected?700:400,
                        cursor:"pointer", fontFamily:F, whiteSpace:"nowrap" }}>
                        {disp.length > 12 ? disp.slice(0,12)+"…" : disp}
                      </button>
                    );
                  })}
                  {filteredSkus.length === 0 && (
                    <div style={{ fontSize:12, color:T.t3, fontFamily:F, padding:"8px 0" }}>검색 결과 없음</div>
                  )}
                </div>
              </Card>

              {/* ⑥ 선택 SKU 상세 */}
              {selSku && (
                <div style={{ marginBottom:16 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>
                    {skuAliases[selSku]||allSkus[selSku]?.name} — 상세 분석
                  </div>

                  {/* 요일별 평균 막대 */}
                  <Card style={{ padding:"14px", marginBottom:10 }}>
                    <div style={{ fontSize:12, fontWeight:700, color:T.t3, fontFamily:F, marginBottom:10 }}>요일별 평균 판매량 (누락 제외)</div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:6 }}>
                      {[0,1,2,3,4,5,6].map(dow => {
                        const avg = dowAvgs[dow];
                        const maxAvg = Math.max(...Object.values(dowAvgs).map(v=>parseFloat(v)||0));
                        const ratio = maxAvg > 0 ? (parseFloat(avg)||0)/maxAvg : 0;
                        const col = dow===0?T.red:dow===6?T.blue:T.brand;
                        return (
                          <div key={dow} style={{ textAlign:"center" }}>
                            <div style={{ fontSize:11, fontWeight:700, color:col, fontFamily:F, marginBottom:4 }}>
                              {DOW_KR_L[dow]}
                            </div>
                            <div style={{ height:52, background:T.card3, borderRadius:6,
                              position:"relative", overflow:"hidden", marginBottom:4 }}>
                              <div style={{ position:"absolute", bottom:0, left:0, right:0,
                                height:(ratio*100)+"%", background:col, opacity:0.8, borderRadius:6 }}/>
                            </div>
                            <div style={{ fontSize:12, fontWeight:700, color:col, fontFamily:F }}>{avg||"-"}</div>
                          </div>
                        );
                      })}
                    </div>
                  </Card>

                  {/* 날짜별 기록 + 평균 대비 표시 */}
                  <Card>
                    <div style={{ padding:"10px 14px 6px", fontSize:12, fontWeight:700, color:T.t1, fontFamily:F }}>
                      날짜별 기록
                    </div>
                    <div style={{ overflowX:"auto" }}>
                      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, fontFamily:F }}>
                        <thead>
                          <tr style={{ background:T.brandDim }}>
                            {["날짜","요일","재고","판매","vs 평균"].map(h=>(
                              <th key={h} style={{ padding:"7px 8px", textAlign:"center",
                                color:T.brand, fontWeight:700 }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {[...skuTrend].reverse().map((row,i) => {
                            const avgForDow = parseFloat(dowAvgs[row.dow]) || null;
                            let diff = null, diffIcon = null, diffColor = T.t3;
                            if (!row.autoSkip && avgForDow && row.sold > 0) {
                              diff = rnd(((row.sold - avgForDow) / avgForDow) * 100, 0);
                              diffIcon = diff > 10 ? "🔼" : diff < -10 ? "🔽" : "–";
                              diffColor = diff > 10 ? T.brand : diff < -10 ? T.red : T.t3;
                            }
                            return (
                              <tr key={row.date} style={{ background: row.autoSkip ? "rgba(255,149,0,0.05)" : i%2===0?T.card2:T.card }}>
                                <td style={{ padding:"7px 8px", color:T.t2, textAlign:"center" }}>{fmtDate(row.date)}</td>
                                <td style={{ padding:"7px 6px", textAlign:"center",
                                  color:row.dow===0?T.red:row.dow===6?T.blue:T.t2, fontWeight:600 }}>
                                  {DOW_KR_L[row.dow]}
                                </td>
                                <td style={{ padding:"7px 6px", textAlign:"center",
                                  color:row.stock===0?T.red:T.t1, fontWeight:row.stock===0?700:400 }}>{row.stock}</td>
                                <td style={{ padding:"7px 6px", textAlign:"center" }}>
                                  {row.autoSkip
                                    ? <span style={{ fontSize:10, color:T.amber, fontWeight:600 }}>누락</span>
                                    : <span style={{ color:T.amber, fontWeight:600 }}>{row.sold||"-"}</span>}
                                </td>
                                <td style={{ padding:"7px 6px", textAlign:"center", color:diffColor, fontWeight:600 }}>
                                  {row.autoSkip ? "-" : diff !== null ? `${diffIcon} ${diff>0?"+":""}${diff}%` : "-"}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </Card>
                </div>
              )}

              {/* ⑦ 업로드 히스토리 목록 */}
              <div style={{ marginTop:4 }}>
                <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>
                  업로드 히스토리 ({uploadHistory.length}건)
                </div>
                <Card>
                  {[...uploadHistory].reverse().map((h,i,arr) => {
                    const totalSold = rnd(Object.entries(h.items||{}).reduce((s,[sku,item]) => {
                      if (autoSkipSet.has(`${h.date}__${sku}`)) return s;
                      return s + (item.sold||0);
                    }, 0), 0);
                    return (
                      <div key={h.date} style={{ padding:"12px 16px",
                        display:"flex", alignItems:"center", gap:12,
                        borderBottom:i<arr.length-1?"1px solid "+T.b0:"none" }}>
                        <div style={{ width:42, height:42, borderRadius:11, background:T.brandDim,
                          display:"flex", flexDirection:"column", alignItems:"center",
                          justifyContent:"center", flexShrink:0 }}>
                          <div style={{ fontSize:14, fontWeight:800, color:T.brand, lineHeight:1 }}>
                            {new Date(h.date+"T00:00:00").getDate()}
                          </div>
                          <div style={{ fontSize:9, color:T.brand, opacity:0.7 }}>
                            {new Date(h.date+"T00:00:00").toLocaleDateString("ko-KR",{month:"short"})}
                          </div>
                        </div>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F }}>
                            {fmtDate(h.date)} ({DOW_KR_L[h.dow]}요일)
                          </div>
                          <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
                            {Object.keys(h.items||{}).length}개 SKU ·
                            총 판매 {totalSold}개 ·
                            재고없음 {Object.values(h.items||{}).filter(i=>i.actualSum===0).length}개
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </Card>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ─── 카테고리 개요 ─── */}
      {viewMode==="cat" && (
        <div>
          {uploadHistory.length === 0 ? (
            <EmptyState emoji="📁" text="업로드된 실사 데이터가 없어요" sub="실사 탭에서 엑셀을 업로드해주세요"/>
          ) : <CatOverview uploadHistory={uploadHistory} skuAliases={skuAliases} autoSkipSet={autoSkipSet}/>}
        </div>
      )}

      {/* ─── 수동 입력 통계 ─── */}
      {viewMode==="manual" && (
        <div>
          {manualRecords.length === 0 ? (
            <EmptyState emoji="📝" text="수동 입력 기록이 없어요" sub="수동 입력 탭에서 재고를 입력해주세요"/>
          ) : (
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>
                수동 입력 요일별 평균
              </div>
              {manualItems.slice(0,5).map(item => {
                const avgs = [0,1,2,3,4,5,6].map(dow => {
                  const vals = manualRecords.filter(r=>r.dow===dow&&!r.items?.[item]?.skipped&&r.items?.[item]?.used>0)
                    .map(r=>r.items[item].used);
                  return vals.length ? rnd(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
                });
                const maxAvg = Math.max(...avgs.map(v=>parseFloat(v)||0));
                const DOW_KR_LOCAL = ["일","월","화","수","목","금","토"];
                return (
                  <Card key={item} style={{ padding:"12px 14px", marginBottom:10 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>{item}</div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
                      {avgs.map((avg,dow) => {
                        const ratio = maxAvg > 0 ? (parseFloat(avg)||0)/maxAvg : 0;
                        const col = dow===0?T.red:dow===6?T.blue:T.brand;
                        return (
                          <div key={dow} style={{ textAlign:"center" }}>
                            <div style={{ fontSize:10, color:col, fontWeight:700, fontFamily:F, marginBottom:2 }}>
                              {DOW_KR_LOCAL[dow]}
                            </div>
                            <div style={{ height:36, background:T.card3, borderRadius:4,
                              position:"relative", overflow:"hidden", marginBottom:2 }}>
                              <div style={{ position:"absolute", bottom:0, left:0, right:0,
                                height:(ratio*100)+"%", background:col, opacity:0.8 }}/>
                            </div>
                            <div style={{ fontSize:11, fontWeight:700, color:col, fontFamily:F }}>{avg||"-"}</div>
                          </div>
                        );
                      })}
                    </div>
                  </Card>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}



/* ─── Render ─────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
