/* ─── Firestore 동기화 헬퍼 ─────────────────────── */

  },
  loadConfig: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("data").doc("config").get();
      return snap.exists ? snap.data() : null;
    } catch(e) { console.warn("Firestore loadConfig error:", e); return null; }
  },

  // 수동 기록 (manualRecords)

    try {
      await DB.path(storeId).collection("data").doc("manualRecords").set({ records }, { merge: false });
      return true;
    } catch(e) { console.warn("Firestore saveManualRecords error:", e); return false; }
  },
  loadManualRecords: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("data").doc("manualRecords").get();
      return snap.exists ? (snap.data().records || []) : null;

  // 업로드 이력 (history) - 각 엔트리를 별도 문서로 저장

      const docId = entry._id || entry.date; // date를 문서 ID로 사용 (유일성 보장)
      await DB.path(storeId).collection("history").doc(docId).set({
        ...entry,
        _id: docId,
        _savedAt: Date.now()

      return true;
    } catch(e) { console.warn("Firestore saveHistoryEntry error:", e); return false; }

    try {
      await DB.path(storeId).collection("history").doc(String(key)).delete();

  loadHistory: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("history").orderBy("date", "asc").get();

/* ─── Filename Date Extraction ───────────────────── */
function isValidDateStr(s) {
  const d = new Date(s+"T00:00:00");
  return !isNaN(d.getTime()) && s.length === 10;
}
function extractDateFromFilename(filename) {
  const name = filename.replace(/\.[^.]+$/, "");
  // YYYYMMDD (8자리)
  const m2 = name.match(/(\d{4})(\d{2})(\d{2})/);
  if (m2) { const d = m2[1]+"-"+m2[2]+"-"+m2[3]; if (isValidDateStr(d)) return d; }
  // YYMMDD (6자리)
  const m1 = name.match(/(?<!\d)(\d{2})(\d{2})(\d{2})(?!\d)/);
  if (m1) {
    const yy = parseInt(m1[1]);
    const year = (yy >= 50 ? 1900+yy : 2000+yy);
    const d = year+"-"+m1[2]+"-"+m1[3];
    if (isValidDateStr(d)) return d;
  }
  // YYYY-MM-DD
  const m3 = name.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m3) { const d = m3[1]+"-"+m3[2]+"-"+m3[3]; if (isValidDateStr(d)) return d; }
  return todayStr();
}

/* ─── Excel Parsing ──────────────────────────────── */
function parseInventoryExcel(arrayBuffer, dateOverride) {
  const wb = XLSX.read(arrayBuffer, { type:"array", cellDates:true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

  // 헤더 2행, 데이터 3행부터
  const items = {};
  const dateStr = dateOverride || todayStr();

  for (let i = 2; i < raw.length; i++) {
    const row = raw[i];
    if (!row[2]) continue; // SKU명 없으면 skip
    const sku   = String(row[1] || "").trim();
    const name  = String(row[2] || "").trim();
    const cat   = String(row[3] || "").trim();
    const unit  = String(row[4] || "EA").trim();
    const actual = parseFloat(row[7]) || 0;
    const actualSum = parseFloat(row[8]) || 0;
    const sold   = parseFloat(row[20]) || 0;
    const tmrIn  = parseFloat(row[21]) || 0;
    const d2In   = parseFloat(row[22]) || 0;
    const dayIn  = parseFloat(row[14]) || 0;

    // 유통기한
    let expDate = null;
    let dday = null;
    if (row[11] && row[11] instanceof Date) {
      expDate = row[11].toISOString().slice(0,10);
    } else if (row[11] && typeof row[11] === "string") {
      expDate = row[11].slice(0,10);
    }
    const ddayRaw = String(row[10] || "").trim();
    if (ddayRaw) {
      const m = ddayRaw.match(/-?(\d+)/);
      dday = m ? parseInt(ddayRaw.replace("D-","").replace("D+","")) : null;
      if (ddayRaw.startsWith("D-") || ddayRaw === "D-day") {
        dday = ddayRaw === "D-day" ? 0 : -parseInt(m[1]);
        // D-3 means expires in 3 days
        dday = parseInt(m ? m[0] : "0") * -1;
        const parts = ddayRaw.match(/D-(\d+)/);
        dday = parts ? parseInt(parts[1]) : (ddayRaw === "D-day" ? 0 : null);
      }
    }

    if (!items[sku]) {
      items[sku] = {
        sku, name, cat, unit,
        batches: [],
        actualSum: 0,
        sold: 0,
        tmrIn: 0,
        d2In: 0,
        dayIn: 0,
      };
    }
    items[sku].batches.push({ actual, expDate, dday: dday });
    // actualSum은 마지막 행 기준 (같은 값 반복됨)
    items[sku].actualSum = actualSum || items[sku].actualSum || actual;
    items[sku].sold = sold || items[sku].sold;
    items[sku].tmrIn = tmrIn || items[sku].tmrIn;
    items[sku].d2In = d2In || items[sku].d2In;
    items[sku].dayIn = dayIn || items[sku].dayIn;
  }

  return { date: dateStr, dow: getDow(dateStr), items };
}

/* ── 음료 판매 파일 파싱 ── */
// 제외 카테고리: 1050(Dairy/Fruit), 1090(Syrup/Shot/Custom 등)
const BEV_EXCLUDE_PREFIX = ['1050', '1090'];

// 에스프레소 대분류 매핑 (코드 앞자리)
function getBevMacro(catCode) {
  const c = String(catCode);
  if (c.startsWith('1010010')) return 'Drip';
  if (c.startsWith('1010040')) return 'Cold Brew';
  if (c.startsWith('1020010')) return '에스프레소';
  if (c.startsWith('1030010')) return 'Frappuccino';
  if (c.startsWith('1030030')) return 'Blended';
  if (c.startsWith('1040010')) return 'Tea';
  if (c.startsWith('1040030')) return 'Fizzio';
  if (c.startsWith('1040040')) return 'Chocolate';
  if (c.startsWith('1040090')) return '기타음료';
  return '기타';
}

// SKU명에서 사이즈 추출: (T)=Tall, (G)=Grande, (V)=Venti, (S)=Short, (TR)=Trenta
function getSizeFromName(name) {
  const m = String(name||"").match(/^\(([A-Z]+)\)/);
  if (!m) return "기타";
  switch(m[1]) {
    case "S":  return "Short";
    case "T":  return "Tall";
    case "G":  return "Grande";
    case "V":  return "Venti";
    case "TR": return "Trenta";
    default:   return m[1];
  }
}

function parseBeverageExcel(arrayBuffer, dateOverride) {
  const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

  let curCatCode = null, curCatName = null, curMacro = null;
  const items = {};
  const categories = {};

  rows.forEach(row => {
    if (!row || row.length < 5) return;
    const rawCode = row[0], catNameEn = row[1], skuNo = row[2], skuName = row[3];
    const qty     = parseFloat(row[4]) || 0;
    const sales   = parseFloat(row[7]) || 0;

    // 카테고리 행 감지
    if (rawCode && String(rawCode) !== "분류코드" && String(rawCode) !== "합 계") {
      curCatCode = String(rawCode);
      curCatName = catNameEn || curCatCode;
      curMacro   = getBevMacro(curCatCode);
    }
    // 소계/합계 행, 헤더, 데이터 없는 행 제외
    if (!skuNo || !skuName || qty === 0) return;
    if (String(skuName).includes("소") && String(skuName).includes("계")) return;
    // 제외 카테고리
    if (!curCatCode || BEV_EXCLUDE_PREFIX.some(p => curCatCode.startsWith(p))) return;

    const size = getSizeFromName(skuName);
    const key  = String(skuNo);

    items[key] = {
      sku:     key,
      catCode: curCatCode,
      catName: curCatName,
      macro:   curMacro,
      name:    String(skuName).replace(/^\([A-Z]+\)/, "").trim(),
      fullName: String(skuName),
      size,
      qty,
      sales: Math.round(sales),
    };

    if (!categories[curCatName]) {
      categories[curCatName] = { catCode:curCatCode, catName:curCatName, macro:curMacro, qty:0, sales:0 };
    }
    categories[curCatName].qty   += qty;
    categories[curCatName].sales += Math.round(sales);
  });

  const totalQty   = Object.values(categories).reduce((s,c)=>s+c.qty,   0);
  const totalSales = Object.values(categories).reduce((s,c)=>s+c.sales, 0);

  const dateStr = dateOverride || todayStr();
  return { date: dateStr, dow: getDow(dateStr), categories, items, totalQty, totalSales };
}

function App() {
  const [tab, setTab] = useState("dashboard");
  const isPC = window.innerWidth >= 768;

  // ── Firebase 동기화 상태 ──
  const [storeId, setStoreId] = useState(() => LS.get("storeId", ""));
  const [storeInput, setStoreInput] = useState("");
  const [syncStatus, setSyncStatus] = useState("idle"); // idle|loading|ok|error
  const [dataLoaded, setDataLoaded] = useState(false);

  // 핵심 데이터
  const [uploadHistory, setUploadHistory] = useState(() => LS.get("history", []));
  const [bevHistory,    setBevHistory]    = useState(() => LS.get("bevHistory", []));
  const [manualItems,   setManualItems]   = useState(() => LS.get("manualItems", ["우유","저지방우유","두유","오트유","바닐라크림베이스","딸기베이스","유자베이스"]));
  const [manualRecords, setManualRecords] = useState(() => LS.get("manualRecords", []));
  // 수동 당일폐기 설정: { [sku]: true(강제 당일) | false(강제 해제) }

  // ── 초기 Firebase 데이터 로드 ──
  useEffect(() => {
    if (!storeId || !window.db) { setDataLoaded(true); return; }
    setSyncStatus("loading");
    (async () => {
      try {
        const [cfg, recs, hist, bev] = await Promise.all([
          DB.loadConfig(storeId),
          DB.loadManualRecords(storeId),
          DB.loadHistory(storeId),
          DB.loadBevHistory(storeId),
        ]);
        if (cfg) {
          if (cfg.manualItems)  { setManualItems(cfg.manualItems);  LS.set("manualItems", cfg.manualItems); }

        }
        if (recs !== null) { setManualRecords(recs); LS.set("manualRecords", recs); }
        if (hist !== null && hist.length > 0) {
          setUploadHistory(hist); LS.set("history", hist);
        }
        if (bev !== null && bev.length > 0) {
          setBevHistory(bev); LS.set("bevHistory", bev);
        } else {
          // Firebase에 히스토리 없음 → 로컬 데이터를 Firebase에 업로드 (최초 동기화)
          const localHist = LS.get("history", []);
          if (localHist.length > 0) {
            console.log("[sync] Firebase history empty, migrating", localHist.length, "entries from localStorage");
            await DB.uploadAllHistory(storeId, localHist);
          }
        }
        setSyncStatus("ok");
      } catch(e) {
        console.warn("Firebase 로드 실패, 로컬 캐시 사용:", e);
        setSyncStatus("error");
      } finally {
        setDataLoaded(true);
      }
    })();
  }, [storeId]);

  // ── Firebase + LS 통합 저장 함수 ──
  const saveBevHistory = async (v, newEntry) => {
    setBevHistory(v); LS.set("bevHistory", v);
    if (storeId && window.db && newEntry) {
      await DB.saveBevEntry(storeId, newEntry);
    }
  };

  const saveHistory = async (v, newEntry) => {
    // 업로드 전후 변화 계산
    if (newEntry && uploadHistory.length > 0) {
      const prev = [...uploadHistory].sort((a,b)=>b.date.localeCompare(a.date))[0];
      if (prev) {
        const newZero  = Object.entries(newEntry.items||{})
          .filter(([,i]) => i.actualSum===0).length;
        const prevZero = Object.entries(prev.items||{})
          .filter(([,i]) => i.actualSum===0).length;
        const newExpiry = Object.entries(newEntry.items||{})
          .filter(([,i]) => (i.batches||[]).some(b=>b.dday!==null&&b.dday<=3&&b.actual>0)).length;
        const newSold  = Object.values(newEntry.items||{}).reduce((s,i)=>s+(i.sold||0),0);
        setUploadSummary({
          date: newEntry.date,
          zeroCount: newZero,
          zeroDiff: newZero - prevZero,
          expiringCount: newExpiry,
          totalSold: Math.round(newSold),
        });
        setTimeout(() => setUploadSummary(null), 10000); // 10초 후 자동 닫기
      }
    }
    setUploadHistory(v); LS.set("history", v);
    if (storeId && window.db && newEntry) {
      setSyncStatus("loading");
      const ok = await DB.saveHistoryEntry(storeId, newEntry);
      setSyncStatus(ok ? "ok" : "error");
    }
  };
  const deleteHistoryEntry = async (id) => {
    if (storeId && window.db) {
      setSyncStatus("loading");
      await DB.deleteHistoryEntry(storeId, id);
      setSyncStatus("ok");
    }
  };
  const saveManualItems = async (v) => {
    setManualItems(v); LS.set("manualItems", v);
    if (storeId && window.db) {
      await DB.saveConfig(storeId, { manualItems: v });
    }
  };
  const saveManualRecords = async (v) => {
    setManualRecords(v); LS.set("manualRecords", v);
    if (!storeId || !window.db) return;
    setSyncStatus("loading");
    const ok = await DB.saveManualRecords(storeId, v);
    setSyncStatus(ok ? "ok" : "error");
  };

  // 매장번호 등록
  const handleSetStore = () => {
    const sid = storeInput.trim();
    if (!sid) return;
    LS.set("storeId", sid);
    setStoreId(sid);
    setDataLoaded(false);
  };

  // UploadTab에서 삭제 접근 가능하게 window에 노출
  useEffect(() => {
    window._deleteHistoryEntry = (id) => deleteHistoryEntry(id);
    return () => { delete window._deleteHistoryEntry; };

  // 최신 업로드 데이터
  const latestUpload = uploadHistory.length ? uploadHistory[uploadHistory.length - 1] : null;

  const tabs = [

    });

      {/* 업로드 없음 안내 */}
      {!latestUpload && (
        <Card style={{ marginBottom:16 }}>
          <EmptyState emoji="📁" text="실사 데이터가 없어요"
            sub="실사 탭에서 엑셀 파일을 업로드해보세요"/>
          <div style={{ padding:"0 16px 16px" }}>
            <GreenBtn full onClick={() => setTab("upload")}>📁 실사 업로드하기</GreenBtn>
          </div>
        </Card>
      )}


            {/* 유통기한 임박 */}
      {expiring.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <SH title="⚠ 유통기한 임박" sub={expiring.length+"개"}/>
          <Card>
            {expiring.slice(0,6).map((item, i, arr) => {
              const dday = item.dday;
              const color = dday === 0 ? T.red : dday <= 1 ? T.red : dday <= 3 ? T.amber : T.t3;
              const dim   = dday === 0 ? T.rDim : dday <= 1 ? T.rDim : T.aDim;
              const dispNm = (skuAliases||{})[item.sku] || item.name;
              const dispName = skuAliases[item.sku] || item.name;
              return (
                <div key={item.sku+"_"+i} style={{
                  padding:"12px 16px", display:"flex", alignItems:"center", gap:12,
                  borderBottom:i<arr.length-1?"1px solid "+T.b0:"none" }}>
                  <div style={{ width:40, height:40, borderRadius:10, background:dim,
                    display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", flexShrink:0 }}>
                    <div style={{ fontSize:13, fontWeight:900, color, lineHeight:1 }}>
                      {dday === 0 ? "D-day" : "D-"+dday}
                    </div>
                    <button onClick={()=>setTab("history")} style={{
                      fontSize:10, color:T.brand, background:T.brandDim,
                      border:"1px solid "+T.brandBorder, borderRadius:6,
                      padding:"2px 8px", cursor:"pointer", fontFamily:F, flexShrink:0 }}>
                      통계 →
                    </button>
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F,
                      overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {dispName}
                    </div>
                    <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
                      재고 {item.actual}개 · {item.expDate ? fmtDate(item.expDate) + " 만료" : ""}
                    </div>
                  </div>
                  <Pill label={dday===0?"오늘마감":dday<=1?"내일마감":"D-"+dday}
                    color={color} dim={dim}/>
                </div>
              );
            })}
          </Card>
        </div>
      )}

      {/* 최근 실사 요약 */}
      {latestUpload && (
        <div style={{ marginBottom:16 }}>
          <SH title="최근 실사 현황" sub={fmtDate(latestUpload.date)+" ("+DOW_KR[latestUpload.dow]+"요일)"}
            action={
              <button onClick={() => setTab("upload")} style={{
                padding:"5px 12px", borderRadius:8, border:"none",
                background:T.brand, color:"#fff", fontSize:12, fontWeight:600,
                cursor:"pointer", fontFamily:F }}>+ 업로드</button>
            }/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {[
              { label:"총 품목", value:totalSku+"개", color:T.brand, dim:T.brandDim },
              { label:"재고 없음", value:zeroStock+"개", color:T.red, dim:T.rDim },
              { label:"내일 입고", value:Object.values(latestUpload.items||{}).filter(i=>i.tmrIn>0).length+"개", color:T.blue, dim:T.bDim },
              { label:"당일 판매", value:Math.round(Object.values(latestUpload.items||{}).reduce((s,i)=>s+i.sold,0))+"개", color:T.amber, dim:T.aDim },
            ].map(stat => (
              <div key={stat.label} style={{ background:stat.dim, borderRadius:14,
                padding:"14px 16px", border:"1px solid "+stat.color+"22" }}>
                <div style={{ fontSize:11, fontWeight:700, color:stat.color, fontFamily:F, marginBottom:4 }}>
                  {stat.label}
                </div>
                <div style={{ fontSize:24, fontWeight:900, color:stat.color, fontFamily:F, letterSpacing:-1 }}>
                  {stat.value}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 바로가기 버튼 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {[
          { icon:"📁", label:"실사 업로드", tab:"upload",  color:T.brand },
          { icon:"📊", label:"통계 보기",   tab:"history", color:"#7C3AED" },
        ].map(btn => (
          <button key={btn.tab} onClick={() => setTab(btn.tab)} style={{
            background:T.card, borderRadius:14, border:"1px solid "+T.b0,
            padding:"16px 14px", cursor:"pointer", display:"flex",
            alignItems:"center", gap:10, boxShadow:T.sh1,
            transition:"transform .15s" }}
          onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"}
          onMouseLeave={e=>e.currentTarget.style.transform="none"}>
            <div style={{ width:38, height:38, borderRadius:10,
              background:btn.color+"15", border:"1px solid "+btn.color+"25",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:18, flexShrink:0 }}>{btn.icon}</div>
            <span style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F }}>{btn.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ─── 실사 업로드 탭 ─────────────────────────────── */
function UploadTab({ uploadHistory, onSave, bevHistory, onSaveBev, skuAliases, onSaveAliases }) {
  const [uploadMode, setUploadMode] = useState("inventory"); // "inventory" | "bev"
  const [dragging, setDragging] = useState(false);
  const [pending,  setPending]  = useState([]);
  const [bevPending, setBevPending] = useState([]);
  const [error,    setError]    = useState("");
  const fileRef = useRef();
  const bevFileRef = useRef();

  const parseFiles = async (files) => {
    setError("");
    const newItems = [];
    for (const file of files) {
      const ext = file.name.split(".").pop().toLowerCase();
      if (!["xlsx","xls"].includes(ext)) { setError('"'+file.name+'" — xlsx 또는 xls 파일만 지원해요'); continue; }
      try {
        const buf = await file.arrayBuffer();
        const guessDate = extractDateFromFilename(file.name);
        const data = parseInventoryExcel(buf, guessDate);
        newItems.push({ id:Date.now()+Math.random(), filename:file.name, data, customDate:guessDate, expanded:false });
      } catch(e) {
        setError('"'+file.name+'" 파싱 오류: '+e.message);
      }
    }
    if (newItems.length) setPending(prev => [...prev, ...newItems]);
  };

  const handleDrop = (e) => { e.preventDefault(); setDragging(false); parseFiles(Array.from(e.dataTransfer.files)); };

  const updateDate = (id, newDate) => {
    setPending(prev => prev.map(p => {
      if (p.id !== id) return p;
      return { ...p, customDate:newDate, data:{ ...p.data, date:newDate, dow:getDow(newDate) } };
    }));
  };

  const removePending = (id) => setPending(prev => prev.filter(p => p.id !== id));

  const saveOne = (item) => {
    const exists = uploadHistory.findIndex(h => h.date === item.data.date);
    let updated;
    if (exists >= 0) {
      if (!window.confirm(item.data.date+" 날짜의 기존 데이터가 있어요. 덮어쓸까요?")) return;
      updated = uploadHistory.map((h,i) => i===exists ? item.data : h);
    } else {
      updated = [...uploadHistory, item.data].sort((a,b) => a.date.localeCompare(b.date));
    }
    // 새 항목이면 newEntry로 Firebase 개별 저장, 덮어쓰기면 배열 전체 저장
    const isNew = exists < 0;
    onSave(updated, isNew ? item.data : null);
    removePending(item.id);
  };

  const saveAll = () => {
    let updated = [...uploadHistory];
    const newEntries = [];
    for (const item of pending) {
      const exists = updated.findIndex(h => h.date === item.data.date);
      if (exists >= 0) updated = updated.map((h,i) => i===exists ? item.data : h);
      else { updated = [...updated, item.data]; newEntries.push(item.data); }
    }
    const sorted = updated.sort((a,b) => a.date.localeCompare(b.date));
    // 새 항목들 개별 Firebase 저장
    newEntries.forEach(entry => onSave(sorted, entry));
    if (newEntries.length === 0) onSave(sorted, null);
    setPending([]);
    alert(pending.length+"개 파일이 저장되었습니다 ✓");
  };

  const deleteHistory = (idx) => {
    if (!window.confirm("이 기록을 삭제할까요?")) return;
    const toDelete = uploadHistory[idx];
    onSave(uploadHistory.filter((_,i) => i!==idx), null);
    // Firebase에서도 삭제
    const delKey = toDelete?.date || toDelete?._id;
    if (delKey) window._deleteHistoryEntry && window._deleteHistoryEntry(delKey);
  };

  const toggleExpand = (id) => setPending(prev => prev.map(p => p.id===id ? {...p,expanded:!p.expanded} : p));

  // ── 음료 파일 파싱 ──
  const parseBevFiles = async (files) => {
    setError("");
    const newItems = [];
    for (const file of files) {
      const ext = file.name.split(".").pop().toLowerCase();
      if (!["xlsx","xls"].includes(ext)) { setError('"'+file.name+'" — xlsx 또는 xls 파일만 지원해요'); continue; }
      try {
        const buf = await file.arrayBuffer();
        const guessDate = extractDateFromFilename(file.name);
        const data = parseBeverageExcel(buf, guessDate);
        newItems.push({ id:Date.now()+Math.random(), filename:file.name, data, customDate:guessDate });
      } catch(e) { setError('"'+file.name+'" 파싱 오류: '+e.message); }
    }
    if (newItems.length) setBevPending(prev => [...prev, ...newItems]);
  };

  const saveBevOne = (item) => {
    const exists = bevHistory.findIndex(h => h.date === item.data.date);
    let updated;
    if (exists >= 0) {
      if (!window.confirm(item.data.date+" 날짜의 기존 음료 데이터가 있어요. 덮어쓸까요?")) return;
      updated = bevHistory.map((h,i) => i===exists ? item.data : h);
    } else {
      updated = [...bevHistory, item.data].sort((a,b) => a.date.localeCompare(b.date));
    }
    onSaveBev(updated, item.data);
    setBevPending(prev => prev.filter(p => p.id !== item.id));
  };

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">

      {/* ── 업로드 모드 세그먼트 컨트롤 ── */}
      <div style={{ display:"flex", background:T.card2, borderRadius:12, padding:3,
        marginBottom:16, border:"1px solid "+T.b0 }}>
        {[["inventory","📋 재고 실사"],["bev","🧃 음료 판매"]].map(([id,label])=>(
          <button key={id} onClick={()=>{ setUploadMode(id); setError(""); }}
            style={{ flex:1, padding:"8px 0", borderRadius:10, border:"none",
              cursor:"pointer", fontFamily:F, fontSize:13, fontWeight:uploadMode===id?700:400,
              background:uploadMode===id?T.card:"transparent",
              color:uploadMode===id?T.t1:T.t3,
              boxShadow:uploadMode===id?"0 1px 4px rgba(0,0,0,0.1)":"none",
              transition:"all .15s" }}>
            {label}
          </button>
        ))}
      </div>

      {/* ── 재고 실사 업로드 ── */}
      {uploadMode==="inventory" && (
      <div>
      <SH title="📋 재고 실사 업로드"
        sub="실사 엑셀 파일 업로드 → 날짜 확인 → 저장"/>

      {/* 드롭존 */}
      <div
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={handleDrop}
        onClick={()=>fileRef.current?.click()}
        style={{ border:"2px dashed "+(dragging?T.brand:T.b1),
          borderRadius:18, padding:"28px 20px", textAlign:"center",
          background:dragging?T.brandDim:T.card, cursor:"pointer",
          transition:"all .2s", marginBottom:14 }}>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" multiple style={{ display:"none" }}
          onChange={e=>{ parseFiles(Array.from(e.target.files)); e.target.value=""; }}/>
        <div style={{ fontSize:34, marginBottom:8 }}>📊</div>
        <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:2 }}>
          실사 엑셀 파일을 올려주세요
        </div>
        <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
          여러 파일 동시 업로드 가능 · .xlsx / .xls
        </div>
      </div>

      {error && (
        <div style={{ padding:"10px 14px", borderRadius:12, background:T.rDim,
          border:"1px solid "+T.rBdr, color:T.red, fontSize:13, fontFamily:F, marginBottom:12 }}>
          ⚠ {error}
        </div>
      )}

      {/* 대기 중인 파일들 */}
      {pending.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F }}>
              파싱 완료 — {pending.length}개 파일
            </div>
            {pending.length > 1 && (
              <GreenBtn small onClick={saveAll}>전체 저장</GreenBtn>
            )}
          </div>
          {pending.map(item => (
            <PendingFileCard
              key={item.id}
              item={item}
              skuAliases={skuAliases}
              onUpdateDate={updateDate}
              onSave={saveOne}
              onRemove={removePending}
              onToggle={toggleExpand}
            />
          ))}
        </div>
      )}

      {/* 업로드 히스토리 */}
      {uploadHistory.length > 0 && (
        <div style={{ marginTop:pending.length>0?4:0 }}>
          <SH title="업로드 기록" sub={uploadHistory.length+"건"}/>
          <Card>
            {[...uploadHistory].reverse().map((h, i, arr) => (
              <div key={h.date} style={{ padding:"12px 16px",
                display:"flex", alignItems:"center", gap:12,
                borderBottom:i<arr.length-1?"1px solid "+T.b0:"none" }}>
                <div style={{ width:40, height:40, borderRadius:10, background:T.brandDim,
                  display:"flex", flexDirection:"column", alignItems:"center",
                  justifyContent:"center", flexShrink:0 }}>
                  <div style={{ fontSize:14, fontWeight:800, color:T.brand, lineHeight:1 }}>
                    {new Date(h.date+"T00:00:00").getDate()}
                  </div>
                  <div style={{ fontSize:9, color:T.brand, opacity:0.7 }}>
                    {new Date(h.date+"T00:00:00").toLocaleDateString("ko-KR",{month:"short"})}
                  </div>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F }}>
                    {fmtDate(h.date)} ({DOW_KR[h.dow]}요일)
                  </div>
                  <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
                    {Object.keys(h.items||{}).length}개 SKU · 판매합계 {Math.round(Object.values(h.items||{}).reduce((s,i)=>s+i.sold,0))}
                  </div>
                </div>
                <button onClick={() => deleteHistory(uploadHistory.length-1-i)} style={{
                  padding:"5px 10px", borderRadius:8, border:"1px solid "+T.rBdr,
                  background:T.rDim, color:T.red, cursor:"pointer",
                  fontSize:12, fontFamily:F }}>삭제</button>
              </div>
            ))}
          </Card>
        </div>
      )}
      </div>  {/* inventory mode end */}
      )}

      {/* ── 음료 판매 업로드 ── */}
      {uploadMode==="bev" && (
        <div>
          <SH title="🧃 음료 판매 업로드"
            sub="POS 음료 판매 리포트 (xlsx) 업로드 → 날짜 확인 → 저장"/>

          {/* 드롭존 */}
          <div
            onDragOver={e=>{e.preventDefault();setDragging(true);}}
            onDragLeave={()=>setDragging(false)}
            onDrop={e=>{e.preventDefault();setDragging(false);parseBevFiles(Array.from(e.dataTransfer.files));}}
            onClick={()=>bevFileRef.current?.click()}
            style={{ border:"2px dashed "+(dragging?T.blue:T.b1),
              borderRadius:18, padding:"28px 20px", textAlign:"center",
              background:dragging?"rgba(0,122,255,0.06)":T.card, cursor:"pointer",
              transition:"all .2s", marginBottom:14 }}>
            <input ref={bevFileRef} type="file" accept=".xlsx,.xls" multiple style={{ display:"none" }}
              onChange={e=>{ parseBevFiles(Array.from(e.target.files)); e.target.value=""; }}/>
            <div style={{ fontSize:28, marginBottom:8 }}>🧃</div>
            <div style={{ fontSize:14, fontWeight:600, color:T.t2, fontFamily:F, marginBottom:4 }}>
              음료 판매 파일을 드래그하거나 클릭해서 업로드
            </div>
            <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
              POS 음료 판매 리포트 xlsx · 파일명에 날짜 포함 권장 (예: 260301.xlsx)
            </div>
          </div>

          {error && <div style={{ padding:"10px 14px", borderRadius:10, background:T.rDim,
            color:T.red, fontSize:12, fontFamily:F, marginBottom:10 }}>{error}</div>}

          {/* 대기 목록 */}
          {bevPending.map(item => (
            <Card key={item.id} style={{ marginBottom:10, padding:"14px 16px", border:"1px solid rgba(0,122,255,0.25)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <span style={{ fontSize:20 }}>📄</span>
                <div style={{ flex:1, fontFamily:F }}>
                  <div style={{ fontSize:13, fontWeight:700, color:T.t1 }}>{item.filename}</div>
                  <div style={{ fontSize:11, color:T.t3 }}>
                    음료 {Object.keys(item.data.items||{}).length}개 SKU ·
                    총 {Math.round(item.data.totalQty||0)}잔 · ₩{(item.data.totalSales||0).toLocaleString()}
                  </div>
                </div>
                <input type="date" value={item.customDate}
                  onChange={e=>setBevPending(prev=>prev.map(p=>p.id!==item.id?p:
                    {...p, customDate:e.target.value, data:{...p.data,date:e.target.value,dow:getDow(e.target.value)}}))}
                  style={{ padding:"5px 10px", borderRadius:8, border:"1px solid "+T.b1,
                    fontFamily:F, fontSize:12, background:T.card }}/>
              </div>
              {/* 카테고리별 요약 */}
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:10 }}>
                {Object.entries(
                  Object.values(item.data.items||{}).reduce((acc,i)=>{
                    if(!acc[i.macro]) acc[i.macro]={qty:0};
                    acc[i.macro].qty+=i.qty; return acc;
                  },{})
                ).sort((a,b)=>b[1].qty-a[1].qty).map(([macro,v])=>(
                  <span key={macro} style={{ fontSize:11, padding:"2px 9px", borderRadius:12,
                    background:"rgba(0,122,255,0.08)", color:T.blue,
                    border:"1px solid rgba(0,122,255,0.2)", fontFamily:F, fontWeight:600 }}>
                    {macro} {v.qty}잔
                  </span>
                ))}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>saveBevOne(item)} style={{ flex:1, padding:"10px", borderRadius:10,
                  border:"none", background:T.blue||"#007AFF", color:"#fff", fontSize:13,
                  fontWeight:700, cursor:"pointer", fontFamily:F }}>
                  💾 저장
                </button>
                <button onClick={()=>setBevPending(prev=>prev.filter(p=>p.id!==item.id))}
                  style={{ padding:"10px 14px", borderRadius:10, border:"1px solid "+T.b1,
                    background:T.card, color:T.t3, fontSize:12, cursor:"pointer", fontFamily:F }}>
                  제거
                </button>
              </div>
            </Card>
          ))}

          {/* 음료 업로드 이력 */}
          {bevHistory.length > 0 && (
            <div style={{ marginTop:12 }}>
              <SH title="음료 업로드 기록" sub={bevHistory.length+"건"}/>
              <Card>
                {[...bevHistory].reverse().map((h, i, arr) => (
                  <div key={h.date} style={{ padding:"12px 16px",
                    display:"flex", alignItems:"center", gap:12,
                    borderBottom:i<arr.length-1?"1px solid "+T.b0:"none" }}>
                    <div style={{ width:40, height:40, borderRadius:10,
                      background:"rgba(0,122,255,0.1)",
                      display:"flex", flexDirection:"column", alignItems:"center",
                      justifyContent:"center", flexShrink:0 }}>
                      <div style={{ fontSize:14, fontWeight:800, color:T.blue, lineHeight:1 }}>
                        {new Date(h.date+"T00:00:00").getDate()}
                      </div>
                      <div style={{ fontSize:9, color:T.blue, opacity:0.7 }}>
                        {new Date(h.date+"T00:00:00").toLocaleDateString("ko-KR",{month:"short"})}
                      </div>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F }}>
                        {fmtDate(h.date)} ({DOW_KR[h.dow]}요일)
                      </div>
                      <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
                        {Object.keys(h.items||{}).length}개 SKU · {Math.round(h.totalQty||0)}잔
                      </div>
                    </div>
                    <button onClick={()=>{
                      if(!window.confirm("이 날짜 음료 데이터를 삭제할까요?")) return;
                      const updated = bevHistory.filter(b=>b.date!==h.date);
                      onSaveBev(updated, null);
                    }} style={{ padding:"5px 10px", borderRadius:8, border:"1px solid "+T.rBdr,
                      background:T.rDim, color:T.red, cursor:"pointer",
                      fontSize:12, fontFamily:F }}>삭제</button>
                  </div>
                ))}
              </Card>
            </div>
          )}
        </div>
      )}

    </div>
  );
}

/* ─── 파일 카드 (업로드 대기) ─────────────────────── */

/* ─── 음료 통계 뷰 ────────────────────────────────── */
function BevStatView({ bevHistory, onSwitchMode }) {
  const DOW   = ["일","월","화","수","목","금","토"];
  const rnd   = (v,d=1) => Math.round(v*Math.pow(10,d))/Math.pow(10,d);
  const today = new Date().toISOString().slice(0,10);

  const PRESETS = [
    { label:"이번 주",  getRange:()=>{ const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)); return [d.toISOString().slice(0,10),today]; }},
    { label:"저번 주",  getRange:()=>{ const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)-7); const e=new Date(d); e.setDate(e.getDate()+6); return [d.toISOString().slice(0,10),e.toISOString().slice(0,10)]; }},
    { label:"최근 14일",getRange:()=>{ const d=new Date(); d.setDate(d.getDate()-13); return [d.toISOString().slice(0,10),today]; }},
    { label:"이번 달",  getRange:()=>{ const d=new Date(new Date().getFullYear(),new Date().getMonth(),1); return [d.toISOString().slice(0,10),today]; }},
    { label:"전체",     getRange:()=>{ if(!bevHistory.length) return [today,today]; const s=[...bevHistory].sort((a,b)=>a.date.localeCompare(b.date)); return [s[0].date,s[s.length-1].date]; }},
  ];

  const [preset,     setPreset]     = React.useState("최근 14일");
  const [showCustom, setShowCustom] = React.useState(false);
  const [customFrom, setCustomFrom] = React.useState("");
  const [customTo,   setCustomTo]   = React.useState("");
  const [macroFilter,setMacroFilter]= React.useState("전체");
  const [viewMode,   setViewMode]   = React.useState("overview"); // overview | heatmap | drill
  const [drillKey,   setDrillKey]   = React.useState(null); // {type:"menu"|"cat", key}
  const [sortKey,    setSortKey]    = React.useState("totalQty");
  const [sortAsc,    setSortAsc]    = React.useState(false);
  const [search,     setSearch]     = React.useState("");

  const [rangeFrom, rangeTo] = React.useMemo(()=>{
    if(showCustom&&customFrom&&customTo) return [customFrom,customTo];
    const p=PRESETS.find(p=>p.label===preset);
    return p?p.getRange():PRESETS[2].getRange();
  },[preset,showCustom,customFrom,customTo,bevHistory]);

  const periodHist = React.useMemo(()=>
    [...bevHistory].filter(h=>h.date>=rangeFrom&&h.date<=rangeTo)
      .sort((a,b)=>a.date.localeCompare(b.date)),
    [bevHistory,rangeFrom,rangeTo]);

  // 전체 대분류(macro) 목록
  const allMacros = React.useMemo(()=>{
    const s=new Set();
    bevHistory.forEach(h=>Object.values(h.items||{}).forEach(i=>s.add(i.macro)));
    return [...s].filter(Boolean).sort();
  },[bevHistory]);

  // ── 메뉴별 집계 (catName 기준) ──
  const menuStats = React.useMemo(()=>{
    const map={};
    periodHist.forEach(h=>{
      Object.values(h.items||{}).forEach(item=>{
        if(macroFilter!=="전체"&&item.macro!==macroFilter) return;
        const k=item.catName||item.name;
        if(!map[k]) map[k]={
          catName:k, macro:item.macro||"기타",
          days:[], qtyArr:[], salesArr:[],
          sizeDist:{}, spark:[]
        };
        const s=map[k];
        s.days.push({date:h.date,dow:h.dow});
        s.qtyArr.push(item.qty||0);
        s.salesArr.push(item.sales||0);
        if(!s.sizeDist[item.size]) s.sizeDist[item.size]=0;
        s.sizeDist[item.size]+=(item.qty||0);
        s.spark.push({date:h.date,dow:h.dow,qty:item.qty||0});
      });
    });
    return Object.entries(map).map(([k,s])=>{
      const totalQty  = rnd(s.qtyArr.reduce((a,b)=>a+b,0),0);
      const totalSales= rnd(s.salesArr.reduce((a,b)=>a+b,0),0);
      const avgQty    = s.qtyArr.length?rnd(totalQty/s.qtyArr.length,1):0;
      // 요일별 평균
      const dowMap={};
      s.days.forEach((d,i)=>{ if(!dowMap[d.dow]) dowMap[d.dow]=[]; if(s.qtyArr[i]>0) dowMap[d.dow].push(s.qtyArr[i]); });
      const dowAvg={};
      [0,1,2,3,4,5,6].forEach(d=>{ const v=dowMap[d]; dowAvg[d]=v&&v.length?rnd(v.reduce((a,b)=>a+b,0)/v.length,1):null; });
      const wdAvg=rnd(([1,2,3,4,5].flatMap(d=>dowMap[d]||[])).reduce((s,v,_,a)=>a.length?s+v/a.length:s,0),1)||null;
      const weAvg=rnd(([0,6].flatMap(d=>dowMap[d]||[])).reduce((s,v,_,a)=>a.length?s+v/a.length:s,0),1)||null;
      const weDiff=(wdAvg&&weAvg)?Math.round(((weAvg-wdAvg)/wdAvg)*100):null;
      return {catName:k,macro:s.macro,totalQty,totalSales,avgQty,dowAvg,wdAvg,weAvg,weDiff,
              sizeDist:s.sizeDist,spark:s.spark,days:s.days.length};
    });
  },[periodHist,macroFilter]);

  // 대분류별 집계
  const macroStats = React.useMemo(()=>{
    const map={};
    periodHist.forEach(h=>{
      Object.values(h.items||{}).forEach(item=>{
        const m=item.macro||"기타";
        if(macroFilter!=="전체"&&m!==macroFilter) return;
        if(!map[m]) map[m]={macro:m,totalQty:0,totalSales:0};
        map[m].totalQty  +=(item.qty||0);
        map[m].totalSales+=(item.sales||0);
      });
    });
    return Object.values(map).sort((a,b)=>b.totalQty-a.totalQty);
  },[periodHist,macroFilter]);

  // KPI
  const kpi = React.useMemo(()=>{
    if(!periodHist.length) return null;
    const totalQty   = rnd(periodHist.reduce((s,h)=>s+(h.totalQty||0),0),0);
    const totalSales = rnd(periodHist.reduce((s,h)=>s+(h.totalSales||0),0),0);
    const dayAvg     = rnd(totalQty/(periodHist.length||1),0);
    const latest     = [...bevHistory].sort((a,b)=>b.date.localeCompare(a.date))[0];
    const todayTop   = latest ? Object.values(latest.items||{})
      .sort((a,b)=>(b.qty||0)-(a.qty||0)).slice(0,1)[0]?.catName : null;
    return {totalQty,totalSales,dayAvg,days:periodHist.length,todayTop};
  },[periodHist,bevHistory]);

  // 일별 총 판매
  const dailySales = React.useMemo(()=>periodHist.map(h=>({
    date:h.date, dow:h.dow,
    qty: macroFilter==="전체"
      ? (h.totalQty||0)
      : rnd(Object.values(h.items||{}).filter(i=>i.macro===macroFilter).reduce((s,i)=>s+(i.qty||0),0),0)
  })),[periodHist,macroFilter]);

  // 테이블 데이터
  const tableData = React.useMemo(()=>{
    let rows=[...menuStats];
    if(search) rows=rows.filter(s=>s.catName.toLowerCase().includes(search.toLowerCase()));
    rows.sort((a,b)=>{
      const va=a[sortKey]??-999, vb=b[sortKey]??-999;
      return sortAsc?va-vb:vb-va;
    });
    return rows;
  },[menuStats,search,sortKey,sortAsc]);

  // ── 차트 컴포넌트 ──
  const BarChart=({data,colorFn})=>{
    if(!data||data.length<1) return null;
    const maxV=Math.max(...data.map(d=>d.qty),1);
    return(
      <div style={{display:"flex",gap:3,alignItems:"flex-end",height:72}}>
        {data.map((d,i)=>{
          const h=Math.max(3,(d.qty/maxV)*64);
          const isWe=d.dow===0||d.dow===6;
          return(
            <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
              <div style={{fontSize:7.5,color:T.t4,lineHeight:1}}>{d.qty>0?d.qty:""}</div>
              <div style={{width:"100%",height:h,background:colorFn?colorFn(d,isWe):(isWe?T.amber:T.blue),
                borderRadius:"3px 3px 0 0",opacity:0.85}}/>
              <div style={{fontSize:8,color:isWe?T.amber:T.t4}}>{DOW[d.dow]}</div>
            </div>
          );
        })}
      </div>
    );
  };

  const Spark=({data})=>{
    const W=56,H=18;
    if(!data||data.length<2) return <svg width={W} height={H}/>;
    const maxV=Math.max(...data.map(d=>d.qty),1);
    const xs=data.map((_,i)=>2+i*(W-4)/(data.length-1));
    const ys=data.map(d=>H-3-(d.qty/maxV)*(H-6));
    const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(" ");
    return(
      <svg width={W} height={H} style={{display:"block"}}>
        <path d={path} fill="none" stroke={T.blue} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="2" fill={T.blue}/>
      </svg>
    );
  };

  // 히트맵
  const HeatmapView=()=>{
    const rows=tableData.slice(0,25);
    const dates=periodHist.map(h=>h.date);
    if(!rows.length||!dates.length) return <div style={{padding:20,textAlign:"center",color:T.t3,fontFamily:F}}>데이터 없음</div>;
    const qtyMap={};
    periodHist.forEach(h=>Object.values(h.items||{}).forEach(item=>{
      const k=item.catName||item.name;
      qtyMap[`${k}__${h.date}`]=(qtyMap[`${k}__${h.date}`]||0)+(item.qty||0);
    }));
    const maxQ=Math.max(...rows.flatMap(r=>dates.map(d=>qtyMap[`${r.catName}__${d}`]||0)),1);
    const getColor=(v,max)=>{
      if(v===0) return "#F2F2F7";
      const t=v/max;
      if(t<0.25) return "#C6D9F7";
      if(t<0.5)  return "#7DAAEF";
      if(t<0.75) return "#3B82F6";
      return "#1D4ED8";
    };
    return(
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",fontSize:10,fontFamily:F,minWidth:"100%"}}>
          <thead>
            <tr>
              <th style={{padding:"4px 8px",textAlign:"left",color:T.t3,fontWeight:600,minWidth:110,
                position:"sticky",left:0,background:T.card,zIndex:1}}>메뉴</th>
              {dates.map(d=>{
                const dd=new Date(d+"T00:00:00");
                return(
                  <th key={d} style={{padding:"2px 3px",textAlign:"center",
                    color:dd.getDay()===0||dd.getDay()===6?T.red:T.t3,fontWeight:400,minWidth:26}}>
                    <div>{d.slice(8)}</div><div>{DOW[dd.getDay()]}</div>
                  </th>
                );
              })}
              <th style={{padding:"4px 8px",textAlign:"right",color:T.blue,fontWeight:700}}>합계</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((row,ri)=>(
              <tr key={row.catName} style={{cursor:"pointer"}}
                onClick={()=>{setDrillKey({type:"menu",key:row.catName});setViewMode("drill");}}>
                <td style={{padding:"4px 8px",color:T.t1,fontWeight:500,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:110,
                  position:"sticky",left:0,background:ri%2===0?T.card2:T.card,zIndex:1}}>
                  {row.catName.length>14?row.catName.slice(0,13)+"…":row.catName}
                </td>
                {dates.map(d=>{
                  const v=qtyMap[`${row.catName}__${d}`]||0;
                  return(
                    <td key={d} style={{padding:"2px 3px",textAlign:"center",
                      background:getColor(v,maxQ),color:v>maxQ*0.5?"#fff":"#333",
                      borderRadius:3,fontSize:9}}>
                      {v>0?v:""}
                    </td>
                  );
                })}
                <td style={{padding:"4px 8px",textAlign:"right",fontWeight:700,color:T.blue,fontSize:11}}>
                  {row.totalQty}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{fontSize:10,color:T.t4,fontFamily:F,marginTop:8,textAlign:"center"}}>
          행 클릭 → 메뉴 상세 · 상위 25개 표시
        </div>
      </div>
    );
  };

  // 드릴다운
  const DrillView=()=>{
    if(!drillKey) return null;
    const stat=menuStats.find(s=>s.catName===drillKey.key);
    if(!stat) return null;
    const sparkData=stat.spark.slice(-21);
    const maxQ=Math.max(...sparkData.map(d=>d.qty),1);
    // 사이즈 비율 계산
    const sizeTotal=Object.values(stat.sizeDist).reduce((a,b)=>a+b,0)||1;
    const sizeEntries=Object.entries(stat.sizeDist).sort((a,b)=>b[1]-a[1]);
    const SIZE_COLORS={"Short":"#8B5CF6","Tall":"#3B82F6","Grande":"#10B981","Venti":"#F59E0B","Trenta":"#EF4444","기타":"#9CA3AF"};
    return(
      <div>
        <button onClick={()=>setViewMode("overview")} style={{
          fontSize:12,color:T.blue,background:"rgba(0,122,255,0.1)",
          border:"1px solid rgba(0,122,255,0.3)",
          borderRadius:8,padding:"5px 12px",cursor:"pointer",fontFamily:F,marginBottom:14}}>
          ← 목록으로
        </button>
        <div style={{fontSize:16,fontWeight:800,color:T.t1,fontFamily:F,marginBottom:3}}>{stat.catName}</div>
        <div style={{fontSize:12,color:T.t3,fontFamily:F,marginBottom:14}}>
          {stat.macro} · {rangeFrom} ~ {rangeTo}
        </div>
        {/* KPI */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
          {[
            {label:"기간 총 판매",value:stat.totalQty+"잔",color:T.blue},
            {label:"일 평균",value:stat.avgQty+"잔",color:T.t2},
            {label:"매출",value:"₩"+(stat.totalSales||0).toLocaleString(),color:T.t2},
          ].map(k=>(
            <div key={k.label} style={{background:T.card,border:"1px solid "+T.b0,
              borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:10,color:T.t3,fontFamily:F,marginBottom:3}}>{k.label}</div>
              <div style={{fontSize:16,fontWeight:900,color:k.color,fontFamily:F,lineHeight:1}}>{k.value}</div>
            </div>
          ))}
        </div>
        {/* 바차트 */}
        <Card style={{padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:F,marginBottom:8}}>일별 판매 추이</div>
          <div style={{display:"flex",gap:3,alignItems:"flex-end",height:80}}>
            {sparkData.map((d,i)=>{
              const h=Math.max(4,(d.qty/maxQ)*72);
              const isWe=d.dow===0||d.dow===6;
              return(
                <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{fontSize:8,color:T.t4}}>{d.qty>0?d.qty:""}</div>
                  <div style={{width:"100%",height:h,
                    background:isWe?T.amber:"#3B82F6",
                    borderRadius:"3px 3px 0 0",opacity:0.85}}/>
                  <div style={{fontSize:8,color:isWe?T.amber:T.t4}}>{DOW[d.dow]}</div>
                </div>
              );
            })}
          </div>
        </Card>
        {/* 요일별 평균 + 사이즈 분포 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <Card style={{padding:"14px 16px"}}>
            <div style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:F,marginBottom:8}}>요일별 평균</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
              {[0,1,2,3,4,5,6].map(dow=>{
                const avg=stat.dowAvg[dow];
                const maxA=Math.max(...Object.values(stat.dowAvg).map(v=>parseFloat(v)||0),1);
                const ratio=(parseFloat(avg)||0)/maxA;
                const col=dow===0?T.red:dow===6?T.amber:"#3B82F6";
                return(
                  <div key={dow} style={{textAlign:"center"}}>
                    <div style={{fontSize:9,fontWeight:700,color:col,fontFamily:F,marginBottom:2}}>{DOW[dow]}</div>
                    <div style={{height:32,background:T.card3,borderRadius:3,position:"relative",overflow:"hidden",marginBottom:2}}>
                      <div style={{position:"absolute",bottom:0,left:0,right:0,
                        height:(ratio*100)+"%",background:col,opacity:0.8,borderRadius:3}}/>
                    </div>
                    <div style={{fontSize:9,fontWeight:700,color:col,fontFamily:F}}>{avg??"-"}</div>
                  </div>
                );
              })}
            </div>
            {stat.wdAvg&&stat.weAvg&&(
              <div style={{display:"flex",gap:8,marginTop:8,fontSize:10,fontFamily:F,flexWrap:"wrap"}}>
                <span style={{color:T.t2}}>평일 {stat.wdAvg}잔</span>
                <span style={{color:T.amber}}>주말 {stat.weAvg}잔</span>
                {stat.weDiff!==null&&(
                  <span style={{color:stat.weDiff>0?T.amber:T.blue,fontWeight:700}}>
                    주말 {stat.weDiff>0?"▲":"▼"}{Math.abs(stat.weDiff)}%
                  </span>
                )}
              </div>
            )}
          </Card>
          <Card style={{padding:"14px 16px"}}>
            <div style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:F,marginBottom:8}}>사이즈 분포</div>
            {sizeEntries.map(([size,qty])=>{
              const pct=Math.round(qty/sizeTotal*100);
              const col=SIZE_COLORS[size]||"#9CA3AF";
              return(
                <div key={size} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:11,color:T.t1,fontFamily:F,fontWeight:600}}>{size}</span>
                    <span style={{fontSize:11,color:col,fontFamily:F,fontWeight:700}}>{qty}잔 ({pct}%)</span>
                  </div>
                  <div style={{height:7,background:T.card3,borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:pct+"%",background:col,borderRadius:4,opacity:0.85}}/>
                  </div>
                </div>
              );
            })}
          </Card>
        </div>
      </div>
    );
  };

  const SortTh=({k,label,color=T.t3,minW=55})=>{
    const active=sortKey===k;
    return(

  if(!bevHistory.length) return(
    <div>

      <div style={{padding:"0 14px 40px"}}>

                      {macroFilter==="전체"&&<th style={{padding:"8px 8px",textAlign:"center",color:T.t3,fontWeight:700,minWidth:70}}>카테고리</th>}

                      <SortTh k="weDiff"    label="주말증감" color={T.amber} minW={55}/>
                      <th style={{padding:"8px 8px",textAlign:"center",color:T.t3,fontWeight:700,minWidth:60}}>추이</th>

                    {tableData.map((s,i)=>{
                      const weColor=s.weDiff===null?T.t4:s.weDiff>=30?T.amber:s.weDiff<=-30?T.blue:T.t2;
                      return(
                        <tr key={s.catName} onClick={()=>{setDrillKey({type:"menu",key:s.catName});setViewMode("drill");}}

                                borderRadius:4,padding:"1px 5px",whiteSpace:"nowrap"}}>{s.macro}</span>
                            </td>

                          <td style={{padding:"7px 8px",textAlign:"center",color:"#3B82F6",fontWeight:700}}>{s.totalQty>0?s.totalQty:"-"}</td>

                      <tr><td colSpan="8" style={{padding:24,textAlign:"center",color:T.t3,fontFamily:F}}>검색 결과 없음</td></tr>
