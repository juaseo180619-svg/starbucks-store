/* ─── Firestore 동기화 헬퍼 ─────────────────────── */
const DB = {
  // 매장별 경로
  path: (storeId) => window.db.collection("orderStores").doc(storeId),

  // 설정 문서 (manualItems, buffers, skuAliases)

      await DB.path(storeId).collection("data").doc("config").set(data, { merge: true });
      return true;
    } catch(e) { console.warn("Firestore saveConfig error:", e); return false; }
  },
  loadConfig: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("data").doc("config").get();
      return snap.exists ? snap.data() : null;
    } catch(e) { console.warn("Firestore loadConfig error:", e); return null; }
  },

  // 수동 기록 (manualRecords)
  saveManualRecords: async (storeId, records) => {
    try {
      await DB.path(storeId).collection("data").doc("manualRecords").set({ records }, { merge: false });
      return true;
    } catch(e) { console.warn("Firestore saveManualRecords error:", e); return false; }
  },
  loadManualRecords: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("data").doc("manualRecords").get();
      return snap.exists ? (snap.data().records || []) : null;
    } catch(e) { console.warn("Firestore loadManualRecords error:", e); return null; }

  // 업로드 이력 (history) - 각 엔트리를 별도 문서로 저장
  saveHistoryEntry: async (storeId, entry) => {
    try {
      const docId = entry._id || entry.date; // date를 문서 ID로 사용 (유일성 보장)
      await DB.path(storeId).collection("history").doc(docId).set({
        ...entry,
        _id: docId,
        _savedAt: Date.now()
      });
      return true;
    } catch(e) { console.warn("Firestore saveHistoryEntry error:", e); return false; }
  },
  deleteHistoryEntry: async (storeId, key) => {
    try {
      await DB.path(storeId).collection("history").doc(String(key)).delete();
      return true;
    } catch(e) { console.warn("Firestore deleteHistoryEntry error:", e); return false; }
  },
  loadHistory: async (storeId) => {
    try {
      const snap = await DB.path(storeId).collection("history").orderBy("date", "asc").get();
      if (snap.empty) return null;
      return snap.docs.map(d => d.data());
    } catch(e) { console.warn("Firestore loadHistory error:", e); return null; }
  },
  // 전체 히스토리를 한번에 업로드 (기존 로컬 데이터 마이그레이션용)
  uploadAllHistory: async (storeId, histArray) => {

      histArray.forEach(entry => {

    } catch(e) { console.warn("Firestore loadOrderLog error:", e); return []; }

  const lower = name.toLowerCase();

const DOW_KR = ["일","월","화","수","목","금","토"];
const fmtDate = (s) => { if (!s) return ""; const d = new Date(s+"T00:00:00"); return d.toLocaleDateString("ko-KR",{month:"short",day:"numeric"}); };

/* ─── Filename Date Extraction ───────────────────── */
function isValidDateStr(s) {
  const d = new Date(s+"T00:00:00");
  return !isNaN(d.getTime()) && s.length === 10;
}
function extractDateFromFilename(filename) {
  const name = filename.replace(/\.[^.]+$/, "");
  // YYYYMMDD (8자리)
  const m2 = name.match(/(\d{4})(\d{2})(\d{2})/);
  if (m2) { const d = m2[1]+"-"+m2[2]+"-"+m2[3]; if (isValidDateStr(d)) return d; }
  // YYMMDD (6자리)
  const m1 = name.match(/(?<!\d)(\d{2})(\d{2})(\d{2})(?!\d)/);
  if (m1) {
    const yy = parseInt(m1[1]);
    const year = (yy >= 50 ? 1900+yy : 2000+yy);
    const d = year+"-"+m1[2]+"-"+m1[3];
    if (isValidDateStr(d)) return d;
  }
  // YYYY-MM-DD
  const m3 = name.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m3) { const d = m3[1]+"-"+m3[2]+"-"+m3[3]; if (isValidDateStr(d)) return d; }
  return todayStr();
}

/* ─── Excel Parsing ──────────────────────────────── */
function parseInventoryExcel(arrayBuffer, dateOverride) {
  const wb = XLSX.read(arrayBuffer, { type:"array", cellDates:true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

  // 헤더 2행, 데이터 3행부터
  const items = {};
  const dateStr = dateOverride || todayStr();

  for (let i = 2; i < raw.length; i++) {
    const row = raw[i];
    if (!row[2]) continue; // SKU명 없으면 skip
    const sku   = String(row[1] || "").trim();
    const name  = String(row[2] || "").trim();
    const cat   = String(row[3] || "").trim();
    const unit  = String(row[4] || "EA").trim();
    const actual = parseFloat(row[7]) || 0;
    const actualSum = parseFloat(row[8]) || 0;
    const sold   = parseFloat(row[20]) || 0;
    const tmrIn  = parseFloat(row[21]) || 0;
    const d2In   = parseFloat(row[22]) || 0;
    const dayIn  = parseFloat(row[14]) || 0;

    // 유통기한
    let expDate = null;
    let dday = null;
    if (row[11] && row[11] instanceof Date) {
      expDate = row[11].toISOString().slice(0,10);
    } else if (row[11] && typeof row[11] === "string") {
      expDate = row[11].slice(0,10);
    }
    const ddayRaw = String(row[10] || "").trim();
    if (ddayRaw) {
      const m = ddayRaw.match(/-?(\d+)/);
      dday = m ? parseInt(ddayRaw.replace("D-","").replace("D+","")) : null;
      if (ddayRaw.startsWith("D-") || ddayRaw === "D-day") {
        dday = ddayRaw === "D-day" ? 0 : -parseInt(m[1]);
        // D-3 means expires in 3 days
        dday = parseInt(m ? m[0] : "0") * -1;
        const parts = ddayRaw.match(/D-(\d+)/);
        dday = parts ? parseInt(parts[1]) : (ddayRaw === "D-day" ? 0 : null);
      }
    }

    if (!items[sku]) {
      items[sku] = {
        sku, name, cat, unit,
        batches: [],
        actualSum: 0,
        sold: 0,
        tmrIn: 0,
        d2In: 0,
        dayIn: 0,
      };
    }
    items[sku].batches.push({ actual, expDate, dday: dday });
    // actualSum은 마지막 행 기준 (같은 값 반복됨)
    items[sku].actualSum = actualSum || items[sku].actualSum || actual;
    items[sku].sold = sold || items[sku].sold;
    items[sku].tmrIn = tmrIn || items[sku].tmrIn;
    items[sku].d2In = d2In || items[sku].d2In;
    items[sku].dayIn = dayIn || items[sku].dayIn;
  }

  return { date: dateStr, dow: getDow(dateStr), items };
}

/* ─── App Entry ──────────────────────────────────── */
function App() {
  const [tab, setTab] = useState("dashboard");
  const isPC = window.innerWidth >= 768;

  // ── Firebase 동기화 상태 ──
  const [storeId, setStoreId] = useState(() => LS.get("storeId", ""));
  const [storeInput, setStoreInput] = useState("");
  const [syncStatus, setSyncStatus] = useState("idle"); // idle|loading|ok|error
  const [dataLoaded, setDataLoaded] = useState(false);

  // 핵심 데이터
  const [uploadHistory, setUploadHistory] = useState(() => LS.get("history", []));
  const [manualItems,   setManualItems]   = useState(() => LS.get("manualItems", ["우유","저지방우유","두유","오트유","바닐라크림베이스","딸기베이스","유자베이스"]));
  const [manualRecords, setManualRecords] = useState(() => LS.get("manualRecords", []));
  const [buffers,       setBuffers]       = useState(() => LS.get("buffers", {}));
  const [skuAliases,    setSkuAliases]    = useState(() => LS.get("skuAliases", {}));
  // 수동 당일폐기 설정: { [sku]: true(강제 당일) | false(강제 해제) }
  const [sameDaySkus,   setSameDaySkus]   = useState(() => LS.get("sameDaySkus", {}));
  // 폐기율 설정 (전사 목표: 5.6%)
  const [wasteTarget,   setWasteTarget]   = useState(() => LS.get("wasteTarget", 5.6));
  // 발주 피드백 기록
  const [orderFeedbacks, setOrderFeedbacks] = useState(() => LS.get("orderFeedbacks", []));
  // 발주 학습 로그
  const [orderLog, setOrderLog] = useState(() => LS.get("orderLog", []));

  // ── 초기 Firebase 데이터 로드 ──
  useEffect(() => {
    if (!storeId || !window.db) { setDataLoaded(true); return; }
    setSyncStatus("loading");
    (async () => {
      try {
        const [cfg, recs, hist, logs] = await Promise.all([
          DB.loadConfig(storeId),
          DB.loadManualRecords(storeId),
          DB.loadHistory(storeId),
          DB.loadOrderLog(storeId),
        ]);
        if (logs && logs.length > 0) {
          setOrderLog(logs); LS.set("orderLog", logs);
        } else {
          // orderLog 없으면 기존 히스토리로 소급 생성
          const localHist = LS.get("history", []).sort((a,b)=>a.date.localeCompare(b.date));
          const generatedLogs = [];
          for (let i = 2; i < localHist.length; i++) {
            const d2 = localHist[i];
            const orderDateObj = new Date(d2.date+"T00:00:00");
            orderDateObj.setDate(orderDateObj.getDate()-2);
            const orderDate = orderDateObj.toISOString().slice(0,10);
            const d0 = localHist.find(h=>h.date===orderDate);
            if (!d0) continue;
            const logItems = {};
            let hasDelivery = false;
            Object.entries(d2.items||{}).forEach(([sku,item]) => {
              const ordered = item.dayIn||0;
              if (ordered<=0) return;
              hasDelivery = true;
              const stockAtOrder = d0.items?.[sku]?.actualSum??0;
              const stockAfter   = item.actualSum??0;
              const result = stockAfter===0?"shortage":stockAfter>=ordered*0.6?"excess":"ok";
              logItems[sku]={ name:item.name, cat:item.cat, stockAtOrder,
                actualOrdered:ordered, stockAfter, soldOnDelivDay:item.sold??0, result };
            });
            if (!hasDelivery) continue;
            generatedLogs.push({ delivDate:d2.date, orderDate,
              orderDow:getDow(orderDate), delivDow:d2.dow,
              items:logItems, autoGenerated:true });
          }
          if (generatedLogs.length > 0) {
            setOrderLog(generatedLogs); LS.set("orderLog", generatedLogs);
            // Firebase에도 업로드
            if (storeId && window.db) {
              generatedLogs.forEach(l => DB.saveOrderLog(storeId, l));
            }
            console.log("[orderLog] 소급 생성:", generatedLogs.length, "건");
          }
        }
        if (cfg) {
          if (cfg.manualItems)  { setManualItems(cfg.manualItems);  LS.set("manualItems", cfg.manualItems); }
          if (cfg.buffers)      { setBuffers(cfg.buffers);          LS.set("buffers", cfg.buffers); }
          if (cfg.skuAliases)   { setSkuAliases(cfg.skuAliases);   LS.set("skuAliases", cfg.skuAliases); }
          if (cfg.sameDaySkus)  { setSameDaySkus(cfg.sameDaySkus); LS.set("sameDaySkus", cfg.sameDaySkus); }
        }
        if (recs !== null) { setManualRecords(recs); LS.set("manualRecords", recs); }
        if (hist !== null && hist.length > 0) {
          setUploadHistory(hist); LS.set("history", hist);
        } else {
          // Firebase에 히스토리 없음 → 로컬 데이터를 Firebase에 업로드 (최초 동기화)
          const localHist = LS.get("history", []);
          if (localHist.length > 0) {
            console.log("[sync] Firebase history empty, migrating", localHist.length, "entries from localStorage");
            await DB.uploadAllHistory(storeId, localHist);
          }
        }
        setSyncStatus("ok");
      } catch(e) {
        console.warn("Firebase 로드 실패, 로컬 캐시 사용:", e);
        setSyncStatus("error");
      } finally {
        setDataLoaded(true);
      }
    })();
  }, [storeId]);

  // ── Firebase + LS 통합 저장 함수 ──
  const syncConfig = async (items, bufs, aliases) => {
    if (!storeId || !window.db) return;
    setSyncStatus("loading");
    const ok = await DB.saveConfig(storeId, { manualItems: items, buffers: bufs, skuAliases: aliases });
    setSyncStatus(ok ? "ok" : "error");
  };

  // 발주 학습 로그 자동 생성: 새 파일 업로드 시 D-2 파일과 비교
  const autoGenerateOrderLog = async (newEntry, allHistory) => {
    const delivDate = newEntry.date;
    const delivDow  = newEntry.dow;
    // 발주일 = 입고일 - 2일
    const orderDateObj = new Date(delivDate + "T00:00:00");
    orderDateObj.setDate(orderDateObj.getDate() - 2);
    const orderDate = orderDateObj.toISOString().slice(0,10);
    const orderEntry = allHistory.find(h => h.date === orderDate);
    if (!orderEntry) return; // D-2 파일 없으면 skip

    // dayIn > 0 인 품목만 처리 (실제 입고된 것)
    const logItems = {};
    let hasDelivery = false;
    Object.entries(newEntry.items || {}).forEach(([sku, item]) => {
      const ordered = item.dayIn || 0;
      if (ordered <= 0) return;
      hasDelivery = true;
      const stockAtOrder = orderEntry.items?.[sku]?.actualSum ?? 0;
      const stockAfter   = item.actualSum ?? 0;
      const soldDay      = item.sold ?? 0;
      // 결과 판단: 재고가 0이면 부족, dayIn의 60% 이상 남으면 과잉
      const result = stockAfter === 0 ? "shortage"
                   : stockAfter >= ordered * 0.6 ? "excess" : "ok";
      logItems[sku] = {
        name: item.name, cat: item.cat,
        stockAtOrder, actualOrdered: ordered,
        stockAfter, soldOnDelivDay: soldDay,
        result,
        diff: ordered - stockAtOrder, // 실제발주 - 발주시재고
      };
    });
    if (!hasDelivery) return;

    const logEntry = {
      delivDate, orderDate,
      orderDow: getDow(orderDate),
      delivDow,
      items: logItems,
      autoGenerated: true,
    };

    const updated = [...orderLog.filter(l => l.delivDate !== delivDate), logEntry];
    setOrderLog(updated);
    LS.set("orderLog", updated);
    if (storeId && window.db) {
      await DB.saveOrderLog(storeId, logEntry);
    }
  };

  const saveHistory = async (v, newEntry) => {
    setUploadHistory(v); LS.set("history", v);
    if (storeId && window.db && newEntry) {
      setSyncStatus("loading");
      const ok = await DB.saveHistoryEntry(storeId, newEntry);
      setSyncStatus(ok ? "ok" : "error");
    }
    // 새 엔트리 업로드 시 자동으로 발주 로그 생성
    if (newEntry) {
      await autoGenerateOrderLog(newEntry, v);
    }
  };
  const deleteHistoryEntry = async (id) => {
    if (storeId && window.db) {
      setSyncStatus("loading");
      await DB.deleteHistoryEntry(storeId, id);
      setSyncStatus("ok");
    }
  };
  const saveManualItems = async (v) => {
    setManualItems(v); LS.set("manualItems", v);
    await syncConfig(v, buffers, skuAliases);
  };
  const saveManualRecords = async (v) => {
    setManualRecords(v); LS.set("manualRecords", v);
    if (!storeId || !window.db) return;
    setSyncStatus("loading");
    const ok = await DB.saveManualRecords(storeId, v);
    setSyncStatus(ok ? "ok" : "error");
  };
  const saveBuffers = async (v) => {
    setBuffers(v); LS.set("buffers", v);
    await syncConfig(manualItems, v, skuAliases);
  };
  const saveSkuAliases = async (v) => {
    setSkuAliases(v); LS.set("skuAliases", v);

  const saveSameDaySkus = async (v) => {
    setSameDaySkus(v); LS.set("sameDaySkus", v);

  const saveWasteTarget = (v) => { setWasteTarget(v); LS.set("wasteTarget", v); };
  const saveOrderFeedbacks = (v) => { setOrderFeedbacks(v); LS.set("orderFeedbacks", v); };

  // 매장번호 등록
  const handleSetStore = () => {
    const sid = storeInput.trim();
    if (!sid) return;
    LS.set("storeId", sid);
    setStoreId(sid);
    setDataLoaded(false);
  };

  // UploadTab에서 삭제 접근 가능하게 window에 노출
  useEffect(() => {
    window._deleteHistoryEntry = (id) => deleteHistoryEntry(id);
    return () => { delete window._deleteHistoryEntry; };
  }, [storeId]);

  // 최신 업로드 데이터
  const latestUpload = uploadHistory.length ? uploadHistory[uploadHistory.length - 1] : null;

  const tabs = [
    { id:"dashboard", icon:"🏠", label:"홈" },

    { id:"manual",    icon:"📝", label:"수동" },

          <div style={{

                  style={{ flex:1, padding:"14px 16px", borderRadius:14,

                textAlign:"center", marginBottom:20 }}>

              </div>
              <button onClick={()=>{ LS.set("storeId","local"); setStoreId("local"); }}
                style={{ width:"100%", padding:"12px", borderRadius:12,
                  background:"rgba(0,0,0,0.04)", border:"1px solid rgba(0,0,0,0.08)",

        {/* 데이터 로딩 중 */}
        {storeId && !dataLoaded && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center",
            justifyContent:"center", minHeight:"60vh", gap:16 }}>
            <div style={{ width:32, height:32, border:"3px solid "+T.brandLight,
              borderTopColor:T.brand, borderRadius:"50%", animation:"spin 0.8s linear infinite" }}/>
            <div style={{ fontSize:14, color:T.t3, fontFamily:F }}>데이터 불러오는 중...</div>
          </div>
        )}

        {storeId && dataLoaded && tab==="dashboard" && (
          <DashboardTab
            latestUpload={latestUpload}
            uploadHistory={uploadHistory}
            manualRecords={manualRecords}
            manualItems={manualItems}
            buffers={buffers}
            setTab={setTab}

        {storeId && dataLoaded && tab==="upload" && (
          <UploadTab
            uploadHistory={uploadHistory}
            onSave={saveHistory}
            skuAliases={skuAliases}

          <ManualTab

            items={manualItems}

            onSaveItems={saveManualItems}
            onSaveBuffers={saveBuffers}

        {storeId && dataLoaded && tab==="history" && (
          <HistoryTab
            uploadHistory={uploadHistory}
            manualRecords={manualRecords}
            manualItems={manualItems}
            skuAliases={skuAliases}
          />
        )}
      </div>
    </div>
  );
}

/* ─── 대시보드 ───────────────────────────────────── */
function DashboardTab({ latestUpload, uploadHistory, manualRecords, manualItems, buffers, setTab, skuAliases, orderLog=[] }) {
  const today = todayStr();
  const dow = getDow(today);

  // 유통기한 임박 항목 (D-3 이하)
  const expiring = useMemo(() => {
    if (!latestUpload) return [];
    return Object.values(latestUpload.items||{})
      .flatMap(item => item.batches.map(b => ({ ...item, ...b })))
      .filter(b => b.dday !== null && b.dday !== undefined && b.dday <= 3 && b.actual > 0)
      .sort((a,b) => (a.dday||99) - (b.dday||99));
  }, [latestUpload]);

  // 재고 부족 (추천 발주량 > 0인 항목)
  const needOrder = useMemo(() => {
    if (!latestUpload) return 0;
    let cnt = 0;
    Object.entries(latestUpload.items||{}).forEach(([sku, item]) => {
      const hist = uploadHistory.filter(h => h.date < latestUpload.date && h.items?.[sku]);
      if (hist.length < 2) return;
      const avgSold = Math.round(hist.reduce((s,h)=>s+(h.items[sku]?.sold||0),0)/hist.length * 10) / 10;
      const buf = parseFloat(buffers[sku]||buffers[item.name]||2);
      const rec = Math.max(0, Math.ceil(avgSold*2 + buf - item.actualSum - item.tmrIn));
      if (rec > 0) cnt++;
    });
    return cnt;
  }, [latestUpload, uploadHistory, buffers]);

  // 총 SKU 수
  const totalSku = latestUpload ? Object.keys(latestUpload.items||{}).length : 0;
  // 재고 0인 SKU
  const zeroStock = latestUpload ? Object.values(latestUpload.items||{}).filter(i=>i.actualSum===0).length : 0;

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
      {/* 히어로 카드 */}
      <div style={{ background:"linear-gradient(135deg,#00704A 0%,#1E3932 100%)",
        borderRadius:22, padding:"22px 20px", marginBottom:18, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", right:-30, top:-30, width:120, height:120,
          borderRadius:"50%", background:"rgba(255,255,255,0.05)" }}/>
        <div style={{ position:"relative", zIndex:1 }}>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.6)", fontFamily:F, marginBottom:4 }}>
            {new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}
          </div>
          <div style={{ fontSize:18, fontWeight:800, color:"#fff", fontFamily:F, marginBottom:16 }}>
            발주 관리 대시보드 ☕
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            {[
              { v:totalSku, l:"총 SKU", tab:"upload" },
              { v:expiring.length, l:"유통임박", tab:"recommend" },
              { v:needOrder, l:"발주필요", tab:"recommend" },
              { v: latestUpload ? Object.entries(latestUpload.items||{}).filter(([sku]) => {
                  const hist = uploadHistory.filter(h=>h.items?.[sku]);
                  if (hist.length < 3) return false;
                  const dc = hist.filter(h=>(h.items[sku]?.batches||[]).some(b=>b.dday!==null&&b.dday<=0)).length;
                  return dc/hist.length >= 0.6;
                }).length : 0, l:"당일소진", tab:"recommend" },
            ].map(s => (
              <button key={s.l} onClick={() => setTab(s.tab)} style={{
                background:"rgba(255,255,255,0.14)", borderRadius:12,
                padding:"10px 8px", border:"none", cursor:"pointer", textAlign:"center" }}>
                <div style={{ fontSize:22, fontWeight:900, color:"#fff", fontFamily:F, lineHeight:1 }}>{s.v}</div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.70)", fontFamily:F, marginTop:3 }}>{s.l}</div>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* 업로드 없음 안내 */}
      {!latestUpload && (
        <Card style={{ marginBottom:16 }}>
          <EmptyState emoji="📁" text="실사 데이터가 없어요"
            sub="실사 탭에서 엑셀 파일을 업로드해보세요"/>
          <div style={{ padding:"0 16px 16px" }}>
            <GreenBtn full onClick={() => setTab("upload")}>📁 실사 업로드하기</GreenBtn>
          </div>
        </Card>
      )}

      {/* 최근 발주 결과 & 학습 인사이트 */}
      {orderLog.length > 0 && (() => {
        const recent = [...orderLog].sort((a,b)=>b.delivDate.localeCompare(a.delivDate)).slice(0,5);
        // 전체 학습 인사이트: 품목별 shortage/excess 패턴
        const skuPatterns = {};
        orderLog.forEach(log => {
          Object.entries(log.items||{}).forEach(([sku,item]) => {
            if (!skuPatterns[sku]) skuPatterns[sku] = { name:item.name, short:0, excess:0, ok:0, total:0, orderDow:log.orderDow };
            skuPatterns[sku].total++;
            skuPatterns[sku][item.result==="shortage"?"short":item.result==="excess"?"excess":"ok"]++;
          });
        });
        const warnings = Object.entries(skuPatterns)
          .filter(([,p]) => p.total >= 2 && (p.short/p.total >= 0.4 || p.excess/p.total >= 0.4))
          .map(([sku,p]) => ({
            sku, name:p.name.length>16?p.name.slice(0,15)+"…":p.name,
            type: p.short/p.total >= 0.4 ? "shortage" : "excess",
            rate: Math.round(Math.max(p.short,p.excess)/p.total*100),
            total: p.total
          }))
          .sort((a,b)=>b.rate-a.rate)
          .slice(0,4);

        const totalShort  = orderLog.reduce((s,l)=>s+Object.values(l.items||{}).filter(i=>i.result==="shortage").length,0);
        const totalExcess = orderLog.reduce((s,l)=>s+Object.values(l.items||{}).filter(i=>i.result==="excess").length,0);
        const totalOk     = orderLog.reduce((s,l)=>s+Object.values(l.items||{}).filter(i=>i.result==="ok").length,0);
        const totalAll    = totalShort+totalExcess+totalOk;

        return (
          <div style={{ marginBottom:16 }}>
            <SH title="🧠 발주 학습 인사이트"
              sub={orderLog.length+"회 발주 분석"}
              action={
                <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>
                  자동 학습 · 추천에 반영 중
                </div>
              }/>

            {/* 전체 발주 정확도 */}
            <Card style={{ padding:"14px 16px", marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
                <div style={{ fontSize:12, fontWeight:700, color:T.t1, fontFamily:F }}>
                  누적 발주 정확도
                </div>
                <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>
                  총 {totalAll}건
                </div>
              </div>
              <div style={{ display:"flex", height:12, borderRadius:6, overflow:"hidden", marginBottom:8 }}>
                {totalShort>0&&<div style={{ width:(totalShort/totalAll*100)+"%", background:T.red, opacity:0.8 }}/>}
                {totalOk>0&&<div style={{ width:(totalOk/totalAll*100)+"%", background:T.brand, opacity:0.8 }}/>}
                {totalExcess>0&&<div style={{ width:(totalExcess/totalAll*100)+"%", background:T.amber, opacity:0.8 }}/>}
              </div>
              <div style={{ display:"flex", gap:12, fontSize:11, fontFamily:F }}>
                <span style={{ color:T.red }}>🔴 부족 {totalShort}건 ({Math.round(totalShort/totalAll*100)}%)</span>
                <span style={{ color:T.brand }}>🟢 적정 {totalOk}건 ({Math.round(totalOk/totalAll*100)}%)</span>
                <span style={{ color:T.amber }}>🟡 과잉 {totalExcess}건 ({Math.round(totalExcess/totalAll*100)}%)</span>
              </div>
            </Card>

            {/* 패턴 경고 */}
            {warnings.length > 0 && (
              <Card style={{ padding:"12px 16px", marginBottom:10 }}>
                <div style={{ fontSize:12, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:8 }}>
                  ⚠ 반복 패턴 감지 — 발주량 자동 보정 중
                </div>
                {warnings.map((w,i) => (
                  <div key={w.sku} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:i<warnings.length-1?8:0 }}>
                    <div style={{ width:36, height:36, borderRadius:10, flexShrink:0,
                      background:w.type==="shortage"?T.rDim:T.aDim,
                      display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <span style={{ fontSize:16 }}>{w.type==="shortage"?"📉":"📦"}</span>
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, fontWeight:600, color:T.t1, fontFamily:F,
                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {w.name}
                      </div>
                      <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>
                        최근 {w.total}회 중 {w.rate}% {w.type==="shortage"?"수량 부족":"재고 과잉"}
                      </div>
                    </div>
                    <div style={{ flexShrink:0 }}>
                      <span style={{ fontSize:12, fontWeight:700,
                        color:w.type==="shortage"?T.red:T.amber,
                        background:w.type==="shortage"?T.rDim:T.aDim,
                        borderRadius:8, padding:"3px 8px", fontFamily:F }}>
                        {w.type==="shortage"?"+1~3":"−1~2"} 보정 중
                      </span>
                    </div>
                  </div>
                ))}
              </Card>
            )}

            {/* 최근 발주 결과 5건 */}
            <Card>
              <div style={{ padding:"10px 14px 6px", fontSize:12, fontWeight:700, color:T.t1, fontFamily:F }}>
                최근 발주 결과
              </div>
              {recent.map((log,i,arr) => {
                const items = Object.values(log.items||{});
                const s = items.filter(x=>x.result==="shortage").length;
                const e = items.filter(x=>x.result==="excess").length;
                const o = items.filter(x=>x.result==="ok").length;
                return (
                  <div key={log.delivDate} style={{
                    padding:"10px 14px", display:"flex", alignItems:"center", gap:10,
                    borderTop:i>0?"1px solid "+T.b0:"none" }}>
                    <div style={{ width:40, flexShrink:0, textAlign:"center" }}>
                      <div style={{ fontSize:12, fontWeight:800, color:T.brand, fontFamily:F }}>
                        {new Date(log.delivDate+"T00:00:00").getDate()}일
                      </div>
                      <div style={{ fontSize:9, color:T.t3, fontFamily:F }}>
                        {["일","월","화","수","목","금","토"][log.delivDow]}요일 입고
                      </div>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginBottom:3 }}>
                        발주 {["일","월","화","수","목","금","토"][log.orderDow]}요일 · {items.length}개 품목
                      </div>
                      <div style={{ display:"flex", gap:6 }}>
                        {s>0&&<span style={{ fontSize:11, color:T.red, background:T.rDim,
                          borderRadius:6, padding:"1px 7px", fontFamily:F, fontWeight:600 }}>부족 {s}</span>}
                        {o>0&&<span style={{ fontSize:11, color:T.brand, background:T.brandDim,
                          borderRadius:6, padding:"1px 7px", fontFamily:F, fontWeight:600 }}>적정 {o}</span>}
                        {e>0&&<span style={{ fontSize:11, color:T.amber, background:T.aDim,
                          borderRadius:6, padding:"1px 7px", fontFamily:F, fontWeight:600 }}>과잉 {e}</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </Card>
          </div>
        );
      })()}

      {/* 유통기한 임박 */}
      {expiring.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <SH title="⚠ 유통기한 임박" sub={expiring.length+"개"}/>
          <Card>
            {expiring.slice(0,6).map((item, i, arr) => {
              const dday = item.dday;
              const color = dday === 0 ? T.red : dday <= 1 ? T.red : dday <= 3 ? T.amber : T.t3;
              const dim   = dday === 0 ? T.rDim : dday <= 1 ? T.rDim : T.aDim;
              const dispName = skuAliases[item.sku] || item.name;
              return (
                <div key={item.sku+"_"+i} style={{
                  padding:"12px 16px", display:"flex", alignItems:"center", gap:12,
                  borderBottom:i<arr.length-1?"1px solid "+T.b0:"none" }}>
                  <div style={{ width:40, height:40, borderRadius:10, background:dim,
                    display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", flexShrink:0 }}>
                    <div style={{ fontSize:13, fontWeight:900, color, lineHeight:1 }}>
                      {dday === 0 ? "D-day" : "D-"+dday}
                    </div>
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F,
                      overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {dispName}
                    </div>
                    <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
                      재고 {item.actual}개 · {item.expDate ? fmtDate(item.expDate) + " 만료" : ""}
                    </div>
                  </div>
                  <Pill label={dday===0?"오늘마감":dday<=1?"내일마감":"D-"+dday}
                    color={color} dim={dim}/>
                </div>
              );
            })}
          </Card>
        </div>
      )}

      {/* 최근 실사 요약 */}
      {latestUpload && (
        <div style={{ marginBottom:16 }}>
          <SH title="최근 실사 현황" sub={fmtDate(latestUpload.date)+" ("+DOW_KR[latestUpload.dow]+"요일)"}
            action={
              <button onClick={() => setTab("upload")} style={{
                padding:"5px 12px", borderRadius:8, border:"none",
                background:T.brand, color:"#fff", fontSize:12, fontWeight:600,
                cursor:"pointer", fontFamily:F }}>+ 업로드</button>
            }/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {[
              { label:"총 품목", value:totalSku+"개", color:T.brand, dim:T.brandDim },
              { label:"재고 없음", value:zeroStock+"개", color:T.red, dim:T.rDim },
              { label:"내일 입고", value:Object.values(latestUpload.items||{}).filter(i=>i.tmrIn>0).length+"개", color:T.blue, dim:T.bDim },
              { label:"당일 판매", value:Math.round(Object.values(latestUpload.items||{}).reduce((s,i)=>s+i.sold,0))+"개", color:T.amber, dim:T.aDim },
            ].map(stat => (
              <div key={stat.label} style={{ background:stat.dim, borderRadius:14,
                padding:"14px 16px", border:"1px solid "+stat.color+"22" }}>
                <div style={{ fontSize:11, fontWeight:700, color:stat.color, fontFamily:F, marginBottom:4 }}>
                  {stat.label}
                </div>
                <div style={{ fontSize:24, fontWeight:900, color:stat.color, fontFamily:F, letterSpacing:-1 }}>
                  {stat.value}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 바로가기 버튼 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {[
          { icon:"📁", label:"실사 업로드", tab:"upload", color:T.brand },
          { icon:"📦", label:"발주 추천",   tab:"recommend", color:T.amber },
          { icon:"📝", label:"수동 입력",   tab:"manual",  color:T.blue },
          { icon:"📈", label:"통계 보기",   tab:"history", color:"#7C3AED" },
        ].map(btn => (
          <button key={btn.tab} onClick={() => setTab(btn.tab)} style={{
            background:T.card, borderRadius:14, border:"1px solid "+T.b0,
            padding:"16px 14px", cursor:"pointer", display:"flex",
            alignItems:"center", gap:10, boxShadow:T.sh1,
            transition:"transform .15s" }}
          onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"}
          onMouseLeave={e=>e.currentTarget.style.transform="none"}>
            <div style={{ width:38, height:38, borderRadius:10,
              background:btn.color+"15", border:"1px solid "+btn.color+"25",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:18, flexShrink:0 }}>{btn.icon}</div>
            <span style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F }}>{btn.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ─── 실사 업로드 탭 ─────────────────────────────── */
function UploadTab({ uploadHistory, onSave, skuAliases, onSaveAliases }) {
  const [dragging, setDragging] = useState(false);
  const [pending,  setPending]  = useState([]); // [{id,filename,data,customDate,expanded}]
  const [error,    setError]    = useState("");
  const fileRef = useRef();

  const parseFiles = async (files) => {
    setError("");
    const newItems = [];
    for (const file of files) {
      const ext = file.name.split(".").pop().toLowerCase();
      if (!["xlsx","xls"].includes(ext)) { setError('"'+file.name+'" — xlsx 또는 xls 파일만 지원해요'); continue; }
      try {
        const buf = await file.arrayBuffer();
        const guessDate = extractDateFromFilename(file.name);
        const data = parseInventoryExcel(buf, guessDate);
        newItems.push({ id:Date.now()+Math.random(), filename:file.name, data, customDate:guessDate, expanded:false });
      } catch(e) {
        setError('"'+file.name+'" 파싱 오류: '+e.message);
      }
    }
    if (newItems.length) setPending(prev => [...prev, ...newItems]);
  };

  const handleDrop = (e) => { e.preventDefault(); setDragging(false); parseFiles(Array.from(e.dataTransfer.files)); };

  const updateDate = (id, newDate) => {
    setPending(prev => prev.map(p => {
      if (p.id !== id) return p;
      return { ...p, customDate:newDate, data:{ ...p.data, date:newDate, dow:getDow(newDate) } };
    }));
  };

  const removePending = (id) => setPending(prev => prev.filter(p => p.id !== id));

  const saveOne = (item) => {
    const exists = uploadHistory.findIndex(h => h.date === item.data.date);
    let updated;
    if (exists >= 0) {
      if (!window.confirm(item.data.date+" 날짜의 기존 데이터가 있어요. 덮어쓸까요?")) return;
      updated = uploadHistory.map((h,i) => i===exists ? item.data : h);
    } else {
      updated = [...uploadHistory, item.data].sort((a,b) => a.date.localeCompare(b.date));
    }
    // 새 항목이면 newEntry로 Firebase 개별 저장, 덮어쓰기면 배열 전체 저장
    const isNew = exists < 0;
    onSave(updated, isNew ? item.data : null);
    removePending(item.id);
  };

  const saveAll = () => {
    let updated = [...uploadHistory];
    const newEntries = [];
    for (const item of pending) {
      const exists = updated.findIndex(h => h.date === item.data.date);
      if (exists >= 0) updated = updated.map((h,i) => i===exists ? item.data : h);
      else { updated = [...updated, item.data]; newEntries.push(item.data); }
    }
    const sorted = updated.sort((a,b) => a.date.localeCompare(b.date));
    // 새 항목들 개별 Firebase 저장
    newEntries.forEach(entry => onSave(sorted, entry));
    if (newEntries.length === 0) onSave(sorted, null);
    setPending([]);
    alert(pending.length+"개 파일이 저장되었습니다 ✓");
  };

  const deleteHistory = (idx) => {
    if (!window.confirm("이 기록을 삭제할까요?")) return;
    const toDelete = uploadHistory[idx];
    onSave(uploadHistory.filter((_,i) => i!==idx), null);
    // Firebase에서도 삭제
    const delKey = toDelete?.date || toDelete?._id;
    if (delKey) window._deleteHistoryEntry && window._deleteHistoryEntry(delKey);
  };

  const toggleExpand = (id) => setPending(prev => prev.map(p => p.id===id ? {...p,expanded:!p.expanded} : p));

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
      <SH title="📁 실사 데이터 업로드"
        sub="엑셀 파일 업로드 → 날짜 설정 → 발주 추천에 반영"/>

      {/* 드롭존 — 항상 표시, multiple 지원 */}
      <div
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={handleDrop}
        onClick={()=>fileRef.current?.click()}
        style={{ border:"2px dashed "+(dragging?T.brand:T.b1),
          borderRadius:18, padding:"28px 20px", textAlign:"center",
          background:dragging?T.brandDim:T.card, cursor:"pointer",
          transition:"all .2s", marginBottom:14 }}>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" multiple style={{ display:"none" }}
          onChange={e=>{ parseFiles(Array.from(e.target.files)); e.target.value=""; }}/>
        <div style={{ fontSize:34, marginBottom:8 }}>📊</div>
        <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:2 }}>
          실사 엑셀 파일을 올려주세요
        </div>
        <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
          여러 파일 동시 업로드 가능 · .xlsx / .xls
        </div>
      </div>

      {error && (
        <div style={{ padding:"10px 14px", borderRadius:12, background:T.rDim,
          border:"1px solid "+T.rBdr, color:T.red, fontSize:13, fontFamily:F, marginBottom:12 }}>
          ⚠ {error}
        </div>
      )}

      {/* 대기 중인 파일들 */}
      {pending.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F }}>
              파싱 완료 — {pending.length}개 파일
            </div>
            {pending.length > 1 && (
              <GreenBtn small onClick={saveAll}>전체 저장</GreenBtn>
            )}
          </div>
          {pending.map(item => (
            <PendingFileCard
              key={item.id}
              item={item}
              skuAliases={skuAliases}
              onUpdateDate={updateDate}
              onSave={saveOne}
              onRemove={removePending}
              onToggle={toggleExpand}
            />
          ))}
        </div>
      )}

      {/* 업로드 히스토리 */}
      {uploadHistory.length > 0 && (
        <div style={{ marginTop:pending.length>0?4:0 }}>
          <SH title="업로드 기록" sub={uploadHistory.length+"건"}/>
          <Card>
            {[...uploadHistory].reverse().map((h, i, arr) => (
              <div key={h.date} style={{ padding:"12px 16px",
                display:"flex", alignItems:"center", gap:12,
                borderBottom:i<arr.length-1?"1px solid "+T.b0:"none" }}>
                <div style={{ width:40, height:40, borderRadius:10, background:T.brandDim,
                  display:"flex", flexDirection:"column", alignItems:"center",
                  justifyContent:"center", flexShrink:0 }}>
                  <div style={{ fontSize:14, fontWeight:800, color:T.brand, lineHeight:1 }}>
                    {new Date(h.date+"T00:00:00").getDate()}
                  </div>
                  <div style={{ fontSize:9, color:T.brand, opacity:0.7 }}>
                    {new Date(h.date+"T00:00:00").toLocaleDateString("ko-KR",{month:"short"})}
                  </div>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:600, color:T.t1, fontFamily:F }}>
                    {fmtDate(h.date)} ({DOW_KR[h.dow]}요일)
                  </div>
                  <div style={{ fontSize:12, color:T.t3, fontFamily:F }}>
                    {Object.keys(h.items||{}).length}개 SKU · 판매합계 {Math.round(Object.values(h.items||{}).reduce((s,i)=>s+i.sold,0))}
                  </div>
                </div>
                <button onClick={() => deleteHistory(uploadHistory.length-1-i)} style={{
                  padding:"5px 10px", borderRadius:8, border:"1px solid "+T.rBdr,
                  background:T.rDim, color:T.red, cursor:"pointer",
                  fontSize:12, fontFamily:F }}>삭제</button>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
}

/* ─── 파일 카드 (업로드 대기) ─────────────────────── */
function PendingFileCard({ item, skuAliases, onUpdateDate, onSave, onRemove, onToggle }) {
  const [catFilter, setCatFilter] = useState("전체");
  const cats = ["전체", ...new Set(Object.values(item.data.items).map(i=>i.cat))];
  const filteredItems = Object.values(item.data.items).filter(i =>
    catFilter === "전체" || i.cat === catFilter
  );
  const skuCount = Object.keys(item.data.items).length;
  return (
    <div style={{ background:T.card, borderRadius:16, boxShadow:T.sh1,
      overflow:"hidden", marginBottom:10, border:"1px solid "+T.brandBorder }}>
      <div style={{ padding:"12px 14px", display:"flex", alignItems:"center", gap:10 }}>
        <div style={{ width:36, height:36, borderRadius:10, background:T.brandDim,
          display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>📊</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F,
            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.filename}</div>
          <div style={{ fontSize:11, color:T.t3, fontFamily:F }}>{skuCount}개 SKU · {DOW_KR[item.data.dow]}요일</div>
        </div>
        <button onClick={()=>onRemove(item.id)} style={{
          padding:"4px 8px", borderRadius:6, border:"1px solid "+T.b1,
          background:T.card2, color:T.t3, cursor:"pointer", fontSize:12 }}>✕</button>
      </div>

      {/* 날짜 설정 */}
      <div style={{ padding:"0 14px 12px", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        <div style={{ fontSize:12, fontWeight:600, color:T.t2, fontFamily:F, flexShrink:0 }}>📅 날짜</div>
        <input type="date" value={item.customDate}
          onChange={e => onUpdateDate(item.id, e.target.value)}
          style={{ flex:1, minWidth:120, padding:"7px 10px", borderRadius:8,
            border:"1px solid "+T.brand, background:T.brandDim,
            fontSize:13, fontFamily:F, color:T.brand, fontWeight:700, outline:"none" }}/>
        <div style={{ fontSize:12, color:T.brand, fontFamily:F, fontWeight:700 }}>
          ({DOW_KR[getDow(item.customDate)]}요일)
        </div>
      </div>

      {/* 미리보기 토글 */}
      <div style={{ padding:"0 14px 10px" }}>
        <button onClick={()=>onToggle(item.id)} style={{
          width:"100%", padding:"7px", borderRadius:8, border:"1px solid "+T.b1,
          background:item.expanded?T.brandDim:T.card2,
          color:item.expanded?T.brand:T.t3,
          fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:F }}>
          {item.expanded ? "▲ 미리보기 접기" : "▼ 미리보기 펼치기"}
        </button>
      </div>

      {/* 미리보기 */}
      {item.expanded && (
        <div>
          <div style={{ display:"flex", gap:5, flexWrap:"wrap", padding:"0 14px 8px" }}>
            {cats.map(c => (
              <button key={c} onClick={()=>setCatFilter(c)} style={{
                padding:"4px 10px", borderRadius:14, border:"1px solid "+(catFilter===c?T.brand:T.b1),
                background:catFilter===c?T.brandDim:T.card2,
                color:catFilter===c?T.brand:T.t2,
                fontSize:11, fontWeight:catFilter===c?700:400, cursor:"pointer", fontFamily:F }}>{c}</button>
            ))}
          </div>
          <div style={{ maxHeight:220, overflowY:"auto" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1.8fr 0.7fr 0.7fr 0.7fr 0.7fr 0.7fr",
              padding:"7px 14px", background:T.brandDim, gap:4 }}>
              {["품목명","재고","판매","내일","모레","유통"].map(h => (
                <div key={h} style={{ fontSize:10, fontWeight:700, color:T.brand, fontFamily:F, textAlign:"center" }}>{h}</div>
              ))}
            </div>
            {filteredItems.map((it, idx) => {
              const minDday = it.batches.reduce((m,b) => b.dday!==null&&b.dday<m ? b.dday : m, 99);
              const expiryColor = minDday<=1?T.red:minDday<=3?T.amber:T.t3;
              const dispName = skuAliases[it.sku] || it.name;
              return (
                <div key={it.sku} style={{ display:"grid", gridTemplateColumns:"1.8fr 0.7fr 0.7fr 0.7fr 0.7fr 0.7fr",
                  padding:"8px 14px", gap:4, alignItems:"center",
                  background:idx%2===0?T.card2:T.card, borderTop:"1px solid "+T.b0 }}>
                  <div style={{ fontSize:12, fontWeight:600, color:T.t1, fontFamily:F,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{dispName}</div>
                  <div style={{ textAlign:"center", fontSize:13, fontWeight:700,
                    color:it.actualSum===0?T.red:T.t1, fontFamily:F }}>{it.actualSum}</div>
                  <div style={{ textAlign:"center", fontSize:12, color:T.amber, fontFamily:F }}>{it.sold||"-"}</div>
                  <div style={{ textAlign:"center", fontSize:12, color:T.blue, fontFamily:F }}>{it.tmrIn||"-"}</div>
                  <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}>{it.d2In||"-"}</div>
                  <div style={{ textAlign:"center", fontSize:11, fontWeight:700,
                    color:expiryColor, fontFamily:F }}>{minDday<=3&&minDday!==99?"D-"+minDday:"-"}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 저장 버튼 */}
      <div style={{ padding:"10px 14px" }}>
        <GreenBtn full onClick={()=>onSave(item)}>
          📅 {item.customDate} ({DOW_KR[item.data.dow]}요일) 로 저장
        </GreenBtn>
      </div>
    </div>
  );
}

/* ─── 발주 추천 탭 ───────────────────────────────── */
function RecommendTab({ latestUpload, uploadHistory, manualRecords, manualItems, buffers, onSaveBuffers, skuAliases, wasteTarget=5.6, onSaveWasteTarget, orderFeedbacks=[], onSaveFeedbacks, orderLog=[], sameDaySkus={}, onSaveSameDaySkus }) {
  const [catFilter, setCatFilter] = useState("전체");
  const [showBufEdit, setShowBufEdit] = useState(false);
  const [bufEdit, setBufEdit] = useState({});
  const [bufCatFilter, setBufCatFilter] = useState("전체");
  const [showWasteEdit, setShowWasteEdit] = useState(false);
  const [showSameDayEdit, setShowSameDayEdit] = useState(false);
  const [sdSearch, setSdSearch] = useState("");
  const [wasteInput, setWasteInput] = useState(String(wasteTarget));
  const [showFeedback, setShowFeedback] = useState(null); // sku or null
  const [fbNote, setFbNote] = useState("");

  if (!latestUpload) {
    return (
      <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
        <EmptyState emoji="📁" text="실사 데이터가 없어요" sub="실사 탭에서 엑셀을 먼저 업로드해주세요"/>
      </div>
    );
  }

  const today = latestUpload.date;
  const todayDow = latestUpload.dow;

  // SKU별 과거 평균 판매량 계산
  function getAvgSold(sku) {
    const hist = uploadHistory.filter(h => h.date <= today && h.items?.[sku]?.sold > 0);
    if (!hist.length) return null;
    const total = hist.reduce((s,h) => s+(h.items[sku]?.sold||0), 0);
    return Math.round(total/hist.length * 10) / 10;
  }
  function getAvgSoldByDow(sku, dow) {
    const hist = uploadHistory.filter(h => h.dow===dow && h.date<=today && h.items?.[sku]?.sold > 0);
    if (!hist.length) return null;
    const total = hist.reduce((s,h) => s+(h.items[sku]?.sold||0), 0);
    return Math.round(total/hist.length * 10) / 10;
  }

  // ── 당일소진 품목 자동 감지 ──
  // 히스토리 전체에서 D-day 출현율 계산
  const ddayRateCache = {};
  function getDdayRate(sku) {
    if (ddayRateCache[sku] !== undefined) return ddayRateCache[sku];
    const hist = uploadHistory.filter(h => h.items?.[sku]);
    if (hist.length < 3) { ddayRateCache[sku] = 0; return 0; }
    const ddayCount = hist.filter(h =>
      (h.items[sku]?.batches||[]).some(b => b.dday !== null && b.dday <= 0)
    ).length;
    ddayRateCache[sku] = ddayCount / hist.length;
    return ddayRateCache[sku];
  }

  // ── 품목별 실제 폐기율 계산 (입고량 vs 판매량 기반) ──
  const wasteRateCache = {};
  function getItemWasteRate(sku) {
    if (wasteRateCache[sku] !== undefined) return wasteRateCache[sku];
    const hist = uploadHistory.filter(h => h.items?.[sku]);
    if (hist.length < 3) { wasteRateCache[sku] = wasteTarget; return wasteTarget; }
    const totalIn   = hist.reduce((s,h) => s + (h.items[sku]?.dayIn||0), 0);
    const totalSold = hist.reduce((s,h) => s + (h.items[sku]?.sold||0), 0);
    if (totalIn === 0) { wasteRateCache[sku] = wasteTarget; return wasteTarget; }
    // 폐기 추정 = 입고 - 판매 (음수면 0으로 처리)
    const estWaste = Math.max(0, totalIn - totalSold);
    const rate = (estWaste / totalIn) * 100;
    wasteRateCache[sku] = Math.round(rate * 10) / 10;
    return wasteRateCache[sku];
  }

  // 발주 추천량 계산
  function calcRecommend(sku, item) {
    const tmrIn   = item.tmrIn;
    const d2In    = item.d2In;
    const dow1    = (todayDow + 1) % 7;
    const dow2    = (todayDow + 2) % 7;
    const avg1    = parseFloat(getAvgSoldByDow(sku, dow1)) || parseFloat(getAvgSold(sku)) || 0;
    const avg2    = parseFloat(getAvgSoldByDow(sku, dow2)) || parseFloat(getAvgSold(sku)) || 0;
    const totalUsage = avg1 + avg2;
    const buf     = parseFloat(buffers[sku] ?? buffers[item.name] ?? 2);

    // ── 당일소진 품목 판별 ──
    // 수동 설정이 있으면 최우선 적용, 없으면 자동 감지
    const ddayRate  = getDdayRate(sku);
    const manualOverride = sameDaySkus[sku]; // true=강제 당일폐기, false=강제 해제
    const isSameDay = manualOverride === true
      ? true
      : manualOverride === false
        ? false
        : ddayRate >= 0.6; // 설정 없으면 자동 (60% 기준)

    // ── 재고 유효성 계산 ──
    let effectiveStock = 0, expiringStock = 0;
    if (isSameDay) {
      // 당일소진 품목: 현재 재고는 오늘 모두 폐기될 것 → 발주 계산에서 제외
      expiringStock = item.actualSum;
      effectiveStock = 0;
    } else if (item.batches && item.batches.length > 0) {
      item.batches.forEach(b => {
        if (b.actual <= 0) return;
        if (b.dday !== null && b.dday !== undefined && b.dday <= 1) {
          expiringStock += b.actual;
        } else {
          effectiveStock += b.actual;
        }
      });
    } else {
      effectiveStock = item.actualSum;
    }

    // ── 폐기율 보정 ──
    const currentWasteRate = getItemWasteRate(sku);
    const wasteDiff = wasteTarget - currentWasteRate; // 양수 = 더 발주 가능
    let wasteAdj = 0;
    if (isSameDay) {
      // 당일소진 품목: 폐기율 기반으로 더 강하게 보정
      // 현재 폐기율 > 목표 → 과발주 줄이기 (-1 ~ -3)
      // 현재 폐기율 < 목표 → 판매 기회 소실 가능, 약간 증가 (+1)
      if (wasteDiff < -10)     wasteAdj = -2; // 폐기율 목표 10%p 초과 → -2
      else if (wasteDiff < -5) wasteAdj = -1; // 5~10%p 초과 → -1
      else if (wasteDiff > 5)  wasteAdj = 1;  // 5%p 미만 → +1 (판매 기회)
    } else {
      // 일반 품목
      wasteAdj = Math.max(-1, Math.min(2, Math.round(wasteDiff / 2)));
    }

    // ── 피드백 가중치 반영 ──
    const feedbackAdj = orderFeedbacks
      .filter(f => f.sku === sku && f.orderDow === todayDow)
      .reduce((adj, f) => adj + (f.type === "shortage" ? 1 : f.type === "excess" ? -1 : 0), 0);
    const feedbackClamp = Math.max(-2, Math.min(2, feedbackAdj));

    // ── orderLog 학습 보정 ──
    const relevantLogs = orderLog
      .filter(l => l.items?.[sku] && l.orderDow === todayDow)
      .slice(-8);
    let learnAdj = 0, learnInsight = null;
    if (relevantLogs.length >= 2) {
      const shorts   = relevantLogs.filter(l => l.items[sku].result === "shortage").length;
      const excesses = relevantLogs.filter(l => l.items[sku].result === "excess").length;
      const total    = relevantLogs.length;
      const sRate    = shorts / total;
      const eRate    = excesses / total;
      if (sRate >= 0.5)      { learnAdj = Math.min(3, Math.ceil(sRate * 3)); learnInsight = `부족 ${Math.round(sRate*100)}%`; }
      else if (sRate >= 0.3) { learnAdj = 1; learnInsight = `부족 ${Math.round(sRate*100)}%`; }
      if (eRate >= 0.5)      { learnAdj -= Math.min(2, Math.ceil(eRate * 2)); learnInsight = `과잉 ${Math.round(eRate*100)}%`; }
      else if (eRate >= 0.3) { learnAdj -= 1; learnInsight = `과잉 ${Math.round(eRate*100)}%`; }
      learnAdj = Math.max(-3, Math.min(3, learnAdj));
    }

    // 당일소진 품목은 버퍼를 줄임 (어차피 남으면 폐기)
    const effectiveBuf = isSameDay ? Math.min(buf, 1) : buf;

    const rec = Math.max(0, Math.ceil(
      totalUsage + effectiveBuf + wasteAdj + feedbackClamp + learnAdj
      - effectiveStock - tmrIn - d2In
    ));
    return {
      rec, avg1, avg2, totalUsage, buf: effectiveBuf,
      current: item.actualSum, effectiveStock, expiringStock,
      tmrIn, d2In, dow1, dow2,
      wasteAdj, feedbackClamp, learnAdj, learnInsight,
      isSameDay, ddayRate: Math.round(ddayRate*100),
      currentWasteRate: Math.round(currentWasteRate*10)/10,
      learnSampleSize: relevantLogs.length
    };
  }

  const cats = ["전체", ...new Set(Object.values(latestUpload.items).map(i=>i.cat))];
  const items = Object.entries(latestUpload.items).filter(([,item]) =>
    catFilter === "전체" || item.cat === catFilter
  );

  // 발주 필요 항목만 상단 정렬
  const sortedItems = [...items].sort((a,b) => {
    const ra = calcRecommend(a[0], a[1]);
    const rb = calcRecommend(b[0], b[1]);
    return rb.rec - ra.rec;
  });

  const totalRec = items.reduce((s,[sku,item]) => s+calcRecommend(sku,item).rec, 0);
  const needOrderItems = items.filter(([sku,item]) => calcRecommend(sku,item).rec > 0);

  return (
    <div style={{ padding:window.innerWidth>=768?"24px 28px":"14px" }} className="fi">
      <SH title="📦 발주 추천"
        sub={fmtDate(today)+" 기준"}
        action={
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            <button onClick={() => setShowBufEdit(!showBufEdit)} style={{
              padding:"5px 12px", borderRadius:8, border:"1px solid "+T.b1,
              background:showBufEdit?T.brandDim:T.card,
              color:showBufEdit?T.brand:T.t2,
              fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:F }}>
              🛡 버퍼 설정
            </button>
            <button onClick={() => setShowSameDayEdit(!showSameDayEdit)} style={{
              padding:"5px 12px", borderRadius:8,
              border:"1px solid "+(showSameDayEdit?T.red:T.b1),
              background:showSameDayEdit?T.rDim:T.card,
              color:showSameDayEdit?T.red:T.t2,
              fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:F }}>
              🗑 당일폐기 설정
            </button>
            <button onClick={() => setShowWasteEdit(!showWasteEdit)} style={{
              padding:"5px 12px", borderRadius:8, border:"1px solid "+(showWasteEdit?T.amber:T.b1),
              background:showWasteEdit?T.aDim:T.card,
              color:showWasteEdit?T.amber:T.t2,
              fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:F }}>
              📊 폐기율
            </button>
          </div>
        }/>

      {/* 요약 배너 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:14 }}>
        {[
          { label:"발주 필요", value:needOrderItems.length+"개 품목", color:T.brand, dim:T.brandDim },
          { label:"총 발주량", value:totalRec+"개", color:T.amber, dim:T.aDim },
          { label:"충분한 품목", value:(items.length-needOrderItems.length)+"개", color:T.blue, dim:T.bDim },
        ].map(s => (
          <div key={s.label} style={{ background:s.dim, borderRadius:12, padding:"12px 12px",
            border:"1px solid "+s.color+"22", textAlign:"center" }}>
            <div style={{ fontSize:10, fontWeight:700, color:s.color, fontFamily:F }}>{s.label}</div>
            <div style={{ fontSize:16, fontWeight:900, color:s.color, fontFamily:F, marginTop:2 }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* 발주 기준 설명 */}
      <div style={{ background:T.brandDim, border:"1px solid "+T.brandBorder,
        borderRadius:12, padding:"10px 14px", marginBottom:14, fontSize:12, color:T.brand, fontFamily:F }}>
        📅 발주일 {DOW_KR[todayDow]}요일 → 입고 예정 {DOW_KR[(todayDow+2)%7]}요일<br/>
        <span style={{ color:T.t2 }}>내일({DOW_KR[(todayDow+1)%7]}) + 입고일({DOW_KR[(todayDow+2)%7]}) 평균판매량 합산 → 현재고/예정입고 차감</span>
      </div>

      {/* 폐기율 설정 패널 */}
      {showWasteEdit && (
        <Card style={{ marginBottom:14, padding:"14px" }}>
          <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:10 }}>
            📊 폐기율 설정
          </div>
          <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:12, lineHeight:1.7 }}>
            전사 목표 폐기율을 기준으로 발주량을 자동 보정해요.<br/>
            현재 폐기율이 목표보다 낮으면 +1~2개, 높으면 -1개 조정됩니다.
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
            <div style={{ fontSize:13, color:T.t1, fontFamily:F }}>전사 목표 폐기율</div>
            <input type="number" min="0" max="20" step="0.1" value={wasteInput}
              onChange={e=>setWasteInput(e.target.value)}
              style={{ width:70, padding:"6px 10px", borderRadius:8,
                border:"1px solid "+T.b1, fontFamily:F, fontSize:13, textAlign:"center" }}/>
            <span style={{ fontSize:13, color:T.t3, fontFamily:F }}>%</span>
            <button onClick={()=>{
              const v=parseFloat(wasteInput);
              if(!isNaN(v)&&v>=0&&v<=20){ onSaveWasteTarget&&onSaveWasteTarget(v); }
            }} style={{ padding:"6px 14px", borderRadius:8, border:"none",
              background:T.brand, color:"#fff", fontSize:12, fontWeight:700,
              cursor:"pointer", fontFamily:F }}>저장</button>
          </div>
          <div style={{ fontSize:11, color:T.t4, fontFamily:F, background:T.card2,
            borderRadius:8, padding:"8px 12px" }}>
            현재 설정: 목표 {wasteTarget}% · 현재보다 낮으면 발주량 ↑, 높으면 ↓
          </div>
        </Card>
      )}

      {/* 발주 피드백 입력 모달 */}
      {showFeedback && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", zIndex:300,
          display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
          onClick={()=>setShowFeedback(null)}>
          <div style={{ background:T.card, borderRadius:16, padding:20, width:"100%", maxWidth:340 }}
            onClick={e=>e.stopPropagation()}>
            <div style={{ fontSize:14, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:4 }}>
              📝 발주 피드백 기록
            </div>
            <div style={{ fontSize:12, color:T.t3, fontFamily:F, marginBottom:14 }}>
              {showFeedback.name} · 발주요일 {["일","월","화","수","목","금","토"][todayDow]}
            </div>
            <div style={{ display:"flex", gap:8, marginBottom:12 }}>
              {[
                { type:"shortage", label:"📉 수량 부족", color:T.red },
                { type:"excess",   label:"📦 재고 과잉", color:T.amber },
                { type:"ok",       label:"✅ 적정",      color:T.brand },
              ].map(opt=>{
                const existing = orderFeedbacks.filter(f=>f.sku===showFeedback.sku&&f.orderDow===todayDow);
                const isSelected = existing.some(f=>f.type===opt.type);
                return (
                  <button key={opt.type} onClick={()=>{
                    const now = new Date().toISOString().slice(0,10);
                    const newFb = { sku:showFeedback.sku, name:showFeedback.name,
                      type:opt.type, orderDow:todayDow, date:now, note:fbNote };
                    const updated = [...orderFeedbacks.filter(
                      f=>!(f.sku===showFeedback.sku&&f.orderDow===todayDow&&f.date===now)
                    ), newFb];
                    onSaveFeedbacks(updated);
                    setShowFeedback(null); setFbNote("");
                  }} style={{ flex:1, padding:"10px 8px", borderRadius:10,
                    border:"2px solid "+(isSelected?opt.color:T.b1),
                    background:isSelected?opt.color+"18":"transparent",
                    color:isSelected?opt.color:T.t2,
                    fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:F, textAlign:"center" }}>
                    {opt.label}
                  </button>
                );
              })}
            </div>
            <input value={fbNote} onChange={e=>setFbNote(e.target.value)}
              placeholder="메모 (선택)" maxLength={50}
              style={{ width:"100%", padding:"8px 12px", borderRadius:8,
                border:"1px solid "+T.b1, fontFamily:F, fontSize:13, marginBottom:10 }}/>
            <div style={{ fontSize:11, color:T.t4, fontFamily:F }}>
              피드백은 다음 발주 추천에 자동 반영돼요 (같은 요일 기준 ±1~2개)
            </div>
            {/* 기존 피드백 목록 */}
            {orderFeedbacks.filter(f=>f.sku===showFeedback.sku).length > 0 && (

                <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginBottom:6 }}>이전 피드백</div>

                    <span style={{ color:f.type==="shortage"?T.red:f.type==="excess"?T.amber:T.brand, fontWeight:700 }}>
                      {f.type==="shortage"?"부족":f.type==="excess"?"과잉":"적정"}

                ))}
              </div>

          </div>
        </div>
      )}

      {/* 당일폐기 설정 패널 */}
      {showSameDayEdit && (() => {
        // 전체 SKU 목록 (최신 업로드 기준)
        const allSkus = latestUpload
          ? Object.entries(latestUpload.items)
              .filter(([,i]) => {
                const n = (skuAliases[i.sku]||i.name||"").toLowerCase();
                return !sdSearch || n.includes(sdSearch.toLowerCase());
              })
              .sort((a,b) => a[1].name.localeCompare(b[1].name))
          : [];
        // 수동 설정된 것 먼저
        const manualSet  = allSkus.filter(([sku]) => sameDaySkus[sku] === true);
        const manualOff  = allSkus.filter(([sku]) => sameDaySkus[sku] === false);
        const autoOn     = allSkus.filter(([sku]) => sameDaySkus[sku] === undefined && getDdayRate(sku) >= 0.6);
        const rest       = allSkus.filter(([sku]) => sameDaySkus[sku] === undefined && getDdayRate(sku) < 0.6);
        const ordered    = [...manualSet, ...manualOff, ...autoOn, ...rest];
        return (
          <Card style={{ marginBottom:14, padding:"14px" }}>
            <div style={{ fontSize:13, fontWeight:700, color:T.t1, fontFamily:F, marginBottom:6 }}>
              🗑 당일폐기 품목 설정
            </div>
            <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginBottom:12, lineHeight:1.7 }}>
              당일폐기로 설정하면 현재 재고를 발주 계산에서 제외하고 버퍼를 최소화해요.<br/>
              <b>자동</b> = 데이터 기반 자동 감지 · <b style={{color:T.red}}>강제 ON</b> = 항상 당일폐기 · <b style={{color:T.blue}}>강제 OFF</b> = 절대 당일폐기 안 함
            </div>
            {/* 검색 */}
            <input value={sdSearch} onChange={e=>setSdSearch(e.target.value)}
              placeholder="품목명 검색..."
              style={{ width:"100%", padding:"7px 12px", borderRadius:8,
                border:"1px solid "+T.b1, fontFamily:F, fontSize:13,
                background:T.card, color:T.t1, marginBottom:10 }}/>
            {/* 목록 */}
            <div style={{ maxHeight:360, overflowY:"auto", border:"1px solid "+T.b0, borderRadius:10, padding:"6px 8px" }}>
              {ordered.map(([sku, item]) => {
                const dispName = skuAliases[sku]||item.name;
                const override = sameDaySkus[sku]; // true|false|undefined

                const effectiveState = override === true ? "on"
                  : override === false ? "off"
                  : autoDetect ? "auto-on" : "auto-off";
                const stateColor = effectiveState==="on" ? T.red
                  : effectiveState==="off" ? T.blue
                  : effectiveState==="auto-on" ? T.amber : T.t4;
                const stateLabel = effectiveState==="on" ? "강제 당일폐기"
                  : effectiveState==="off" ? "강제 해제"
                  : effectiveState==="auto-on" ? `자동 ON (${ddayPct}%)`
                  : `자동 OFF (${ddayPct}%)`;
                return (
                  <div key={sku} style={{ display:"flex", alignItems:"center", gap:8,
                    padding:"8px 6px", borderBottom:"1px solid "+T.b0+"44" }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, color:T.t1, fontFamily:F,
                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                        fontWeight: effectiveState==="on"||effectiveState==="auto-on" ? 600 : 400 }}>
                        {dispName}
                      </div>
                      <div style={{ fontSize:10, color:stateColor, fontFamily:F }}>{stateLabel}</div>
                    </div>
                    {/* 3-way 토글: ON / 자동 / OFF */}
                    <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                      {[
                        { val:true,      label:"당일폐기",  color:T.red,  dim:T.rDim },
                        { val:undefined, label:"자동",      color:T.t3,   dim:T.card2 },
                        { val:false,     label:"해제",      color:T.blue, dim:T.bDim },
                      ].map(opt => {

                          <button key={String(opt.val)} onClick={()=>{
                            const updated = {...sameDaySkus};
                            if (opt.val === undefined) delete updated[sku];
                            else updated[sku] = opt.val;

                          }} style={{
                            padding:"4px 8px", borderRadius:6, cursor:"pointer",
                            border:"1px solid "+(isActive?opt.color:T.b1),

          <div style={{ maxHeight:360, overflowY:"auto",
            border:"1px solid "+T.b0, borderRadius:10, padding:"8px 10px" }}>

              : null;
            const avgSold = (() => {

              else if (minDday <= 5)  { suggested = Math.max(1, Math.ceil(avgSold*1.0)); suggLabel="D-"+minDday; suggColor=T.amber; }
              else if (minDday <= 10) { suggested = Math.max(2, Math.ceil(avgSold*1.5)); suggLabel="D-"+minDday; suggColor=T.brand; }
              else                    { suggested = Math.max(2, Math.ceil(avgSold*2.0)); suggLabel="여유"; suggColor=T.t3; }

              suggested = Math.max(2, Math.ceil(avgSold*2.0)); suggLabel="기본"; suggColor=T.t3;

                    {skuAliases[sku]||item.name}
                  </div>
                  <div style={{ fontSize:10, color:suggColor, fontFamily:F }}>

                  </div>
                </div>
                <input type="number" min="0" step="1" value={cur}
                  onChange={e => setBufEdit(b=>({...b,[key]:e.target.value}))}
                  onBlur={e => {
                    // DOM 값 직접 읽기 → stale closure 완전 우회
                    const val = parseFloat(e.target.value);
                    if (!isNaN(val) && val !== (buffers[key]??2)) {
                      onSaveBuffers({...buffers,[key]:val});
                    }
                    setBufEdit(b=>{ const n={...b}; delete n[key]; return n; });
                  }}
                  onKeyDown={e => {
                    if (e.key === "Enter") {
                      e.target.blur(); // Enter로도 저장

                  style={{ width:58, padding:"6px 8px", borderRadius:8,

                    fontSize:13, fontFamily:F, textAlign:"center", outline:"none",
                    color:isSame?T.t1:T.brand, fontWeight:isSame?400:700 }}/>
                {!isSame && (
                  <button onClick={()=>{
                    onSaveBuffers({...buffers,[key]:suggested});
                    // bufEdit에서 제거 → buffers prop 새 값 즉시 반영
                    setBufEdit(b=>{ const n={...b}; delete n[key]; return n; });
                  }} style={{ padding:"4px 8px", borderRadius:6, border:"none",
                    background:T.brandDim, color:T.brand, fontSize:11,
                    fontWeight:700, cursor:"pointer", fontFamily:F, flexShrink:0 }}>
                    적용
                  </button>
                )}
              </div>
            );
          })}
          </div>{/* 스크롤 컨테이너 끝 */}
        </Card>
      )}

      {/* 카테고리 필터 */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
        {cats.map(c => (
          <button key={c} onClick={() => setCatFilter(c)} style={{

        <div style={{ display:"grid", gridTemplateColumns:"1.6fr 0.7fr 0.6fr 0.6fr 0.7fr 0.6fr 0.9fr 0.6fr",

        {sortedItems.map(([sku, item], idx) => {
          const { rec, avg1, avg2, totalUsage, buf, current, effectiveStock, expiringStock, tmrIn, d2In, dow1, dow2, wasteAdj=0, feedbackClamp=0, learnAdj=0, learnInsight=null, learnSampleSize=0, isSameDay=false, ddayRate=0, currentWasteRate=0 } = calcRecommend(sku, item);
          const dispName = skuAliases[sku] || item.name;
          const isNeed = rec > 0;
          return (
            <div key={sku} style={{ display:"grid", gridTemplateColumns:"1.6fr 0.7fr 0.6fr 0.6fr 0.7fr 0.6fr 0.9fr 0.6fr",
              padding:"10px 14px", gap:4, alignItems:"center",
              background: isNeed ? (idx%2===0?"rgba(255,149,0,0.04)":"rgba(255,149,0,0.02)") : (idx%2===0?T.card2:T.card),
              borderTop:idx>0?"1px solid "+T.b0:"none" }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:T.t1, fontFamily:F,
                  overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {dispName}
                </div>
                <div style={{ display:"flex", gap:4, alignItems:"center", marginTop:1 }}>
                  <span style={{ fontSize:10, color:T.t3, fontFamily:F }}>{item.cat}</span>
                  {isSameDay && (
                    <span style={{ fontSize:9, fontWeight:700, color:T.amber,
                      background:T.aDim, borderRadius:4, padding:"0px 4px",
                      lineHeight:"14px" }} title={`D-day 출현율 ${ddayRate}% — 재고 폐기 반영`}>
                      당일소진 {ddayRate}%
                    </span>
                  )}
                </div>
              </div>
              <div style={{ textAlign:"center", fontFamily:F }}>
                <div style={{ fontSize:13, fontWeight:current===0?700:400,
                  color:current===0?T.red:T.t1 }}>{current}</div>
                {isSameDay && current > 0 && (
                  <div style={{ fontSize:9, color:T.amber, lineHeight:1.2 }}>오늘 전량폐기</div>
                )}
                {!isSameDay && expiringStock > 0 && (
                  <div style={{ fontSize:9, color:T.red, lineHeight:1.2 }}>폐기예정 -{expiringStock}</div>
                )}
                {currentWasteRate > 0 && Math.abs(currentWasteRate - wasteTarget) > 2 && (
                  <div style={{ fontSize:9, lineHeight:1.2,
                    color:currentWasteRate > wasteTarget ? T.amber : T.blue }}>

              </div>
              <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}
                title={DOW_KR[dow1]+"요일 평균"}>{avg1||"-"}</div>
              <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}

              <div style={{ textAlign:"center", fontSize:12, color:T.t3, fontFamily:F }}>{buf}</div>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontSize:15, fontWeight:800,
                  color:isNeed?T.brand:T.t4, fontFamily:F }}>
                  {isNeed ? "▶ "+rec : "✓"}
                </div>
                {(wasteAdj!==0||feedbackClamp!==0||learnAdj!==0) && (
                  <div style={{ fontSize:9, color:T.t4, lineHeight:1.4 }}>
                    {learnAdj!==0&&(
                      <span style={{ color:learnAdj>0?T.red:T.blue, fontWeight:700 }}
                        title={learnInsight||""}>
                        🧠{learnAdj>0?"+":""}{learnAdj}
                      </span>
                    )}
                    {wasteAdj!==0&&<span style={{color:T.t4}}> 폐기{wasteAdj>0?"+":""}{wasteAdj}</span>}
                    {feedbackClamp!==0&&<span style={{color:T.t4}}> 피드백{feedbackClamp>0?"+":""}{feedbackClamp}</span>}
                  </div>
                )}
                {learnInsight && learnAdj!==0 && (
                  <div style={{ fontSize:8, color:learnAdj>0?T.red:T.blue, lineHeight:1.2 }}>
                    {learnInsight}
                  </div>
                )}
              </div>
              {/* 피드백 버튼 */}
              <div style={{ textAlign:"center" }}>
                <button onClick={()=>setShowFeedback({sku, name:dispName})} style={{
                  padding:"3px 7px", borderRadius:6, border:"1px solid "+T.b1,
                  background:"transparent", fontSize:11, cursor:"pointer",
                  color:orderFeedbacks.some(f=>f.sku===sku&&f.orderDow===todayDow)?T.brand:T.t4,
                  fontFamily:F }}>
                  {orderFeedbacks.some(f=>f.sku===sku&&f.orderDow===todayDow)?"📝✓":"📝"}
                </button>
              </div>
            </div>
          );
        })}
      </Card>
      <div style={{ fontSize:11, color:T.t3, fontFamily:F, marginTop:8 }}>
        * 당일소진(D-day 60%↑) 품목은 현재고 무효처리 · 버퍼 최소화 · 폐기율 자동 반영 · 🧠 학습 보정 · 📝 피드백 학습
      </div>
    </div>
  );
}

/* ─── 수동 입력 탭 (기존 OrderTab 개선) ─────────── */
function ManualTab({ records, items, buffers, onSaveRecords, onSaveItems, onSaveBuffers }) {
  const [mode, setMode] = useState("input");
  const [inputDate, setInputDate] = useState(todayStr);
  const [form, setForm] = useState({});
  const [skippedItems, setSkippedItems] = useState({});
  const [newItem, setNewItem] = useState("");
  const [bufEdit, setBufEdit] = useState({});
  const [statsItem, setStatsItem] = useState(() => items && items[0] ? items[0] : "");
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const DOW_KR_LOCAL = ["일","월","화","수","목","금","토"];

  const recordsRef = useRef(records);
  recordsRef.current = records;
  const itemsRef = useRef(items);
  itemsRef.current = items;

  useEffect(() => {
    const recs = recordsRef.current;
    const itms = itemsRef.current;
    const existRec = recs.find(r => r.date === inputDate);
    const init = {};
    const initSkipped = {};
    if (existRec) {
      itms.forEach(item => {
        const d = existRec.items[item] || {};
        if (d.skipped) { initSkipped[item] = true; init[item] = { prev:"", received:"", closing:"" }; }
        else { init[item] = { prev:String(d.prev??""), received:String(d.received??""), closing:String(d.closing??"") }; }
      });
    } else {
      itms.forEach(item => {
        const prevRec = recs.filter(r=>r.date<inputDate&&!r.items?.[item]?.skipped&&r.items?.[item]?.closing!=null)
          .sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
        const prevClosing = prevRec?(prevRec.items[item]?.closing??""):"";
        init[item] = { prev:String(prevClosing!==""?prevClosing:""), received:"", closing:"" };
      });
    }
    setForm(init);
    setSkippedItems(initSkipped);
  }, [inputDate]);

  function calcUsed(prev, received, closing) {
    const p=parseFloat(prev)||0, r=parseFloat(received)||0, c=parseFloat(closing)||0;
    if (prev===""&&received===""&&closing==="") return null;
    return Math.max(0,p+r-c);
  }

  function getAvgByDow(item, dow) {
    const vals = records.filter(r=>r.dow===dow&&!r.items?.[item]?.skipped&&r.items?.[item]?.used>0)
      .map(r=>r.items[item].used);
    if (!vals.length) return null;
    return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
  }

  function getRecommend(item) {
    const baseDow = new Date(inputDate+"T00:00:00").getDay();
    const todayRec = records.find(r=>r.date===inputDate);
    const currentStock = todayRec?(todayRec.items[item]?.closing??0):0;
    const dow1=(baseDow+1)%7, dow2=(baseDow+2)%7;
    const avg1=parseFloat(getAvgByDow(item,dow1))||0;
    const avg2=parseFloat(getAvgByDow(item,dow2))||0;
    const totalAvgUsage=avg1+avg2;
    const buf=parseFloat(buffers[item])||2;
    const rec=Math.max(0,Math.ceil(totalAvgUsage+buf-currentStock));
    return {rec,avg1,avg2,totalAvgUsage,buf,currentStock,dow1,dow2};
  }

  function getWeeklyStats(item) {
    const sorted=[...records].sort((a,b)=>b.date.localeCompare(a.date));
    const weeks=[];
    sorted.forEach(r=>{
      const d=new Date(r.date+"T00:00:00");
      const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk=mon.toISOString().slice(0,10);
      let w=weeks.find(x=>x.week===wk);
      if(!w){w={week:wk,days:{}}; weeks.push(w);}
      w.days[r.dow]=r.items?.[item]?.skipped?"누락":(r.items?.[item]?.used??null);
    });
    return weeks.slice(0,8).reverse();
  }

  function handleSaveRecord() {
    const dow=new Date(inputDate+"T00:00:00").getDay();
    const itemData={};
    items.forEach(item=>{
      if(skippedItems[item]){
        itemData[item]={skipped:true,prev:0,received:0,closing:0,used:0};
      } else {
        const f=form[item]||{};
        const used=calcUsed(f.prev,f.received,f.closing);
        itemData[item]={prev:parseFloat(f.prev)||0,received:parseFloat(f.received)||0,closing:parseFloat(f.closing)||0,used:used!==null?used:0};
      }
    });
    const newRec={date:inputDate,dow,items:itemData};
    const exists=records.findIndex(r=>r.date===inputDate);
    let updated;
    if(exists>=0){updated=records.map((r,i)=>i===exists?newRec:r);}
    else{updated=[...records,newRec].sort((a,b)=>a.date.localeCompare(b.date));}
    onSaveRecords(updated);
    alert("저장되었습니다 ✓");
  }

      }
      return next;
    });
  }
